<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>PyLingo — Learn Python, NumPy & Pandas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fcf8ec; --card:#fffcf3; --ink:#1f1f1f; --ink2:#3a3a3a; --muted:#6f6f6f;
  --line:#e6e0c8; --line-d:#d4cda8;
  --green:#46a302; --green-sh:#3a8501;
  --blue:#1e8df3; --blue-sh:#1873cd;
  --red:#e0463a; --red-sh:#b8392f;
  --gold:#f59e0b; --gold-sh:#c77400;
  --orange:#ff9600; --orange-sh:#d97e00;
  --purple:#8b5cf6; --purple-sh:#7c3aed;
  --teal:#0d9488; --teal-sh:#0f766e;
  --py-yellow:#ffd43b; --py-blue:#3776ab;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:Nunito,system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-weight:700;-webkit-font-smoothing:antialiased;overflow-x:hidden}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit;padding:0}
input,textarea{font:inherit}
code,pre,.mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-weight:500}
h1,h2,h3,h4{font-weight:900;letter-spacing:-.5px}
.app{max-width:760px;margin:0 auto;min-height:100%;display:flex;flex-direction:column}

/* Topbar */
.topbar{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:2px solid var(--line);padding:10px 14px;display:flex;align-items:center;gap:10px}
.brand{display:flex;align-items:center;gap:6px;font-weight:900;font-size:17px;letter-spacing:-.3px}
.brand-logo{font-size:22px}
.brand b{color:var(--py-blue)}
.stat-pill{display:flex;align-items:center;gap:4px;background:var(--card);border:2px solid var(--line);border-radius:14px;padding:4px 10px;font-weight:900;font-size:13px;box-shadow:0 2px 0 var(--line)}
.stat-pill.fire{color:#ea580c;border-color:#fed7aa;box-shadow:0 2px 0 #fed7aa}
.stat-pill.xp{color:var(--blue-sh);border-color:#bfdbfe;box-shadow:0 2px 0 #bfdbfe}
.glossary-btn{margin-left:auto;background:var(--card);border:2px solid var(--line);border-radius:12px;padding:6px 10px;font-weight:900;font-size:13px;box-shadow:0 2px 0 var(--line)}

/* Main */
main{flex:1;padding:14px;padding-bottom:90px}

/* Hero */
.hero{background:linear-gradient(135deg,var(--py-yellow),#ffeb70);border:2px solid #d4a017;border-radius:18px;padding:20px;margin-bottom:14px;box-shadow:0 4px 0 #b8870e}
.hero h1{font-size:22px;letter-spacing:-.5px;color:#3a2f00;margin-bottom:4px}
.hero p{color:#5a4500;font-weight:700;font-size:13.5px;line-height:1.5}
.banner{background:linear-gradient(135deg,#dbeafe,#e0e7ff);border:2px solid #93c5fd;border-radius:14px;padding:12px 14px;margin-bottom:14px;display:flex;gap:10px;align-items:center;box-shadow:0 3px 0 #93c5fd}
.banner-icon{font-size:22px}
.banner-text{font-size:13px;line-height:1.45;color:#1e3a8a;font-weight:700}

/* Featured cards */
.featured{background:linear-gradient(135deg,#fee2e2,#fecaca);border:2px solid var(--red);border-radius:16px;padding:14px;margin-bottom:14px;display:grid;grid-template-columns:48px 1fr;gap:12px;align-items:center;box-shadow:0 4px 0 var(--red-sh)}
.featured-icon{font-size:28px}
.featured-content h2{font-size:16px;color:#7f1d1d;letter-spacing:-.3px;margin-bottom:3px}
.featured-content p{font-size:12px;color:#991b1b;font-weight:700;margin-bottom:8px;line-height:1.35}
.featured-actions{display:flex;gap:6px;flex-wrap:wrap}
.featured-btn{background:#fff;color:#7f1d1d;border:1.5px solid #fca5a5;border-radius:10px;padding:6px 11px;font-size:12px;font-weight:900;cursor:pointer}
.featured-btn:hover{background:#fef2f2}
.featured.interview-card{background:linear-gradient(135deg,#ede9fe,#ddd6fe);border-color:var(--purple);box-shadow:0 4px 0 var(--purple-sh)}
.featured.interview-card .featured-content h2{color:#4c1d95}
.featured.interview-card .featured-content p{color:#5b21b6}
.featured.interview-card .featured-btn{color:#4c1d95;border-color:#c4b5fd}

/* Section heading */
.section-heading{font-size:19px;font-weight:900;letter-spacing:-.3px;margin:22px 0 6px;display:flex;gap:8px;align-items:center}
.section-sub{font-size:12.5px;color:var(--muted);font-weight:700;margin-bottom:10px;line-height:1.45}

/* Module map */
.map{display:flex;flex-direction:column;gap:10px}
.mod{background:var(--card);border:2px solid var(--line);border-radius:14px;padding:14px;cursor:pointer;display:grid;grid-template-columns:50px 1fr auto;gap:12px;align-items:center;text-align:left;width:100%;transition:transform .1s,box-shadow .1s;box-shadow:0 3px 0 var(--line)}
.mod:hover{transform:translateY(-2px);box-shadow:0 5px 0 var(--line)}
.mod.done{border-color:var(--green);background:#f0fdf4;box-shadow:0 3px 0 var(--green-sh)}
.mod-icon{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;flex-shrink:0;box-shadow:inset 0 -3px 0 rgba(0,0,0,.15)}
.mod-title{font-size:15px;font-weight:900;letter-spacing:-.1px;line-height:1.25}
.mod-desc{font-size:12px;color:var(--muted);font-weight:600;margin-top:2px;line-height:1.4}
.mod-meta{display:flex;gap:6px;margin-top:6px;align-items:center}
.diff{padding:2px 7px;border-radius:5px;font-size:9.5px;font-weight:900;letter-spacing:.3px;text-transform:uppercase}
.diff.beginner{background:#e3f7d2;color:#3d7300}
.diff.intermediate{background:#fff0d6;color:#9c5d00}
.diff.advanced{background:#ffe0e0;color:#9c2222}
.diff.numpy{background:#dbeafe;color:#1d4ed8}
.diff.pandas{background:#e8defb;color:#5e2c9e}
.mod-arrow{font-size:20px;color:var(--muted);font-weight:900}

/* Card system */
article.card{background:var(--card);border:2px solid var(--line);border-radius:18px;padding:22px;margin-bottom:14px;position:relative;box-shadow:0 4px 0 var(--line)}
.card-badge{position:absolute;top:-10px;left:18px;padding:3px 10px;border-radius:8px;font-size:10px;font-weight:900;letter-spacing:.4px;text-transform:uppercase}
.b-concept{background:#dbeafe;color:#1d4ed8}
.b-syntax{background:#e9d5ff;color:#6b21a8}
.b-example{background:#d1fae5;color:#065f46}
.b-question{background:#ffedd5;color:#9a3412}
.b-pitfall{background:#fee2e2;color:#991b1b}
.b-summary{background:#fef3c7;color:#92400e}
.card h2{font-size:19px;letter-spacing:-.3px;margin-bottom:8px}
.card h3{font-size:15px;margin-top:14px;margin-bottom:5px;letter-spacing:-.2px}
.card p{font-size:14px;line-height:1.6;color:var(--ink2);font-weight:600;margin:6px 0}
.card p b{color:var(--ink);font-weight:900}
.card ul{margin:8px 0 6px 18px;font-size:13.5px;line-height:1.7;color:var(--ink2)}
.card li{margin-bottom:3px}
.card code{font-family:'JetBrains Mono',monospace;background:rgba(0,0,0,.07);padding:1px 6px;border-radius:5px;font-size:12.5px;color:var(--ink);font-weight:600}

.card-concept{border-color:#bfdbfe;box-shadow:0 4px 0 #93c5fd}
.card-syntax{border-color:#ddd6fe;box-shadow:0 4px 0 #c4b5fd}
.card-example{border-color:#a7f3d0;box-shadow:0 4px 0 #6ee7b7}
.card-question{border-color:#fed7aa;box-shadow:0 4px 0 #fdba74}
.card-pitfall{border-color:#fecaca;box-shadow:0 4px 0 #fca5a5}
.card-summary{border-color:#fde68a;box-shadow:0 4px 0 #fcd34d}

/* Code block */
pre.code{background:#1e1e2e;color:#cdd6f4;padding:13px 14px;border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.55;overflow-x:auto;white-space:pre;font-weight:500;margin:8px 0}
pre.code .kw{color:#f9e2af}
pre.code .str{color:#a6e3a1}
pre.code .num{color:#fab387}
pre.code .com{color:#7f849c;font-style:italic}
pre.code .fn{color:#89b4fa}
pre.code .builtin{color:#cba6f7}

/* Inline result/output */
.note{background:#fff7e0;border-left:3px solid var(--gold);padding:9px 12px;border-radius:8px;font-size:13px;line-height:1.5;color:#7a4a00;font-weight:700;margin-top:8px}
.real{background:#ecfdf5;border-left:3px solid var(--green);padding:9px 12px;border-radius:8px;font-size:13px;line-height:1.5;color:#065f46;font-weight:700;margin-top:8px}
.result-label{font-size:10.5px;font-weight:900;letter-spacing:.4px;color:var(--muted);text-transform:uppercase;margin-top:10px;margin-bottom:5px}

/* Mini-table */
.minit{font-family:'JetBrains Mono',monospace;font-size:11.5px;border-collapse:collapse;width:100%;margin:6px 0}
.minit .mt-name{font-size:11px;font-weight:900;letter-spacing:.3px;color:var(--muted);text-transform:uppercase;text-align:left;padding-bottom:4px;padding-top:8px}
.minit thead th{background:#1e1e2e;color:#cdd6f4;padding:6px 8px;text-align:left;font-weight:700;border:1px solid #313244}
.minit tbody td{padding:5px 8px;border:1px solid var(--line);background:#fff}
.minit tbody td.null{color:#94a3b8;font-style:italic;background:#fafafa}
.minit tbody tr:nth-child(2n) td{background:#fcfcfc}

/* Question */
.q-prompt{font-size:15px;font-weight:800;line-height:1.5;margin-bottom:12px}
.options{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.opt{background:#fff;border:2px solid var(--line);border-radius:12px;padding:11px 13px;font-size:13.5px;font-weight:700;cursor:pointer;text-align:left;transition:all .12s;line-height:1.45}
.opt:hover{border-color:var(--blue)}
.opt.selected{border-color:var(--blue);background:#eff6ff}
.opt.correct{border-color:var(--green);background:#dcfce7;color:var(--green-sh)}
.opt.wrong{border-color:var(--red);background:#fee2e2;color:var(--red-sh)}
.opt code{background:rgba(0,0,0,.07);padding:1px 5px;border-radius:4px;font-size:12px}
.blank-input{font-family:'JetBrains Mono',monospace;border:2px solid var(--line);border-radius:10px;padding:9px 12px;font-size:14px;font-weight:600;background:#fff;min-width:200px;outline:none}
.blank-input:focus{border-color:var(--blue)}
.blank-input.correct{border-color:var(--green);background:#dcfce7}
.blank-input.wrong{border-color:var(--red);background:#fee2e2}

/* Progress */
.progress-bar{background:var(--line);height:8px;border-radius:4px;overflow:hidden;margin-bottom:14px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),#0ea5e9);border-radius:4px;transition:width .3s}

/* Buttons */
.btn{padding:11px 18px;border-radius:12px;font-weight:900;font-size:14px;letter-spacing:-.1px;cursor:pointer;transition:transform .08s;min-height:42px;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:var(--blue);color:#fff;box-shadow:0 3px 0 var(--blue-sh)}
.btn-primary:active{transform:translateY(2px);box-shadow:0 1px 0 var(--blue-sh)}
.btn-secondary{background:#fff;color:var(--ink);border:2px solid var(--line);box-shadow:0 3px 0 var(--line)}
.btn-secondary:active{transform:translateY(2px);box-shadow:0 1px 0 var(--line)}
.btn-ghost{background:transparent;color:var(--muted);font-weight:800}
.btn-blue{background:var(--blue);color:#fff;box-shadow:0 3px 0 var(--blue-sh)}
.btn-green{background:var(--green);color:#fff;box-shadow:0 3px 0 var(--green-sh)}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* Lesson */
.lesson-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.close-btn{font-size:28px;line-height:1;color:var(--muted);width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900}
.close-btn:hover{background:rgba(0,0,0,.06)}

/* Feedback */
.feedback{position:fixed;left:0;right:0;bottom:0;background:#fff;padding:14px 18px;border-top:3px solid var(--line);transform:translateY(105%);transition:transform .25s;z-index:60}
.feedback.show{transform:translateY(0)}
.feedback.correct{background:#dcfce7;border-top-color:var(--green)}
.feedback.wrong{background:#fee2e2;border-top-color:var(--red)}
.fb-row{display:flex;align-items:center;gap:12px;max-width:760px;margin:0 auto}
.fb-title{font-size:17px;font-weight:900;letter-spacing:-.3px;flex:1}
.feedback.correct .fb-title{color:var(--green-sh)}
.feedback.wrong .fb-title{color:var(--red-sh)}
.fb-explain{font-size:13px;font-weight:600;color:var(--ink2);margin-top:4px;line-height:1.5;max-width:760px;margin-left:auto;margin-right:auto}
.fb-continue{background:var(--green);color:#fff;padding:10px 22px;border-radius:12px;font-weight:900;font-size:14px;box-shadow:0 3px 0 var(--green-sh)}
.feedback.wrong .fb-continue{background:var(--red);box-shadow:0 3px 0 var(--red-sh)}

/* Results */
.results{text-align:center;padding:24px 16px;background:var(--card);border-radius:18px;border:2px solid var(--line);box-shadow:0 4px 0 var(--line);margin-bottom:14px}
.trophy{font-size:64px;margin-bottom:8px}
.results h2{font-size:22px;margin-bottom:5px;letter-spacing:-.5px}
.results .subtitle{font-size:13px;color:var(--muted);font-weight:700;margin-bottom:14px}
.results-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}
.rs{background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:9px 6px}
.rs .v{font-size:22px;font-weight:900;letter-spacing:-.3px;color:var(--blue-sh)}
.rs .l{font-size:10.5px;font-weight:800;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;margin-top:2px}
.results-actions{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.footer-actions{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.footer-actions .right{display:flex;gap:8px}

/* Playground */
.pg-tables{display:flex;flex-direction:column;gap:8px;margin:10px 0}
.editor-wrap{position:relative;margin:10px 0}
.editor-wrap textarea{width:100%;min-height:170px;background:#1e1e2e;color:#cdd6f4;border:2px solid #313244;border-radius:10px;padding:11px 14px;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.55;resize:vertical;outline:none;font-weight:500}
.editor-wrap textarea:focus{border-color:var(--blue)}
.pg-actions{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.pg-actions .btn{padding:8px 13px;font-size:13px;min-height:38px}
.run-output{margin-top:10px}
.run-status{padding:10px 13px;border-radius:10px;font-size:13px;font-weight:800;line-height:1.4}
.run-status.ok{background:#dcfce7;color:var(--green-sh)}
.run-status.err{background:#fee2e2;color:var(--red-sh)}
.error-block{background:#fef2f2;border:1.5px solid #fecaca;border-radius:10px;padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#7f1d1d;margin-top:6px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word;font-weight:600}
.success-block{background:#dcfce7;border:1.5px solid #86efac;border-radius:10px;padding:10px 12px;font-size:13px;color:#14532d;margin-top:6px;line-height:1.5;font-weight:700}
.hint-block{background:#fef3c7;border:1.5px solid #fde68a;border-radius:10px;padding:10px 12px;font-size:13px;color:#78350f;margin-top:6px;line-height:1.5;font-weight:700}
.diff-block{background:#fff7e0;border:1.5px solid #fde68a;border-radius:10px;padding:10px 12px;margin-top:6px}
.pg-loading{padding:30px;text-align:center;color:var(--muted);font-weight:700;font-size:14px}
.spin{display:inline-block;animation:spin 1s linear infinite;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Challenge list */
.challenge-list{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.challenge-item{background:var(--card);border:2px solid var(--line);border-radius:12px;padding:11px 13px;cursor:pointer;display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;text-align:left;width:100%;transition:transform .08s,box-shadow .1s;box-shadow:0 2px 0 var(--line)}
.challenge-item:hover{transform:translateY(-1px);box-shadow:0 3px 0 var(--line)}
.challenge-item.done{background:#f0fdf4;border-color:var(--green)}
.ci-icon{font-size:18px;width:32px;height:32px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center}
.ci-title{font-weight:800;font-size:13.5px;letter-spacing:-.1px}
.ci-prompt{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:1px;line-height:1.4}

/* Interview */
.interview-bar{position:sticky;top:54px;background:var(--card);border:2px solid var(--purple);border-radius:14px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:14px;box-shadow:0 3px 0 var(--purple-sh);z-index:40;flex-wrap:wrap}
.iv-timer{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:900;color:var(--purple-sh);letter-spacing:-.5px;min-width:78px}
.iv-timer.urgent{color:var(--red);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.iv-meta{display:flex;gap:18px;font-size:11.5px;font-weight:800;color:var(--muted)}
.iv-meta-item{display:flex;flex-direction:column}
.iv-meta-item .val{font-size:16px;color:var(--ink);font-weight:900;font-family:'JetBrains Mono',monospace}
.iv-meta-item .lbl{font-size:9.5px;letter-spacing:.4px;text-transform:uppercase}
.iv-abort{margin-left:auto;background:#fee2e2;color:var(--red-sh);padding:5px 10px;border-radius:8px;font-size:11.5px;font-weight:900}

.iv-diff-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:14px 0}
.iv-diff-btn{background:#fff;border:2px solid var(--line);border-radius:12px;padding:12px 6px;font-weight:900;font-size:13px;cursor:pointer;box-shadow:0 3px 0 var(--line);text-align:center}
.iv-diff-btn.active{background:var(--purple);color:#fff;border-color:var(--purple-sh);box-shadow:0 3px 0 var(--purple-sh)}
.iv-diff-btn .lbl{font-size:10px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;margin-top:2px;opacity:.75}
.iv-dur-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0 14px}

/* Mentor */
.mentor-card{background:linear-gradient(135deg,#fefce8,#fef3c7);border:2px solid #f59e0b;border-radius:14px;padding:14px;margin-top:12px;box-shadow:0 4px 0 rgba(245,158,11,.25)}
.mentor-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.mentor-avatar{font-size:22px;width:38px;height:38px;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 0 rgba(0,0,0,.1)}
.mentor-info{flex:1;min-width:0}
.mentor-name{font-weight:900;font-size:13.5px;color:#7a4a00;letter-spacing:-.2px;line-height:1.2}
.mentor-tag{font-size:10px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:#a16207;margin-top:2px}
.mentor-close{font-size:18px;color:#a16207;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:900}
.mentor-title{font-size:14.5px;font-weight:900;letter-spacing:-.2px;color:#7a4a00;margin-bottom:8px;line-height:1.35}
.mentor-title code{background:rgba(0,0,0,.07);padding:1px 6px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:12.5px;font-weight:700;color:#5a3a00}
.mentor-hint{background:#fff;border-radius:10px;padding:11px 13px;font-size:13.5px;line-height:1.6;color:#3f2a00;font-weight:600}
.mentor-hint code{background:rgba(0,0,0,.08);padding:2px 6px;border-radius:5px;font-size:12px;font-family:'JetBrains Mono',monospace}
.mentor-progress{font-size:10.5px;font-weight:900;color:#a16207;margin-top:8px;letter-spacing:.4px;text-transform:uppercase}
.mentor-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.mentor-actions .btn{padding:8px 14px;font-size:12.5px;min-height:36px}
.mentor-encouragement{background:#fff;border-radius:10px;padding:11px 13px;font-size:13.5px;line-height:1.6;color:#3d7300;font-weight:700;border-left:3px solid var(--green)}
.btn-mentor{background:#fef3c7;color:#7a4a00;border:2px solid #f59e0b;box-shadow:0 3px 0 #c77400;font-weight:800}

/* Adaptive */

<script>
"use strict";

/* ============ Helpers ============ */
const $ = sel => document.querySelector(sel);
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

/* Python syntax highlighter */
const PY_KW = ['False','None','True','and','as','assert','async','await','break','class','continue','def','del','elif','else','except','finally','for','from','global','if','import','in','is','lambda','nonlocal','not','or','pass','raise','return','try','while','with','yield','match','case'];
const PY_BUILTIN = ['print','len','range','int','float','str','list','dict','set','tuple','bool','type','open','enumerate','zip','map','filter','sum','min','max','abs','round','sorted','reversed','any','all','isinstance','hasattr','getattr','setattr','input','format','repr','iter','next','id','help','dir'];
function hl(code){
  let s = esc(code);
  // ORDER MATTERS. We do passes that inject <span class="..."> in the order
  // that prevents later passes from matching content we just injected.
  //   - Keywords FIRST: nothing has been injected yet, so `class` only matches Python source.
  //   - Builtins: same reason, before any injection has `(`-followed builtin names.
  //   - Numbers: our injected spans contain no digits.
  //   - Strings: regex matches HTML-entity quotes (&quot;); our injected spans use LITERAL ".
  //   - Comments: our injected spans contain no `#`.
  // Function-def name highlight runs at the end on the already-injected "def" span.

  // 1. keywords
  PY_KW.forEach(k => {
    const re = new RegExp('\\b' + k + '\\b', 'g');
    s = s.replace(re, '<span class="kw">' + k + '</span>');
  });
  // 2. builtins (only when followed by an open paren)
  PY_BUILTIN.forEach(b => {
    const re = new RegExp('\\b' + b + '\\b(?=\\()', 'g');
    s = s.replace(re, '<span class="builtin">' + b + '</span>');
  });
  // 3. numbers
  s = s.replace(/\b(\d+\.?\d*)\b/g, '<span class="num">$1</span>');
  // 4. strings (triple-quoted first, then single-line)
  s = s.replace(/&quot;&quot;&quot;[\s\S]*?&quot;&quot;&quot;|&#039;&#039;&#039;[\s\S]*?&#039;&#039;&#039;/g, m => '<span class="str">' + m + '</span>');
  s = s.replace(/f?&quot;[^&\n]*?&quot;|f?&#039;[^&\n]*?&#039;/g, m => '<span class="str">' + m + '</span>');
  // 5. comments — wrap each comment from # to end of line (which may already contain inner spans)
  s = s.replace(/#[^\n]*/g, m => '<span class="com">' + m + '</span>');
  // 6. function defs: when "def" was wrapped above, attach the following name as a fn span
  s = s.replace(/<span class="kw">def<\/span>\s+(\w+)/g, '<span class="kw">def</span> <span class="fn">$1</span>');
  return s;
}

/* Mini-table helper for showing DataFrame/list outputs */
function T(name, colsStr, rows){
  return {name, cols: colsStr.split(',').map(s => s.trim()), rows};
}
function renderTable(t){
  if(!t) return '';
  const thead = `<thead><tr>${t.cols.map(c => `<th>${esc(c)}</th>`).join('')}</tr></thead>`;
  const tbody = `<tbody>${t.rows.map(r => `<tr>${r.map(v => {
    if(v === null || v === undefined) return '<td class="null">NaN</td>';
    return `<td>${esc(String(v))}</td>`;
  }).join('')}</tr>`).join('')}</tbody>`;
  return `<div class="mt-name">${esc(t.name)}</div><table class="minit">${thead}${tbody}</table>`;
}
function renderTables(arr){return (arr||[]).map(renderTable).join('')}

/* ============ State ============ */
const DEFAULT_STATE = {xp:0, streak:0, lastPlayed:null, moduleProgress:{}};
function loadState(){
  try{
    const raw = localStorage.getItem('pylingo.v1');
    if(!raw) return {...DEFAULT_STATE};
    return {...DEFAULT_STATE, ...JSON.parse(raw)};
  }catch(e){return {...DEFAULT_STATE}}
}
function saveState(){try{localStorage.setItem('pylingo.v1', JSON.stringify(state))}catch(e){}}
let state = loadState();

(function migrateState(){
  function tk(){const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
  const today = new Date().toDateString();
  if(state.freezesAvailable === undefined) state.freezesAvailable = 1;
  if(!state.concepts) state.concepts = {};
  if(!state.questionSrs) state.questionSrs = {};
  if(!state.dailyGoal) state.dailyGoal = 10;
  if(!state.dailyProgress || state.dailyProgress.date !== tk()){
    state.dailyProgress = {date: tk(), completed: 0};
  }
  state.streakFrozeRecently = false;
  if(state.lastPlayed && state.lastPlayed !== today){
    const diff = (new Date(today) - new Date(state.lastPlayed))/86400000;
    if(diff === 2 && state.freezesAvailable > 0){
      state.freezesAvailable -= 1;
      const yest = new Date(); yest.setDate(yest.getDate() - 1);
      state.lastPlayed = yest.toDateString();
      state.streakFrozeRecently = true;
    } else if(diff > 1){
      state.streak = 0;
    }
  }
  saveState();
})();

  feedback.classList.add('show', correct?'correct':'wrong');
  fbTitle.textContent = correct ? randomCorrect() : 'Not quite';
  fbExplain.innerHTML = explain || '';
}
function randomCorrect(){
  const o = ['Nice!','Excellent!','You got it!','Crushed it!','Perfect.','Sharp!'];
  return o[Math.floor(Math.random()*o.length)];
}


/* ============ Module Data ============ */
const MODULES = [
/* 1 */ {id:1, title:"Variables, types & operators", icon:"🔤", color:"#22c55e", difficulty:"beginner",

y = 3.14      # float
name = "Asha" # str

nothing = None</pre>

/* 2 */ {id:2, title:"Strings & f-strings", icon:"📝", color:"#3b82f6", difficulty:"beginner",

s[0:5]      # 'hello'  (slice: start, stop[, step])
s[::-1]     # 'dlrow olleh'  (reverse)
len(s)      # 11</pre>`},

s.lower()

s.replace('o', '0')   # 'hell0 w0rld'

' '.join(['a','b','c'])  # 'a b c'
s.startswith('he')   # True
'42'.zfill(5)   # '00042'`,

     code:`d = {'a': 1, 'b': 2, 'c': 3}

# keys (default)
for k in d:
    print(k, d[k])

# items — cleanest:
for k, v in d.items():
    print(k, v)

# values
for v in d.values():
    print(v)

# dict comprehension
squares = {x: x**2 for x in range(5)}
# {0: 0, 1: 1, 2: 4, 3: 9, 4: 16}`,
     note:"As of Python 3.7+, dicts preserve insertion order. Don't rely on this for sets — sets are unordered."},
    {type:'example', title:"Sets: unique elements, fast membership",
     code:`# create
unique = set([1, 1, 2, 3, 2])    # {1, 2, 3}
tags = {'python', 'data'}        # set literal
empty = set()                    # NOT {} (that's a dict!)

# membership: O(1) — much faster than list 'in' for large data
'python' in tags                 # True

# set operations
a = {1, 2, 3}; b = {2, 3, 4}
a | b      # union {1,2,3,4}
a & b      # intersection {2,3}
a - b      # difference {1}
a ^ b      # symmetric diff {1,4}

# dedupe a list (loses order)
unique_words = list(set(words))`,
     walkthrough:"<p>Sets shine for membership tests on large collections and for deduplication. Just remember <code>{}</code> is an empty dict — use <code>set()</code> for an empty set.</p>"},
    {type:'question', kind:'mcq',
     question:"What does <code>d.get('missing', 0)</code> return when the key doesn't exist?",
     options:["KeyError", "<code>None</code>", "<code>0</code>", "<code>False</code>"], correct:2,
     explanation:"<code>.get(key, default)</code> returns the default if the key is missing — no exception."},
    {type:'question', kind:'mcq',
     question:"Which deduplicates a list?",
     options:["<code>list(set(xs))</code>", "<code>xs.unique()</code>", "<code>dedupe(xs)</code>", "<code>set.dedupe(xs)</code>"], correct:0,
     explanation:"Wrap in a <code>set</code> to drop duplicates, then back to a list. (Order is lost — use <code>list(dict.fromkeys(xs))</code> to preserve it.)"},
    {type:'pitfall', title:"Don't modify a dict while iterating",
     body:`<p>Adding or removing keys during iteration raises <code>RuntimeError</code>.</p>
           <pre class="code"># WRONG
for k in d:
    if d[k] is None:
        del d[k]    # RuntimeError

# RIGHT — collect keys first, then delete
to_remove = [k for k, v in d.items() if v is None]
for k in to_remove:
    del d[k]</pre>`},
    {type:'summary', title:"Recap", bullets:[
      "Dict access is O(1) average; keys must be hashable.",
      "Use <code>.get(k, default)</code> to avoid KeyError.",
      "Iterate items with <code>for k, v in d.items()</code>.",
      "Sets dedupe and have O(1) membership. Empty set: <code>set()</code>, not <code>{}</code>."
    ]}
  ]},

/* 5 */ {id:5, title:"Conditionals & loops", icon:"🔀", color:"#8b5cf6", difficulty:"beginner",
  description:"if/elif/else, for, while, break, continue, and Pythonic loop idioms.",
  cards:[
    {type:'concept', title:"if / elif / else",
     body:`<p>No parentheses, no braces — Python uses indentation.</p>
           <pre class="code">score = 87

if score >= 90:
    grade = 'A'
elif score >= 80:
    grade = 'B'
elif score >= 70:
    grade = 'C'
else:
    grade = 'F'

# ternary expression
status = 'pass' if score >= 60 else 'fail'</pre>
           <p>Use 4 spaces (not tabs) per level. Mixing causes <code>IndentationError</code>.</p>`},
    {type:'syntax', title:"for and while loops",
     code:`# range
for i in range(5):           # 0,1,2,3,4
    print(i)

for i in range(2, 10, 2):    # 2,4,6,8 (start, stop, step)
    print(i)

# iterate items
for fruit in ['apple','pear','plum']:
    print(fruit)

# iterate with index — enumerate!
for i, fruit in enumerate(fruits):
    print(i, fruit)

# parallel iteration
for name, score in zip(names, scores):
    print(name, score)

# while
n = 10
while n > 0:
    print(n)
    n -= 1`,
     note:"<code>enumerate</code> and <code>zip</code> beat manual index tracking. <code>enumerate(xs, start=1)</code> lets you start counting from 1."},
    {type:'example', title:"break, continue, else on loops",
     code:`# break — exit loop early
for x in nums:
    if x < 0:
        break        # stop iterating

# continue — skip rest of this iteration
for x in nums:
    if x % 2 == 0:
        continue     # skip evens
    print(x)         # only odds reach here

# for...else — runs if loop completes WITHOUT break
for x in nums:
    if x == target:
        print('found')
        break
else:
    print('not found')   # only if no break`,
     walkthrough:"<p>The <code>else</code> clause on a loop is uniquely Python. It runs only if the loop ran to completion (no <code>break</code>). Read it as 'no-break'.</p>"},
    {type:'question', kind:'mcq',
     question:"What does <code>list(range(1, 11, 2))</code> produce?",
     options:["<code>[1,3,5,7,9]</code>", "<code>[1,3,5,7,9,11]</code>", "<code>[2,4,6,8,10]</code>", "<code>[1,2,3,...,11]</code>"], correct:0,
     explanation:"range(start=1, stop=11 exclusive, step=2) → 1,3,5,7,9. Stop is NEVER included."},
    {type:'question', kind:'mcq',
     question:"Best way to iterate with both index and value?",
     options:[
       "<code>for i in range(len(xs)): print(i, xs[i])</code>",
       "<code>for i, x in enumerate(xs):</code>",
       "<code>for x in xs: print(xs.index(x), x)</code>",
       "<code>for i = 0; i < len(xs); i++</code>"
     ], correct:1,
     explanation:"<code>enumerate</code> is the Pythonic idiom. Option 3 is O(n²) and breaks on duplicates. Option 4 isn't even valid Python."},
    {type:'pitfall', title:"Modifying a list while iterating",
     body:`<p>Removing items shifts indices and skips elements.</p>
           <pre class="code"># WRONG — skips items
for x in xs:
    if x < 0:
        xs.remove(x)   # bug: skips next item after removal

# RIGHT — iterate a copy, or filter
xs = [x for x in xs if x >= 0]

# OR iterate over xs[:] (a slice copy)
for x in xs[:]:
    if x < 0:
        xs.remove(x)</pre>`},
    {type:'summary', title:"Recap", bullets:[
      "Indentation is the syntax — 4 spaces, no tabs.",
      "<code>range(start, stop, step)</code> — stop is exclusive.",
      "Use <code>enumerate</code> for index+value, <code>zip</code> for parallel iteration.",
      "<code>for...else</code> runs when no <code>break</code> happened.",
      "Don't mutate a list while iterating — use a comprehension instead."
    ]}
  ]},

/* 6 */ {id:6, title:"Functions, *args, **kwargs", icon:"⚙️", color:"#0ea5e9", difficulty:"beginner",
  description:"Defining functions, default args, variadic args, and return semantics.",
  cards:[
    {type:'concept', title:"Defining a function",
     body:`<p><code>def name(params): body</code>. Functions are first-class objects — pass them, store them, return them.</p>
           <pre class="code">def greet(name, greeting="Hello"):
    return f"{greeting}, {name}!"

greet("Asha")                # 'Hello, Asha!'
greet("Asha", "Hi")          # 'Hi, Asha!'
greet(name="Asha", greeting="Yo")  # keyword args</pre>
           <p>Functions without an explicit <code>return</code> implicitly return <code>None</code>.</p>`},
    {type:'syntax', title:"*args and **kwargs",
     code:`# *args — variable positional args (collected into tuple)
def add_all(*nums):
    return sum(nums)
add_all(1, 2, 3, 4)          # 10

# **kwargs — variable keyword args (collected into dict)
def make_record(**fields):
    return dict(fields)
make_record(name='Asha', age=30)
# {'name': 'Asha', 'age': 30}

# combine: ordering matters
def f(a, b, *args, c=10, **kwargs):
    pass

# unpacking on the calling side
nums = [1, 2, 3]
add_all(*nums)               # unpack list as positional args
opts = {'name': 'Asha'}
make_record(**opts)          # unpack dict as kwargs`,
     note:"Names are convention — you can write <code>*items</code>, <code>**options</code>. The <code>*</code> and <code>**</code> are what matter."},
    {type:'example', title:"Functions as first-class values",
     code:`def double(x): return x * 2
def square(x): return x ** 2

# assign to variable
fn = double
fn(5)                # 10

# store in list
ops = [double, square]
[op(3) for op in ops]    # [6, 9]

# pass to another function
list(map(square, [1,2,3,4]))   # [1, 4, 9, 16]

# return from function (closure)
def make_multiplier(n):
    def inner(x):
        return x * n
    return inner

triple = make_multiplier(3)
triple(7)                # 21`,
     walkthrough:"<p>Because functions are objects, you can hand them around like any other value. This is the foundation of decorators, callbacks, and functional patterns.</p>"},
    {type:'question', kind:'mcq',
     question:"What does <code>add_all(*[1,2,3])</code> do when <code>def add_all(*nums)</code>?",
     options:[
       "TypeError",
       "Returns 6",
       "Returns <code>[1,2,3]</code>",
       "Returns <code>([1,2,3],)</code>"
     ], correct:1,
     explanation:"<code>*[1,2,3]</code> unpacks the list into separate positional args, so it's called as <code>add_all(1, 2, 3)</code>."},
    {type:'question', kind:'mcq',
     question:"Functions without a return statement return:",
     options:["<code>0</code>", "<code>False</code>", "<code>None</code>", "an empty string"], correct:2,
     explanation:"Python returns <code>None</code> implicitly when a function has no return."},
    {type:'pitfall', title:"Don't mutate args you didn't create",
     body:`<p>Mutating a passed-in list inside a function changes the caller's list — sometimes unintended.</p>
           <pre class="code"># RISKY
def add_default(items):
    items.append('default')   # mutates caller's list

xs = ['a']
add_default(xs)
xs   # ['a', 'default']  ← caller's list changed!

# SAFER
def add_default(items):
    return items + ['default']   # new list</pre>`},
    {type:'summary', title:"Recap", bullets:[
      "Default args are evaluated ONCE — never use mutable defaults.",
      "<code>*args</code> collects positionals into a tuple; <code>**kwargs</code> collects keywords into a dict.",
      "Unpack with <code>*list</code> and <code>**dict</code> at the call site.",
      "Functions are objects — pass, store, return them freely.",
      "No <code>return</code> means <code>None</code> implicitly."
    ]}
  ]},

/* 7 */ {id:7, title:"Comprehensions", icon:"📐", color:"#10b981", difficulty:"intermediate",
  description:"List, dict, set, and generator comprehensions — Python's most expressive idiom.",
  cards:[
    {type:'concept', title:"List comprehension: the canonical form",
     body:`<p><code>[expr for x in iterable if condition]</code> — build a new list by transforming and filtering.</p>
           <pre class="code"># square the odd numbers from 1..10
[x**2 for x in range(1, 11) if x % 2 == 1]
# [1, 9, 25, 49, 81]

# uppercase non-empty strings
[s.upper() for s in lines if s.strip()]

# nested:
flat = [item for sublist in lists for item in sublist]</pre>
           <p>Read left-to-right: "expression FOR x IN iterable IF condition".</p>`},
    {type:'syntax', title:"All four comprehension types",
     code:`# list
squares = [x**2 for x in nums]

# dict
square_map = {x: x**2 for x in nums}
# invert a dict
inverted = {v: k for k, v in d.items()}

# set (deduplicates automatically)
unique_lengths = {len(s) for s in words}

# generator expression — lazy, no [] or {}
total = sum(x**2 for x in nums)    # no intermediate list
peek = next(x for x in nums if x > 10)`,
     note:"Use generators when feeding to <code>sum()</code>, <code>any()</code>, <code>max()</code> — they save memory on big iterables."},
    {type:'example', title:"Comprehension vs map/filter",
     code:`nums = [1, 2, 3, 4, 5, 6]

# functional style — works, but reads awkwardly
list(map(lambda x: x**2, filter(lambda x: x%2==0, nums)))
# [4, 16, 36]

# comprehension — clearer
[x**2 for x in nums if x % 2 == 0]
# [4, 16, 36]

# conditional inside the expression
[x if x > 0 else 0 for x in nums]
# clip negatives to zero`,
     walkthrough:"<p>Comprehensions are usually clearer than <code>map</code>/<code>filter</code> for transforms. The <code>if/else</code> inside-expression form (without a trailing filter) is for value transformation, not filtering.</p>"},
    {type:'question', kind:'mcq',
     question:"What does <code>{x: x**2 for x in range(3)}</code> return?",
     options:[
       "<code>[0, 1, 4]</code>",
       "<code>{0, 1, 4}</code>",
       "<code>{0: 0, 1: 1, 2: 4}</code>",
       "<code>{(0,0), (1,1), (2,4)}</code>"
     ], correct:2,
     explanation:"Dict comprehension — key:value pairs. Curly braces with a colon means dict; curly braces without means set."},
    {type:'question', kind:'mcq',
     question:"Which is the generator (lazy, not a list)?",
     options:[
       "<code>[x*2 for x in xs]</code>",
       "<code>{x*2 for x in xs}</code>",
       "<code>(x*2 for x in xs)</code>",
       "<code>{x: x*2 for x in xs}</code>"
     ], correct:2,
     explanation:"Parentheses = generator expression. No intermediate collection is built — values are yielded one at a time."},
    {type:'pitfall', title:"Don't nest deeply for readability",
     body:`<p>One-liners get unreadable fast. Don't sacrifice clarity for cleverness.</p>
           <pre class="code"># cute but unreadable
result = [[y*z for y in row if y > 0] for row, z in zip(matrix, scales) if z != 0]

# clearer
result = []
for row, z in zip(matrix, scales):
    if z == 0:
        continue
    transformed = [y * z for y in row if y > 0]
    result.append(transformed)</pre>`},
    {type:'summary', title:"Recap", bullets:[
      "<code>[expr for x in xs if cond]</code> — the canonical pattern.",
      "Four flavors: list <code>[]</code>, set <code>{}</code>, dict <code>{k:v}</code>, generator <code>()</code>.",
      "Generator expressions stream values — best for <code>sum/any/max</code>.",
      "<code>x if cond else y</code> transforms; trailing <code>if cond</code> filters.",
      "If it's too nested to read, write a loop."
    ]}
  ]},

/* 8 */ {id:8, title:"Iterators & generators", icon:"♻️", color:"#06b6d4", difficulty:"intermediate",
  description:"yield, lazy evaluation, and processing data that doesn't fit in memory.",
  cards:[
    {type:'concept', title:"What is an iterator?",
     body:`<p>An iterator is anything you can call <code>next()</code> on. It produces values one at a time until <code>StopIteration</code>.</p>
           <pre class="code">it = iter([10, 20, 30])
next(it)     # 10
next(it)     # 20
next(it)     # 30
next(it)     # StopIteration

# 'for' loops use iter()/next() under the hood</pre>
           <p>Generators are a convenient way to write iterators.</p>`},
    {type:'syntax', title:"yield: the generator keyword",
     code:`def count_up_to(n):
    i = 0
    while i < n:
        yield i      # pause and return; resume next call
        i += 1

gen = count_up_to(3)
next(gen)         # 0
next(gen)         # 1

for x in count_up_to(3):
    print(x)      # 0, 1, 2

# generator expression — like a list comp with () instead of []
squares = (x**2 for x in range(1000000))
sum(squares)      # no million-element list in memory`,
     note:"Each <code>yield</code> pauses the function. The next <code>next()</code> resumes from that exact spot. State is preserved automatically."},
    {type:'example', title:"Reading huge files lazily",
     code:`def lines_matching(path, pattern):
    """Yield matching lines one at a time — works on huge files."""
    with open(path) as f:
        for line in f:
            if pattern in line:
                yield line.strip()

# this works on a 100GB file:
for line in lines_matching('huge.log', 'ERROR'):
    process(line)

# count without loading everything
error_count = sum(1 for _ in lines_matching('huge.log', 'ERROR'))`,
     walkthrough:"<p>The generator only reads as much as needed. <code>sum(1 for _ in ...)</code> is a memory-efficient counter — no list ever exists.</p>"},
    {type:'question', kind:'mcq',
     question:"What does this generator yield?<br><code>def g():\n    yield 1\n    yield 2\n    return\n    yield 3</code>",
     options:["1, 2, 3", "1, 2", "Nothing", "Error"], correct:1,
     explanation:"<code>return</code> in a generator stops iteration. The third <code>yield</code> is unreachable. The generator yields just 1, then 2."},
    {type:'question', kind:'mcq',
     question:"After exhausting a generator (looped through all values), what does <code>next(gen)</code> raise?",
     options:["<code>EmptyError</code>", "<code>StopIteration</code>", "<code>ValueError</code>", "Returns <code>None</code>"], correct:1,
     explanation:"<code>StopIteration</code>. The <code>for</code> loop catches this internally and exits cleanly."},
    {type:'pitfall', title:"Generators are one-shot",
     body:`<p>You can iterate a generator only once. After it's exhausted, it's done.</p>
           <pre class="code">gen = (x**2 for x in range(5))
list(gen)    # [0, 1, 4, 9, 16]
list(gen)    # []  ← already consumed!

# if you need to iterate multiple times, make a list
data = list(gen_function())
# or pass a generator FUNCTION (not the result)
def gen_data():
    yield from range(5)</pre>`},
    {type:'summary', title:"Recap", bullets:[
      "Iterators yield values via <code>next()</code>; raise <code>StopIteration</code> when done.",
      "<code>yield</code> turns a function into a generator that pauses/resumes.",
      "Generators are LAZY — perfect for huge data and infinite streams.",
      "Generators are one-shot — re-call the function to restart."
    ]}
  ]},

/* 9 */ {id:9, title:"OOP: classes & methods", icon:"🏛️", color:"#a855f7", difficulty:"intermediate",
  description:"Defining classes, instance vs class attrs, methods, properties.",
  cards:[
    {type:'concept', title:"Classes encapsulate state + behavior",
     body:`<p>Define with <code>class</code>, instantiate by calling the class. <code>__init__</code> is the constructor.</p>
           <pre class="code">class Customer:
    def __init__(self, name, tier='silver'):
        self.name = name
        self.tier = tier
        self.orders = []

    def add_order(self, amount):
        self.orders.append(amount)

    def lifetime_value(self):
        return sum(self.orders)

c = Customer('Asha')
c.add_order(99); c.add_order(199)
c.lifetime_value()      # 298</pre>
           <p><code>self</code> is the instance, always the first parameter on instance methods.</p>`},
    {type:'syntax', title:"Class vs instance attributes",
     code:`class Counter:
    total_count = 0     # class attribute — shared

    def __init__(self):
        self.value = 0  # instance attribute — per-instance
        Counter.total_count += 1

    def tick(self):
        self.value += 1

a = Counter(); b = Counter()
a.tick(); a.tick(); b.tick()

a.value              # 2
b.value              # 1
Counter.total_count  # 2`,
     note:"Class attributes are shared across instances. Mutable class attributes (lists, dicts) cause cross-instance leaks — same trap as mutable defaults."},
    {type:'example', title:"@property — getters that look like attributes",
     code:`class Rectangle:
    def __init__(self, w, h):
        self.w = w
        self.h = h

    @property
    def area(self):
        return self.w * self.h

    @property
    def perimeter(self):
        return 2 * (self.w + self.h)

r = Rectangle(3, 4)
r.area         # 12   — no () needed
r.perimeter    # 14

# property with setter (input validation)
class Account:
    def __init__(self, balance):
        self._balance = balance

    @property
    def balance(self):
        return self._balance

    @balance.setter
    def balance(self, value):
        if value < 0:
            raise ValueError("can't be negative")
        self._balance = value`,
     walkthrough:"<p><code>@property</code> turns a method into a read-only attribute. Add <code>.setter</code> to validate on assignment. Users see clean attribute access; you control the implementation.</p>"},
    {type:'question', kind:'mcq',
     question:"In <code>def method(self, x):</code>, what is <code>self</code>?",
     options:[
       "Keyword like <code>this</code>",
       "The class object",
       "The instance the method was called on",
       "Optional — just convention"
     ], correct:2,
     explanation:"<code>self</code> is the instance. Python passes it implicitly when you call <code>obj.method(x)</code>. The name is convention but the slot is required."},
    {type:'question', kind:'mcq',
     question:"What's the difference between a class attribute and an instance attribute?",
     options:[
       "No difference",
       "Class attrs are shared across all instances; instance attrs are per-instance",
       "Class attrs must be capitalized",
       "Instance attrs can be deleted, class attrs can't"
     ], correct:1,
     explanation:"Class attributes are defined in the class body and shared. Instance attributes are assigned to <code>self</code> in <code>__init__</code> and are per-instance."},
    {type:'pitfall', title:"Shared mutable class attribute",
     body:`<p>Same trap as mutable defaults — easy bug.</p>
           <pre class="code">class Cart:
    items = []        # SHARED across all carts!

    def add(self, x):
        self.items.append(x)

c1 = Cart(); c2 = Cart()
c1.add('apple')
c2.items          # ['apple']  ← leaked!

# fix: instance-level
class Cart:
    def __init__(self):
        self.items = []   # per-instance</pre>`},
    {type:'summary', title:"Recap", bullets:[
      "<code>class Name:</code> + <code>__init__(self, ...)</code> defines a class.",
      "<code>self</code> is always the first method parameter — Python passes the instance.",
      "Class attrs are shared; instance attrs (via <code>self.x = ...</code>) are per-instance.",
      "<code>@property</code> = method that looks like an attribute. <code>.setter</code> for write logic.",
      "Never make a mutable class attribute — it's shared, not per-instance."
    ]}
  ]},

/* 10 */ {id:10, title:"Inheritance & dunder methods", icon:"🧬", color:"#dc2626", difficulty:"intermediate",
  description:"Subclasses, super(), and the dunder protocol (__str__, __eq__, __len__).",
  cards:[
    {type:'concept', title:"Subclassing with super()",
     body:`<p>A subclass extends a parent. <code>super()</code> calls the parent's method, including <code>__init__</code>.</p>
           <pre class="code">class Animal:
    def __init__(self, name):
        self.name = name
    def speak(self):
        return f"{self.name} makes a sound"

class Dog(Animal):
    def __init__(self, name, breed):
        super().__init__(name)   # call parent init
        self.breed = breed
    def speak(self):
        return f"{self.name} barks"

d = Dog('Rex', 'Husky')
d.speak()        # 'Rex barks'</pre>
           <p>Method overriding: redefine a method with the same name. Calls dispatch to the subclass first.</p>`},
    {type:'syntax', title:"The dunder protocol",
     code:`class Money:
    def __init__(self, amount, currency='USD'):
        self.amount = amount
        self.currency = currency

    def __repr__(self):
        return f"Money({self.amount}, '{self.currency}')"

    def __str__(self):
        return f"{self.amount:.2f} {self.currency}"

    def __eq__(self, other):
        return (self.amount == other.amount
                and self.currency == other.currency)

    def __lt__(self, other):
        return self.amount < other.amount

    def __add__(self, other):
        if self.currency != other.currency:
            raise ValueError("mismatched currency")
        return Money(self.amount + other.amount, self.currency)

m = Money(10) + Money(20)    # Money(30, 'USD')
print(m)                     # 30.00 USD`,
     note:"<code>__repr__</code> = debug/dev string; <code>__str__</code> = user-friendly. If you only define <code>__repr__</code>, both <code>print(obj)</code> and <code>repr(obj)</code> use it."},
    {type:'example', title:"Container-like classes",
     code:`class Playlist:
    def __init__(self, songs):
        self._songs = list(songs)

    def __len__(self):
        return len(self._songs)

    def __getitem__(self, i):
        return self._songs[i]

    def __iter__(self):
        return iter(self._songs)

    def __contains__(self, song):
        return song in self._songs

p = Playlist(['a', 'b', 'c'])
len(p)            # 3 — uses __len__
p[1]              # 'b' — uses __getitem__
for s in p:       # uses __iter__
    print(s)
'a' in p          # True — uses __contains__`,
     walkthrough:"<p>Defining these dunders makes your class behave like a list to outside code. Python's protocol-based design rewards this consistency.</p>"},
    {type:'question', kind:'mcq',
     question:"What does <code>super().__init__(x)</code> do?",
     options:[
       "Skips the parent constructor",
       "Calls the parent class's <code>__init__</code> with argument x",
       "Creates a new parent instance",
       "Raises if there is no parent"
     ], correct:1,
     explanation:"<code>super()</code> returns a proxy that dispatches to the parent class. <code>super().__init__(x)</code> calls the parent's <code>__init__</code> method."},
    {type:'question', kind:'mcq',
     question:"After defining only <code>__repr__</code> (no <code>__str__</code>), what does <code>print(obj)</code> show?",
     options:["empty string", "the class name", "the <code>__repr__</code> output", "an error"], correct:2,
     explanation:"If <code>__str__</code> isn't defined, Python falls back to <code>__repr__</code>."},
    {type:'pitfall', title:"<code>__eq__</code> without <code>__hash__</code>",
     body:`<p>Defining <code>__eq__</code> automatically sets <code>__hash__</code> to <code>None</code> — your objects can't go in sets or dict keys.</p>
           <pre class="code">class P:
    def __eq__(self, other): return self.x == other.x

p = P()
{p}    # TypeError: unhashable type: 'P'

# fix: also define __hash__
class P:
    def __init__(self, x): self.x = x
    def __eq__(self, other): return self.x == other.x
    def __hash__(self): return hash(self.x)</pre>`},
    {type:'summary', title:"Recap", bullets:[
      "Subclass: <code>class Sub(Parent):</code>. Use <code>super().__init__(...)</code> to extend.",
      "Dunders make objects work with Python's syntax: <code>+</code>, <code>==</code>, <code>len()</code>, <code>in</code>, <code>for</code>.",
      "<code>__repr__</code> = debug; <code>__str__</code> = user-facing.",
      "Implementing <code>__eq__</code> makes the class unhashable — define <code>__hash__</code> too."
    ]}
  ]},

/* 11 */ {id:11, title:"Decorators & context managers", icon:"🎀", color:"#7c3aed", difficulty:"intermediate",
  description:"Wrap functions with @decorator; manage resources with `with`.",
  cards:[
    {type:'concept', title:"A decorator wraps a function",
     body:`<p>It takes a function and returns a new function — typically the original with extra behavior around it.</p>
           <pre class="code">def log_calls(fn):
    def wrapper(*args, **kwargs):
        print(f"calling {fn.__name__}")
        result = fn(*args, **kwargs)
        print(f"  returned {result}")
        return result
    return wrapper

@log_calls
def add(x, y):
    return x + y

add(3, 4)
# calling add
#   returned 7
# 7</pre>
           <p><code>@log_calls</code> is shorthand for <code>add = log_calls(add)</code>.</p>`},
    {type:'syntax', title:"Built-in decorators worth knowing",
     code:`from functools import lru_cache, wraps

@lru_cache(maxsize=None)
def fib(n):
    return n if n < 2 else fib(n-1) + fib(n-2)
# memoized — fib(100) is instant

# always use @wraps inside your own decorators
def timer(fn):
    @wraps(fn)            # preserves __name__, __doc__
    def wrapper(*a, **k):
        t = time.time()
        r = fn(*a, **k)
        print(f"{fn.__name__}: {time.time()-t:.3f}s")
        return r
    return wrapper

# @staticmethod, @classmethod, @property on classes
class C:
    @staticmethod
    def util(): ...

    @classmethod
    def from_dict(cls, d): return cls(**d)`,
     note:"<code>@functools.wraps</code> copies the wrapped function's name/docstring onto the wrapper — essential for debugging and tooling."},
    {type:'example', title:"Context managers: the with statement",
     code:`# files — auto-close
with open('data.txt') as f:
    contents = f.read()
# f is closed here, even if read() raised

# locks
from threading import Lock
lock = Lock()
with lock:
    do_critical_thing()
# released even on exception

# DIY with a class
class Timer:
    def __enter__(self):
        self.start = time.time()
        return self
    def __exit__(self, exc_type, exc_val, tb):
        print(f"elapsed: {time.time()-self.start:.2f}s")

with Timer():
    big_computation()

# DIY with contextlib (simpler)
from contextlib import contextmanager
@contextmanager
def timing(label):
    t = time.time()
    yield
    print(f"{label}: {time.time()-t:.2f}s")

with timing("step 1"):
    work()`,
     walkthrough:"<p>The <code>with</code> statement guarantees cleanup. <code>__exit__</code> runs even if an exception was raised inside the block. Use it for files, locks, db connections, timers.</p>"},
    {type:'question', kind:'mcq',
     question:"<code>@decorator</code> applied to <code>fn</code> is equivalent to:",
     options:[
       "<code>fn(decorator)</code>",
       "<code>fn = decorator(fn)</code>",
       "<code>decorator(*fn)</code>",
       "Nothing — it's syntax sugar"
     ], correct:1,
     explanation:"<code>@decorator</code> above a <code>def fn</code> is exactly <code>fn = decorator(fn)</code>."},
    {type:'question', kind:'mcq',
     question:"Why use <code>@functools.wraps</code> inside a decorator?",
     options:[
       "Required by Python",
       "Preserves the wrapped function's name and docstring",
       "Makes the decorator faster",
       "Enables async support"
     ], correct:1,
     explanation:"Without <code>@wraps</code>, <code>fn.__name__</code> becomes <code>'wrapper'</code> and tools/debuggers get confused."},
    {type:'pitfall', title:"Decorator parens vs no-parens",
     body:`<p>Some decorators take arguments and you call them; others don't.</p>
           <pre class="code">@staticmethod         # no parens
def util(): ...

@lru_cache(maxsize=100)   # WITH parens — it's a factory
def fn(): ...

# bad: forgetting parens on @lru_cache
@lru_cache         # passes the function AS the maxsize arg!
def fn(): ...      # broken in Python <3.8</pre>`},
    {type:'summary', title:"Recap", bullets:[
      "<code>@dec</code> above <code>def f</code> means <code>f = dec(f)</code>.",
      "Use <code>@functools.wraps</code> in your own decorators to preserve metadata.",
      "<code>@lru_cache</code> memoizes pure functions for free.",
      "<code>with</code> guarantees cleanup. Build your own with <code>__enter__</code>/<code>__exit__</code> or <code>@contextmanager</code>."
    ]}
  ]},

/* 12 */ {id:12, title:"Exceptions & file I/O", icon:"⚠️", color:"#f97316", difficulty:"beginner",
  description:"try/except/else/finally and reading/writing files.",
  cards:[
    {type:'concept', title:"try / except / else / finally",
     body:`<p>Catch errors, run cleanup code, decide what to do.</p>
           <pre class="code">try:
    result = risky_call()
except ValueError as e:
    print(f"bad value: {e}")
    result = None
except (KeyError, IndexError):
    result = None
except Exception as e:
    # last-resort catch-all
    raise
else:
    # runs only if NO exception
    print("success")
finally:
    # runs no matter what
    cleanup()</pre>
           <p>Always catch the narrowest exception type that makes sense. Bare <code>except:</code> swallows everything including KeyboardInterrupt.</p>`},
    {type:'syntax', title:"Reading and writing files",
     code:`# read full content
with open('data.txt') as f:
    text = f.read()

# read line by line (memory-friendly)
with open('big.log') as f:
    for line in f:
        process(line.rstrip())

# write
with open('out.txt', 'w') as f:
    f.write("hello\\n")
    f.writelines(['a\\n', 'b\\n'])

# append
with open('log.txt', 'a') as f:
    f.write(f"{datetime.now()}: event\\n")

# binary
with open('img.png', 'rb') as f:
    data = f.read()

# explicit encoding (always specify for text!)
with open('utf.txt', encoding='utf-8') as f:
    text = f.read()`,
     note:"Always specify <code>encoding='utf-8'</code> for text files. The default is platform-dependent and will bite you on Windows."},
    {type:'example', title:"Raising and chaining exceptions",
     code:`def validate_age(value):
    try:
        n = int(value)
    except ValueError as e:
        # chain: preserves original cause
        raise ValueError(f"invalid age: {value!r}") from e
    if n < 0 or n > 150:
        raise ValueError(f"age out of range: {n}")
    return n

# custom exception class
class AgeError(ValueError):
    pass

# usage
try:
    age = validate_age('thirty')
except ValueError as e:
    print(e)            # invalid age: 'thirty'
    print(e.__cause__)  # invalid literal for int(): 'thirty'`,
     walkthrough:"<p><code>raise NewError(...) from original</code> chains exceptions — the traceback shows both. Define custom exception subclasses for domain errors.</p>"},
    {type:'question', kind:'mcq',
     question:"What is the difference between <code>else</code> and <code>finally</code> in a try block?",
     options:[
       "No difference",
       "<code>else</code> always runs; <code>finally</code> only on success",
       "<code>else</code> runs on success only; <code>finally</code> runs always",
       "<code>else</code> runs on exception"
     ], correct:2,
     explanation:"<code>else</code>: no exception happened. <code>finally</code>: runs no matter what (success, exception, or even <code>return</code>)."},
    {type:'question', kind:'mcq',
     question:"What's wrong with this code?<br><code>try:\n    f = open('x.txt')\n    data = f.read()\nfinally:\n    f.close()</code>",
     options:[
       "Nothing — it's fine",
       "Should use <code>with open</code> instead",
       "Should use <code>except</code> not <code>finally</code>",
       "<code>open</code> doesn't need closing"
     ], correct:1,
     explanation:"It works but it's verbose. <code>with open('x.txt') as f:</code> handles close automatically and is the Pythonic way."},
    {type:'pitfall', title:"Bare <code>except:</code> is dangerous",
     body:`<p><code>except:</code> catches EVERYTHING including KeyboardInterrupt and SystemExit. You can't Ctrl-C out.</p>
           <pre class="code"># BAD
try:
    work()
except:           # swallows Ctrl-C
    pass

# OK if you must catch everything
try:
    work()
except Exception:    # excludes KeyboardInterrupt
    log_error()

# BETTER — catch what you expect
try:
    work()
except (NetworkError, TimeoutError) as e:
    retry()</pre>`},
    {type:'summary', title:"Recap", bullets:[
      "Catch narrow exception types. Avoid bare <code>except:</code>.",
      "<code>else</code> = success path; <code>finally</code> = always runs.",
      "Use <code>with open(path, encoding='utf-8')</code> for files — auto-close.",
      "<code>raise X(...) from e</code> chains exceptions; subclass <code>Exception</code> for domain errors."
    ]}
  ]},

/* 13 */ {id:13, title:"Type hints & dataclasses", icon:"🏷️", color:"#0891b2", difficulty:"intermediate",
  description:"Modern Python: type annotations, dataclasses, and tooling support.",
  cards:[
    {type:'concept', title:"Type hints don't change runtime",
     body:`<p>They're for tooling (mypy, IDEs, readers). Python doesn't enforce them at runtime.</p>
           <pre class="code">def greet(name: str, times: int = 1) -> str:
    return ("Hello, " + name) * times

# variable annotations
total: float = 0.0
names: list[str] = []
config: dict[str, int] = {}

# complex types
from typing import Optional, Union, Callable

def find(items: list[int], key: int) -> Optional[int]:
    return next((i for i, x in enumerate(items) if x == key), None)

def apply(fn: Callable[[int], int], x: int) -> int:
    return fn(x)</pre>
           <p>Code without type checking still runs. With <code>mypy</code>, type errors become catchable before runtime.</p>`},
    {type:'syntax', title:"Common type patterns",
     code:`from typing import Optional, Union, Any, Iterable, Sequence

# T | None (3.10+) or Optional[T]
x: int | None = None
y: Optional[str] = None        # same thing

# multiple types
val: Union[int, str] = "hi"    # pre-3.10
val: int | str = "hi"          # 3.10+

# generic containers (3.9+)
nums: list[int] = []           # was List[int]
mapping: dict[str, list[int]] = {}

# Any escape hatch (use sparingly)
data: Any = parse(...)

# function aliases
from typing import TypeAlias
JSON: TypeAlias = dict[str, Any]`,
     note:"Use builtin generics (<code>list[int]</code>, <code>dict[str, str]</code>) on Python 3.9+. Older versions need <code>List</code>/<code>Dict</code> from <code>typing</code>."},
    {type:'example', title:"dataclasses: less boilerplate",
     code:`from dataclasses import dataclass, field

@dataclass
class Customer:
    name: str
    age: int
    tier: str = 'silver'             # default
    orders: list = field(default_factory=list)  # mutable default

c = Customer('Asha', 30)
c.tier             # 'silver'
c.orders.append(100)
print(c)
# Customer(name='Asha', age=30, tier='silver', orders=[100])

# auto-generated: __init__, __repr__, __eq__
Customer('A', 30) == Customer('A', 30)    # True!

# frozen=True for immutable (hashable)
@dataclass(frozen=True)
class Point:
    x: float
    y: float

# now hashable — can go in sets:
{Point(1,2), Point(1,2)}    # {Point(x=1, y=2)}`,
     walkthrough:"<p>Dataclasses generate <code>__init__</code>, <code>__repr__</code>, <code>__eq__</code> from your type hints. Use <code>field(default_factory=...)</code> for mutable defaults instead of <code>= []</code>.</p>"},
    {type:'question', kind:'mcq',
     question:"What happens if you pass a wrong type to a function with hints?<br><code>def add(x: int, y: int) -> int: return x + y</code><br><code>add('a', 'b')</code>",
     options:[
       "TypeError at runtime",
       "Returns <code>'ab'</code> — hints are not enforced",
       "Returns <code>None</code>",
       "Compile-time error"
     ], correct:1,
     explanation:"Type hints are NOT enforced at runtime. The function happily concatenates the strings. Type checkers (mypy) catch this statically."},
    {type:'question', kind:'mcq',
     question:"What does <code>field(default_factory=list)</code> do in a dataclass?",
     options:[
       "Sets the default to the <code>list</code> class itself",
       "Calls <code>list()</code> for each new instance (avoids shared mutable default)",
       "Raises an error",
       "Makes the field read-only"
     ], correct:1,
     explanation:"It calls the factory (<code>list</code>) per-instance, giving each a fresh empty list — solving the mutable default trap."},
    {type:'pitfall', title:"<code>List[int]</code> vs <code>list[int]</code>",
     body:`<p>Older Python required typing module generics. 3.9+ supports builtins directly.</p>
           <pre class="code"># Python 3.9+
def f(xs: list[int]) -> dict[str, int]: ...

# Python 3.8 and below
from typing import List, Dict
def f(xs: List[int]) -> Dict[str, int]: ...

# Optional usage — both work on modern Python
from typing import Optional
x: Optional[str] = None       # works everywhere
x: str | None = None          # 3.10+ only</pre>`},
    {type:'summary', title:"Recap", bullets:[
      "Type hints are documentation + tooling. Not enforced at runtime.",
      "<code>list[int]</code>, <code>dict[str, int]</code> work on Python 3.9+.",
      "<code>x | None</code> on 3.10+; <code>Optional[x]</code> everywhere.",
      "<code>@dataclass</code> auto-generates init, repr, eq. Use <code>field(default_factory=...)</code> for mutable defaults."
    ]}
  ]},

/* 14 */ {id:14, title:"Closures & functional patterns", icon:"🪢", color:"#be185d", difficulty:"advanced",
  description:"Lambdas, closures, map/filter/reduce, and partial application.",
  cards:[
    {type:'concept', title:"Closures capture enclosing scope",
     body:`<p>A function defined inside another function captures the outer variables.</p>
           <pre class="code">def make_adder(n):
    def add(x):
        return x + n       # 'n' is captured from outer scope
    return add

add5 = make_adder(5)
add5(10)        # 15
add5(20)        # 25
add10 = make_adder(10)
add10(7)        # 17</pre>
           <p>Each call to <code>make_adder</code> creates a fresh closure with its own captured <code>n</code>.</p>`},
    {type:'syntax', title:"lambda: anonymous functions",
     code:`# lambda PARAMS: EXPRESSION
square = lambda x: x * x
square(4)         # 16

# typical use: sort key, map, filter
sorted(words, key=lambda s: len(s))

names = [{'name':'Asha', 'age':30}, {'name':'Ben', 'age':25}]
sorted(names, key=lambda p: p['age'])

# multiple args
combine = lambda a, b: a*10 + b
combine(3, 4)     # 34

# lambdas can't have statements, just expressions
# (no assignment, no print, no if/else statements — but TERNARY is OK)
abs_v = lambda x: x if x >= 0 else -x`,
     note:"If your lambda gets complicated, name it with <code>def</code>. Lambdas should fit on one short line."},
    {type:'example', title:"functools: partial, reduce",
     code:`from functools import partial, reduce

# partial — pre-fill arguments
def power(base, exp):
    return base ** exp

square = partial(power, exp=2)
cube = partial(power, exp=3)
square(5)        # 25
cube(3)          # 27

# reduce — fold a sequence to a single value
nums = [1, 2, 3, 4, 5]
total = reduce(lambda acc, x: acc + x, nums, 0)   # 15
product = reduce(lambda a, b: a * b, nums, 1)     # 120

# but use sum() / math.prod() when they exist
sum(nums)            # 15
import math
math.prod(nums)      # 120`,
     walkthrough:"<p><code>partial</code> binds some arguments now and returns a new callable. <code>reduce</code> is general but often a built-in (<code>sum</code>, <code>any</code>, <code>max</code>) is clearer.</p>"},
    {type:'question', kind:'mcq',
     question:"What does this print?<br><code>multipliers = [lambda x: x * i for i in range(3)]\nprint([m(10) for m in multipliers])</code>",
     options:[
       "<code>[0, 10, 20]</code>",
       "<code>[10, 10, 10]</code>",
       "<code>[20, 20, 20]</code>",
       "Error"
     ], correct:2,
     explanation:"The classic late-binding closure trap. All three lambdas capture the same <code>i</code> — which equals 2 after the comprehension finishes. Fix: <code>lambda x, i=i: x*i</code> to bind eagerly."},
    {type:'question', kind:'mcq',
     question:"What does <code>partial(f, 1, 2)(3)</code> do?",
     options:[
       "Calls <code>f(1, 2, 3)</code>",
       "Calls <code>f(3)</code>",
       "Returns a tuple",
       "Returns <code>f</code> unchanged"
     ], correct:0,
     explanation:"<code>partial</code> binds positional args eagerly. Calling the partial passes additional args after the bound ones."},
    {type:'pitfall', title:"Late-binding closures in loops",
     body:`<p>Closures capture the variable, not its current value.</p>
           <pre class="code"># BUG — all return 9
fns = [lambda: i**2 for i in range(4)]
[f() for f in fns]   # [9, 9, 9, 9]

# FIX — default arg captures eagerly
fns = [lambda i=i: i**2 for i in range(4)]
[f() for f in fns]   # [0, 1, 4, 9]

# or use partial / explicit closure
from functools import partial
fns = [partial(lambda x: x**2, i) for i in range(4)]</pre>`},
    {type:'summary', title:"Recap", bullets:[
      "A closure captures variables from the enclosing scope (by REFERENCE).",
      "<code>lambda PARAMS: EXPR</code> for tiny anonymous fns; <code>def</code> for anything bigger.",
      "<code>partial(f, x)</code> pre-fills args; <code>reduce(fn, iter, init)</code> folds.",
      "Late-binding trap: closures see the variable's FINAL value. Fix with default args."
    ]}
  ]},

/* 15 */ {id:15, title:"Async, threads & multiprocessing", icon:"⚡", color:"#dc2626", difficulty:"advanced",
  description:"GIL, asyncio basics, threading vs multiprocessing — and when to use each.",
  cards:[
    {type:'concept', title:"The GIL and what it means",
     body:`<p>CPython's Global Interpreter Lock ensures only ONE thread executes Python bytecode at a time. So Python threads don't speed up CPU-bound work.</p>
           <ul>
             <li><b>I/O-bound</b> (network, disk, DB) → threads OR asyncio (great speedup)</li>
             <li><b>CPU-bound</b> (math, image processing) → multiprocessing or numpy</li>
             <li><b>Mixed</b> → asyncio for I/O, offload CPU work to a process pool</li>
           </ul>
           <p>NumPy releases the GIL during heavy ops — that's why <code>np.matmul</code> can use all your cores.</p>`},
    {type:'syntax', title:"asyncio: async/await",
     code:`import asyncio, aiohttp

async def fetch(url):
    async with aiohttp.ClientSession() as s:
        async with s.get(url) as r:
            return await r.text()

async def fetch_all(urls):
    # gather runs them concurrently
    return await asyncio.gather(*[fetch(u) for u in urls])

# entry point
results = asyncio.run(fetch_all(urls))

# sleep cooperatively
async def worker(n):
    print(f"start {n}")
    await asyncio.sleep(1)   # yields to event loop
    print(f"done {n}")

asyncio.run(asyncio.gather(*[worker(i) for i in range(5)]))
# all 5 finish in ~1s, not 5s`,
     note:"<code>await</code> can only be used inside <code>async def</code>. Don't mix blocking calls (<code>requests.get</code>) with async — use the async equivalent (<code>aiohttp</code>)."},
    {type:'example', title:"ThreadPoolExecutor and ProcessPoolExecutor",
     code:`from concurrent.futures import ThreadPoolExecutor, ProcessPoolExecutor

# I/O-bound: threads are fine (despite GIL — they block on I/O)
def fetch(url):
    return requests.get(url).text

with ThreadPoolExecutor(max_workers=10) as ex:
    results = list(ex.map(fetch, urls))

# CPU-bound: processes (sidestep GIL entirely)
def heavy_compute(n):
    return sum(i**2 for i in range(n))

with ProcessPoolExecutor() as ex:   # defaults to CPU count
    results = list(ex.map(heavy_compute, [10**6]*8))
# now you actually use all cores

# submit returns Future (more control)
with ProcessPoolExecutor() as ex:
    futures = [ex.submit(heavy_compute, n) for n in [10**6]*8]
    for f in futures:
        print(f.result())`,
     walkthrough:"<p>Threads share memory but are GIL-bound on CPU work. Processes give true parallelism but data must be serialized between them. Pick based on workload.</p>"},
    {type:'question', kind:'mcq',
     question:"You have CPU-bound work (intensive number crunching). What gives you real parallelism?",
     options:[
       "<code>threading</code>",
       "<code>asyncio</code>",
       "<code>multiprocessing</code>",
       "<code>functools.lru_cache</code>"
     ], correct:2,
     explanation:"CPU-bound work hits the GIL. Threads can't run Python bytecode in parallel. Use processes (or NumPy/C extensions that release the GIL)."},
    {type:'question', kind:'mcq',
     question:"What does <code>await</code> do?",
     options:[
       "Spawns a thread",
       "Blocks the OS thread until done",
       "Yields control back to the event loop until the awaitable completes",
       "Forces synchronous execution"
     ], correct:2,
     explanation:"<code>await</code> pauses the coroutine, gives control to the event loop, which runs other coroutines, and resumes this one when the awaitable is ready."},
    {type:'pitfall', title:"Don't block the event loop",
     body:`<p>Sync calls (<code>requests.get</code>, <code>time.sleep</code>) freeze the event loop and kill async benefits.</p>
           <pre class="code"># BAD
async def fetch_all(urls):
    return [requests.get(u).text for u in urls]   # blocks!

# GOOD — use async-aware lib
async def fetch_all(urls):
    async with aiohttp.ClientSession() as s:
        return await asyncio.gather(*[s.get(u) for u in urls])

# OR offload sync work to a thread pool
import asyncio
loop = asyncio.get_running_loop()
result = await loop.run_in_executor(None, blocking_fn, arg)</pre>`},
    {type:'summary', title:"Recap", bullets:[
      "GIL: only one thread runs Python bytecode at a time.",
      "I/O-bound → threads or asyncio. CPU-bound → multiprocessing.",
      "<code>async def</code> + <code>await</code> + <code>asyncio.gather</code> for concurrent I/O.",

    ]}
