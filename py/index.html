/* 16 */ {id:16, title:"NumPy: arrays & dtypes", icon:"🔢", color:"#1d4ed8", difficulty:"numpy",
  description:"ndarray basics, dtypes, and array creation.",
  cards:[
    {type:'concept', title:"ndarray: homogeneous, vectorized",
     body:`<p>NumPy's <code>ndarray</code> is a homogeneous, fixed-shape, n-dimensional array. Ops are vectorized in C — 10–1000× faster than Python lists for numeric work.</p>
           <pre class="code">import numpy as np
a = np.array([1, 2, 3, 4])
a.shape, a.dtype, a.ndim, a.size
# (4,)  int64  1  4

m = np.array([[1,2,3],[4,5,6]])
m.shape   # (2, 3) — (rows, cols)</pre>
           <p>Every element shares a dtype. Mixing values upcasts (int → float → string).</p>`},
    {type:'syntax', title:"Creation patterns",
     code:`np.zeros((2,3))         # 2x3 zeros
np.ones((3,3))          # 3x3 ones
np.full((2,2), 7)       # filled with 7
np.arange(10)           # [0..9]   exclusive stop
np.arange(0, 10, 2)     # [0,2,4,6,8]
np.linspace(0, 1, 5)    # 5 evenly spaced, INCLUSIVE stop
np.eye(3)               # identity matrix
np.random.seed(42)
np.random.rand(3)       # uniform [0, 1)
np.random.randn(3)      # standard normal
np.random.randint(0,10,5)  # 5 ints in [0,10)`,
     note:"<code>arange</code>'s endpoint is exclusive (like <code>range</code>); <code>linspace</code>'s is inclusive. Easy to mix up."},
    {type:'example', title:"dtypes affect memory",
     code:`a = np.array([1, 2, 3])
a.dtype                # dtype('int64')   8 bytes/element
b = np.array([1, 2, 3], dtype=np.float32)
b.itemsize             # 4 bytes
b.astype(np.float64)   # convert (returns new array)
# common dtypes: int8/16/32/64, uint8/16/32/64,
#                float16/32/64, bool, complex64/128
# Pick the smallest dtype that fits — saves memory at scale.`,
     walkthrough:"<p><code>uint8</code> fits image pixels (0-255). <code>float32</code> is usually enough for ML — half the memory of <code>float64</code>.</p>"},
    {type:'question', kind:'mcq',
     question:"What is <code>np.array([1, 2, 3.0]).dtype</code>?",
     options:["<code>int64</code>","<code>float64</code>","<code>object</code>","Error"], correct:1,
     explanation:"NumPy upcasts to the common dtype — <code>float64</code> covers all three values."},
    {type:'question', kind:'mcq',
     question:"Shape of <code>np.zeros((3, 4))</code>?",
     options:["<code>(3, 4)</code>","<code>(4, 3)</code>","<code>(12,)</code>","<code>(0, 3, 4)</code>"], correct:0,
     explanation:"Shape tuples read (rows, cols). 3 rows of 4 elements."},
    {type:'pitfall', title:"Arrays are NOT lists",
     body:`<pre class="code">[1, 2] + [3, 4]        # [1, 2, 3, 4]  (concat)
np.array([1,2]) + np.array([3,4])  # array([4, 6])  (element-wise)

[1,2] * 3              # [1,2,1,2,1,2]
np.array([1,2]) * 3    # array([3, 6])  (scalar mul)</pre>
           <p>Convert when crossing: <code>arr.tolist()</code> / <code>np.array(my_list)</code>.</p>`},
    {type:'summary', title:"Recap", bullets:[
      "<code>ndarray</code>: one dtype, fixed shape, vectorized ops.",
      "<code>np.zeros / ones / arange / linspace / random.*</code> for creation.",
      "<code>arange</code> exclusive endpoint; <code>linspace</code> inclusive.",
      "Pick the smallest dtype that fits. Convert with <code>.astype(...)</code>.",
      "<code>+</code> / <code>*</code> are ELEMENT-WISE on arrays."
    ]}
  ]},

/* 17 */ {id:17, title:"Indexing, slicing & boolean masks", icon:"🎯", color:"#0ea5e9", difficulty:"numpy",
  description:"Slices, fancy indexing, masks — and view vs copy.",
  cards:[
    {type:'concept', title:"Slicing returns a VIEW",
     body:`<p>Slicing an ndarray gives you a view, not a copy. Modifying the view modifies the original.</p>
           <pre class="code">a = np.arange(10)        # [0..9]
a[2:5]                   # array([2, 3, 4])
a[::2]                   # every other element
a[::-1]                  # reversed

m = np.arange(12).reshape(3,4)
m[1, 2]                  # 6
m[:, 0]                  # first column
m[0:2, 1:3]              # 2x2 slice

view = m[:, 0]
view[0] = 999            # mutates m too!
m[0, 0]                  # 999</pre>
           <p>Use <code>.copy()</code> when you want independence.</p>`},
    {type:'syntax', title:"Boolean masks",
     code:`a = np.array([10, 20, 30, 40, 50])
mask = a > 25            # array([F,F,T,T,T])
a[mask]                  # array([30, 40, 50])

# compound — use & | with parens, NOT and/or
a[(a > 20) & (a < 50)]   # array([30, 40])

# assign by mask
a[a > 30] = 0

# np.where: vectorized if/else
status = np.where(ages >= 18, 'adult', 'minor')

# count / any / all
(a > 0).sum() / .any() / .all()`,
     note:"<code>and</code>/<code>or</code> raise on arrays. Always <code>&</code> / <code>|</code> with parens around each condition."},
    {type:'example', title:"Fancy indexing",
     code:`a = np.array([10, 20, 30, 40, 50])
a[[0, 2, 4]]             # array([10, 30, 50])
a[[0, 0, 1, 1]]          # repeats OK

m = np.arange(12).reshape(3,4)
rows = [0, 1, 2]
cols = [3, 2, 1]
m[rows, cols]            # array([3, 6, 9])  picks (0,3),(1,2),(2,1)

# argmax/argmin: get the INDEX not the value
np.argmax(a)             # 4
np.argsort(a)            # indices that would sort the array

# m[m > 5] = flat array of values matching mask`,
     walkthrough:"<p>Fancy indexing (list of indices, or boolean mask) always returns a COPY, not a view.</p>"},
    {type:'question', kind:'mcq',
     question:"Given <code>a = np.array([1,2,3,4])</code>, what is <code>a[a > 2]</code>?",
     options:["<code>[F,F,T,T]</code>","<code>array([3, 4])</code>","<code>array([2,3,4])</code>","<code>2</code>"], correct:1,
     explanation:"Boolean mask selects values where True. <code>(a>2)</code> is <code>[F,F,T,T]</code>; indexing with it gives <code>[3,4]</code>."},
    {type:'question', kind:'mcq',
     question:"Combine two NumPy conditions correctly?",
     options:["<code>a[a>0 and a<10]</code>","<code>a[(a>0) & (a<10)]</code>","<code>a[a>0 && a<10]</code>","<code>a.between(0,10)</code>"], correct:1,
     explanation:"<code>&</code>/<code>|</code> with parens. Python <code>and</code> requires scalar bools."},
    {type:'pitfall', title:"View vs copy",
     body:`<pre class="code">sub = arr[3:7]       # VIEW
sub[0] = -1
arr                  # mutated!

# explicit copy:
sub = arr[3:7].copy()
# fancy indexing always returns a copy:
arr[[0,2,4]]         # always copy</pre>`},
    {type:'summary', title:"Recap", bullets:[
      "Slicing = VIEW (mutating changes the original). <code>.copy()</code> for independence.",
      "Boolean mask: <code>a[(a>0) & (a<10)]</code> — parens around each condition.",
      "Fancy indexing (list of indices, mask) returns a COPY.",
      "<code>np.where(cond, a, b)</code> = vectorized if/else."
    ]}
  ]},

/* 18 */ {id:18, title:"Broadcasting & vectorization", icon:"📡", color:"#7c3aed", difficulty:"numpy",
  description:"Align shapes implicitly; replace loops with array ops.",
  cards:[
    {type:'concept', title:"Broadcasting rules",
     body:`<p>NumPy aligns shapes right-to-left. Dims must be equal OR one must be 1.</p>
           <pre class="code">a = np.ones((3, 4))            # (3, 4)
b = np.array([10,20,30,40])    # (4,)
a + b
# right-align: (3,4) vs (  4)  → b broadcasts across rows
# result: (3, 4)</pre>
           <p>Size-1 dims are virtually stretched. The result shape is the element-wise max of input shapes.</p>`},
    {type:'syntax', title:"Adding axes",
     code:`col = np.array([1,2,3])           # (3,)
row = np.array([10,20,30,40])     # (4,)

# col[:, None] gives shape (3, 1)
col[:, None] + row                # (3,1) + (4,) → (3, 4)

col[:, np.newaxis]                # same — None alias
col.reshape(-1, 1)                # also same — -1 means infer

# subtract per-column mean (centering)
centered = m - m.mean(axis=0)`,
     note:"<code>None</code> in indexing inserts a size-1 axis. Master this and most broadcasting clicks."},
    {type:'example', title:"Vectorization > Python loops",
     code:`# task: pairwise distances between rows of A (1000×3) and B (500×3)

# slow — nested Python loops (~5 sec)
dist = np.zeros((1000, 500))
for i in range(1000):
    for j in range(500):
        dist[i,j] = np.sqrt(((A[i]-B[j])**2).sum())

# fast — broadcast (~0.02 sec, 250x faster)
diff = A[:, None, :] - B[None, :, :]   # (1000, 500, 3)
dist = np.sqrt((diff**2).sum(axis=2))  # (1000, 500)`,
     walkthrough:"<p>Insert size-1 axes so shapes align, do the op, then sum along the feature axis. The canonical 'all-pairs' trick.</p>"},
    {type:'question', kind:'mcq',
     question:"Can <code>(3, 4)</code> and <code>(3,)</code> broadcast?",
     options:["Yes across cols","Yes across rows","No (incompatible)","Yes both become <code>(3,4)</code>"], correct:2,
     explanation:"Right-align: <code>(3,4)</code> vs <code>(3,)</code> → 3 aligns with 4. Not equal, neither is 1. Reshape to <code>(3,1)</code> to broadcast across columns."},
    {type:'question', kind:'mcq',
     question:"<code>x[:, None]</code> does what?",
     options:["Removes last axis","Inserts size-1 axis after first","Slices second col","Sets values to None"], correct:1,
     explanation:"<code>None</code> in slicing inserts a new axis. <code>(5,)</code> → <code>(5, 1)</code>."},
    {type:'pitfall', title:"Never iterate an ndarray in Python",
     body:`<pre class="code"># SLOW
out = np.zeros(n)
for i in range(n):
    out[i] = a[i]**2 + b[i]

# FAST
out = a**2 + b

# even masks:
mask = (data > 0) & (data < 100)   # not [is_valid(x) for x in data]</pre>`},
    {type:'summary', title:"Recap", bullets:[
      "Broadcast: align right-to-left; size-1 dims stretch.",
      "Insert axes with <code>x[:, None]</code> or <code>.reshape(-1, 1)</code>.",
      "Loops over an ndarray are a code smell — find the vectorized form."
    ]}
  ]},

/* 19 */ {id:19, title:"NumPy: reductions, reshape, combine", icon:"🔧", color:"#0891b2", difficulty:"numpy",
  description:"axis-based reductions, reshape, concatenate, stack.",
  cards:[
    {type:'concept', title:"axis: the most important reduction param",
     body:`<p>Reductions like <code>sum</code>, <code>mean</code>, <code>max</code> take an <code>axis</code>.</p>
           <pre class="code">m = np.arange(12).reshape(3,4)
m.sum()           # 66 (everything)
m.sum(axis=0)     # array([12,15,18,21])  one per COLUMN
m.sum(axis=1)     # array([6, 22, 38])    one per ROW
m.sum(axis=1, keepdims=True)  # shape (3, 1) — keeps axis</pre>
           <p><b>Think:</b> "axis is what gets collapsed." axis=0 collapses rows → one value per column.</p>`},
    {type:'syntax', title:"Reshape, transpose, flatten",
     code:`a = np.arange(12)
a.reshape(3, 4)          # (3, 4)
a.reshape(-1, 4)         # -1 = infer
m.T                      # transpose
m.transpose(1, 0)        # same
m.ravel()                # flatten (view when possible)
m.flatten()              # flatten (always copy)
np.squeeze(x)            # remove size-1 axes`,
     note:"<code>reshape(-1, n)</code> is the idiom: 'n columns, whatever rows that takes.'"},
    {type:'example', title:"Concatenate, stack, split",
     code:`a, b = np.array([[1,2],[3,4]]), np.array([[5,6],[7,8]])

np.concatenate([a, b], axis=0)    # vertical (4, 2)
np.concatenate([a, b], axis=1)    # horizontal (2, 4)
np.vstack([a, b])                 # = concat axis=0
np.hstack([a, b])                 # = concat axis=1

np.stack([a, b])                  # NEW axis: (2, 2, 2)
np.stack([a, b], axis=-1)         # along last axis

np.split(a, 2)                    # equal pieces
np.array_split(np.arange(7), 3)   # tolerates unequal`,
     walkthrough:"<p><code>concatenate</code> joins along an existing axis. <code>stack</code> CREATES a new axis. Pick based on whether you want +1 dim.</p>"},
    {type:'question', kind:'mcq',
     question:"For a <code>(5,4)</code> array, <code>.sum(axis=0).shape</code> is?",
     options:["<code>(5,)</code>","<code>(4,)</code>","<code>(5,4)</code>","<code>()</code>"], correct:1,
     explanation:"axis=0 collapses rows → one value per column. Shape <code>(4,)</code>."},
    {type:'question', kind:'mcq',
     question:"<code>np.arange(12).reshape(-1, 3).shape</code> is?",
     options:["<code>(12, 3)</code>","<code>(3, 4)</code>","<code>(4, 3)</code>","Error"], correct:2,
     explanation:"<code>-1</code> infers. 12/3 = 4 rows. Shape <code>(4, 3)</code>."},
    {type:'pitfall', title:"axis=0 vs axis=1 confusion",
     body:`<p>Counterintuitive: axis=0 doesn't mean 'rows result', it means 'collapse the row axis'.</p>
           <pre class="code">[[1,2,3],[4,5,6]].sum(axis=0)   # [5,7,9] — one per COLUMN
[[1,2,3],[4,5,6]].sum(axis=1)   # [6, 15] — one per ROW</pre>
           <p>Remember as: <b>axis is what gets collapsed</b>.</p>`},
    {type:'summary', title:"Recap", bullets:[
      "axis is what gets COLLAPSED. axis=0 → one value per column.",
      "<code>keepdims=True</code> retains the axis as size 1 (broadcast-friendly).",
      "<code>concatenate</code> = existing axis; <code>stack</code> = new axis.",
      "<code>reshape(-1, n)</code> infers the other dim."
    ]}
  ]},

/* 21 */ {id:21, title:"Pandas: selection & filtering", icon:"🔍", color:"#7c3aed", difficulty:"pandas",
  description:"loc, iloc, masks, query — the selector toolkit.",
  cards:[
    {type:'concept', title:"loc vs iloc",
     body:`<p><code>.loc[]</code> = by <b>label</b> (inclusive slices). <code>.iloc[]</code> = by <b>integer position</b> (exclusive stop, like Python).</p>
           <pre class="code">df = pd.DataFrame({'a':[10,20,30],'b':[40,50,60]}, index=['x','y','z'])
df.loc['y']           # row 'y'
df.loc['y','a']       # 20
df.loc[['x','z'],['a','b']]
df.loc['x':'y']       # INCLUSIVE both ends

df.iloc[1]            # second row
df.iloc[0:2]          # rows 0,1 (exclusive)
df.iloc[:, -1]        # last column

df['a']               # column 'a'
df[['a','b']]         # multiple columns</pre>`},
    {type:'syntax', title:"Masks & query",
     code:`df[df['age'] > 30]
df[(df['age'] > 30) & (df['city'] == 'Pune')]   # & | with parens
df[df['city'].isin(['NYC','London'])]
df[df['age'].between(25, 40)]
df[df['name'].str.contains('asha', case=False)]
df[~df['city'].isin(['NYC'])]    # negate

# .query() — string syntax
df.query('age > 30 and city == "Pune"')
df.query('city in ["NYC","London"]')
# backticks for spaces: df.query('\`my col\` > 5')`,
     note:"<code>.query()</code> is often clearer for complex filters and supports referencing columns directly without brackets."},
    {type:'example', title:"Assignment via loc",
     input:[T("df","name, age, tier",[["Asha",30,"silver"],["Ben",25,"silver"],["Cara",41,"gold"]])],
     code:`df.loc[df['age'] >= 30, 'tier'] = 'platinum'

# multi-column at once
df.loc[df['city']=='Pune', ['tier','discount']] = ['vip', 0.2]

# new column
df['adult'] = df['age'] >= 18
df['age_group'] = pd.cut(df['age'], bins=[0,18,35,60,120],
                         labels=['child','young','mid','senior'])

# np.where for fast conditional column
import numpy as np
df['flag'] = np.where(df['age'] > 30, 'old', 'young')`,
     walkthrough:"<p><code>df.loc[mask, col] = value</code> is the canonical conditional assignment. <code>pd.cut</code> bins continuous values.</p>"},
    {type:'question', kind:'mcq',
     question:"Difference between <code>df.loc[0:3]</code> and <code>df.iloc[0:3]</code>?",
     options:["Same","<code>.loc</code> returns 4 rows (inclusive); <code>.iloc</code> returns 3 (exclusive)","<code>.iloc</code> returns 4 rows","Both error"], correct:1,
     explanation:"<code>.loc</code> is INCLUSIVE on both ends; <code>.iloc</code> is exclusive on stop. Classic bug."},
    {type:'question', kind:'mcq',
     question:"Filter rows where city is NYC or London?",
     options:["<code>df[df.city == 'NYC' or df.city == 'London']</code>","<code>df[df.city in ('NYC','London')]</code>","<code>df[df.city.isin(['NYC','London'])]</code>","none"], correct:2,
     explanation:"<code>.isin([...])</code>. Option 1 fails because <code>or</code> needs scalar bools."},
    {type:'pitfall', title:"Chained assignment (SettingWithCopyWarning)",
     body:`<pre class="code"># BAD — might modify a copy
df[df['age'] > 30]['tier'] = 'platinum'   # warning, may not stick

# GOOD — single .loc
df.loc[df['age'] > 30, 'tier'] = 'platinum'</pre>
           <p>Rule: combine filter + assign in ONE <code>.loc[mask, col] = val</code>.</p>`},
    {type:'summary', title:"Recap", bullets:[
      "<code>.loc</code> = labels (inclusive). <code>.iloc</code> = positions (exclusive).",
      "<code>&</code> / <code>|</code> with parens; <code>isin</code> / <code>between</code> / <code>str.contains</code>.",
      "<code>df.query('...')</code> is often clearer.",
      "Conditional assignment ALWAYS via <code>df.loc[mask, col] = val</code>."
    ]}
  ]},

/* 22 */ {id:22, title:"Pandas: groupby & aggregation", icon:"📊", color:"#a855f7", difficulty:"pandas",
  description:"split-apply-combine — the heart of analytical Pandas.",
  cards:[
    {type:'concept', title:"split → apply → combine",
     body:`<pre class="code">df.groupby('city')['amount'].sum()

# multiple groupers

# named aggregation — modern, clean

    total=('amount', 'sum'),
    avg=('amount', 'mean'),

    last_date=('created_at', 'max')
)</pre>`},
    {type:'syntax', title:"Aggregation toolkit",
     code:`g = df.groupby('city')
g['amount'].sum() / .mean() / .median() / .std()
g['amount'].count() / .min() / .max()
g.size()                  # rows per group (incl. nulls)
g['amount'].count()       # non-null per group
g['amount'].first() / .last() / .nth(2)
g['amount'].agg(lambda s: s.max() - s.min())   # custom`,
     note:"<code>as_index=False</code> in <code>groupby()</code> keeps the keys as columns instead of becoming the index."},
    {type:'example', title:"transform vs agg vs filter",
     input:[T("orders","customer_id, amount",[[1,100],[1,200],[2,50],[2,300],[3,150]])],
     code:`# agg — one row per group
df.groupby('customer_id')['amount'].sum()
# 1→300, 2→350, 3→150

# transform — SAME shape, broadcast within group
df['total'] = df.groupby('customer_id')['amount'].transform('sum')
df['pct'] = df['amount'] / df.groupby('customer_id')['amount'].transform('sum')

/* ============ Glossary ============ */
const GLOSSARY = [
  {term:'list comprehension', def:'A concise way to build a list: <code>[expr for x in iterable if cond]</code>.'},
  {term:'generator', def:'Lazy iterator created with <code>yield</code> or a generator expression <code>(...)</code>. Values produced one at a time.'},
  {term:'decorator', def:'A callable that takes a function and returns a function. Applied with <code>@dec</code>.'},
  {term:'closure', def:'A function that captures variables from its enclosing scope.'},
  {term:'lambda', def:'Anonymous function expression: <code>lambda params: expr</code>.'},
  {term:'mutable', def:'Can be changed in place (lists, dicts, sets). Tuples, strings, frozensets are immutable.'},
  {term:'truthy/falsy', def:'Truthy: any non-zero, non-empty value. Falsy: 0, 0.0, "", [], {}, set(), None, False.'},
  {term:'GIL', def:'Global Interpreter Lock — CPython only runs one thread of Python bytecode at a time.'},
  {term:'duck typing', def:'"If it walks like a duck..." — Python cares about behavior (methods), not declared type.'},
  {term:'dunder method', def:'A method with double underscores like <code>__init__</code> or <code>__eq__</code>. Used by Python\'s syntax/operators.'},
  {term:'iterator', def:'Anything you can call <code>next()</code> on. Raises <code>StopIteration</code> when exhausted.'},
  {term:'iterable', def:'Anything you can put in a <code>for</code> loop. Has <code>__iter__</code>.'},
  {term:'unpacking', def:'Assigning multiple variables from an iterable: <code>a, b, *rest = [1,2,3,4]</code>.'},
  {term:'f-string', def:'String literal prefixed with <code>f</code>; embeds expressions: <code>f"{x:.2f}"</code>.'},
  {term:'context manager', def:'Object with <code>__enter__</code> and <code>__exit__</code>. Used with <code>with</code> for cleanup.'},
  {term:'dataclass', def:'A class auto-generated from type annotations via <code>@dataclass</code>.'},
  {term:'type hint', def:'Annotation (<code>x: int</code>, <code>-> str</code>) used by tools like mypy. Not enforced at runtime.'},
  {term:'ndarray', def:'NumPy\'s n-dimensional array: homogeneous dtype, fixed shape, vectorized ops.'},
  {term:'broadcasting', def:'NumPy/Pandas mechanism for aligning shapes — size-1 dims are virtually stretched.'},
  {term:'vectorization', def:'Replacing Python loops with array operations that run in C. Typically 10-1000× faster.'},
  {term:'axis', def:'In NumPy/Pandas reductions, the axis that gets COLLAPSED. axis=0 → one result per column.'},
  {term:'dtype', def:'The element type of an ndarray or Series (int64, float32, object, category, etc.).'},
  {term:'view vs copy', def:'NumPy slice returns a view (mutating it changes the original). Use <code>.copy()</code> for independence.'},
  {term:'Series', def:'Pandas\' 1D labeled array — essentially a column.'},
  {term:'DataFrame', def:'Pandas\' 2D labeled table.'},
  {term:'index', def:'Row labels for a Series/DataFrame. Often default RangeIndex, but can be datetime, multi-level, etc.'},
  {term:'loc / iloc', def:'<code>.loc</code> = by label (slices are INCLUSIVE). <code>.iloc</code> = by integer position (exclusive).'},
  {term:'groupby', def:'Split rows into groups, apply a function to each, combine results.'},
  {term:'transform', def:'Like groupby+agg but RETURNS same shape as input — broadcasts group result back to each row.'},
  {term:'pivot vs melt', def:'<code>pivot</code> = long → wide. <code>melt</code> = wide → long. <code>pivot_table</code> = pivot + aggregation.'},
  {term:'NaN', def:'"Not a Number" — Pandas\' missing-value marker. <code>nan == nan</code> is False. Use <code>.isna()</code>.'},
  {term:'apply vs vectorize', def:'<code>apply(axis=1)</code> is a Python loop. Prefer column arithmetic — 100-1000× faster.'},
  {term:'resample', def:'Time-based groupby. <code>df.resample(\'D\').sum()</code> = daily totals from a datetime-indexed DataFrame.'},
  {term:'rolling', def:'Moving window: <code>df.x.rolling(7).mean()</code> = 7-period moving average.'}
];


/* ============ Module rendering ============ */
const M = MODULES;
let curModule = null, curIdx = 0, curSelected = null, curAnswered = false;
let sessionStart = 0, sessionTotal = 0, sessionCorrect = 0;

function nextModuleId(){
  if(!curModule) return null;
  const i = M.findIndex(m => m.id === curModule.id);
  return (i >= 0 && i + 1 < M.length) ? M[i+1].id : null;
}

async function startModule(id){
  curModule = M.find(m => m.id === id);
  if(!curModule) return renderHome();
  curIdx = 0; curSelected = null; curAnswered = false;
  sessionStart = Date.now();
  sessionTotal = 0; sessionCorrect = 0;
  if(!state.moduleProgress[id]) state.moduleProgress[id] = {cardsDone:0, completed:false};
  state.moduleProgress[id].cardsDone = 0;
  hideFeedback();
  renderCurrentCard();
}

function startMixed(n){
  const all = [];
  for(const m of M){
    for(const c of m.cards){
      if(c.type === 'question') all.push({...c, _modTitle: m.title, _modId: m.id});
    }
  }
  const picked = [...all].sort(() => Math.random() - 0.5).slice(0, n);
  curModule = {id:'mixed', title:`Mixed Practice (${picked.length})`, icon:'🎲', color:'#ef4444', cards: picked};
  curIdx = 0; curSelected = null; curAnswered = false;
  sessionStart = Date.now(); sessionTotal = 0; sessionCorrect = 0;
  hideFeedback();
  renderCurrentCard();
}

function renderCurrentCard(){
  const c = curModule.cards[curIdx];
  if(!c) return finishModule();
  curSelected = null; curAnswered = false;
  const progress = ((curIdx) / curModule.cards.length) * 100;
  const cardHtml = renderCard(c);
  main.innerHTML = `
    <div class="lesson-header">
      <button class="close-btn" onclick="confirmExitModule()" aria-label="Exit lesson">×</button>
      <div style="flex:1">
        <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      </div>
    </div>
    ${cardHtml}
    ${c.type !== 'question' ? `<div class="footer-actions"><div></div><button class="btn btn-primary" onclick="nextCard()">Continue →</button></div>` : ''}
  `;
}

function renderCard(c){
  const t = c.type;
  if(t === 'concept'){
    return `<article class="card card-concept"><span class="card-badge b-concept">💡 Concept</span><h2>${esc(c.title)}</h2>${c.body || ''}${c.real ? `<div class="real">${c.real}</div>` : ''}</article>`;
  }
  if(t === 'syntax'){
    return `<article class="card card-syntax"><span class="card-badge b-syntax">🔧 Syntax</span><h2>${esc(c.title)}</h2><pre class="code">${hl(c.code)}</pre>${c.note ? `<div class="note">${c.note}</div>` : ''}</article>`;
  }
  if(t === 'example'){
    return `<article class="card card-example"><span class="card-badge b-example">✨ Example</span><h2>${esc(c.title)}</h2>${c.input ? `<div class="result-label">input</div>${renderTables(c.input)}` : ''}<div class="result-label">code</div><pre class="code">${hl(c.code)}</pre>${c.result ? `<div class="result-label">result</div>${renderTable(c.result)}` : ''}${c.walkthrough ? c.walkthrough : ''}</article>`;
  }
  if(t === 'pitfall'){
    return `<article class="card card-pitfall"><span class="card-badge b-pitfall">⚠ Pitfall</span><h2>${esc(c.title)}</h2>${c.body || ''}</article>`;
  }
  if(t === 'summary'){
    const items = (c.bullets || []).map(b => `<li>${b}</li>`).join('');
    return `<article class="card card-summary"><span class="card-badge b-summary">📝 Recap</span><h2>${esc(c.title)}</h2><ul>${items}</ul></article>`;
  }
  if(t === 'question'){
    if(c.kind === 'mcq'){
      const opts = c.options.map((o, i) => `<button class="opt" data-idx="${i}" onclick="selectMcq(${i})">${o}</button>`).join('');
      return `<article class="card card-question"><span class="card-badge b-question">❓ Question</span><div class="q-prompt">${c.question}</div><div class="options" id="optsArea">${opts}</div>${c.code ? `<pre class="code" style="margin-top:10px">${hl(c.code)}</pre>` : ''}<div style="margin-top:14px;text-align:right"><button class="btn btn-primary" id="checkBtn" onclick="checkAnswer()" disabled>Check</button></div></article>`;
    }
    if(c.kind === 'fill'){
      return `<article class="card card-question"><span class="card-badge b-question">❓ Question</span><div class="q-prompt">${c.question}</div><input class="blank-input" id="blankInput" placeholder="${esc(c.placeholder || '...')}" autocomplete="off" /><div style="margin-top:14px;text-align:right"><button class="btn btn-primary" id="checkBtn" onclick="checkAnswer()">Check</button></div></article>`;
    }
  }
  return '';
}

function selectMcq(i){
  if(curAnswered) return;
  curSelected = i;
  document.querySelectorAll('.opt').forEach((el, idx) => {
    el.classList.toggle('selected', idx === i);
  });
  $('#checkBtn').disabled = false;
}

function checkAnswer(){
  if(curAnswered) return;
  const c = curModule.cards[curIdx];
  let correct = false;
  sessionTotal++;
  if(c.kind === 'mcq'){
    correct = curSelected === c.correct;
    document.querySelectorAll('.opt').forEach((el, idx) => {
      if(idx === c.correct) el.classList.add('correct');
      else if(idx === curSelected && !correct) el.classList.add('wrong');
    });
  } else if(c.kind === 'fill'){
    const input = $('#blankInput');
    const userAns = (input.value || '').trim();
    const answers = c.answer.split('|').map(a => a.trim().toLowerCase());
    correct = answers.includes(userAns.toLowerCase());
    input.disabled = true;
    input.classList.add(correct ? 'correct' : 'wrong');
  }
  curAnswered = true;
  if(correct){
    sessionCorrect++;
    state.xp += 10;
    bumpDailyGoal();
  }
  if(curModule && curModule.id !== 'mixed'){
    const concepts = moduleToConcepts(curModule);
    if(concepts.length) recordConcept(concepts, !!correct);
  }
  saveState();
  updateStatsUI();
  showFeedback(correct, c.explanation);
  const btn = $('#checkBtn'); if(btn) btn.remove();
}

continueBtn.onclick = () => { hideFeedback(); nextCard(); };

function nextCard(){
  if(curIdx >= curModule.cards.length - 1) return finishModule();
  curIdx++;
  if(curModule.id !== 'mixed' && state.moduleProgress[curModule.id]){
    state.moduleProgress[curModule.id].cardsDone = Math.max(state.moduleProgress[curModule.id].cardsDone || 0, curIdx + 1);
  }
  saveState();
  renderCurrentCard();
}

function confirmExitModule(){
  if(curAnswered || curIdx === 0 || confirm('Exit this module? Progress is saved.')) renderHome();
}

function finishModule(){
  tickStreak();
  if(curModule.id !== 'mixed' && state.moduleProgress[curModule.id]){
    state.moduleProgress[curModule.id].completed = true;
    state.moduleProgress[curModule.id].cardsDone = curModule.cards.length;
  }
  saveState();
  updateStatsUI();
  const acc = sessionTotal > 0 ? Math.round(100 * sessionCorrect / sessionTotal) : 100;
  const elapsed = Math.round((Date.now() - sessionStart) / 1000);
  const mins = Math.floor(elapsed/60), secs = elapsed%60;
  const timeStr = mins > 0 ? `${mins}m ${secs}s` : `${secs}s`;
  const xpGained = sessionCorrect * 10;
  const isMixed = curModule.id === 'mixed';
  main.innerHTML = `
    <div class="results">
      <div class="trophy">${acc===100?'🏆':acc>=80?'🌟':acc>=60?'💪':'📖'}</div>
      <h2>${isMixed ? 'Practice complete!' : 'Module complete!'}</h2>
      <p class="subtitle">${esc(curModule.title)}</p>
      <div class="results-stats">
        <div class="rs"><div class="v">${sessionCorrect}/${sessionTotal||0}</div><div class="l">Correct</div></div>
        <div class="rs"><div class="v">${acc}%</div><div class="l">Accuracy</div></div>
        <div class="rs"><div class="v">+${xpGained}</div><div class="l">XP earned</div></div>
      </div>
      <p style="font-size:13px;color:var(--muted);font-weight:700">Time: ${timeStr}</p>
      <div class="results-actions">
        ${isMixed ? `<button class="btn btn-primary" onclick="startMixed(10)">🎯 Practice again</button>` : (nextModuleId() ? `<button class="btn btn-primary" onclick="startModule(${nextModuleId()})">Next module →</button>` : '')}
        <button class="btn btn-secondary" onclick="renderHome()">Back to map</button>
      </div>
    </div>
  `;
}

function goNextOrHome(){const n = nextModuleId(); if(n) startModule(n); else renderHome();}

function setIvDiff(d){ ivPickDiff = d; renderInterviewLanding(); }
function setIvDur(n){ ivPickDur = n; renderInterviewLanding(); }

const IV_CFG = {
  easy:{base:100, speed:[50,30,15]},
  medium:{base:150, speed:[60,40,20]},
  hard:{base:200, speed:[80,50,25]},
  faang:{base:300, speed:[100,60,30]}
};

function launchInterview(){
  const pool = ivQuestionsBy(ivPickDiff);
  if(pool.length === 0){ alert('No questions in this pool yet.'); return; }
  const n = Math.min(ivCount(ivPickDiff, ivPickDur), pool.length);
  const shuffled = [...pool].sort(() => Math.random() - 0.5).slice(0, n);
  iv = {
    difficulty: ivPickDiff,
    durationMs: ivPickDur * 60000,
    startTime: Date.now(),
    endTime: Date.now() + ivPickDur * 60000,
    questions: shuffled,
    idx: 0, score: 0,
    qStart: 0, qSelected: null, qAnswered: false,
    results: []
  };
  startIvQuestion();
  iv.timerId = setInterval(tickIvTimer, 200);
}

function startIvQuestion(){
  iv.qStart = Date.now();
  iv.qSelected = null;
  iv.qAnswered = false;
  renderIvQuestion();
}

function renderIvQuestion(){
  const q = iv.questions[iv.idx];
  const timeRem = Math.max(0, iv.endTime - Date.now());
  const tm = formatTime(timeRem);
  const opts = q.options.map((o,i) => `<button class="opt" data-idx="${i}" onclick="ivSelect(${i})">${o}</button>`).join('');
  main.innerHTML = `
    <div class="interview-bar" id="ivBar">
      <div class="iv-timer ${timeRem < 30000 ? 'urgent' : ''}" id="ivTimer">${tm}</div>
      <div class="iv-meta">
        <div class="iv-meta-item"><div class="val" id="ivScore">${iv.score}</div><div class="lbl">Score</div></div>
        <div class="iv-meta-item"><div class="val">${iv.idx + 1}/${iv.questions.length}</div><div class="lbl">Question</div></div>
      </div>
      <button class="iv-abort" onclick="abortInterview()">End</button>
    </div>
    <article class="card card-question">
      <span class="card-badge b-question">🎤 ${q.difficulty.toUpperCase()}</span>
      <h2>${esc(q.title)}</h2>
      <div class="q-prompt">${q.prompt}</div>
      ${q.code ? `<pre class="code">${hl(q.code)}</pre>` : ''}
      <div class="options" id="ivOpts">${opts}</div>
      <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-primary" id="ivCheckBtn" onclick="ivCheck()" disabled>Submit</button>
        <button class="btn btn-ghost" onclick="ivHint()">💡 Hint (-25)</button>
        <button class="btn btn-ghost" onclick="ivSkip()" style="color:var(--red-sh)">⏭ Skip</button>
      </div>
      <div id="ivOutput"></div>
    </article>
  `;
}

function ivSelect(i){
  if(iv.qAnswered) return;
  iv.qSelected = i;
  document.querySelectorAll('#ivOpts .opt').forEach((el, idx) => el.classList.toggle('selected', idx === i));
  $('#ivCheckBtn').disabled = false;
}

function ivCheck(){
  if(iv.qAnswered) return;
  const q = iv.questions[iv.idx];
  const correct = iv.qSelected === q.correct;
  iv.qAnswered = true;
  document.querySelectorAll('#ivOpts .opt').forEach((el, idx) => {
    if(idx === q.correct) el.classList.add('correct');
    else if(idx === iv.qSelected && !correct) el.classList.add('wrong');
  });
  const elapsed = Math.round((Date.now() - iv.qStart) / 1000);
  const cfg = IV_CFG[q.difficulty] || IV_CFG.medium;
  let qScore = correct ? cfg.base : 0;
  if(correct){
    if(elapsed < 30) qScore += cfg.speed[0];
    else if(elapsed < 60) qScore += cfg.speed[1];
    else if(elapsed < 90) qScore += cfg.speed[2];
    qScore = Math.max(10, qScore - (iv.qHinted ? 25 : 0));
    iv.score += qScore;
    bumpDailyGoal();
    const c = tagsToConcepts(q.tags || []);
    if(c.length) recordConcept(c, true);
    recordQuestionSrs(q.id, true);
  } else {
    const c = tagsToConcepts(q.tags || []);
    if(c.length) recordConcept(c, false);
    recordQuestionSrs(q.id, false);
  }
  iv.results.push({questionId:q.id, title:q.title, solved:correct, score:qScore, timeSpent:elapsed});
  $('#ivOutput').innerHTML = `
    <div class="${correct ? 'success-block' : 'error-block'}">
      ${correct ? `✓ Correct! +${qScore} pts in ${elapsed}s` : `✗ Not quite.`}
      <div style="margin-top:6px;font-size:12.5px;line-height:1.5">${q.explanation || ''}</div>
    </div>
    <div style="margin-top:10px"><button class="btn btn-primary" onclick="ivAdvance()">Continue →</button></div>
  `;
  const scoreEl = $('#ivScore'); if(scoreEl) scoreEl.textContent = iv.score;
  $('#ivCheckBtn').disabled = true;
}

function ivHint(){
  if(iv.qAnswered) return;
  const q = iv.questions[iv.idx];
  iv.qHinted = true;
  $('#ivOutput').innerHTML = `<div class="hint-block"><b>💡 Hint:</b> ${q.hint}</div>`;
}

function ivSkip(){
  if(!confirm('Skip this question? 0 points.')) return;
  const q = iv.questions[iv.idx];
  const c = tagsToConcepts(q.tags || []);
  if(c.length) recordConcept(c, false);
  recordQuestionSrs(q.id, false);
  iv.results.push({questionId:q.id, title:q.title, solved:false, score:0, timeSpent: Math.round((Date.now()-iv.qStart)/1000)});
  ivAdvance();
}

function ivAdvance(){
  iv.idx++;
  iv.qHinted = false;
  if(iv.idx >= iv.questions.length || Date.now() >= iv.endTime) return finishInterview();
  startIvQuestion();
}

function abortInterview(){
  if(!confirm('End round now? Score so far will be recorded.')) return;
  for(let i = iv.idx; i < iv.questions.length; i++){
    const q = iv.questions[i];
    if(!iv.results.find(r => r.questionId === q.id)){
      iv.results.push({questionId:q.id, title:q.title, solved:false, score:0, timeSpent:0});
    }
  }
  finishInterview();
}

function tickIvTimer(){
  const timeRem = Math.max(0, iv.endTime - Date.now());
  const el = $('#ivTimer');
  if(el){
    el.textContent = formatTime(timeRem);
    if(timeRem < 30000) el.classList.add('urgent');
  }
  if(timeRem === 0){
    clearInterval(iv.timerId);
    finishInterview();
  }
}

function formatTime(ms){
  const total = Math.floor(ms / 1000);
  const m = Math.floor(total / 60), s = total % 60;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function finishInterview(){
  if(iv.timerId) clearInterval(iv.timerId);
  const total = iv.questions.length;
  const solved = iv.results.filter(r => r.solved).length;
  const xpEarned = Math.round(iv.score / 10);
  state.xp += xpEarned;
  tickStreak();
  if(!state.interviewHistory) state.interviewHistory = [];
  state.interviewHistory.push({
    timestamp: Date.now(),
    difficulty: iv.difficulty,
    duration: iv.durationMs / 60000,
    score: iv.score,
    questionsTotal: total,
    questionsSolved: solved,
    xp: xpEarned
  });
  if(state.interviewHistory.length > 50) state.interviewHistory = state.interviewHistory.slice(-50);
  saveState();
  updateStatsUI();
  const acc = total ? Math.round(solved/total*100) : 0;
  const trophy = acc >= 90 ? '🏆' : acc >= 70 ? '🌟' : acc >= 50 ? '💪' : '📖';
  main.innerHTML = `
    <div class="results">
      <div class="trophy">${trophy}</div>
      <h2>Round complete!</h2>
      <p class="subtitle">${iv.difficulty.toUpperCase()} · ${iv.durationMs/60000} min</p>
      <div class="results-stats">
        <div class="rs"><div class="v">${iv.score}</div><div class="l">Score</div></div>
        <div class="rs"><div class="v">${solved}/${total}</div><div class="l">Solved</div></div>
        <div class="rs"><div class="v">+${xpEarned}</div><div class="l">XP</div></div>
      </div>
      <div class="results-actions">
        <button class="btn btn-primary" onclick="renderInterviewLanding()">Another round</button>
        <button class="btn btn-secondary" onclick="renderHome()">Back to map</button>
      </div>
    </div>
  `;
}


/* ============ Playground (Pyodide) ============ */
let curChallenge = null;
let lastChallengeRun = {output:null, error:null};
let pyodideReady = false;
let pyodideLoading = null;

async function ensurePyodide(){
  if(pyodideReady) return window.pyodide;
  if(!pyodideLoading){
    pyodideLoading = (async () => {
      if(!window.loadPyodide){
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js';
        document.head.appendChild(script);
        await new Promise((res, rej) => { script.onload = res; script.onerror = rej; });
      }
      const py = await loadPyodide({indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.26.4/full/'});
      window.pyodide = py;
      // Try to load numpy + pandas in background (optional for most challenges)
      try{ await py.loadPackage(['numpy', 'pandas']); }catch(e){ console.warn('numpy/pandas load failed', e); }
      pyodideReady = true;
      return py;
    })();
  }
  return pyodideLoading;
}

async function startChallenge(id){
  curChallenge = CHALLENGES.find(c => c.id === id);
  if(!curChallenge) return renderHome();
  hideFeedback();
  lastChallengeRun = {output:null, error:null};

  renderChallenge();
}

function renderChallenge(){
  const c = curChallenge;

    <div class="lesson-header">
      <button class="close-btn" onclick="renderHome()" aria-label="Back">×</button>

function resetChallenge(){
  if(!curChallenge) return;
  $('#pyEditor').value = curChallenge.starter;
  $('#runOutput').innerHTML = '';
  $('#mentorPanel').innerHTML = '';

}

function showHint(){
  if(!curChallenge) return;
  $('#runOutput').innerHTML = `<div class="hint-block"><b>💡 Hint:</b> ${curChallenge.hint}</div>`;
}

async function runChallenge(){
  const code = $('#pyEditor').value;
  const out = $('#runOutput');
  out.innerHTML = `<div class="pg-loading"><span class="spin">⟳</span>Running Python (may take a moment first time)</div>`;

_buf = io.StringIO()
sys.stdout = _buf
sys.stderr = _buf
`;

    out.innerHTML = `<div class="run-status ok">▶ Ran successfully</div>${output ? `<div class="error-block" style="background:#1e1e2e;color:#cdd6f4;border-color:#313244">${esc(output)}</div>` : '<div class="hint-block">No output. Use <code>print(...)</code> to see results.</div>'}`;
  }catch(e){
    const msg = String(e.message || e);

    out.innerHTML = `<div class="run-status err">⚠ Error — try the 🧠 Mentor</div><div class="error-block">${esc(msg)}</div>`;
  }

async function checkChallenge(){
  const code = $('#pyEditor').value;
  const out = $('#runOutput');
  out.innerHTML = `<div class="pg-loading"><span class="spin">⟳</span>Checking solution</div>`;
  try{
    const py = await ensurePyodide();
    const setup = `
import sys, io
_buf = io.StringIO()
sys.stdout = _buf
sys.stderr = _buf
`;
    py.runPython(setup);
    py.runPython(code);                  // load user code
    py.runPython(curChallenge.test);     // run test asserts
    const output = py.runPython('_buf.getvalue()');
    lastChallengeRun = {output:String(output), error:null};
    if(!state.playgroundProgress) state.playgroundProgress = {};
    const already = state.playgroundProgress[curChallenge.id]?.completed;
    state.playgroundProgress[curChallenge.id] = {completed:true};
    if(!already){
      state.xp += 30;
      tickStreak();
      bumpDailyGoal();
    }
    saveState(); updateStatsUI();
    out.innerHTML = `<div class="run-status ok">✓ All tests passed!</div><div class="success-block">${already ? '🎉 Solved again — XP only awarded once.' : '🎉 +30 XP earned!'}</div><pre class="code">${esc(output)}</pre>`;
  }catch(e){
    const msg = String(e.message || e);
    lastChallengeRun = {output:null, error:msg};
    out.innerHTML = `<div class="run-status err">✗ Tests failed — try the 🧠 Mentor</div><div class="error-block">${esc(msg)}</div>`;
  }
}

/* ============ AI Mentor ============ */
let mentor = {issues:[], issueIdx:0, hintLevel:0};

const MENTOR_RULES = [
  {id:'mutable-default', tag:'Mutable default arg', title:'Mutable default argument (<code>=[]</code>)',
   test:s=>/\bdef\s+\w+\s*\([^)]*=\s*\[\s*\][^)]*\)/.test(s) || /\bdef\s+\w+\s*\([^)]*=\s*\{\s*\}[^)]*\)/.test(s),
   hints:[
     'You\'re using a mutable container (<code>[]</code> or <code>{}</code>) as a default argument. This is a classic trap.',
     'Default arguments are evaluated ONCE when the function is defined — not on each call. The same list persists across calls.',
     'Use <code>None</code> as the sentinel: <code>def f(x=None): x = x or [] ...</code> — and create the empty list inside the function.'
   ]},
  {id:'eq-none', tag:'Comparison style', title:'Comparing with <code>== None</code>',
   test:s=>/==\s*None\b|None\s*==/.test(s),
   hints:[
     'You\'re writing <code>== None</code>. Pythonic check: <code>is None</code>.',
     '<code>is</code> checks identity (same object). For singletons like <code>None</code>, <code>True</code>, <code>False</code> it\'s the idiom and slightly faster.',
     'Replace <code>x == None</code> with <code>x is None</code> (and <code>!= None</code> → <code>is not None</code>).'
   ]},
  {id:'iterrows', tag:'Pandas perf', title:'<code>iterrows()</code> in a loop',
   test:s=>/\.iterrows\s*\(/.test(s),
   hints:[
     '<code>iterrows</code> is one of the slowest ways to process a DataFrame. 100-1000× slower than vectorized ops.',
     'Almost always you can replace it with column arithmetic, <code>apply</code>, or a groupby. <code>apply(axis=1)</code> is also slow but cleaner.',
     'Try: <code>df[\'total\'] = df[\'price\'] * df[\'qty\']</code> — direct column ops are vectorized.'
   ]},
  {id:'chained-assign', tag:'Pandas warning', title:'Chained assignment',
   test:s=>/df\s*\[[^\]]+\]\s*\[[^\]]+\]\s*=/.test(s),
   hints:[
     'You\'re chaining <code>df[mask][col] = val</code>. This triggers <code>SettingWithCopyWarning</code> and may NOT modify the original.',
     'Pandas isn\'t sure if the chain returns a view or a copy. Use <code>.loc</code> to make intent explicit.',
     'Rewrite as <code>df.loc[mask, col] = val</code> — one operation, guaranteed to modify the original.'
   ]},
  {id:'eq-nan', tag:'NaN comparison', title:'Comparing to <code>NaN</code> with <code>==</code>',
   test:s=>/==\s*np\.nan|np\.nan\s*==|==\s*float\(['"]nan/.test(s),
   hints:[
     'You\'re comparing with <code>== np.nan</code>. NaN never equals anything — even itself.',
     '<code>np.nan == np.nan</code> is False. This is by IEEE 754 design.',
     'Use <code>np.isnan(x)</code>, <code>pd.isna(x)</code>, or for Series: <code>s.isna()</code>.'
   ]},
  {id:'for-numpy', tag:'NumPy perf', title:'Python for-loop over a NumPy array',
   test:s=>/for\s+\w+\s+in\s+\w*np\b[\s\S]{0,80}?(\.shape|\.size|range\s*\()/.test(s) || (/\bnp\./.test(s) && /\bfor\s+\w+\s+in\s+range\s*\(\s*len\s*\(/.test(s)),
   hints:[
     'Looping over a NumPy array in Python defeats the whole point — you lose the C speedup.',
     'Find the vectorized form. Most reductions have an <code>axis</code> parameter; most ops are element-wise.',
     'If you\'re combining two arrays, look at broadcasting. If you need conditionals, <code>np.where</code>.'
   ]},
  {id:'paren', tag:'Syntax', title:'Unbalanced parentheses',
   test:s=>{const o=(s.match(/\(/g)||[]).length, c=(s.match(/\)/g)||[]).length; return o !== c;},
   hints:[
     'Your parentheses don\'t balance.',
     'Common spots: function calls, nested expressions, list comprehensions, lambdas.',
     'Read each <code>(</code> and match it to a <code>)</code>. The unpaired one is your bug.'
   ]},
  {id:'mixed-tabs', tag:'Indentation', title:'Mixed tabs and spaces',
   test:s=>/\t/.test(s) && /\n {4}/.test(s),
   hints:[
     'You have both tabs and spaces in indentation. Python forbids mixing.',
     'Pick one — typically 4 spaces per level.',
     'Run "Convert tabs to spaces" in your editor.'
   ]},
  {id:'print-args', tag:'Python 3', title:'<code>print</code> without parentheses',
   test:s=>/\bprint\s+(?!\()/.test(s),
   hints:[
     '<code>print</code> is a function in Python 3 — it needs parentheses.',
     '<code>print "hi"</code> is Python 2 syntax. Python 3 raises SyntaxError.',
     'Use <code>print("hi")</code>.'
   ]}
];

function analyzeCode(code){
  if(!code || !code.trim()) return [];
  return MENTOR_RULES.filter(r => { try{return r.test(code);}catch(e){return false;} });
}

function parseExecError(msg){
  if(!msg) return [];
  // NameError
  let m = msg.match(/NameError:\s*name '([^']+)' is not defined/);
  if(m) return [{tag:'NameError', title:`<code>${esc(m[1])}</code> is not defined`,
    hints:[
      `Python doesn\'t know what <code>${esc(m[1])}</code> refers to in this scope.`,
      'Common causes: typo, used before assigned, missing import, or referenced from inside a different scope.',
      `Define it before this line, or import it. If it\'s a class name, check the capitalization.`
    ]}];
  // TypeError
  m = msg.match(/TypeError:\s*(.+?)(?:\n|$)/);
  if(m){
    if(/missing.*required.*argument/i.test(m[1])) return [{tag:'TypeError', title:'Missing required argument',
      hints:['You called a function without all required arguments.', `The error message: <code>${esc(m[1])}</code>`, 'Pass the missing argument — check the function signature.']}];
    if(/unsupported operand/i.test(m[1])) return [{tag:'TypeError', title:'Unsupported operand type',
      hints:['You tried to combine incompatible types (e.g. <code>"5" + 5</code>).', `Error: <code>${esc(m[1])}</code>`, 'Convert one side: <code>int(...)</code> or <code>str(...)</code>.']}];
    return [{tag:'TypeError', title:'Type error', hints:[`Python raised: <code>${esc(m[1])}</code>`, 'Look at the argument types you\'re passing — something doesn\'t match the function\'s expectation.', 'Try printing <code>type(x)</code> on suspicious values just before the error line.']}];
  }
  // IndentationError
  if(/IndentationError|TabError/.test(msg)) return [{tag:'IndentationError', title:'Indentation problem',
    hints:['Python uses indentation as syntax — it must be consistent.', 'Make sure every line in the same block has the same leading whitespace. No mixing tabs and spaces.', 'Re-indent the block using 4 spaces per level.']}];
  // IndexError / KeyError
  m = msg.match(/IndexError:\s*(.+?)(?:\n|$)/);
  if(m) return [{tag:'IndexError', title:'List/tuple index out of range',
    hints:[`The index you used doesn\'t exist: <code>${esc(m[1])}</code>`, 'Check <code>len(x)</code> before indexing. Negative indices wrap, but going past <code>-len(x)</code> still errors.', 'Use <code>.get()</code> for dicts; use <code>if i < len(...):</code> for lists.']}];
  m = msg.match(/KeyError:\s*(.+?)(?:\n|$)/);
  if(m) return [{tag:'KeyError', title:`Dictionary missing key`,
    hints:[`Key not found: ${esc(m[1])}`, 'Use <code>d.get(key, default)</code> to avoid the error.', 'Or check <code>key in d</code> first.']}];
  // SyntaxError
  m = msg.match(/SyntaxError:\s*(.+?)(?:\n|$)/);
  if(m) return [{tag:'SyntaxError', title:'Python syntax error',
    hints:[`Python couldn\'t parse the code: <code>${esc(m[1])}</code>`, 'Common causes: missing <code>:</code> after if/for/def, unbalanced parens/brackets, stray characters.', 'The line number in the traceback points to the area — start there and work backwards.']}];
  // ValueError
  m = msg.match(/ValueError:\s*(.+?)(?:\n|$)/);
  if(m) return [{tag:'ValueError', title:'Wrong value for the operation',
    hints:[`Python raised: <code>${esc(m[1])}</code>`, 'The type was OK but the value wasn\'t valid (e.g. <code>int("abc")</code>).', 'Validate input before conversion, or wrap in <code>try/except ValueError</code>.']}];
  // ZeroDivisionError
  if(/ZeroDivisionError/.test(msg)) return [{tag:'ZeroDivisionError', title:'Division by zero',
    hints:['You divided (or modulo\'d) by zero.', 'Check the denominator before the operation.', 'Guard with <code>if d != 0:</code> or handle with try/except.']}];
  // AssertionError
  if(/AssertionError/.test(msg)){
    const detail = msg.match(/AssertionError:\s*(.+?)(?:\n|$)/);
    return [{tag:'AssertionError', title:'A test assertion failed',
      hints:['One of the check\'s <code>assert</code> statements failed.', detail ? `Detail: <code>${esc(detail[1])}</code>` : 'Re-read the prompt and trace through your function with the test input.', 'Add some <code>print</code>s in your function to see what it actually returns.']}];
  }
  // ModuleNotFoundError
  m = msg.match(/ModuleNotFoundError:\s*No module named '([^']+)'/);
  if(m) return [{tag:'ImportError', title:`Module <code>${esc(m[1])}</code> not found`,
    hints:[`Pyodide doesn\'t have <code>${esc(m[1])}</code> loaded.`, 'Only numpy, pandas, and stdlib are preloaded here.', 'Try without that import, or pick an alternative.']}];
  return [{tag:'Runtime error', title:'Python raised an error',
    hints:[`Engine said: <code>${esc(msg.slice(0,200))}</code>`, 'Read the traceback bottom-up. The last line tells you the error type and message.', 'The line numbers point to where the error originated.']}];
}

function askMentor(){
  const code = $('#pyEditor') ? $('#pyEditor').value : '';
  let issues = [];
  if(lastChallengeRun.error){
    issues = issues.concat(parseExecError(lastChallengeRun.error));
  }
  issues = issues.concat(analyzeCode(code));
  mentor = {issues, issueIdx:0, hintLevel:0};
  renderMentorPanel();
  const p = $('#mentorPanel'); if(p) p.scrollIntoView({behavior:'smooth', block:'center'});
}

function renderMentorPanel(){
  const panel = $('#mentorPanel');
  if(!panel) return;
  if(mentor.issues.length === 0){
    panel.innerHTML = `<div class="mentor-card"><div class="mentor-header"><div class="mentor-avatar">🧠</div><div class="mentor-info"><div class="mentor-name">SQL Mentor</div><div class="mentor-tag">Looks clean</div></div><button class="mentor-close" onclick="closeMentor()">×</button></div><div class="mentor-encouragement">Your code looks structurally clean — no obvious anti-patterns or common Python pitfalls. Hit <b>Run</b> to see what happens, then come back if the output isn\'t what you expected!</div></div>`;
    return;
  }
  const issue = mentor.issues[mentor.issueIdx];
  const total = mentor.issues.length;
  const lastHint = mentor.hintLevel >= issue.hints.length - 1;
  const moreIssues = mentor.issueIdx < total - 1;
  panel.innerHTML = `
    <div class="mentor-card">
      <div class="mentor-header">
        <div class="mentor-avatar">🧠</div>
        <div class="mentor-info">
          <div class="mentor-name">Python Mentor${total>1?` · Issue ${mentor.issueIdx+1} of ${total}`:''}</div>
          <div class="mentor-tag">${issue.tag}</div>
        </div>
        <button class="mentor-close" onclick="closeMentor()">×</button>
      </div>
      <div class="mentor-title">${issue.title}</div>
      <div class="mentor-hint">${issue.hints[mentor.hintLevel]}</div>
      <div class="mentor-progress">Hint ${mentor.hintLevel+1} of ${issue.hints.length}${lastHint ? ' · last one!' : ''}</div>
      <div class="mentor-actions">
        ${!lastHint ? '<button class="btn btn-mentor" onclick="moreMentorHint()">Tell me more →</button>' : ''}
        ${lastHint && moreIssues ? '<button class="btn btn-mentor" onclick="nextMentorIssue()">Next issue →</button>' : ''}
        ${lastHint && !moreIssues ? '<button class="btn btn-primary" onclick="closeMentor()">Got it</button>' : '<button class="btn btn-ghost" onclick="closeMentor()">Close</button>'}
      </div>
    </div>
  `;
}

function moreMentorHint(){
  const issue = mentor.issues[mentor.issueIdx]; if(!issue) return;
  if(mentor.hintLevel < issue.hints.length - 1){ mentor.hintLevel++; renderMentorPanel(); }
}
function nextMentorIssue(){
  if(mentor.issueIdx < mentor.issues.length - 1){ mentor.issueIdx++; mentor.hintLevel = 0; renderMentorPanel(); }
}
function closeMentor(){ const p = $('#mentorPanel'); if(p) p.innerHTML = ''; mentor = {issues:[], issueIdx:0, hintLevel:0}; }


/* ============ Adaptive Learning ============ */
const CONCEPTS = [
  {id:'collections', name:'Lists, dicts, sets', icon:'📋'},
  {id:'functions', name:'Functions & closures', icon:'⚙️'},
  {id:'oop', name:'OOP', icon:'🏛️'},
  {id:'comprehensions', name:'Comprehensions', icon:'📐'},
  {id:'generators', name:'Iterators & generators', icon:'♻️'},
  {id:'decorators', name:'Decorators & context mgrs', icon:'🎀'},
  {id:'numpy', name:'NumPy', icon:'🔢'},
  {id:'pandas', name:'Pandas', icon:'🐼'},
  {id:'async-concurrency', name:'Async & concurrency', icon:'⚡'}
];

const CONCEPT_TAG_MAP = {
  'lists':'collections','mutability':'collections','dicts':'collections','sets':'collections','tuples':'collections','iteration':'collections',
  'functions':'functions','closures':'functions','lambdas':'functions',
  'oop':'oop','classes':'oop','inheritance':'oop',
  'comprehensions':'comprehensions','generators':'generators','iterators':'generators',
  'decorators':'decorators','exceptions':'decorators',
  'numpy':'numpy','indexing':'numpy','broadcasting':'numpy','axis':'numpy','views':'numpy','vectorize':'numpy',
  'pandas':'pandas','loc':'pandas','filtering':'pandas','groupby':'pandas','merges':'pandas','time series':'pandas','reshape':'pandas','strings':'collections','slicing':'collections','performance':'pandas',
  'async':'async-concurrency','threading':'async-concurrency','transactions':'async-concurrency'
};

function adTodayKey(){const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

function tagsToConcepts(tags){
  if(!tags || !tags.length) return [];
  const set = new Set();
  for(const t of tags){
    const lt = String(t).toLowerCase();
    if(CONCEPT_TAG_MAP[lt]){ set.add(CONCEPT_TAG_MAP[lt]); continue; }
    for(const [key, cid] of Object.entries(CONCEPT_TAG_MAP)){
      if(lt.includes(key)){ set.add(cid); break; }
    }
  }
  return Array.from(set);
}

function moduleToConcepts(mod){
  if(!mod) return [];
  const text = ((mod.title||'') + ' ' + (mod.description||'')).toLowerCase();
  const out = new Set();
  if(/list|dict|set|tuple|string|collection/.test(text)) out.add('collections');
  if(/function|closure|lambda/.test(text)) out.add('functions');
  if(/oop|class|inherit/.test(text)) out.add('oop');
  if(/comprehension/.test(text)) out.add('comprehensions');
  if(/iterator|generator/.test(text)) out.add('generators');
  if(/decorator|context|exception/.test(text)) out.add('decorators');
  if(/numpy|broadcast|ndarray|vector|axis/.test(text)) out.add('numpy');
  if(/pandas|dataframe|series|groupby|merge/.test(text)) out.add('pandas');
  if(/async|thread|concurren|gil/.test(text)) out.add('async-concurrency');
  return Array.from(out);
}

function recordConcept(concepts, correct){
  if(!concepts || !concepts.length) return;
  if(!state.concepts) state.concepts = {};
  for(const c of concepts){
    if(!state.concepts[c]) state.concepts[c] = {seen:0, correct:0, ease:2.5, dueAt:0, lastSeen:0, interval:1};
    const cs = state.concepts[c];
    cs.seen += 1;
    if(correct) cs.correct += 1;
    cs.lastSeen = Date.now();
    if(correct){
      cs.ease = Math.min(3.0, (cs.ease||2.5) + 0.05);
      cs.interval = Math.max(1, Math.round((cs.interval||1) * cs.ease));
    } else {
      cs.ease = Math.max(1.3, (cs.ease||2.5) - 0.2);
      cs.interval = 1;
    }
    cs.dueAt = Date.now() + cs.interval * 86400000;
  }
}

function recordQuestionSrs(qid, correct){
  if(!qid) return;
  if(!state.questionSrs) state.questionSrs = {};
  let srs = state.questionSrs[qid] || {ease:2.5, interval:1, reps:0, lapses:0, dueAt:0};
  srs.reps += 1;
  if(correct){
    srs.ease = Math.min(3.0, srs.ease + 0.1);
    if(srs.reps === 1) srs.interval = 1;
    else if(srs.reps === 2) srs.interval = 4;
    else srs.interval = Math.max(1, Math.round(srs.interval * srs.ease));
  } else {
    srs.lapses += 1;
    srs.ease = Math.max(1.3, srs.ease - 0.25);
    srs.interval = 1;
    srs.reps = 0;
  }
  srs.dueAt = Date.now() + srs.interval * 86400000;
  state.questionSrs[qid] = srs;
}

function bumpDailyGoal(){
  const today = adTodayKey();
  if(!state.dailyProgress || state.dailyProgress.date !== today){
    state.dailyProgress = {date: today, completed: 0};
  }
  state.dailyProgress.completed += 1;
}

function getDailyProgress(){
  const today = adTodayKey();
  const goal = state.dailyGoal || 10;
  if(!state.dailyProgress || state.dailyProgress.date !== today){
    return {completed: 0, goal};
  }
  return {completed: state.dailyProgress.completed, goal};
}

function tickStreak(){
  const today = new Date().toDateString();
  if(state.lastPlayed === today) return;
  state.streak = (state.streak || 0) + 1;
  state.lastPlayed = today;
  state.streakFrozeRecently = false;
  if(state.streak > 0 && state.streak % 7 === 0 && state.streak !== (state.lastFreezeMilestone||0)){
    state.freezesAvailable = Math.min((state.freezesAvailable || 0) + 1, 3);
    state.lastFreezeMilestone = state.streak;
  }
}

function getDueReviewQuestions(){
  const now = Date.now();
  const due = [];
  if(!state.questionSrs) return due;
  for(const q of INTERVIEW_QUESTIONS){
    const srs = state.questionSrs[q.id];
    if(srs && srs.dueAt && srs.dueAt <= now) due.push(q);
  }
  return due;
}

function getWeakConcepts(threshold=0.7, minSeen=3){
  if(!state.concepts) return [];
  const arr = [];
  for(const c of CONCEPTS){
    const cs = state.concepts[c.id];
    if(cs && cs.seen >= minSeen){
      const acc = cs.correct / cs.seen;
      if(acc < threshold) arr.push({...c, accuracy: acc, seen: cs.seen, correct: cs.correct});
    }
  }
  return arr.sort((a,b) => a.accuracy - b.accuracy);
}

function getUntouchedConcepts(){
  return CONCEPTS.filter(c => {
    const cs = state.concepts && state.concepts[c.id];
    return !cs || cs.seen < 2;
  });
}

function getRecommendation(){
  const weak = getWeakConcepts();
  if(weak.length > 0) return {type:'weak', concept: weak[0]};
  const untouched = getUntouchedConcepts();
  if(untouched.length > 0) return {type:'untouched', concept: untouched[0]};
  return null;
}

function findModulesForConcept(conceptId){
  return M.filter(m => moduleToConcepts(m).includes(conceptId));
}

function startConceptPractice(conceptId){
  const mods = findModulesForConcept(conceptId);
  if(mods.length > 0) startModule(mods[0].id);
  else renderConceptStats();
}

function renderAdaptivePanels(){
  const prog = getDailyProgress();
  const pct = Math.min(100, Math.round(prog.completed / Math.max(1, prog.goal) * 100));
  const complete = prog.completed >= prog.goal;
  const remaining = Math.max(0, prog.goal - prog.completed);
  let statusMsg;
  if(complete) statusMsg = `🎉 Daily goal hit! +${prog.completed - prog.goal} bonus.`;
  else if(prog.completed === 0) statusMsg = `${prog.goal} correct answers today builds your streak.`;
  else statusMsg = `${remaining} more correct answer${remaining===1?'':'s'} to hit today's goal.`;
  const freezeLine = state.freezesAvailable > 0 ? ` · ❄️ ${state.freezesAvailable} streak freeze${state.freezesAvailable===1?'':'s'}` : '';
  const frozeLine = state.streakFrozeRecently ? '<span class="dg-freeze">❄️ STREAK SAVED</span>' : '';
  const goalHtml = `
    <button class="daily-goal-card" onclick="renderConceptStats()" aria-label="View concept stats">
      <div class="dg-header">
        <div class="dg-title">🎯 Today's goal ${frozeLine}</div>
        <div class="dg-count">${prog.completed} / ${prog.goal}</div>
      </div>
      <div class="dg-bar-bg"><div class="dg-bar-fill ${complete?'complete':''}" style="width:${pct}%"></div></div>
      <div class="dg-status">${statusMsg}${freezeLine}</div>
    </button>
  `;
  const due = getDueReviewQuestions();
  const reviewHtml = due.length > 0 ? `
    <button class="review-card" onclick="launchReview()">
      <div class="review-icon">🔄</div>
      <div class="review-info">
        <h4>Review session ready</h4>
        <p>Spaced-repetition — lock in what you've practiced.</p>
      </div>
      <div class="review-badge">${due.length} DUE</div>
    </button>
  ` : '';
  const rec = getRecommendation();
  let recHtml = '';
  if(rec && rec.type === 'weak'){
    const acc = Math.round(rec.concept.accuracy * 100);
    recHtml = `<button class="rec-card" onclick="startConceptPractice('${rec.concept.id}')"><div class="rec-icon">${rec.concept.icon}</div><div class="rec-body"><h4>Practice ${esc(rec.concept.name)}</h4><p>Your weakest topic — ${acc}% accuracy across ${rec.concept.seen} tries.</p></div><div class="rec-arrow">›</div></button>`;
  } else if(rec && rec.type === 'untouched' && state.concepts && Object.keys(state.concepts).length > 0){
    recHtml = `<button class="rec-card" onclick="startConceptPractice('${rec.concept.id}')"><div class="rec-icon">${rec.concept.icon}</div><div class="rec-body"><h4>Try ${esc(rec.concept.name)}</h4><p>New territory — you haven't practiced this yet.</p></div><div class="rec-arrow">›</div></button>`;
  }
  return goalHtml + reviewHtml + recHtml;
}

function renderConceptStats(){
  hideFeedback();
  const concepts = state.concepts || {};
  const items = CONCEPTS.map(c => {
    const cs = concepts[c.id] || {seen:0, correct:0};
    const acc = cs.seen ? Math.round((cs.correct/cs.seen)*100) : null;
    const cls = acc === null ? '' : acc >= 80 ? 'strong' : acc < 60 ? 'weak' : '';
    const mods = findModulesForConcept(c.id);
    const modBtns = mods.slice(0,3).map(m => `<button class="rec-btn" onclick="startModule(${m.id})">${m.icon} ${esc(m.title)}</button>`).join('');
    const srsHint = cs.dueAt && cs.dueAt > Date.now() ? ` · next review in ${Math.ceil((cs.dueAt - Date.now())/86400000)}d` : '';
    return `<div class="concept-row ${cls}"><div class="cr-icon">${c.icon}</div><div class="cr-info"><div class="cr-name">${esc(c.name)}</div><div class="cr-bar-bg"><div class="cr-bar-fill" style="width:${acc||0}%"></div></div></div><div class="cr-stat"><div class="cr-acc">${acc !== null ? acc + '%' : '–'}</div><div class="cr-seen">${cs.seen} ${cs.seen===1?'try':'tries'}${srsHint}</div></div></div>${modBtns ? `<div class="rec-buttons" style="margin:-2px 0 6px 48px">${modBtns}</div>` : ''}`;
  }).join('');
  const totalAttempts = Object.values(concepts).reduce((a,c) => a + (c.seen||0), 0);
  const totalCorrect = Object.values(concepts).reduce((a,c) => a + (c.correct||0), 0);
  const overall = totalAttempts ? Math.round(totalCorrect/totalAttempts*100) : null;
  const prog = getDailyProgress();
  main.innerHTML = `
    <div class="lesson-header">
      <button class="close-btn" onclick="renderHome()">×</button>
      <div style="flex:1;font-weight:800;font-size:14px;color:var(--muted)">Concept mastery</div>
    </div>
    <article class="card card-concept">
      <span class="card-badge b-concept">📊 Adaptive stats</span>
      <h2>Your concept mastery</h2>
      <p>Accuracy per concept based on every answered question. Weak concepts (under 60%) get prioritized in recommendations and reviews.</p>
      <div style="display:flex;gap:14px;margin:14px 0;font-size:13px;font-weight:700;color:var(--muted);flex-wrap:wrap">
        <div>Overall: <b style="color:var(--ink);font-size:15px">${overall !== null ? overall + '%' : '–'}</b></div>
        <div>Attempts: <b style="color:var(--ink);font-size:15px">${totalAttempts}</b></div>
        <div>Today: <b style="color:var(--ink);font-size:15px">${prog.completed}/${prog.goal}</b></div>
        <div>Streak: <b style="color:var(--ink);font-size:15px">${state.streak||0}🔥</b></div>
        <div>Freezes: <b style="color:var(--ink);font-size:15px">${state.freezesAvailable||0}❄️</b></div>
      </div>
      <div class="concept-rows">${items}</div>
    </article>
    <div class="footer-actions" style="margin-top:18px"><button class="btn btn-primary" onclick="renderHome()">Done</button></div>
  `;
}

function launchReview(){
  let due = getDueReviewQuestions();
  if(due.length === 0){
    const weak = getWeakConcepts();
    if(weak.length > 0){
      const pool = INTERVIEW_QUESTIONS.filter(q => tagsToConcepts(q.tags || []).includes(weak[0].id));
      if(pool.length > 0) due = pool.sort(() => Math.random() - 0.5).slice(0, 5);
    }
    if(due.length === 0){ alert('No reviews due yet! Complete a few interview questions first.'); return; }
  }
  const questions = due.slice(0, 10);
  iv = {
    difficulty: 'medium',
    durationMs: Math.max(5, questions.length * 1.5) * 60000,
    startTime: Date.now(),
    endTime: Date.now() + Math.max(5, questions.length * 1.5) * 60000,
    questions, idx:0, score:0,
    qStart:0, qSelected:null, qAnswered:false, results:[]
  };
  startIvQuestion();
  iv.timerId = setInterval(tickIvTimer, 200);
}

/* ============ Glossary ============ */

  const items = GLOSSARY.map(g => `<div class="gloss-item"><div class="gloss-term">${g.term}</div><div class="gloss-def">${g.def}</div></div>`).join('');
  const overlay = document.createElement('div');
  overlay.className = 'modal';
  overlay.onclick = (e) => { if(e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `<div class="modal-content"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><h2>📖 Python glossary</h2><button class="close-btn" onclick="this.closest('.modal').remove()">×</button></div>${items}</div>`;
  document.body.appendChild(overlay);
}

    if(m.difficulty === 'beginner') beg.appendChild(card);

    else if(m.difficulty === 'pandas') pd.appendChild(card);

  const chList = $('#challengeList');
  if(chList){
    CHALLENGES.forEach(c => {
