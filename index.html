/* 25 */ {
  id:25, title:"Funnels & Marketing Attribution", icon:"🔄", color:"#f97316", difficulty:"analytics",
  description:"Step conversion rates, drop-off analysis, attribution models.",
  cards:[
    {type:'concept', title:"What's a conversion funnel?",
     body:`<p>A sequence of steps users move through: visit → signup → activate → purchase.</p>
           <p>The funnel shape (wide → narrow) shows where users drop off. Each step has a conversion rate to the next.</p>`},
    {type:'example', title:"Funnel conversion rates",
     input:[T("events","user_id, step",[[1,"visit"],[2,"visit"],[3,"visit"],[4,"visit"],[1,"signup"],[2,"signup"],[3,"signup"],[1,"activate"],[2,"activate"],[1,"purchase"]])],
     code:`WITH counts AS (
  SELECT step, COUNT(DISTINCT user_id) AS users
  FROM events GROUP BY step
)
SELECT step, users,
  ROUND(100.0 * users / LAG(users) OVER (
    ORDER BY CASE step
      WHEN 'visit' THEN 1 WHEN 'signup' THEN 2
      WHEN 'activate' THEN 3 WHEN 'purchase' THEN 4
    END), 1) AS step_conv_pct
FROM counts;`,
     result:T("result","step, users, step_conv_pct",[["visit",4,null],["signup",3,75.0],["activate",2,66.7],["purchase",1,50.0]]),
     walkthrough:"<p>Half drop off between visit→signup. Bigger fall between activate→purchase. Each step's % shows what fraction of the previous step made it through.</p>",
     real:"Find the LEAKIEST step — that's where to invest UX, copy, or onboarding work."},
    {type:'concept', title:"Attribution models",
     body:`<p>A user touches your brand many times before buying — ad, email, organic search. Which touch gets credit for the conversion?</p>
           <ul>
             <li><b>First-touch</b> — first interaction. Useful for awareness/branding spend.</li>
             <li><b>Last-touch</b> — last interaction before conversion. Useful for closing tactics.</li>
             <li><b>Linear</b> — credit split equally across all touches.</li>
             <li><b>Time-decay</b> — recent touches get more credit.</li>
           </ul>`},
    {type:'example', title:"Last-touch attribution",
     input:[T("touchpoints","user_id, channel, touched_at",[[1,"google","2025-05-01"],[1,"email","2025-05-03"],[1,"direct","2025-05-05"],[2,"facebook","2025-05-02"],[2,"email","2025-05-04"]]), T("conversions","user_id, value, converted_at",[[1,100,"2025-05-06"],[2,200,"2025-05-05"]])],
     code:`WITH last_touch AS (
  SELECT t.user_id, t.channel,
    ROW_NUMBER() OVER (PARTITION BY t.user_id
      ORDER BY t.touched_at DESC) AS rn
  FROM touchpoints t
  JOIN conversions c
    ON c.user_id = t.user_id AND t.touched_at <= c.converted_at
)
SELECT lt.channel, SUM(c.value) AS attributed_revenue
FROM last_touch lt
JOIN conversions c ON c.user_id = lt.user_id
WHERE lt.rn = 1
GROUP BY lt.channel;`,
     result:T("result","channel, attributed_revenue",[["direct",100],["email",200]]),
     walkthrough:"<p>User 1's last touch was 'direct' → $100 credit. User 2's was 'email' → $200. Last-touch tends to favor channels that close the deal, not the ones that started the journey.</p>"},
    {type:'question', kind:'mcq',
     question:"Step conversion rate of 'signup → activate' = 75%. What does it mean?",
     options:["75% of all users activated","75% of users who signed up went on to activate","75% of activations came from signups","Conversion is up by 75%"], correct:1,
     explanation:"Step conv = users at step N ÷ users at step N-1. It's the transition rate between adjacent steps."},
    {type:'pitfall', title:"Count distinct users, not events",
     body:`<p>A user can fire the same event 10 times. If you <code>COUNT(*)</code> instead of <code>COUNT(DISTINCT user_id)</code>, your funnel inflates and looks better than reality.</p>
           <p>Also: define a time window. "Signup within 7 days of visit" is very different from "ever signed up".</p>`,
     bad:`SELECT step, COUNT(*) AS n FROM events GROUP BY step;`,
     good:`SELECT step, COUNT(DISTINCT user_id) AS users
FROM events GROUP BY step;`},
    {type:'summary', title:"Recap", bullets:[
      "Funnel = ordered sequence of user steps with drop-off at each.",
      "Step conv % = users at step ÷ users at previous step.",
      "Attribution models differ on which touch gets credit (first/last/linear/decay).",
      "Always <code>COUNT(DISTINCT user_id)</code>, not <code>COUNT(*)</code>.",
      "Define a conversion time window so the funnel is comparable across time."
    ]}
  ]
},

/* 26 */ {
  id:26, title:"Cohorts, Revenue & Fraud", icon:"📊", color:"#3b82f6", difficulty:"analytics",
  description:"Cohort retention, MoM/YoY growth, velocity-based fraud detection.",
  cards:[
    {type:'concept', title:"Cohort analysis",
     body:`<p>A <b>cohort</b> is a group of users sharing a starting event — most often signup month.</p>
           <p>Cohort retention shows what % of each cohort comes back in months 1, 2, 3… It separates "good months" (lots of signups) from "good products" (signups that stick).</p>`},
    {type:'example', title:"Monthly cohort retention",
     input:[T("users","id, signup_month",[[1,"2025-01"],[2,"2025-01"],[3,"2025-02"],[4,"2025-02"]]), T("events","user_id, event_month",[[1,"2025-01"],[1,"2025-02"],[2,"2025-01"],[3,"2025-02"],[3,"2025-03"]])],
     code:`SELECT u.signup_month AS cohort,
       e.event_month,
       COUNT(DISTINCT u.id) AS active_users
FROM users u
JOIN events e ON e.user_id = u.id
GROUP BY u.signup_month, e.event_month
ORDER BY cohort, event_month;`,
     result:T("result","cohort, event_month, active_users",[["2025-01","2025-01",2],["2025-01","2025-02",1],["2025-02","2025-02",1],["2025-02","2025-03",1]]),
     walkthrough:"<p>Jan cohort: 2 users active in Jan, only 1 returned in Feb (50%). Retention curves that flatten quickly (instead of dropping to 0) signal product-market fit.</p>"},
    {type:'concept', title:"Period-over-period growth",
     body:`<p><b>MoM</b> = (this month − last month) ÷ last month × 100.</p>
           <p><b>YoY</b> compares to 12 months ago — better signal when business is seasonal (retail, travel, education).</p>`},
    {type:'example', title:"MoM revenue growth",
     input:[T("monthly_rev","month, revenue",[["2025-01",10000],["2025-02",12000],["2025-03",11500],["2025-04",14000]])],
     code:`SELECT month, revenue,
  ROUND(100.0 * (revenue - LAG(revenue) OVER (ORDER BY month))
              / LAG(revenue) OVER (ORDER BY month), 1) AS mom_pct
FROM monthly_rev;`,
     result:T("result","month, revenue, mom_pct",[["2025-01",10000,null],["2025-02",12000,20.0],["2025-03",11500,-4.2],["2025-04",14000,21.7]]),
     walkthrough:"<p>March dipped 4.2%, April rebounded 21.7%. First row is NULL because there's no prior month to compare to.</p>"},
    {type:'concept', title:"Fraud — velocity patterns",
     body:`<p>Most online fraud reveals itself through <i>velocity</i> — abnormally fast or repeated actions.</p>
           <ul>
             <li>Many transactions from one card in minutes</li>
             <li>Many accounts created from one IP</li>
             <li>Sudden spend spike vs personal baseline</li>
           </ul>
           <p>Detect with window functions counting events in rolling time windows.</p>`,
     real:"Real fraud systems combine 10+ signals with ML. SQL velocity checks are the FIRST line of defense — and often catch the obvious stuff."},
    {type:'example', title:"5+ transactions in 10 minutes",
     input:[T("transactions","id, user_id, ts",[[1,1,"2025-05-01 10:00"],[2,1,"2025-05-01 10:02"],[3,1,"2025-05-01 10:05"],[4,1,"2025-05-01 10:07"],[5,1,"2025-05-01 10:09"],[6,2,"2025-05-01 11:00"]])],
     code:`WITH x AS (
  SELECT user_id, ts,
    COUNT(*) OVER (
      PARTITION BY user_id ORDER BY julianday(ts)
      RANGE BETWEEN 0.00694 PRECEDING AND CURRENT ROW
    ) AS c10min
  FROM transactions
)
SELECT DISTINCT user_id FROM x WHERE c10min >= 5;`,
     result:T("result","user_id",[[1]]),

     question:"In a cohort retention matrix, columns typically represent:",

    {type:'pitfall', title:"Survivorship bias",

    {type:'summary', title:"Recap", bullets:[

      "Retention matrix: rows = cohort, cols = months since.",
      "MoM = (this − prev) ÷ prev. YoY for seasonal businesses.",

},

/* 27 */ {
  id:27, title:"Indexing Mastery", icon:"🗃️", color:"#475569", difficulty:"engineering",
  description:"B-trees, composite ordering, covering indexes, and when NOT to add indexes.",
  cards:[
    {type:'concept', title:"Why indexes exist",
     body:`<p>Without an index, every query is a <b>full table scan</b> — read every row, check if it matches.</p>
           <p>With a B-tree index on column X, MySQL finds matching rows in O(log N) time. On a million-row table that's ~20 comparisons instead of a million.</p>
           <p>Trade-off: every index slows down INSERT/UPDATE/DELETE (the index has to be maintained) and uses disk space.</p>`},
    {type:'syntax', title:"Creating indexes",
     code:`CREATE INDEX idx_name ON orders (customer_id);

-- composite:
CREATE INDEX idx_oc ON orders (customer_id, created_at);

-- unique:
CREATE UNIQUE INDEX idx_email ON users (email);

-- drop:
DROP INDEX idx_name ON orders;`,
     note:"PRIMARY KEY columns are indexed automatically (clustered in InnoDB)."},
    {type:'concept', title:"Composite index: the leftmost-prefix rule",
     body:`<p>An index on <code>(a, b, c)</code> is sorted by a first, then b, then c. It serves queries that filter from the LEFT.</p>
           <ul>
             <li>✓ <code>WHERE a=1</code></li>
             <li>✓ <code>WHERE a=1 AND b=2</code></li>
             <li>✓ <code>WHERE a=1 AND b=2 AND c &gt; 5</code></li>
             <li>✗ <code>WHERE b=2</code> — no leftmost (a)</li>
             <li>✗ <code>WHERE c &gt; 5</code> — no leftmost (a, b)</li>
             <li>✗ <code>WHERE a=1 AND c &gt; 5</code> — skips b</li>
           </ul>
           <p>Canonical column order: <b>equality → range → sort</b>.</p>`},
    {type:'concept', title:"Covering index",
     body:`<p>If the index contains EVERY column the query needs (SELECT + WHERE + ORDER BY), MySQL serves the query from the index without touching the table.</p>
           <p>EXPLAIN shows <code>Extra: Using index</code>. Often 10–100× faster than the same query without a covering index.</p>`,
     real:"For hot list-page queries (ORDER BY + LIMIT with a few columns), the right covering index makes them near-instant."},
    {type:'example', title:"Designing a composite index",
     code:`-- query:
SELECT order_id, total
FROM orders
WHERE customer_id = 5
  AND status = 'paid'
  AND created_at > '2025-01-01'
ORDER BY created_at DESC
LIMIT 20;

-- best index:
CREATE INDEX idx_paid ON orders
  (customer_id, status, created_at, total);
-- equality, equality, range+sort, covered`,
     walkthrough:"<p>customer_id and status are equalities (most selective first). created_at handles both the range and ORDER BY. Adding total at the end makes it covering — no table access at all.</p>"},
    {type:'question', kind:'mcq',
     question:"Given INDEX(client_id, status, created_at), which query CAN'T use the index efficiently?",
     options:[
       "WHERE client_id = 5",
       "WHERE client_id = 5 AND status = 'open'",
       "WHERE status = 'open'",
       "WHERE client_id = 5 AND created_at > '2025-01-01'"
     ], correct:2,
     explanation:"Leftmost-prefix: without client_id in the predicate, the index can't be seeked. The DB falls back to a scan."},
    {type:'question', kind:'mcq',
     question:"A 'covering index' means:",
     options:[
       "Index covers all rows of the table",
       "Index contains every column the query needs",
       "Index has many columns",
       "Index is unique"
     ], correct:1,
     explanation:"Covering = MySQL answers the query from the index alone. EXPLAIN shows 'Using index'."},
    {type:'pitfall', title:"Too many indexes = slow writes",
     body:`<p>Every index has to be updated on every INSERT/UPDATE/DELETE. A table with 10 indexes is dramatically slower to write to.</p>
           <p>Audit unused indexes via <code>information_schema</code> (or pt-index-usage). Drop the ones nothing reads.</p>`},
    {type:'summary', title:"Recap", bullets:[
      "Indexes turn O(N) scans into O(log N) lookups.",
      "Composite index column order: equality → range → sort.",
      "Leftmost-prefix: queries must filter from the left of the index.",
      "Covering index = entire query served from the index alone.",
      "Indexes slow writes — only add what your queries actually need."
    ]}
  ]
},

/* 28 */ {
  id:28, title:"Query Optimization & EXPLAIN", icon:"📊", color:"#7c3aed", difficulty:"engineering",
  description:"Reading EXPLAIN, fixing common slow patterns, when partitioning helps.",
  cards:[
    {type:'concept', title:"EXPLAIN — your most-used optimization tool",
     body:`<p><code>EXPLAIN query</code> shows MySQL's plan: what tables, what indexes, estimated rows, join order.</p>
           <p>Key columns to watch:</p>
           <ul>
             <li><code>type</code> — <code>ALL</code> = full scan (bad), <code>ref/range/eq_ref</code> = index seek (good), <code>const</code> = best</li>
             <li><code>rows</code> — estimated rows examined; lower is better</li>
             <li><code>Extra</code> — <code>Using index</code> = covering (great), <code>Using filesort</code>/<code>Using temporary</code> = often expensive</li>
           </ul>`},
    {type:'example', title:"Reading an EXPLAIN row",
     code:`EXPLAIN SELECT * FROM orders
WHERE client_id = 5 AND created_at > '2025-01-01';

-- output:
-- type:  ref
-- key:   idx_client_date
-- rows:  42
-- Extra: Using index condition`,
     walkthrough:"<p><code>type:ref</code> + index used + small <code>rows</code> count = good plan. If you see <code>type:ALL</code> with rows in the millions, that's the slow query you need to fix.</p>"},
    {type:'concept', title:"Common slow patterns and fixes",
     body:`<ul>
       <li><b>Function on indexed column</b> — <code>DATE(created_at) = '...'</code> defeats the index. Rewrite as a range: <code>created_at &gt;= '...' AND created_at &lt; '...'</code>.</li>
       <li><b>Leading wildcard LIKE</b> — <code>LIKE '%abc'</code> can't seek. Use FULLTEXT for contains-search at scale.</li>
       <li><b>OR across different columns</b> — often turns into a scan. UNION ALL of two indexed queries can be faster.</li>
       <li><b>Big OFFSET</b> — <code>LIMIT 1000000, 10</code> still reads a million rows. Use keyset pagination: <code>WHERE id &gt; last_seen_id ORDER BY id LIMIT 10</code>.</li>
       <li><b>SELECT *</b> in a list page — defeats covering indexes. Select only the columns you actually display.</li>
     </ul>`},
    {type:'concept', title:"Partitioning",
     body:`<p>Splits one logical table into multiple physical chunks by some key (usually date).</p>
           <p><b>Helps when:</b> queries naturally filter on the partition key, the table is huge (100M+ rows), or you need to drop old data fast (dropping a partition = instant).</p>
           <p><b>Doesn't help when:</b> most queries don't include the partition key in WHERE.</p>`},
    {type:'example', title:"Range partitioning by year",
     code:`CREATE TABLE orders (
  id INT, created_at DATETIME, amount DECIMAL,
  ...
)
PARTITION BY RANGE (YEAR(created_at)) (
  PARTITION p2023 VALUES LESS THAN (2024),
  PARTITION p2024 VALUES LESS THAN (2025),
  PARTITION p2025 VALUES LESS THAN (2026)
);

-- this query only touches p2025:
SELECT * FROM orders
WHERE created_at >= '2025-01-01'
  AND created_at <  '2026-01-01';`,
     walkthrough:"<p>MySQL prunes the irrelevant partitions automatically. EXPLAIN shows <code>partitions: p2025</code> — only one chunk is read instead of the whole table.</p>"},
    {type:'question', kind:'mcq',
     question:"EXPLAIN shows <code>type: ALL</code> and <code>rows: 5,000,000</code>. What does it mean?",
     options:[
       "Optimal plan",
       "Full table scan — likely missing an index",
       "Using covering index",
       "The query is invalid"
     ], correct:1,
     explanation:"type:ALL = full table scan. If rows are large, add the right index on the WHERE columns."},
    {type:'question', kind:'mcq',
     question:"You see <code>Using filesort</code> in EXPLAIN. The likely cause:",
     options:[
       "ORDER BY can't use an index",
       "Tables are too large",
       "Wrong JOIN type",
       "Missing PRIMARY KEY"
     ], correct:0,
     explanation:"Filesort means MySQL must sort results in memory or on disk because the result order doesn't match any available index."},
    {type:'pitfall', title:"Don't optimize prematurely",
     body:`<p>Add indexes when you SEE a slow query, not "just in case". Speculative indexes bloat writes and storage with no measurable benefit.</p>
           <p>Workflow: write query → EXPLAIN → measure → add index only if needed → re-measure.</p>`},
    {type:'summary', title:"Recap", bullets:[
      "EXPLAIN before optimizing — watch type, rows, Extra.",
      "type:ALL = scan; type:ref/range/eq_ref = index seek.",
      "Using index = covering (great). Using filesort/temporary = often expensive.",
      "Common fixes: convert function-on-column to ranges; avoid leading wildcards; use keyset pagination.",
      "Partition huge date-keyed tables. Measure first."
    ]}
  ]
},

/* 29 */ {
  id:29, title:"Concurrency, Locks & Replication", icon:"⚙️", color:"#dc2626", difficulty:"engineering",
  description:"Isolation levels, locking, deadlocks, primary/replica setups.",
  cards:[
    {type:'concept', title:"Isolation levels in practice",
     body:`<p>Four standard levels, from loose to strict:</p>
           <ul>
             <li><b>READ UNCOMMITTED</b> — can see other transactions' uncommitted changes (dirty reads).</li>
             <li><b>READ COMMITTED</b> — only see committed data; reads can change between statements (non-repeatable reads).</li>
             <li><b>REPEATABLE READ</b> — same read returns same data within one transaction. <b>InnoDB default.</b></li>
             <li><b>SERIALIZABLE</b> — strongest; effectively locks ranges. Slowest, rarely used.</li>
           </ul>
           <p>Most production apps use REPEATABLE READ or READ COMMITTED.</p>`},
    {type:'concept', title:"Locks in InnoDB",
     body:`<p>InnoDB uses <b>row-level locks</b>: only the affected rows are locked, not the whole table.</p>
           <ul>
             <li><b>Shared (S)</b> — multiple readers OK; blocks writers. <code>SELECT … FOR SHARE</code>.</li>
             <li><b>Exclusive (X)</b> — blocks readers and writers. <code>SELECT … FOR UPDATE</code> or any UPDATE/DELETE.</li>
             <li><b>Gap locks</b> — lock the empty space BETWEEN index entries. Prevent phantom reads in REPEATABLE READ.</li>
           </ul>`},
    {type:'concept', title:"Deadlocks",
     body:`<p>Two transactions each hold a lock the other needs:</p>
           <pre class="code">-- T1: UPDATE accounts SET ... WHERE id = 1;   (locks row 1)
-- T2: UPDATE accounts SET ... WHERE id = 2;   (locks row 2)
-- T1: UPDATE accounts SET ... WHERE id = 2;   (waits for T2)
-- T2: UPDATE accounts SET ... WHERE id = 1;   (waits for T1)
-- ⚠ DEADLOCK</pre>
           <p>InnoDB detects deadlocks automatically and rolls back one transaction (error 1213). Your application must catch this error and retry.</p>`},
    {type:'concept', title:"Avoiding deadlocks",
     body:`<ul>
       <li><b>Lock rows in a consistent order</b> across all transactions (e.g. ascending by id).</li>
       <li><b>Keep transactions short</b> — long-held locks = more conflicts.</li>
       <li><b>Use single statements when possible.</b> <code>UPDATE … WHERE id IN (1, 2)</code> takes locks atomically.</li>
       <li><b>Retry on deadlock</b> — driver throws 1213; your code retries the transaction.</li>
     </ul>`,
     real:"Bank transfer code always locks the lower-id account first. That convention alone eliminates ~all deadlocks across concurrent transfers."},
    {type:'concept', title:"Replication basics",
     body:`<p><b>Primary/replica</b> architecture. The primary accepts writes. Replicas asynchronously copy the primary's binary log and serve reads.</p>
           <p>Benefits: read scaling, backups, disaster recovery, analytics queries off the hot DB.</p>
           <p>Trade-off: <b>replication lag</b>. A replica may be seconds (or more) behind. Don't read-your-own-write from a replica unless you've waited for catchup.</p>`},
    {type:'concept', title:"Read replica patterns",
     body:`<ul>
       <li><b>Stale-OK reads</b> (dashboards, search) → any replica</li>
       <li><b>Write-your-own-read</b> (just-submitted form) → primary, or wait for replica catchup</li>
       <li><b>Hot standby</b> → one replica promotable to primary on failure</li>
       <li><b>Geo-replicas</b> → reads served from the nearest region</li>
     </ul>`},
    {type:'question', kind:'mcq',
     question:"InnoDB's default isolation level is:",
     options:["READ UNCOMMITTED","READ COMMITTED","REPEATABLE READ","SERIALIZABLE"], correct:2,
     explanation:"REPEATABLE READ. InnoDB's implementation also prevents most phantom reads via gap locks."},
    {type:'question', kind:'mcq',
     question:"Two transactions deadlock. What happens?",

       "MySQL detects the deadlock and rolls back one; the other proceeds",

    {type:'pitfall', title:"Long-running transactions are the enemy",
     body:`<p>A transaction held open for 30 seconds holds its locks for 30 seconds. Other transactions queue up, replication lag explodes, deadlocks multiply.</p>
           <p>Rule: <code>START TRANSACTION</code> → run statements → <code>COMMIT</code> (or <code>ROLLBACK</code>). Never do HTTP calls, file I/O, or user prompts inside an open transaction.</p>`},
    {type:'summary', title:"Recap", bullets:[
      "4 isolation levels. InnoDB default = REPEATABLE READ.",
      "InnoDB uses row-level locks; SELECT FOR UPDATE for explicit exclusive locks.",
      "Deadlocks: detected automatically; one txn rolled back. App must retry.",
      "Always lock rows in a consistent order to prevent deadlocks.",
      "Replication: primary writes, replicas read. Always mind the lag."
    ]}
  ]

           <p><b>OLAP</b> (Online Analytical Processing) — your data warehouse. Optimized for big aggregate reads (revenue by region by quarter).</p>

    {type:'concept', title:"Materialized views",
     body:`<p>A regular VIEW stores its query and re-runs it on every SELECT. A <b>materialized view</b> stores the RESULT and serves it like a table.</p>
           <p>Trade-off: instant reads, but stale until refreshed. You choose the freshness policy:</p>
           <ul>
             <li>Refresh on schedule (every hour, every night)</li>
             <li>Refresh on demand (after a known data change)</li>
             <li>Refresh incrementally (only update changed rows)</li>
           </ul>
           <pre class="code">-- PostgreSQL syntax:
CREATE MATERIALIZED VIEW mv_daily_revenue AS
SELECT DATE(created_at) AS day, SUM(amount) AS revenue
FROM orders
GROUP BY DATE(created_at);

REFRESH MATERIALIZED VIEW mv_daily_revenue;</pre>`},

           <ul>

             <li><b>Transform</b> — clean, type-cast, derive, deduplicate, join.</li>
             <li><b>Load</b> — write into warehouse tables (often append-only).</li>
           </ul>
           <p>Modern variant: <b>ELT</b> — load raw data first, transform inside the warehouse using dbt/SQL. Easier to debug; closer to the analyst.</p>`},

             <li><b>Type 3</b> — add a <code>previous_value</code> column. One step of history.</li>

const DEFAULT_STATE = {xp:0, streak:0, lastPlayed:null, moduleProgress:{}};
function loadState(){
  try{
    const raw = localStorage.getItem('sqlingo.v3');
    if(!raw) return {...DEFAULT_STATE};
    return {...DEFAULT_STATE, ...JSON.parse(raw)};
  }catch(e){return {...DEFAULT_STATE}}
}
function saveState(){try{localStorage.setItem('sqlingo.v3', JSON.stringify(state))}catch(e){}}
let state = loadState();
(function migrateState(){
  function tk(){const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
  const today = new Date().toDateString();
  // adaptive learning fields
  if(state.freezesAvailable === undefined) state.freezesAvailable = 1;
  if(!state.concepts) state.concepts = {};
  if(!state.questionSrs) state.questionSrs = {};
  if(!state.dailyGoal) state.dailyGoal = 10;
  if(!state.dailyProgress || state.dailyProgress.date !== tk()){
    state.dailyProgress = {date: tk(), completed: 0};
  }
  // streak check with freeze recovery
  state.streakFrozeRecently = false;
  if(state.lastPlayed && state.lastPlayed !== today){
    const diff = (new Date(today) - new Date(state.lastPlayed))/86400000;
    if(diff === 2 && state.freezesAvailable > 0){
      // Streak freeze: silently bridge one missed day
      state.freezesAvailable -= 1;
      const yest = new Date(); yest.setDate(yest.getDate() - 1);
      state.lastPlayed = yest.toDateString();
      state.streakFrozeRecently = true;
    } else if(diff > 1){
      state.streak = 0;
    }
  }
  saveState();
})();

/* ============ Table render (real null) ============ */
function renderTable(t){
  if(!t) return '';
  const head = t.cols.map(c => `<th>${esc(c)}</th>`).join('');
  const body = t.rows.length === 0 ? '' :
    `<tbody>${t.rows.map(r => `<tr>${r.map(v => v===null||v===undefined ? '<td class="null">NULL</td>' : `<td>${esc(String(v))}</td>`).join('')}</tr>`).join('')}</tbody>`;
  return `<div class="mini-table" role="table" aria-label="Table ${esc(t.name)}">
    <div class="mt-caption">${esc(t.name)}</div>
    <table><thead><tr>${head}</tr></thead>${body}</table>
    ${t.rows.length===0 ? '<div class="empty-rows">∅ 0 rows returned</div>' : ''}
  </div>`;
}
function renderTables(arr){
  if(!arr || !arr.length) return '';
  return `<div class="tables-wrap">${arr.map(renderTable).join('')}</div>`;
}

/* ============ Code highlighter (lightweight) ============ */
function hl(code){
  if(!code) return '';
  let s = esc(code);
  s = s.replace(/(--[^\n]*)/g, '<span class="c">$1</span>');
  s = s.replace(/(#[^\n]*)/g, '<span class="c">$1</span>');
  s = s.replace(/'((?:[^'\\\n]|\\.)*)'/g, "<span class=\"s\">'$1'</span>");
  s = s.replace(/(?<![\w])(\d+\.?\d*)\b/g, '<span class="n">$1</span>');
  const kw = ['SELECT','DISTINCT','FROM','WHERE','GROUP BY','HAVING','ORDER BY','LIMIT','OFFSET','JOIN','INNER JOIN','LEFT JOIN','RIGHT JOIN','CROSS JOIN','ON','AS','AND','OR','NOT','IN','BETWEEN','LIKE','IS NULL','IS NOT NULL','NULL','CASE','WHEN','THEN','ELSE','END','UNION ALL','UNION','WITH','RECURSIVE','EXISTS','INSERT INTO','VALUES','UPDATE','SET','DELETE','TRUNCATE','TABLE','CREATE','ALTER','DROP','ADD','MODIFY','COLUMN','INDEX','UNIQUE','PRIMARY KEY','FOREIGN KEY','REFERENCES','CHECK','DEFAULT','NOT','AUTO_INCREMENT','INT','BIGINT','VARCHAR','TEXT','DECIMAL','DATE','DATETIME','TIMESTAMP','JSON','BOOLEAN','BEGIN','COMMIT','ROLLBACK','START TRANSACTION','CALL','RETURN','RETURNS','DECLARE','IF','LOOP','PROCEDURE','FUNCTION','TRIGGER','BEFORE','AFTER','FOR EACH ROW','VIEW','OR REPLACE','GRANT','REVOKE','FLUSH PRIVILEGES','USER','ROLE','TO','OVER','PARTITION BY','MATCH','AGAINST','FULLTEXT','INTERVAL','NOW','CURDATE','CURRENT_TIMESTAMP','ON DUPLICATE KEY UPDATE','ANY_VALUE','COALESCE','IFNULL','COUNT','SUM','AVG','MIN','MAX','DATEDIFF','DATE_FORMAT','YEAR','MONTH','DAY','SUBSTRING','REPLACE','LOWER','UPPER','TRIM','CHAR_LENGTH','CONCAT','REGEXP','SOUNDEX','ROW_NUMBER','RANK','DENSE_RANK','LAG','LEAD','NTILE','PREPARE','EXECUTE','USING','DEALLOCATE','OLD','NEW','VALUES','PRIMARY','SET DEFAULT ROLE','IDENTIFIED BY','DELIMITER','IN','OUT','INOUT'];
  kw.sort((a,b)=>b.length-a.length);
  for(const k of kw){
    const re = new RegExp(`(?<![\\w])(${k.replace(/[-/\\^$*+?.()|[\\]{}]/g,'\\$&')})(?![\\w])`,'gi');
    s = s.replace(re, m => `<span class="k">${m}</span>`);
  }
  return s;
}

/* ============ Lesson state ============ */
let curModule = null;
let curIdx = 0;
let sessionCorrect = 0;
let sessionTotal = 0;
let sessionStart = 0;
let curSelected = null;
let curAnswered = false;

function startModule(id){
  curModule = M.find(m => m.id === id);
  curIdx = 0;
  sessionCorrect = 0;
  sessionTotal = curModule.cards.filter(c => c.type === 'question').length;
  sessionStart = Date.now();
  if(!state.moduleProgress[id]) state.moduleProgress[id] = {cardsDone:0, completed:false};
  state.moduleProgress[id].cardsDone = 0;
  renderCard();
}

function startMixed(count){
  const all = [];
  M.forEach(m => m.cards.forEach(c => {
    if(c.type === 'question') all.push({...c, _from: m.title});
  }));
  for(let i = all.length-1; i>0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [all[i], all[j]] = [all[j], all[i]];
  }
  const picked = all.slice(0, Math.min(count, all.length));
  curModule = {id:'mixed', title:`Mixed Practice (${picked.length})`, icon:'🎲', color:'#ef4444', cards: picked};
  curIdx = 0;
  sessionCorrect = 0;
  sessionTotal = picked.length;
  sessionStart = Date.now();
  renderCard();
}

/* ============ Render card by type ============ */
function renderCard(){
  hideFeedback();
  curSelected = null;
  curAnswered = false;
  const total = curModule.cards.length;
  const stepNum = curIdx + 1;
  const progress = Math.round(100 * curIdx / total);
  const card = curModule.cards[curIdx];

  let body = '';
  if(card.type === 'concept')  body = renderConcept(card);
  else if(card.type === 'syntax')  body = renderSyntax(card);
  else if(card.type === 'example') body = renderExample(card);
  else if(card.type === 'question')body = renderQuestion(card);
  else if(card.type === 'pitfall') body = renderPitfall(card);
  else if(card.type === 'summary') body = renderSummary(card);

  const isQuestion = card.type === 'question';
  const continueText = curIdx === total - 1 ? 'Finish' : 'Continue';

  main.innerHTML = `
    <div class="lesson-header">
      <button class="close-btn" onclick="renderHome()" aria-label="Exit lesson">×</button>
      <div class="progress-bar" role="progressbar" aria-valuenow="${progress}" aria-valuemin="0" aria-valuemax="100">

      </div>
      <div class="step-label">${stepNum}/${total}</div>
    </div>
    ${body}
    <div class="footer-actions">
      <button class="btn btn-secondary" onclick="prevCard()" ${curIdx===0?'disabled':''} aria-label="Previous card">Back</button>
      <div class="right">
        ${isQuestion
          ? `<button class="btn btn-primary" id="checkBtn" onclick="checkAnswer()" disabled>Check</button>`
          : `<button class="btn btn-primary" onclick="nextCard()">${continueText}</button>`}
      </div>
    </div>`;

  if(card.type === 'question' && card.kind === 'fill'){
    const input = $('#blankInput');
    if(input){
      input.addEventListener('input', () => $('#checkBtn').disabled = input.value.trim().length === 0);
      input.focus();
      input.addEventListener('keydown', e => { if(e.key === 'Enter' && !$('#checkBtn').disabled) checkAnswer(); });
    }
  }

/* ============ Navigation ============ */
function nextCard(){
  const c = curModule.cards[curIdx];
  if(c.type !== 'question') {
    state.moduleProgress[curModule.id] && (state.moduleProgress[curModule.id].cardsDone = Math.max(state.moduleProgress[curModule.id].cardsDone || 0, curIdx + 1));
    saveState();
  }
  if(curIdx < curModule.cards.length - 1){
    curIdx++; renderCard();
  } else finishModule();
}
function prevCard(){
  if(curIdx > 0){curIdx--; renderCard();}
}

/* ============ Questions ============ */
function selectOption(i){
  if(curAnswered) return;
  curSelected = i;
  document.querySelectorAll('.option').forEach((el, idx) => {
    el.classList.toggle('selected', idx === i);
    el.setAttribute('aria-checked', idx === i ? 'true' : 'false');
  });
  $('#checkBtn').disabled = false;
}
function checkAnswer(){
  const c = curModule.cards[curIdx];
  let correct = false;
  if(c.kind === 'mcq'){
    if(curSelected === null) return;
    correct = curSelected === c.correct;
    document.querySelectorAll('.option').forEach((el, idx) => {
      el.disabled = true;
      el.classList.remove('selected');
      if(idx === c.correct) el.classList.add('correct');
      else if(idx === curSelected && !correct) el.classList.add('wrong');
    });
  } else if(c.kind === 'fill'){
    const input = $('#blankInput');
    const userAns = input.value.trim();
    const answers = c.answer.split('|').map(a => a.trim().toLowerCase());
    correct = answers.includes(userAns.toLowerCase());
    input.disabled = true;
    input.classList.add(correct ? 'correct' : 'wrong');
  }
  curAnswered = true;
  if(correct){
    sessionCorrect++;
    state.xp += 10;
    bumpDailyGoal();
  }
  if(curModule && curModule.id !== 'mixed'){
    const concepts = moduleToConcepts(curModule);
    if(concepts.length) recordConcept(concepts, !!correct);
  }
  saveState();
  updateStatsUI();
  showFeedback(correct, c.explanation);
  const btn = $('#checkBtn'); if(btn) btn.remove();
}

continueBtn.onclick = () => {
  hideFeedback();
  nextCard();
};

/* ============ Finish ============ */
function finishModule(){
  tickStreak();
  if(curModule.id !== 'mixed' && state.moduleProgress[curModule.id]){
    state.moduleProgress[curModule.id].completed = true;
    state.moduleProgress[curModule.id].cardsDone = curModule.cards.length;
  }
  saveState();
  const acc = sessionTotal > 0 ? Math.round(100 * sessionCorrect / sessionTotal) : 100;
  const elapsed = Math.round((Date.now() - sessionStart) / 1000);
  const mins = Math.floor(elapsed/60), secs = elapsed%60;
  const timeStr = mins > 0 ? `${mins}m ${secs}s` : `${secs}s`;
  const xpGained = sessionCorrect * 10;
  const isMixed = curModule.id === 'mixed';
  main.innerHTML = `
    <div class="results">
      <div class="trophy">${acc===100?'🏆':acc>=80?'🌟':acc>=60?'💪':'📖'}</div>
      <h2>${isMixed ? 'Practice complete!' : 'Module complete!'}</h2>
      <p class="subtitle">${esc(curModule.title)}</p>
      <div class="stat-grid">
        <div class="stat-card xp"><div class="sc-label">XP</div><div class="sc-value">+${xpGained}</div></div>
        <div class="stat-card acc"><div class="sc-label">Accuracy</div><div class="sc-value">${acc}%</div></div>
        <div class="stat-card time"><div class="sc-label">Time</div><div class="sc-value">${timeStr}</div></div>
      </div>
      <div class="footer-actions" style="justify-content:center">
        ${isMixed
          ? `<button class="btn btn-secondary" onclick="startMixed(${sessionTotal})">Another round</button>
             <button class="btn btn-primary" onclick="renderHome()">Back to map</button>`
          : `<button class="btn btn-secondary" onclick="startModule(${curModule.id})">Replay</button>
             <button class="btn btn-primary" onclick="goNextOrHome()">${nextModuleId()?'Next module →':'Back to map'}</button>`}
      </div>
    </div>`;
}
function nextModuleId(){
  if(curModule.id === 'mixed') return null;
  const idx = M.findIndex(m => m.id === curModule.id);
  return idx < M.length - 1 ? M[idx+1].id : null;
}
function goNextOrHome(){const n = nextModuleId(); if(n) startModule(n); else renderHome();}
function resetProgress(){
  if(confirm('Reset all progress, XP and streak? This cannot be undone.')){
    state = {...DEFAULT_STATE}; saveState(); renderHome();
  }
}

/* ============ SQL Playground ============ */
let _SQL = null;
let _sqlLoading = null;
const SQLJS_CDN = 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/';

function ensureSql(){
  if(_SQL) return Promise.resolve(_SQL);
  if(_sqlLoading) return _sqlLoading;
  _sqlLoading = new Promise((resolve, reject) => {
    const start = () => {
      window.initSqlJs({locateFile: f => SQLJS_CDN + f})
        .then(SQL => { _SQL = SQL; resolve(SQL); })
        .catch(reject);
    };
    if(window.initSqlJs) start();
    else {
      const s = document.createElement('script');
      s.src = SQLJS_CDN + 'sql-wasm.js';
      s.async = true;
      s.onload = start;
      s.onerror = () => reject(new Error('Could not load sql.js from CDN. Check your network.'));
      document.head.appendChild(s);
    }
  });
  return _sqlLoading;
}

function buildDb(setup){
  const db = new _SQL.Database();
  setup.forEach(stmt => db.run(stmt));
  return db;
}

function execSelect(db, sql){
  const trimmed = sql.trim().replace(/;+\s*$/, '');
  if(!trimmed) throw new Error('Empty query — type something first.');
  if(!/^(select|with)\b/i.test(trimmed)){
    throw new Error('The playground only runs SELECT queries (or WITH … SELECT). No INSERT / UPDATE / DELETE here.');
  }
  const out = db.exec(trimmed);
  if(out.length === 0) return {cols:[], rows:[]};
  return {cols: out[0].columns, rows: out[0].values};
}

function compareResults(a, b, ordered){
  if(a.rows.length !== b.rows.length) return false;
  if(a.cols.length !== b.cols.length) return false;
  const norm = rows => rows.map(r => r.map(v => v===null||v===undefined ? '\u0000NULL' : String(v).trim()));
  let ar = norm(a.rows), br = norm(b.rows);
  if(!ordered){
    const f = (x, y) => JSON.stringify(x).localeCompare(JSON.stringify(y));
    ar = [...ar].sort(f);
    br = [...br].sort(f);
  }
  return JSON.stringify(ar) === JSON.stringify(br);
}

function previewTable(db, name){
  try{
    const r = db.exec(`SELECT * FROM ${name} LIMIT 50`);
    if(r.length === 0) return {name, cols:[], rows:[]};
    return {name, cols: r[0].columns, rows: r[0].values};
  }catch(e){return null}
}

/* ---------- Challenge UI ---------- */
let curChallenge = null;
let curChallengeDb = null;
let curChallengeStarter = '';

async function startChallenge(id){
  curChallenge = CHALLENGES.find(c => c.id === id);
  if(!curChallenge) return renderHome();
  hideFeedback();
  lastChallengeRun = {user:null, expected:null, error:null};
  mentor = {issues:[], issueIdx:0, hintLevel:0};
  main.innerHTML = `<div class="pg-loading"><span class="spin">⟳</span>Loading SQL engine</div>`;
  try{
    await ensureSql();
    if(curChallengeDb){try{curChallengeDb.close()}catch(e){}}
    curChallengeDb = buildDb(curChallenge.setup);
    curChallengeStarter = curChallenge.starter;
    renderChallenge();
  }catch(e){
    main.innerHTML = `
      <div class="lesson-header">
        <button class="close-btn" onclick="renderHome()" aria-label="Back">×</button>
        <div style="flex:1"></div>
      </div>
      <article class="card card-pitfall">
        <span class="card-badge b-pitfall">⚠ Couldn't load engine</span>
        <h2>Couldn't load the SQL engine</h2>
        <p>The playground fetches <code>sql.js</code> from a CDN. Make sure you're online and reload the page.</p>
        <div class="error-block">${esc(e.message || String(e))}</div>
        <div class="footer-actions"><button class="btn btn-secondary" onclick="renderHome()">Back to map</button></div>
      </article>`;
  }
}

function renderChallenge(){
  hideFeedback();
  const c = curChallenge;
  const tables = (c.visible || []).map(n => previewTable(curChallengeDb, n)).filter(Boolean);
  main.innerHTML = `
    <div class="lesson-header">
      <button class="close-btn" onclick="exitChallenge()" aria-label="Back to map">×</button>
      <div style="flex:1;font-weight:800;font-size:14px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.title)}</div>
      <span class="diff ${c.difficulty}">${c.difficulty}</span>
    </div>
    <article class="card card-syntax">
      <span class="card-badge b-syntax">🛠 Playground</span>
      <h2>${esc(c.title)}</h2>
      <p>${c.prompt}</p>
      ${tables.length ? `<div class="result-label">tables you can query</div>${renderTables(tables)}` : ''}
      <div class="editor-shell">
        <div class="editor-bar">
          <span>SQL Editor</span>
          <span class="hint">Ctrl/Cmd + Enter to run</span>
        </div>
        <textarea class="sql-editor" id="sqlEditor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" aria-label="SQL editor">${esc(c.starter)}</textarea>
      </div>
      <div class="pg-actions">
        <button class="btn btn-blue" onclick="runChallenge()" aria-label="Run query">▶ Run Query</button>
        <button class="btn btn-primary" onclick="checkChallenge()" aria-label="Check answer">✓ Check Answer</button>
        <button class="btn btn-secondary" onclick="resetChallenge()" aria-label="Reset editor">↺ Reset</button>
        ${c.hint ? `<button class="btn btn-ghost" onclick="showHint()" aria-label="Show hint">💡 Hint</button>` : ''}
        <button class="btn btn-mentor" onclick="askMentor('playground')" aria-label="Ask the AI mentor">🧠 Mentor</button>
      </div>
      <div class="run-output" id="runOutput" aria-live="polite"></div>
      <div id="mentorPanel" aria-live="polite"></div>
    </article>
    <div class="footer-actions" style="margin-top:18px">
      <button class="btn btn-secondary" onclick="prevChallenge()" ${!hasPrevChallenge()?'disabled':''} aria-label="Previous challenge">← Previous</button>
      <div class="right">
        <button class="btn btn-primary" onclick="nextChallenge()" ${!hasNextChallenge()?'disabled':''} aria-label="Next challenge">Next →</button>
      </div>
    </div>
  `;
  const editor = $('#sqlEditor');
  editor.addEventListener('keydown', e => {
    if((e.ctrlKey || e.metaKey) && e.key === 'Enter'){
      e.preventDefault();
      runChallenge();
    }
    if(e.key === 'Tab' && !e.shiftKey){
      e.preventDefault();
      const s = editor.selectionStart, ee = editor.selectionEnd;
      editor.value = editor.value.slice(0, s) + '  ' + editor.value.slice(ee);
      editor.selectionStart = editor.selectionEnd = s + 2;
    }
  });
}

function exitChallenge(){
  if(curChallengeDb){try{curChallengeDb.close()}catch(e){}}
  curChallengeDb = null;
  curChallenge = null;
  renderHome();
}

function runChallenge(){
  const sql = $('#sqlEditor').value;
  const out = $('#runOutput');
  try{
    const r = execSelect(curChallengeDb, sql);
    lastChallengeRun = {user:r, expected:lastChallengeRun.expected, error:null};
    out.innerHTML = `
      <div class="run-status ok">▶ Query ran · ${r.rows.length} row${r.rows.length===1?'':'s'}</div>
      ${renderTables([{name:'your result', cols:r.cols, rows:r.rows}])}
    `;
  }catch(e){
    const msg = e.message || String(e);
    lastChallengeRun = {user:null, expected:lastChallengeRun.expected, error: msg};
    out.innerHTML = `
      <div class="run-status err">⚠ Query error — try the 🧠 Mentor button for help</div>
      <div class="error-block">${esc(msg)}</div>
    `;
  }
}

function checkChallenge(){
  const sql = $('#sqlEditor').value;
  const out = $('#runOutput');
  let userRes;
  try{
    userRes = execSelect(curChallengeDb, sql);
  }catch(e){
    const msg = e.message || String(e);
    lastChallengeRun = {user:null, expected:null, error:msg};
    out.innerHTML = `
      <div class="run-status err">⚠ Query error — try the 🧠 Mentor button for help</div>
      <div class="error-block">${esc(msg)}</div>
    `;
    return;
  }
  let expectedRes;
  try{
    const fresh = buildDb(curChallenge.setup);
    expectedRes = execSelect(fresh, curChallenge.expected);
    fresh.close();
  }catch(e){
    out.innerHTML = `<div class="error-block">Internal error: ${esc(e.message)}</div>`;
    return;
  }
  const correct = compareResults(userRes, expectedRes, curChallenge.ordered);
  lastChallengeRun = {user:userRes, expected:expectedRes, error:null};
  if(correct){
    if(!state.playgroundProgress) state.playgroundProgress = {};
    const already = state.playgroundProgress[curChallenge.id]?.completed;
    state.playgroundProgress[curChallenge.id] = {completed:true};
    if(!already){
      state.xp += 20;
      tickStreak();
      bumpDailyGoal();
    }
    saveState();
    updateStatsUI();
    out.innerHTML = `
      <div class="run-status ok">✓ Correct!</div>
      <div class="success-block">${already ? '🎉 Solved again — XP only awarded once per challenge.' : '🎉 +20 XP earned!'} Your query matches the expected result.</div>
      ${curChallenge.interpretation ? `<div class="real" style="margin-top:10px"><b>📊 Business meaning:</b> ${curChallenge.interpretation}</div>` : ''}
      ${renderTables([{name:'your result', cols:userRes.cols, rows:userRes.rows}])}
    `;
  } else {
    out.innerHTML = `
      <div class="run-status err">✗ Not yet — your output doesn't match the expected result.</div>
      <div class="diff-block">
        <strong>Your result · ${userRes.rows.length} row${userRes.rows.length===1?'':'s'}</strong>
        ${renderTables([{name:'yours', cols:userRes.cols, rows:userRes.rows}])}
        <strong>Expected · ${expectedRes.rows.length} row${expectedRes.rows.length===1?'':'s'}</strong>
        ${renderTables([{name:'expected', cols:expectedRes.cols, rows:expectedRes.rows}])}
      </div>
    `;
  }
}

function resetChallenge(){
  const ed = $('#sqlEditor');
  ed.value = curChallengeStarter;
  $('#runOutput').innerHTML = '';
  ed.focus();
}

function showHint(){
  $('#runOutput').innerHTML = `<div class="hint-block"><b>💡 Hint:</b> ${curChallenge.hint}</div>`;
}

function challengeIdx(){return CHALLENGES.findIndex(c => c.id === curChallenge.id)}
function hasPrevChallenge(){return challengeIdx() > 0}
function hasNextChallenge(){return challengeIdx() < CHALLENGES.length - 1}
function prevChallenge(){if(hasPrevChallenge()) startChallenge(CHALLENGES[challengeIdx()-1].id)}
function nextChallenge(){if(hasNextChallenge()) startChallenge(CHALLENGES[challengeIdx()+1].id)}

const IV_DIFF_CONFIG = {
  easy:   {base:100, mult:1,   speed:[50,30,15], desc:'Filters, joins, GROUP BY basics'},
  medium: {base:150, mult:1.5, speed:[60,40,20], desc:'Top-N per group, anti-joins, windows'},
  hard:   {base:200, mult:2,   speed:[80,50,25], desc:'Rolling windows, gaps/islands, retention, recursive'},
  faang:  {base:300, mult:3,   speed:[100,60,30],desc:'Cohorts, mutual graph, anomaly detection'}
};

const IV_DURATIONS = [
  {min:5,  label:'Sprint'},
  {min:10, label:'Standard'},
  {min:20, label:'Marathon'}
];

function ivCount(diff, durMin){
  const baseTime = {easy:1.5, medium:2.5, hard:4, faang:6};
  return Math.max(2, Math.floor(durMin / baseTime[diff]));
}

let iv = null; // active session

function ivQuestionsBy(diff){
  return INTERVIEW_QUESTIONS.filter(q => q.difficulty === diff);
}

let ivPickDur = 10;

function ivPick(kind, val){
  if(kind === 'diff') ivPickDiff = val;
  else if(kind === 'dur') ivPickDur = val;
  renderInterviewLanding();
}

/* ---------- Launching ---------- */
async function launchInterview(){
  const pool = ivQuestionsBy(ivPickDiff);
  if(pool.length === 0){
    alert('No questions in this pool yet.');
    return;
  }
  hideFeedback();
  main.innerHTML = `<div class="pg-loading"><span class="spin">⟳</span>Loading SQL engine</div>`;
  try{
    await ensureSql();
  }catch(e){
    main.innerHTML = `
      <article class="card card-pitfall">
        <span class="card-badge b-pitfall">⚠ Couldn't load engine</span>
        <h2>Couldn't load SQL engine</h2>
        <div class="error-block">${esc(e.message || String(e))}</div>
        <div class="footer-actions"><button class="btn btn-secondary" onclick="renderInterviewLanding()">Back</button></div>
      </article>`;
    return;
  }
  const n = Math.min(ivCount(ivPickDiff, ivPickDur), pool.length);
  const shuffled = [...pool].sort(() => Math.random() - 0.5).slice(0, n);
  iv = {
    difficulty: ivPickDiff,
    durationMs: ivPickDur * 60000,
    startTime: Date.now(),
    endTime: Date.now() + ivPickDur * 60000,
    questions: shuffled,
    idx: 0,
    score: 0,
    db: null,
    timerId: null,
    qStart: 0,
    qHints: 0,
    qAttempts: 0,
    qStarter: '',
    results: []
  };
  startIvQuestion();
}

function startIvQuestion(){
  const q = iv.questions[iv.idx];
  if(iv.db){try{iv.db.close()}catch(e){}}
  iv.db = buildDb(q.setup);
  iv.qStart = Date.now();
  iv.qHints = 0;
  iv.qAttempts = 0;
  iv.qStarter = q.starter;
  iv.lastRun = {user:null, expected:null, error:null};
  mentor = {issues:[], issueIdx:0, hintLevel:0};
  renderIvQuestion();
  startIvTimer();
}

      <div class="pg-actions">
        <button class="btn btn-blue" onclick="runIv()" aria-label="Run query">▶ Run Query</button>
        <button class="btn btn-primary" onclick="checkIv()" aria-label="Check answer">✓ Submit</button>
        <button class="btn btn-secondary" onclick="resetIv()" aria-label="Reset editor">↺ Reset</button>
        <button class="btn btn-ghost" onclick="hintIv()" aria-label="Show hint (−25 pts)">💡 Hint (−25)</button>
        <button class="btn btn-mentor" onclick="askMentor('interview')" aria-label="Ask the AI mentor">🧠 Mentor</button>
        <button class="btn btn-ghost" onclick="skipIv()" style="color:var(--red-sh)" aria-label="Skip question (0 pts)">⏭ Skip</button>
      </div>
      <div class="run-output" id="runOutput" aria-live="polite"></div>
      <div id="mentorPanel" aria-live="polite"></div>
    </article>
    <div style="margin-top:14px;text-align:center">
      <button class="btn btn-ghost" onclick="abortInterview()" style="font-size:13px">End round early</button>
    </div>
  `;
  const editor = $('#sqlEditor');
  editor.addEventListener('keydown', e => {
    if((e.ctrlKey || e.metaKey) && e.key === 'Enter'){ e.preventDefault(); runIv(); }
    if(e.key === 'Tab' && !e.shiftKey){
      e.preventDefault();
      const s = editor.selectionStart, ee = editor.selectionEnd;
      editor.value = editor.value.slice(0,s) + '  ' + editor.value.slice(ee);
      editor.selectionStart = editor.selectionEnd = s + 2;
    }
  });
}

function startIvTimer(){
  stopIvTimer();
  iv.timerId = setInterval(() => {
    const remain = Math.max(0, iv.endTime - Date.now());
    const sec = Math.round(remain/1000);
    const el = $('#ivTime');
    if(el){
      const mm = String(Math.floor(sec/60)).padStart(2,'0');
      const ss = String(sec%60).padStart(2,'0');
      el.textContent = `${mm}:${ss}`;
      const wrap = $('#ivTimer');
      if(wrap){
        if(sec <= 30) wrap.classList.add('urgent');
        else wrap.classList.remove('urgent');
      }
    }
    if(remain === 0){
      stopIvTimer();
      // record current Q as timed out if not yet done
      iv.results.push({
        questionId: iv.questions[iv.idx].id,
        title: iv.questions[iv.idx].title,
        category: iv.questions[iv.idx].category,
        solved:false, status:'timeout', score:0,
        timeSpent: Math.round((Date.now() - iv.qStart)/1000),
        hintsUsed: iv.qHints, attempts: iv.qAttempts
      });
      finishInterview();
    }
  }, 1000);
}
function stopIvTimer(){
  if(iv && iv.timerId){clearInterval(iv.timerId); iv.timerId = null;}
}

function runIv(){
  const sql = $('#sqlEditor').value;
  const out = $('#runOutput');
  try{
    const r = execSelect(iv.db, sql);
    iv.lastRun = {user:r, expected: iv.lastRun ? iv.lastRun.expected : null, error:null};
    out.innerHTML = `
      <div class="run-status ok">▶ Query ran · ${r.rows.length} row${r.rows.length===1?'':'s'}</div>
      ${renderTables([{name:'your result', cols:r.cols, rows:r.rows}])}
    `;
  }catch(e){
    const msg = e.message || String(e);
    iv.lastRun = {user:null, expected: iv.lastRun ? iv.lastRun.expected : null, error:msg};
    out.innerHTML = `
      <div class="run-status err">⚠ Query error — try the 🧠 Mentor button for help</div>
      <div class="error-block">${esc(msg)}</div>
    `;
  }
}

function checkIv(){
  const sql = $('#sqlEditor').value;
  const out = $('#runOutput');
  const q = iv.questions[iv.idx];
  let userRes;
  try{ userRes = execSelect(iv.db, sql); }
  catch(e){
    iv.qAttempts++;
    const msg = e.message || String(e);
    iv.lastRun = {user:null, expected:null, error:msg};
    out.innerHTML = `
      <div class="run-status err">⚠ Query error — try the 🧠 Mentor button for help</div>
      <div class="error-block">${esc(msg)}</div>
    `;
    return;
  }
  let expectedRes;
  try{
    const fresh = buildDb(q.setup);
    expectedRes = execSelect(fresh, q.expected);
    fresh.close();
  }catch(e){
    out.innerHTML = `<div class="error-block">Internal error: ${esc(e.message)}</div>`;
    return;
  }
  const correct = compareResults(userRes, expectedRes, q.ordered);
  iv.lastRun = {user:userRes, expected:expectedRes, error:null};
  if(correct){
    const elapsed = Math.round((Date.now() - iv.qStart) / 1000);
    const cfg = IV_DIFF_CONFIG[iv.difficulty];
    let qScore = cfg.base;
    // failed attempts before correct
    qScore -= iv.qAttempts * 10;
    // hint penalty
    qScore -= iv.qHints * 25;
    // speed bonus
    if(elapsed < 60) qScore += cfg.speed[0];
    else if(elapsed < 120) qScore += cfg.speed[1];
    else if(elapsed < 180) qScore += cfg.speed[2];
    qScore = Math.max(10, qScore);
    iv.score += qScore;
    bumpDailyGoal();
    const ivConcepts = tagsToConcepts(q.tags || []);
    if(ivConcepts.length) recordConcept(ivConcepts, true);
    recordQuestionSrs(q.id, true);
    iv.results.push({
      questionId: q.id, title: q.title, category: q.category,
      solved:true, status:'correct', score:qScore,
      timeSpent: elapsed, hintsUsed: iv.qHints, attempts: iv.qAttempts
    });
    out.innerHTML = `
      <div class="run-status ok">✓ Correct! +${qScore} pts</div>
      <div class="success-block">Solved in ${elapsed}s${iv.qHints?` · ${iv.qHints} hint(s)`:''}${iv.qAttempts?` · ${iv.qAttempts} failed check(s)`:''}.</div>
    `;
    const scoreEl = $('#ivScore'); if(scoreEl) scoreEl.textContent = iv.score;
    setTimeout(advanceIv, 900);
  } else {
    iv.qAttempts++;
    out.innerHTML = `
      <div class="run-status err">✗ Not matching expected output (attempt ${iv.qAttempts}). −10 pts when you finally solve it.</div>
      <div class="diff-block">
        <strong>Your result · ${userRes.rows.length} row${userRes.rows.length===1?'':'s'}</strong>
        ${renderTables([{name:'yours', cols:userRes.cols, rows:userRes.rows}])}
        <strong>Expected · ${expectedRes.rows.length} row${expectedRes.rows.length===1?'':'s'}</strong>
        ${renderTables([{name:'expected', cols:expectedRes.cols, rows:expectedRes.rows}])}
      </div>
    `;
  }
}

function hintIv(){
  const q = iv.questions[iv.idx];
  iv.qHints++;
  $('#runOutput').innerHTML = `<div class="hint-block"><b>💡 Hint (−25):</b> ${q.hint}</div>`;
}

function resetIv(){
  $('#sqlEditor').value = iv.qStarter;
  $('#runOutput').innerHTML = '';
  $('#sqlEditor').focus();
}

function skipIv(){
  if(!confirm('Skip this question? You will get 0 points for it.')) return;
  const q = iv.questions[iv.idx];
  const ivConcepts = tagsToConcepts(q.tags || []);
  if(ivConcepts.length) recordConcept(ivConcepts, false);
  recordQuestionSrs(q.id, false);
  iv.results.push({
    questionId: q.id, title: q.title, category: q.category,
    solved:false, status:'skipped', score:0,
    timeSpent: Math.round((Date.now() - iv.qStart)/1000),
    hintsUsed: iv.qHints, attempts: iv.qAttempts
  });
  advanceIv();
}

function advanceIv(){
  if(iv.idx < iv.questions.length - 1){
    iv.idx++;
    startIvQuestion();
  } else {
    stopIvTimer();
    finishInterview();
  }
}

function abortInterview(){
  if(!confirm('End this round now? Your score so far will be recorded.')) return;
  // mark remaining as skipped
  for(let i = iv.idx; i < iv.questions.length; i++){
    const q = iv.questions[i];
    if(!iv.results.find(r => r.questionId === q.id)){
      iv.results.push({
        questionId: q.id, title: q.title, category: q.category,
        solved:false, status:'skipped', score:0,
        timeSpent: 0, hintsUsed: 0, attempts: 0
      });
    }
  }
  stopIvTimer();
  finishInterview();
}

function finishInterview(){
  stopIvTimer();
  if(iv.db){try{iv.db.close()}catch(e){}}
  const total = iv.questions.length;
  const solved = iv.results.filter(r => r.solved).length;
  const totalTime = iv.results.reduce((a,r) => a + (r.timeSpent||0), 0);
  const avgTime = solved > 0 ? Math.round(iv.results.filter(r=>r.solved).reduce((a,r)=>a+r.timeSpent,0) / solved) : 0;
  const xpEarned = Math.round(iv.score / 10);
  state.xp += xpEarned;
  tickStreak();
  // save session
  if(!state.interviewHistory) state.interviewHistory = [];
  state.interviewHistory.push({
    timestamp: Date.now(),
    sessionId: Math.random().toString(36).substring(2,11),
    difficulty: iv.difficulty,
    duration: iv.durationMs / 60000,
    score: iv.score,
    questionsTotal: total,
    questionsSolved: solved,
    avgTimePerQ: avgTime,
    xp: xpEarned,
    results: iv.results.map(r => ({
      questionId: r.questionId, status: r.status, score: r.score,
      timeSpent: r.timeSpent, hintsUsed: r.hintsUsed, attempts: r.attempts
    }))
  });
  if(state.interviewHistory.length > 50) state.interviewHistory = state.interviewHistory.slice(-50);
  saveState();
  updateStatsUI();
  // render summary
  const trophy = iv.score >= total * IV_DIFF_CONFIG[iv.difficulty].base * 0.9 ? '🏆'
               : iv.score >= total * IV_DIFF_CONFIG[iv.difficulty].base * 0.6 ? '🌟'
               : iv.score >= total * IV_DIFF_CONFIG[iv.difficulty].base * 0.3 ? '💪' : '📖';
  main.innerHTML = `
    <div class="results">
      <div class="trophy">${trophy}</div>
      <h2>Round complete</h2>
      <p class="subtitle">${iv.difficulty.toUpperCase()} · ${iv.durationMs/60000} min</p>
      <div class="iv-summary-grid">
        <div class="iv-sum-card score"><div class="lbl">Score</div><div class="val">${iv.score}</div></div>
        <div class="iv-sum-card solved"><div class="lbl">Solved</div><div class="val">${solved}/${total}</div></div>
        <div class="iv-sum-card xp"><div class="lbl">XP</div><div class="val">+${xpEarned}</div></div>
        <div class="iv-sum-card time"><div class="lbl">Avg time</div><div class="val">${avgTime}s</div></div>
      </div>

      <div class="iv-breakdown" style="max-width:560px;margin:0 auto;text-align:left">
        <h3>Question breakdown</h3>
        ${iv.results.map((r,i) => `
          <div class="iv-q-row ${r.solved?'correct':r.status==='skipped'?'skipped':'failed'}">
            <div class="qnum">${i+1}</div>
            <div>
              <div class="qtitle">${esc(r.title)}</div>
              <div class="qcat">${r.category}${r.hintsUsed?` · ${r.hintsUsed} hint`:''}${r.attempts?` · ${r.attempts} fail`:''}</div>
            </div>
            <div class="qtime">${r.timeSpent}s</div>
            <div class="qscore">${r.solved?'+':''}${r.score}</div>
          </div>
        `).join('')}
      </div>

      <div class="footer-actions" style="justify-content:center;margin-top:20px">
        <button class="btn btn-secondary" onclick="renderInterviewLanding()">Another round</button>
        <button class="btn btn-primary" onclick="renderHome()">Back to map</button>
      </div>
    </div>
  `;
  iv = null;
}

function renderSchemaCanvas(schema){
  const paths = schema.relationships.map((rel, i) => {
    const p = buildErPath(schema, rel);
    return {...p, idx:i};
  });
  const pathsSvg = paths.map((p, i) => `
    <path id="${curSchemaCtx ? curSchemaCtx.idPrefix : 'rel-'+schema.id}-${i}" d="${p.d}" class="rel-line" data-rel-idx="${i}" />
    <path d="${p.d}" class="rel-line hit" data-rel-idx="${i}" onclick="highlightRel(${i})" />
    <text x="${p.midX}" y="${p.midY - 5}" class="rel-label">${schema.relationships[i].type}</text>
  `).join('');
  const tablesHtml = schema.tables.map(t => renderErTable(t)).join('');
  return `
    <div class="schema-canvas">
      <div class="schema-canvas-inner" style="width:${schema.canvasW}px;height:${schema.canvasH}px">
        <svg class="schema-svg" viewBox="0 0 ${schema.canvasW} ${schema.canvasH}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">${pathsSvg}</svg>
        <div class="schema-tables">${tablesHtml}</div>
      </div>
    </div>
  `;
}

function renderErTable(table){
  const rows = table.columns.map(col => {
    const isPk = !!col.pk;
    const isFk = !!col.fk;
    const cls = (isPk?'pk-row ':'') + (isFk?'fk-row ':'');
    const badges = (isPk?'<span class="kpi pk">PK</span>':'') + (isFk?'<span class="kpi fk">FK</span>':'');
    return `<div class="er-row ${cls.trim()}" data-col="${table.id}.${col.name}">
      <span class="col-name">${badges} ${esc(col.name)}</span>
      <span class="col-type">${esc(col.type)}</span>
    </div>`;
  }).join('');
  return `<div class="er-table" style="left:${table.x}px;top:${table.y}px" data-table="${table.id}">
    <div class="er-table-header">${esc(table.id)}</div>${rows}
  </div>`;
}

function buildErPath(schema, rel){
  const [fromT, fromCol] = rel.from.split('.');
  const [toT, toCol] = rel.to.split('.');
  const fT = schema.tables.find(t => t.id === fromT);
  const tT = schema.tables.find(t => t.id === toT);
  const fI = fT.columns.findIndex(c => c.name === fromCol);
  const tI = tT.columns.findIndex(c => c.name === toCol);
  const fY = fT.y + ER_HEADER_H + fI * ER_ROW_H + ER_ROW_H/2;
  const tY = tT.y + ER_HEADER_H + tI * ER_ROW_H + ER_ROW_H/2;
  const fCx = fT.x + ER_TABLE_W/2;
  const tCx = tT.x + ER_TABLE_W/2;
  let fX, tX, c1x, c2x;
  if(tCx < fCx - 30){
    fX = fT.x;            tX = tT.x + ER_TABLE_W;
    const dx = Math.min(80, (fX - tX) / 2);
    c1x = fX - dx;        c2x = tX + dx;
  } else if(tCx > fCx + 30){
    fX = fT.x + ER_TABLE_W; tX = tT.x;
    const dx = Math.min(80, (tX - fX) / 2);
    c1x = fX + dx;        c2x = tX - dx;
  } else {
    fX = fT.x + ER_TABLE_W; tX = tT.x + ER_TABLE_W;
    c1x = fX + 70;          c2x = tX + 70;
  }
  const d = `M ${fX} ${fY} C ${c1x} ${fY}, ${c2x} ${tY}, ${tX} ${tY}`;
  const midX = (fX + c1x + c2x + tX) / 4;
  const midY = (fY + tY) / 2;
  return {d, midX, midY};
}

function renderRelList(schema){
  const items = schema.relationships.map((r, i) => `
    <button class="rel-item" data-rel-item="${i}" onclick="highlightRel(${i})" aria-label="${esc(r.from)} to ${esc(r.to)}">
      <span class="rel-type-pill one-to-many">${r.type}</span>
      <span class="rel-desc">${r.label}<small><code>${esc(r.from)}</code> → <code>${esc(r.to)}</code></small></span>
    </button>
  `).join('');
  const derived = (schema.derivedRelationships || []).map((r, i) => `
    <button class="rel-item" onclick="showDerivedRel(${i})" aria-label="${esc(r.label.replace(/<[^>]+>/g,''))}">
      <span class="rel-type-pill many-to-many">${r.type}</span>
      <span class="rel-desc">${r.label}<small>${r.desc}</small></span>
    </button>
  `).join('');
  return `<div class="rel-list">${items}${derived}</div>`;
}

function highlightRel(idx){
  if(!curSchemaCtx) return;
  const {schema, idPrefix} = curSchemaCtx;
  const rel = schema.relationships[idx];
  // clear previous
  document.querySelectorAll('.rel-line').forEach(l => l.classList.remove('active'));
  document.querySelectorAll('.rel-item').forEach(l => l.classList.remove('active'));
  document.querySelectorAll('.er-row').forEach(r => r.classList.remove('highlight'));
  document.querySelectorAll('.join-dot').forEach(d => d.remove());
  // activate
  document.querySelectorAll(`.rel-line[data-rel-idx="${idx}"]`).forEach(l => l.classList.add('active'));
  const item = document.querySelector(`[data-rel-item="${idx}"]`);
  if(item) item.classList.add('active');
  const fromRow = document.querySelector(`[data-col="${rel.from}"]`);
  const toRow = document.querySelector(`[data-col="${rel.to}"]`);
  if(fromRow) fromRow.classList.add('highlight');
  if(toRow) toRow.classList.add('highlight');
  // animate dot
  const svg = document.querySelector('.schema-svg');
  if(svg){
    const SVG_NS = 'http://www.w3.org/2000/svg';
    const XLINK_NS = 'http://www.w3.org/1999/xlink';
    const dot = document.createElementNS(SVG_NS, 'circle');
    dot.setAttribute('r', '7');
    dot.setAttribute('class', 'join-dot');
    const motion = document.createElementNS(SVG_NS, 'animateMotion');
    motion.setAttribute('dur', '1.6s');
    motion.setAttribute('repeatCount', '3');
    motion.setAttribute('rotate', '0');
    const mpath = document.createElementNS(SVG_NS, 'mpath');
    const pathId = `${idPrefix}-${idx}`;
    mpath.setAttribute('href', '#' + pathId);
    mpath.setAttributeNS(XLINK_NS, 'xlink:href', '#' + pathId);
    motion.appendChild(mpath);
    dot.appendChild(motion);
    svg.appendChild(dot);
    setTimeout(() => { if(dot.parentNode) dot.parentNode.removeChild(dot); }, 5000);
  }
  // show SQL
  const box = document.getElementById('joinSqlBox');
  if(box){
    box.style.display = 'block';
    box.innerHTML = `
      <div class="result-label">join SQL</div>
      <pre class="code">${hl(rel.joinSql)}</pre>
    `;
  }
}

function showDerivedRel(idx){
  if(!curSchemaCtx) return;
  const rel = curSchemaCtx.schema.derivedRelationships[idx];
  document.querySelectorAll('.rel-line').forEach(l => l.classList.remove('active'));
  document.querySelectorAll('.rel-item').forEach(l => l.classList.remove('active'));
  document.querySelectorAll('.er-row').forEach(r => r.classList.remove('highlight'));
  document.querySelectorAll('.join-dot').forEach(d => d.remove());
  const box = document.getElementById('joinSqlBox');
  if(box){
    box.style.display = 'block';
    box.innerHTML = `
      <div class="result-label">M:N join SQL</div>
      <pre class="code">${hl(rel.joinSql)}</pre>
    `;
  }
}

function setNormStage(i){

    tab.classList.toggle('active', idx === i);
    tab.setAttribute('aria-selected', idx === i ? 'true' : 'false');
  });
  const stage = NORM_STAGES[i];
  // build a schema-like object for canvas
  const fakeSchema = {
    id:'norm-'+i,
    canvasW:stage.canvasW, canvasH:stage.canvasH,
    tables:stage.tables,
    relationships:stage.relationships || []
  };
  curSchemaCtx = {schema:fakeSchema, idPrefix:'norm-'+i};
  document.getElementById('normStageContent').innerHTML = `

      <span class="norm-stage-badge ${stage.status}">${stage.badge}</span>
