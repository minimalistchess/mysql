<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SQLingo — MySQL Mastery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f7f7f2;
    --card:#ffffff;
    --ink:#2b2b2b;
    --muted:#777;
    --line:#e5e5e5;
    --green:#58cc02;
    --green-dark:#46a302;
    --green-shadow:#58a700;
    --orange:#ff9600;
    --orange-shadow:#c77400;
    --blue:#1cb0f6;
    --blue-shadow:#0a8ac9;
    --red:#ff4b4b;
    --red-shadow:#cc3a3a;
    --purple:#ce82ff;
    --gold:#ffc800;
    --code-bg:#1e1e2e;
    --code-text:#cdd6f4;
    --code-keyword:#f5c2e7;
    --code-string:#a6e3a1;
    --code-number:#fab387;
    --code-comment:#6c7086;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Nunito',system-ui,sans-serif;
    background:var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  code,pre{font-family:'JetBrains Mono',ui-monospace,monospace}

  /* ─── APP SHELL ─── */
  #app{min-height:100vh;display:flex;flex-direction:column}
  .topbar{
    position:sticky;top:0;z-index:50;
    background:var(--card);
    border-bottom:2px solid var(--line);
    padding:14px 20px;
    display:flex;align-items:center;justify-content:space-between;
    gap:12px;
  }
  .logo{font-weight:900;font-size:24px;letter-spacing:-0.5px;display:flex;align-items:center;gap:8px}
  .logo-mark{
    width:36px;height:36px;border-radius:10px;
    background:linear-gradient(135deg,var(--green),var(--blue));
    display:flex;align-items:center;justify-content:center;
    color:white;font-weight:900;font-size:18px;
    box-shadow:0 3px 0 var(--green-shadow);
  }
  .stats{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
  .stat{
    display:flex;align-items:center;gap:6px;
    font-weight:800;font-size:15px;
  }
  .stat-icon{font-size:20px}
  .hearts{color:var(--red)}
  .streak{color:var(--orange)}
  .xp{color:var(--gold)}

  main{flex:1;padding:24px 16px 60px;max-width:900px;margin:0 auto;width:100%}

  /* ─── BUTTONS ─── */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:14px 24px;border-radius:14px;
    font-weight:800;font-size:15px;letter-spacing:0.5px;text-transform:uppercase;
    transition:transform 0.08s, box-shadow 0.08s;
    user-select:none;
  }
  .btn:active{transform:translateY(2px)}
  .btn-primary{background:var(--green);color:white;box-shadow:0 4px 0 var(--green-shadow)}
  .btn-primary:active{box-shadow:0 2px 0 var(--green-shadow)}
  .btn-primary:disabled{background:#e5e5e5;color:#aaa;box-shadow:0 4px 0 #ccc;cursor:not-allowed}
  .btn-secondary{background:white;color:var(--muted);box-shadow:0 4px 0 var(--line);border:2px solid var(--line)}
  .btn-secondary:active{box-shadow:0 2px 0 var(--line)}
  .btn-danger{background:var(--red);color:white;box-shadow:0 4px 0 var(--red-shadow)}
  .btn-blue{background:var(--blue);color:white;box-shadow:0 4px 0 var(--blue-shadow)}
  .btn-ghost{background:transparent;color:var(--muted);font-weight:700}

  /* ─── HOME / MODULE MAP ─── */
  .hero{
    text-align:center;padding:24px 0 32px;
  }
  .hero h1{font-size:38px;font-weight:900;letter-spacing:-1px;line-height:1.05}
  .hero p{color:var(--muted);font-size:17px;font-weight:600;margin-top:8px;max-width:560px;margin-left:auto;margin-right:auto}
  .resume-banner{
    background:linear-gradient(135deg,#fff5e1,#ffe9c4);
    border:2px solid #ffd17a;
    border-radius:18px;
    padding:16px 20px;
    margin:0 auto 28px;max-width:640px;
    display:flex;gap:14px;align-items:flex-start;
  }
  .resume-banner-icon{font-size:28px;line-height:1}
  .resume-banner-text{font-size:14px;font-weight:600;color:#7a5a10;line-height:1.45}
  .resume-banner-text strong{font-weight:900;color:#4a3700}

  .map{display:flex;flex-direction:column;gap:18px;margin-top:8px}
  .module-card{
    background:var(--card);
    border:2px solid var(--line);
    border-radius:20px;
    padding:22px;
    display:grid;grid-template-columns:64px 1fr auto;gap:18px;align-items:center;
    cursor:pointer;
    transition:transform 0.1s, box-shadow 0.1s, border-color 0.1s;
    box-shadow:0 4px 0 var(--line);
    position:relative;
  }
  .module-card:hover:not(.locked){transform:translateY(-2px);box-shadow:0 6px 0 var(--line);border-color:var(--green)}
  .module-card.locked{opacity:0.55;cursor:not-allowed}
  .module-card.completed{border-color:var(--green);background:linear-gradient(135deg,#ffffff,#f0fae6)}
  .module-icon{
    width:64px;height:64px;border-radius:18px;
    display:flex;align-items:center;justify-content:center;
    font-size:32px;
    color:white;
    box-shadow:inset 0 -4px 0 rgba(0,0,0,0.15);
  }
  .module-meta h3{font-size:19px;font-weight:900;letter-spacing:-0.3px}
  .module-meta .desc{font-size:13.5px;color:var(--muted);font-weight:600;margin-top:3px;line-height:1.4}
  .module-meta .diff{display:inline-block;margin-top:8px;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:800;letter-spacing:0.6px;text-transform:uppercase;background:#eef;color:#447}
  .diff.beginner{background:#e3f7d2;color:#3d7300}
  .diff.intermediate{background:#fff0d6;color:#9c5d00}
  .diff.advanced{background:#ffe0e0;color:#9c2222}
  .diff.expert{background:#e8defb;color:#5e2c9e}
  .module-progress{
    text-align:right;
    font-weight:900;font-size:14px;color:var(--muted);
    min-width:50px;
  }
  .progress-ring{
    width:54px;height:54px;
    border-radius:50%;
    background:conic-gradient(var(--green) calc(var(--p)*1%), #eee 0);
    display:flex;align-items:center;justify-content:center;
    margin-left:auto;
  }
  .progress-ring-inner{
    width:42px;height:42px;border-radius:50%;
    background:var(--card);
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:900;
  }
  .lock-icon{position:absolute;top:14px;right:14px;font-size:18px;opacity:0.6}

  /* ─── LESSON / FLASHCARD VIEW ─── */
  .lesson-header{
    display:flex;align-items:center;gap:12px;margin-bottom:24px;
  }
  .progress-bar{
    flex:1;height:14px;background:#e5e5e5;border-radius:10px;overflow:hidden;
  }
  .progress-bar-fill{
    height:100%;background:var(--green);border-radius:10px;
    transition:width 0.3s;
    box-shadow:inset 0 -3px 0 rgba(0,0,0,0.1);
  }
  .close-btn{
    width:36px;height:36px;border-radius:50%;background:#eee;color:var(--muted);
    display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;
  }

  .card-stage{
    perspective:1200px;
    min-height:420px;
    display:flex;align-items:center;justify-content:center;
    margin:30px 0;
  }
  .flashcard{
    width:100%;max-width:560px;min-height:380px;
    position:relative;
    transform-style:preserve-3d;
    transition:transform 0.6s cubic-bezier(.65,.05,.36,1);
    cursor:pointer;
  }
  .flashcard.flipped{transform:rotateY(180deg)}
  .flashcard-face{
    position:absolute;inset:0;
    background:var(--card);
    border:2px solid var(--line);
    border-radius:22px;
    padding:30px;
    display:flex;flex-direction:column;
    backface-visibility:hidden;
    box-shadow:0 6px 0 var(--line);
  }
  .flashcard-face.back{transform:rotateY(180deg)}
  .flashcard-label{
    font-size:11px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--blue);margin-bottom:12px;
  }
  .flashcard-front .concept{
    font-size:28px;font-weight:900;letter-spacing:-0.5px;line-height:1.2;
    margin-bottom:14px;
  }
  .flashcard-front .hint{
    color:var(--muted);font-size:14.5px;font-weight:600;line-height:1.5;
  }
  .flashcard-back h4{font-size:15px;font-weight:800;margin-bottom:10px}
  .flashcard-back p{font-size:14.5px;line-height:1.55;color:#444;font-weight:500;margin-bottom:12px}
  .tap-hint{
    position:absolute;bottom:14px;left:0;right:0;
    text-align:center;font-size:12px;font-weight:700;color:var(--muted);
    letter-spacing:0.5px;text-transform:uppercase;
  }
  pre.code{
    background:var(--code-bg);color:var(--code-text);
    padding:14px 16px;border-radius:12px;
    font-size:13px;line-height:1.55;
    overflow-x:auto;white-space:pre;
    margin:8px 0 6px;
  }
  pre.code .k{color:var(--code-keyword);font-weight:600}
  pre.code .s{color:var(--code-string)}
  pre.code .n{color:var(--code-number)}
  pre.code .c{color:var(--code-comment);font-style:italic}
  .scenario-tag{
    display:inline-block;padding:4px 10px;border-radius:8px;
    font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.6px;
    background:#e1f4ff;color:#0a6996;margin-bottom:10px;
  }

  /* ─── QUIZ VIEW ─── */
  .question-area{
    background:var(--card);
    border:2px solid var(--line);
    border-radius:22px;
    padding:26px;
    box-shadow:0 6px 0 var(--line);
  }
  .question-prompt{
    font-size:13px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--orange);margin-bottom:10px;
  }
  .question-text{
    font-size:20px;font-weight:800;line-height:1.35;margin-bottom:8px;letter-spacing:-0.3px;
  }
  .question-scenario{
    background:#f0f8ff;border-left:4px solid var(--blue);
    padding:12px 14px;border-radius:10px;
    font-size:13.5px;font-weight:600;color:#1a4d6e;margin:14px 0;line-height:1.5;
  }
  .options{display:grid;gap:12px;margin-top:16px}
  .option{
    background:white;border:2px solid var(--line);
    border-radius:14px;padding:14px 18px;
    font-size:15px;font-weight:700;text-align:left;
    box-shadow:0 3px 0 var(--line);
    transition:all 0.1s;
    display:flex;align-items:center;gap:12px;
  }
  .option:hover:not(:disabled){border-color:var(--blue)}
  .option.selected{border-color:var(--blue);background:#eaf6fe;color:var(--blue-shadow)}
  .option.correct{border-color:var(--green);background:#dffac4;color:var(--green-shadow);box-shadow:0 3px 0 var(--green-shadow)}
  .option.wrong{border-color:var(--red);background:#ffd6d6;color:var(--red-shadow);box-shadow:0 3px 0 var(--red-shadow)}
  .option-letter{
    width:28px;height:28px;border-radius:8px;background:#eee;
    display:flex;align-items:center;justify-content:center;
    font-weight:900;font-size:13px;color:var(--muted);flex-shrink:0;
  }
  .option.selected .option-letter{background:var(--blue);color:white}
  .option.correct .option-letter{background:var(--green);color:white}
  .option.wrong .option-letter{background:var(--red);color:white}
  .option code{font-size:13.5px;background:rgba(0,0,0,0.06);padding:2px 6px;border-radius:4px}

  /* Fill in the blank */
  .fill-template{
    background:var(--code-bg);color:var(--code-text);
    padding:18px;border-radius:12px;
    font-family:'JetBrains Mono',monospace;font-size:14px;line-height:1.7;
    margin:14px 0;white-space:pre-wrap;
  }
  .blank-input{
    display:inline-block;
    background:white;color:var(--ink);
    border:2px dashed var(--orange);border-radius:8px;
    padding:2px 10px;font-family:inherit;font-size:14px;font-weight:700;
    min-width:90px;outline:none;
  }
  .blank-input:focus{border-style:solid;border-color:var(--blue)}
  .blank-input.correct{border-color:var(--green);background:#dffac4;color:var(--green-shadow)}
  .blank-input.wrong{border-color:var(--red);background:#ffd6d6;color:var(--red-shadow)}

  /* Order/arrange clauses */
  .order-bank,.order-zone{
    display:flex;flex-wrap:wrap;gap:8px;
    padding:14px;border-radius:14px;
    min-height:64px;margin:10px 0;
  }
  .order-bank{background:#f5f5f0;border:2px dashed #ccc}
  .order-zone{background:white;border:2px solid var(--line);box-shadow:0 3px 0 var(--line)}
  .order-chip{
    background:white;border:2px solid var(--line);
    border-radius:10px;padding:8px 14px;
    font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;
    box-shadow:0 3px 0 var(--line);
    cursor:pointer;transition:transform 0.1s;
    user-select:none;
  }
  .order-chip:active{transform:translateY(2px);box-shadow:0 1px 0 var(--line)}
  .order-chip.placed{background:#eaf6fe;border-color:var(--blue)}

  /* ─── FEEDBACK BAR ─── */
  .feedback{
    position:fixed;bottom:0;left:0;right:0;
    padding:18px 20px 24px;
    background:white;border-top:3px solid var(--line);
    transform:translateY(100%);
    transition:transform 0.25s cubic-bezier(.5,.0,.5,1.4);
    z-index:60;
  }
  .feedback.show{transform:translateY(0)}
  .feedback.correct{background:#d7ffb8;border-top-color:var(--green)}
  .feedback.wrong{background:#ffdfdf;border-top-color:var(--red)}
  .feedback-inner{max-width:780px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
  .feedback-title{font-size:22px;font-weight:900;letter-spacing:-0.5px}
  .feedback.correct .feedback-title{color:var(--green-shadow)}
  .feedback.wrong .feedback-title{color:var(--red-shadow)}
  .feedback-explain{font-size:14px;font-weight:600;line-height:1.4;margin-top:4px;max-width:550px}
  .feedback-explain code{background:rgba(0,0,0,0.08);padding:2px 6px;border-radius:4px;font-size:12.5px}

  /* ─── RESULTS ─── */
  .results{text-align:center;padding:40px 20px}
  .results-trophy{font-size:88px;margin-bottom:12px;animation:bounce 0.8s ease-out}
  @keyframes bounce{
    0%{transform:scale(0) rotate(-15deg)}
    60%{transform:scale(1.15) rotate(8deg)}
    100%{transform:scale(1) rotate(0)}
  }
  .results h2{font-size:32px;font-weight:900;letter-spacing:-0.8px;margin-bottom:8px}
  .results .subtitle{color:var(--muted);font-weight:600;font-size:16px;margin-bottom:32px}
  .stat-grid{
    display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:540px;margin:0 auto 32px;
  }
  .stat-card{
    background:var(--card);border:2px solid var(--line);
    border-radius:16px;padding:20px 12px;
    box-shadow:0 4px 0 var(--line);
  }
  .stat-card-label{font-size:11px;font-weight:900;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted)}
  .stat-card-value{font-size:30px;font-weight:900;letter-spacing:-1px;margin-top:6px}
  .stat-card.xp .stat-card-value{color:var(--gold)}
  .stat-card.acc .stat-card-value{color:var(--green)}
  .stat-card.time .stat-card-value{color:var(--blue)}

  /* ─── ANIMATIONS ─── */
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  .shake{animation:shake 0.3s}
  @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
  .pop{animation:pop 0.3s}

  /* ─── MISC ─── */
  .hidden{display:none !important}
  .row{display:flex;gap:12px;align-items:center}
  .center{text-align:center}
  .footer-actions{display:flex;gap:12px;justify-content:center;margin-top:20px}

  @media (max-width:600px){
    .hero h1{font-size:28px}
    .module-card{grid-template-columns:54px 1fr auto;padding:16px;gap:12px}
    .module-icon{width:54px;height:54px;font-size:26px;border-radius:14px}
    .module-meta h3{font-size:16px}
    .module-meta .desc{font-size:12.5px}
    .progress-ring{width:46px;height:46px}
    .progress-ring-inner{width:36px;height:36px;font-size:11px}
    .flashcard-front .concept{font-size:22px}
    .question-text{font-size:17px}
    .stats{gap:10px}
    .stat{font-size:13px}
    .topbar{padding:10px 14px}
    .logo{font-size:20px}
    .logo-mark{width:32px;height:32px;font-size:16px}
  }
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="logo">
      <div class="logo-mark">🐬</div>
      <span>SQLingo</span>
    </div>
    <div class="stats">
      <div class="stat streak"><span class="stat-icon">🔥</span><span id="streakCount">0</span></div>
      <div class="stat xp"><span class="stat-icon">⚡</span><span id="xpCount">0</span></div>
      <div class="stat hearts"><span class="stat-icon">❤️</span><span id="heartCount">5</span></div>
    </div>
  </header>
  <main id="mainContent"></main>
</div>

<div class="feedback" id="feedback">
  <div class="feedback-inner">
    <div>
      <div class="feedback-title" id="feedbackTitle"></div>
      <div class="feedback-explain" id="feedbackExplain"></div>
    </div>
    <button class="btn btn-primary" id="continueBtn">Continue</button>
  </div>
</div>

<script>
/* ─────────────────────────────────────────────────────────
   SQLINGO — MySQL Mastery, tailored to a senior data
   analyst / Python+FastAPI dev background.
   All scenarios pulled from the user's real work history:
   SEO/backlinks, brand imitation detection, inventory &
   billing, BI dashboards, audience segmentation, etc.
   ───────────────────────────────────────────────────────── */

const MODULES = [
  /* ─── 1 ─── */
  {
    id:1, title:"SELECT Sharpening", icon:"🎯", color:"#58cc02",
    description:"Refresh advanced SELECT, DISTINCT, ORDER BY and filter patterns.",
    difficulty:"intermediate",
    flashcards:[
      {label:"PATTERN MATCHING", concept:"LIKE vs REGEXP",
       hint:"When do you reach for each in MySQL?",
       back:`<p><b>LIKE</b> uses <code>%</code> (any chars) and <code>_</code> (one char). Case-insensitive by default in MySQL.</p>
             <p><b>REGEXP</b> (alias <code>RLIKE</code>) supports full regex — character classes, anchors, alternation.</p>
             <pre class="code"><span class="k">SELECT</span> brand_name <span class="k">FROM</span> listings
<span class="k">WHERE</span> brand_name <span class="k">REGEXP</span> <span class="s">'^(nik[eE3]|n1ke)'</span>;</pre>
             <p class="scenario-tag">Your work: brand imitation detection</p>`},
      {label:"NULL HANDLING", concept:"NULL is not equal to anything",
       hint:"Including itself. So how do you filter it?",
       back:`<p><code>col = NULL</code> is always UNKNOWN (effectively false). Use <code>IS NULL</code> / <code>IS NOT NULL</code>.</p>
             <p>Want a fallback value? Use <code>COALESCE(col, 'default')</code> or <code>IFNULL(col, 'default')</code>.</p>
             <pre class="code"><span class="k">SELECT</span> COALESCE(meta_description, <span class="s">'(missing)'</span>)
<span class="k">FROM</span> seo_pages
<span class="k">WHERE</span> canonical_url <span class="k">IS NOT NULL</span>;</pre>`},
      {label:"DISTINCT", concept:"DISTINCT applies to ALL listed columns",
       hint:"It's not just on the first column.",
       back:`<p><code>SELECT DISTINCT a, b</code> returns unique <b>combinations</b> of (a, b), not distinct values of <code>a</code>.</p>
             <p>For per-column uniqueness use <code>GROUP BY</code> or window functions.</p>
             <pre class="code"><span class="c">-- unique (campaign, keyword) pairs:</span>
<span class="k">SELECT DISTINCT</span> campaign_id, keyword
<span class="k">FROM</span> serp_tracking;</pre>`},
      {label:"ORDER BY tricks", concept:"You can ORDER BY expressions",
       hint:"Not just columns — and you can use column position too.",
       back:`<p>Order by computed values, CASE expressions, or even by ordinal position (<code>ORDER BY 2 DESC</code>).</p>
             <pre class="code"><span class="k">SELECT</span> client_id, SUM(spend) <span class="k">AS</span> total
<span class="k">FROM</span> campaigns
<span class="k">GROUP BY</span> client_id
<span class="k">ORDER BY</span> total <span class="k">DESC</span>,
  <span class="k">CASE</span> tier <span class="k">WHEN</span> <span class="s">'platinum'</span> <span class="k">THEN</span> <span class="n">1</span> <span class="k">ELSE</span> <span class="n">2</span> <span class="k">END</span>;</pre>`}
    ],
    questions:[
      {type:"mcq",
       scenario:"You're auditing SEO metadata and need to find pages where the meta title contains either 'sale', 'discount' or 'offer' — case-insensitive.",
       question:"Which WHERE clause is most idiomatic in MySQL?",
       options:[
         "WHERE meta_title LIKE '%sale%' OR meta_title LIKE '%discount%' OR meta_title LIKE '%offer%'",
         "WHERE meta_title REGEXP 'sale|discount|offer'",
         "WHERE meta_title IN ('sale','discount','offer')",
         "WHERE meta_title CONTAINS ANY ('sale','discount','offer')"
       ],
       correct:1,
       explanation:"REGEXP with alternation is the cleanest. Option A works but is verbose. IN matches the entire string, not substrings. Option D isn't valid MySQL syntax."},
      {type:"mcq",

/* ─────── STATE & PERSISTENCE ─────── */

const DEFAULT_STATE = {
  xp:0,
  streak:0,
  hearts:5,
  lastPlayed:null,
  moduleProgress:{} // moduleId -> {flashcardsDone:bool, questionsCorrect:N, total:N, completed:bool}
};

function loadState(){
  try{
    const raw = localStorage.getItem('sqlingo.v1');
    if(!raw) return {...DEFAULT_STATE};
    const s = JSON.parse(raw);
    return {...DEFAULT_STATE, ...s};
  }catch(e){return {...DEFAULT_STATE}}
}
function saveState(){
  try{localStorage.setItem('sqlingo.v1', JSON.stringify(state))}catch(e){}
}

let state = loadState();

// streak: bump if last play was yesterday, reset if older
(function streakCheck(){
  const today = new Date().toDateString();
  if(state.lastPlayed !== today){
    const last = state.lastPlayed ? new Date(state.lastPlayed) : null;
    if(last){
      const diff = (new Date(today) - last)/86400000;
      if(diff > 1) state.streak = 0;
    }
  }
})();

const $ = (sel)=>document.querySelector(sel);

function updateStatsUI(){
  $('#xpCount').textContent = state.xp;
  $('#streakCount').textContent = state.streak;
  $('#heartCount').textContent = state.hearts;
}

function hideFeedback(){feedback.classList.remove('show','correct','wrong')}
function showFeedback(correct, explain){
  feedback.classList.remove('correct','wrong');
  feedback.classList.add('show', correct?'correct':'wrong');
  feedbackTitle.textContent = correct ? randomCorrect() : 'Not quite';
  feedbackExplain.innerHTML = explain;
}

function randomCorrect(){
  const opts = ['Nice!','Excellent!','You got it!','Crushed it!','That\'s the one.','Perfect.'];
  return opts[Math.floor(Math.random()*opts.length)];
}

      <div class="resume-banner-icon">🎯</div>
      <div class="resume-banner-text">
        Tailored from your resume: <strong>SEO &amp; backlink analytics</strong>, <strong>brand imitation detection</strong>, <strong>inventory &amp; billing</strong>, <strong>FastAPI data exposure</strong>, <strong>BI dashboards</strong>. Every scenario below maps to something you've actually built.
      </div>
    </div>
    <div class="row" style="justify-content:space-between;align-items:flex-end;margin-bottom:14px">
      <h2 style="font-size:22px;font-weight:900;letter-spacing:-0.5px">Your roadmap</h2>
      <div style="color:var(--muted);font-weight:700;font-size:13px">${completedCount}/${MODULES.length} modules complete</div>
    </div>
    <div class="map" id="map"></div>
    <div class="footer-actions">
      <button class="btn btn-secondary" onclick="resetProgress()">Reset progress</button>
    </div>
  `;
  const map = $('#map');
  MODULES.forEach((m, idx)=>{
    const prog = state.moduleProgress[m.id] || {};
    const isUnlocked = idx===0 || state.moduleProgress[MODULES[idx-1].id]?.completed;
    const totalQs = m.questions.length + m.flashcards.length;
    const doneQs = (prog.flashcardsDone?m.flashcards.length:0) + (prog.questionsCorrect||0);
    const pct = Math.min(100, Math.round(100*doneQs/totalQs));
    const card = document.createElement('div');
    card.className = `module-card ${!isUnlocked?'locked':''} ${prog.completed?'completed':''}`;
    card.innerHTML = `
      <div class="module-icon" style="background:${m.color}">${m.icon}</div>
      <div class="module-meta">
        <h3>${idx+1}. ${m.title}</h3>
        <div class="desc">${m.description}</div>
        <span class="diff ${m.difficulty}">${m.difficulty}</span>
      </div>
      <div class="progress-ring" style="--p:${pct}">
        <div class="progress-ring-inner">${prog.completed?'✓':pct+'%'}</div>
      </div>
      ${!isUnlocked?'<div class="lock-icon">🔒</div>':''}
    `;
    if(isUnlocked) card.onclick = ()=>startModule(m.id);
    map.appendChild(card);
  });
  updateStatsUI();
}

function startModule(moduleId){
  currentModule = MODULES.find(m=>m.id===moduleId);
  currentStage = 'flashcards';
  currentIndex = 0;
  sessionCorrect = 0;
  sessionWrong = 0;
  sessionStart = Date.now();
  if(!state.moduleProgress[moduleId]){
    state.moduleProgress[moduleId] = {flashcardsDone:false,questionsCorrect:0,total:currentModule.questions.length,completed:false};
  }
  renderFlashcard();
}

let currentModule = null;
let currentStage = 'flashcards'; // 'flashcards' | 'questions'
let currentIndex = 0;
let sessionCorrect = 0;
let sessionWrong = 0;
let sessionStart = 0;
let currentSelected = null;
let currentAnsweredCorrectly = false;

function renderFlashcard(){
  hideFeedback();
  const fc = currentModule.flashcards[currentIndex];
  const totalSteps = currentModule.flashcards.length + currentModule.questions.length;
  const stepNum = currentIndex + 1;
  const progress = Math.round(100*(stepNum-1)/totalSteps);
  main.innerHTML = `
    <div class="lesson-header">
      <button class="close-btn" onclick="renderHome()">×</button>
      <div class="progress-bar"><div class="progress-bar-fill" style="width:${progress}%"></div></div>
      <div style="font-weight:900;font-size:14px;color:var(--muted);min-width:50px;text-align:right">${stepNum}/${totalSteps}</div>
    </div>
    <div style="font-size:13px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:var(--blue);text-align:center;margin-bottom:8px">Flashcard ${currentIndex+1} of ${currentModule.flashcards.length}</div>
    <div class="card-stage">
      <div class="flashcard" id="flashcard" onclick="this.classList.toggle('flipped')">
        <div class="flashcard-face flashcard-front">
          <div class="flashcard-label">${fc.label}</div>
          <div class="concept">${fc.concept}</div>
          <div class="hint">${fc.hint}</div>
          <div class="tap-hint">Tap card to reveal →</div>
        </div>
        <div class="flashcard-face back">
          <div class="flashcard-label">EXPLANATION</div>
          <div class="flashcard-back">${fc.back}</div>
          <div class="tap-hint">← Tap to flip back</div>
        </div>
      </div>
    </div>
    <div class="footer-actions">
      <button class="btn btn-secondary" onclick="prevStep()" ${currentIndex===0?'disabled':''}>Back</button>
      <button class="btn btn-primary" onclick="nextStep()">${currentIndex===currentModule.flashcards.length-1?'Start quiz →':'Next card'}</button>
    </div>
  `;
}

function prevStep(){
  if(currentStage==='flashcards' && currentIndex>0){currentIndex--; renderFlashcard()}
  else if(currentStage==='questions' && currentIndex>0){currentIndex--; renderQuestion()}
  else if(currentStage==='questions' && currentIndex===0){
    currentStage='flashcards';
    currentIndex = currentModule.flashcards.length-1;
    renderFlashcard();
  }
}

function nextStep(){
  if(currentStage==='flashcards'){
    if(currentIndex < currentModule.flashcards.length-1){
      currentIndex++;
      renderFlashcard();
    } else {
      state.moduleProgress[currentModule.id].flashcardsDone = true;
      saveState();
      currentStage='questions';
      currentIndex=0;
      renderQuestion();
    }
  }
}

function renderQuestion(){
  hideFeedback();
  currentSelected = null;
  currentAnsweredCorrectly = false;
  const q = currentModule.questions[currentIndex];
  const totalSteps = currentModule.flashcards.length + currentModule.questions.length;
  const stepNum = currentModule.flashcards.length + currentIndex + 1;
  const progress = Math.round(100*(stepNum-1)/totalSteps);

  let body = '';
  if(q.type==='mcq'){
    body = `
      ${q.scenario?`<div class="question-scenario"><strong>Scenario:</strong> ${escapeHtml(q.scenario)}</div>`:''}
      <div class="question-text">${q.question||'Choose the best answer:'}</div>
      <div class="options" id="options">
        ${q.options.map((opt,i)=>`
          <button class="option" data-i="${i}" onclick="selectOption(${i})">
            <div class="option-letter">${String.fromCharCode(65+i)}</div>
            <div>${formatCode(opt)}</div>
          </button>
        `).join('')}
      </div>
    `;
  } else if(q.type==='fill'){
    body = `
      ${q.scenario?`<div class="question-scenario"><strong>Scenario:</strong> ${escapeHtml(q.scenario)}</div>`:''}
      <div class="question-text">${q.question||'Fill in the blank:'}</div>
      <div class="fill-template">${q.template.replace('___','<input class="blank-input" id="blankInput" autocomplete="off" spellcheck="false" />')}</div>
    `;
  } else if(q.type==='order'){
    body = `
      ${q.scenario?`<div class="question-scenario"><strong>Scenario:</strong> ${escapeHtml(q.scenario)}</div>`:''}
      <div class="question-text">${q.question}</div>
      <div style="font-size:12px;font-weight:800;color:var(--muted);margin-top:14px;letter-spacing:0.5px;text-transform:uppercase">Tap chips below in correct order</div>
      <div class="order-zone" id="orderZone"></div>
      <div style="font-size:12px;font-weight:800;color:var(--muted);margin-top:6px;letter-spacing:0.5px;text-transform:uppercase">Available</div>
      <div class="order-bank" id="orderBank"></div>
    `;
  }

  main.innerHTML = `
    <div class="lesson-header">
      <button class="close-btn" onclick="renderHome()">×</button>
      <div class="progress-bar"><div class="progress-bar-fill" style="width:${progress}%"></div></div>
      <div style="font-weight:900;font-size:14px;color:var(--muted);min-width:50px;text-align:right">${stepNum}/${totalSteps}</div>
    </div>
    <div style="font-size:13px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:var(--orange);text-align:center;margin-bottom:8px">Question ${currentIndex+1} of ${currentModule.questions.length}</div>
    <div class="question-area">${body}</div>
    <div class="footer-actions" id="checkActions">
      <button class="btn btn-secondary" onclick="prevStep()">Back</button>
      <button class="btn btn-primary" id="checkBtn" onclick="checkAnswer()" disabled>Check</button>
    </div>
  `;

  if(q.type==='order'){
    const bank = $('#orderBank');
    // shuffle chips for display
    const shuffled = [...q.chips.map((c,i)=>({c,i}))].sort(()=>Math.random()-0.5);
    shuffled.forEach(({c,i})=>{
      const chip = document.createElement('button');
      chip.className='order-chip';
      chip.dataset.i=i;
      chip.textContent=c;
      chip.onclick = ()=>moveChip(chip, 'zone');
      bank.appendChild(chip);
    });
  }
  if(q.type==='fill'){
    const input = $('#blankInput');
    input.addEventListener('input', ()=>{
      $('#checkBtn').disabled = input.value.trim().length===0;
    });
    input.focus();
    input.addEventListener('keydown',(e)=>{if(e.key==='Enter' && !$('#checkBtn').disabled)checkAnswer()});
  }
}

function selectOption(i){
  if(currentAnsweredCorrectly) return;
  currentSelected = i;
  document.querySelectorAll('#options .option').forEach((el,idx)=>{
    el.classList.toggle('selected', idx===i);
  });
  $('#checkBtn').disabled = false;
}

function moveChip(chip, target){
  if(currentAnsweredCorrectly) return;
  const dest = target==='zone'?$('#orderZone'):$('#orderBank');
  // Toggle handlers based on new container
  chip.onclick = ()=>moveChip(chip, target==='zone'?'bank':'zone');
  chip.classList.toggle('placed', target==='zone');
  dest.appendChild(chip);
  const placed = $('#orderZone').children.length;
  $('#checkBtn').disabled = placed===0;
}

function checkAnswer(){
  const q = currentModule.questions[currentIndex];
  let correct = false;
  let userAnswer = '';

  if(q.type==='mcq'){
    if(currentSelected===null) return;
    correct = currentSelected === q.correct;
    document.querySelectorAll('#options .option').forEach((el,idx)=>{
      el.disabled = true;
      el.classList.remove('selected');
      if(idx===q.correct) el.classList.add('correct');
      else if(idx===currentSelected && !correct) el.classList.add('wrong');
    });
  } else if(q.type==='fill'){
    const input = $('#blankInput');
    userAnswer = input.value.trim();
    const answers = q.answer.split('|').map(a=>a.trim().toLowerCase());
    correct = answers.includes(userAnswer.toLowerCase());
    input.disabled = true;
    input.classList.add(correct?'correct':'wrong');
  } else if(q.type==='order'){
    const placed = [...$('#orderZone').children].map(el=>parseInt(el.dataset.i,10));
    correct = JSON.stringify(placed) === JSON.stringify(q.correctOrder);
  }

  if(correct){
    currentAnsweredCorrectly = true;
    sessionCorrect++;
    state.xp += 10;
    state.moduleProgress[currentModule.id].questionsCorrect = (state.moduleProgress[currentModule.id].questionsCorrect||0)+1;
  } else {
    sessionWrong++;
    state.hearts = Math.max(0, state.hearts-1);
  }
  saveState();
  updateStatsUI();
  showFeedback(correct, q.explanation);
  $('#checkBtn').remove();

  if(state.hearts<=0 && !correct){
    setTimeout(()=>{
      alert("You're out of hearts! Take a break — they'll refill when you reset, or you can keep going for practice.");
      state.hearts = 5; saveState(); updateStatsUI();
    }, 800);
  }
}

continueBtn.onclick = ()=>{
  hideFeedback();
  if(currentStage==='questions'){
    if(currentIndex < currentModule.questions.length-1){
      currentIndex++;
      renderQuestion();
    } else {
      finishModule();
    }
  }
};

function finishModule(){
  const today = new Date().toDateString();
  if(state.lastPlayed !== today){
    state.streak += 1;
    state.lastPlayed = today;
  }
  state.moduleProgress[currentModule.id].completed = true;
  saveState();
  const totalQs = currentModule.questions.length;
  const acc = Math.round(100 * sessionCorrect / totalQs);
  const elapsed = Math.round((Date.now()-sessionStart)/1000);
  const mins = Math.floor(elapsed/60);
  const secs = elapsed%60;
  const timeStr = mins>0 ? `${mins}m ${secs}s` : `${secs}s`;
  const xpGained = sessionCorrect * 10;

  main.innerHTML = `
    <div class="results">
      <div class="results-trophy">${acc===100?'🏆':acc>=80?'🌟':acc>=60?'💪':'📖'}</div>
      <h2>Module complete!</h2>
      <p class="subtitle">${currentModule.title}</p>
      <div class="stat-grid">
        <div class="stat-card xp">
          <div class="stat-card-label">XP Earned</div>
          <div class="stat-card-value">+${xpGained}</div>
        </div>
        <div class="stat-card acc">
          <div class="stat-card-label">Accuracy</div>
          <div class="stat-card-value">${acc}%</div>
        </div>
        <div class="stat-card time">
          <div class="stat-card-label">Time</div>
          <div class="stat-card-value">${timeStr}</div>
        </div>
      </div>
      <div class="footer-actions">
        <button class="btn btn-secondary" onclick="startModule(${currentModule.id})">Replay</button>
        <button class="btn btn-primary" onclick="goNextOrHome()">${nextModuleId()?'Next module →':'Back to map'}</button>
      </div>
    </div>
  `;
}

function nextModuleId(){
  const idx = MODULES.findIndex(m=>m.id===currentModule.id);
  if(idx<MODULES.length-1) return MODULES[idx+1].id;
  return null;
}
function goNextOrHome(){
  const n = nextModuleId();
  if(n) startModule(n); else renderHome();
}

function resetProgress(){
  if(confirm('Reset all progress, XP and streak? This cannot be undone.')){
    state = {...DEFAULT_STATE};
    saveState();
    renderHome();
  }
}

/* ─────── UTILITIES ─────── */
function escapeHtml(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function formatCode(s){
  // wrap SQL-looking tokens in code tags for nicer rendering inside options
  if(/SELECT|FROM|WHERE|JOIN|GROUP|HAVING|ORDER|INDEX|EXISTS|NULL|REGEXP|LIKE|CASE|WHEN|SUM|COUNT|MAX|MIN|AVG|MATCH|AGAINST|HAVING|DISTINCT|TRANSACTION|COMMIT|ROLLBACK/.test(s)){
    return `<code>${escapeHtml(s)}</code>`;
  }
  return escapeHtml(s);
}

/* ─────── BOOT ─────── */
updateStatsUI();
renderHome();
</script>
</body>
</html>
