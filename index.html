.rec-body h4{font-weight:900;font-size:14px;color:#7a4a00;letter-spacing:-.1px;line-height:1.3}
.rec-body p{font-size:12px;color:#a16207;font-weight:700;margin-top:2px;line-height:1.4}
.rec-arrow{font-size:22px;color:#a16207;font-weight:900}

.review-card{background:linear-gradient(135deg,#ddd6fe,#c4b5fd);border:2px solid #8b5cf6;border-radius:14px;padding:12px 14px;margin-bottom:14px;box-shadow:0 3px 0 #7c3aed;display:grid;grid-template-columns:42px 1fr auto;gap:12px;align-items:center;cursor:pointer;text-align:left;width:100%;transition:transform .08s,box-shadow .15s}
.review-card:hover{transform:translateY(-1px);box-shadow:0 4px 0 #7c3aed}
.review-icon{font-size:22px;width:42px;height:42px;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 0 rgba(0,0,0,.1)}
.review-info h4{font-weight:900;font-size:14px;color:#4c1d95;letter-spacing:-.1px;line-height:1.3}
.review-info p{font-size:12px;color:#5b21b6;font-weight:700;margin-top:2px;line-height:1.4}
.review-badge{background:#fff;color:#7c3aed;font-weight:900;font-size:11px;padding:4px 8px;border-radius:6px;letter-spacing:.5px}

.concept-rows{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.concept-row{background:#fff;border:2px solid var(--line);border-radius:12px;padding:11px 13px;display:grid;grid-template-columns:36px 1fr auto;gap:12px;align-items:center}
.concept-row.weak{border-color:var(--red);background:#fef2f2}
.concept-row.strong{border-color:var(--green);background:#f0fdf4}
.cr-icon{font-size:20px;width:36px;height:36px;border-radius:9px;background:var(--bg);display:flex;align-items:center;justify-content:center}
.cr-name{font-weight:900;font-size:14px;letter-spacing:-.1px;margin-bottom:5px}
.cr-bar-bg{background:var(--line);height:6px;border-radius:3px;overflow:hidden}
.cr-bar-fill{height:100%;background:linear-gradient(90deg,#22c55e,#16a34a);border-radius:3px;transition:width .4s}
.concept-row.weak .cr-bar-fill{background:linear-gradient(90deg,#ef4444,#dc2626)}
.cr-stat{text-align:right;min-width:60px}
.cr-acc{font-weight:900;font-size:18px;font-family:'JetBrains Mono',monospace;letter-spacing:-.5px}
.concept-row.weak .cr-acc{color:var(--red-sh)}
.concept-row.strong .cr-acc{color:var(--green-sh)}
.cr-seen{font-size:10.5px;color:var(--muted);font-weight:700;margin-top:1px}
.rec-buttons{display:flex;flex-wrap:wrap;gap:6px}
.rec-btn{background:var(--bg);border:1.5px solid var(--line);border-radius:10px;padding:7px 11px;font-size:12px;font-weight:800;color:var(--ink);cursor:pointer;transition:border-color .15s,transform .08s}
.rec-btn:hover{border-color:#0ea5e9}
.rec-btn:active{transform:translateY(1px)}
</style>
</head>
<body>
<div id="app">
  <header class="topbar" role="banner">
    <div class="logo"><div class="logo-mark" aria-hidden="true">🐬</div><span>SQLingo</span></div>
    <div class="stats" role="group" aria-label="Progress">
      <div class="stat streak" aria-label="Streak"><span class="stat-icon" aria-hidden="true">🔥</span><span id="streakCount">0</span></div>
      <div class="stat xp" aria-label="XP"><span class="stat-icon" aria-hidden="true">⚡</span><span id="xpCount">0</span></div>
      <button class="icon-btn" onclick="openGlossary()" aria-label="Open glossary">📖</button>
    </div>
  </header>
  <main id="mainContent" role="main"></main>
</div>
<div class="feedback" id="feedback" role="status" aria-live="polite">
  <div class="feedback-inner">
    <div><div class="fb-title" id="fbTitle"></div><div class="fb-explain" id="fbExplain"></div></div>
    <button class="btn btn-primary" id="continueBtn">Continue</button>
  </div>
</div>
<div id="modalContainer"></div>

<script>
/* ============ Helpers ============ */
const T = (name, cols, rows) => ({name, cols: cols.split(',').map(c=>c.trim()), rows});
const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

/* ============ Tables (real null, no fake "NULL" strings) ============ */
const TBL = {
  users:        T("users","id, name, email, joined",                  [[1,"Asha","asha@x.com","2024-01-15"],[2,"Ben","ben@x.com","2024-03-02"],[3,"Cara",null,"2024-05-10"]]),
  roles:        T("roles","id, name",                                  [[1,"admin"],[2,"editor"],[3,"viewer"]]),
  user_roles:   T("user_roles","user_id, role_id",                     [[1,1],[1,2],[2,2],[3,3]]),
  departments:  T("departments","id, name, head_id",                   [[1,"Engineering",2],[2,"Marketing",null],[3,"Operations",4]]),
  employees:    T("employees","id, name, salary, dept_id",             [[1,"Asha",70000,1],[2,"Ben",95000,1],[3,"Cara",60000,2],[4,"Dev",95000,3]]),
  products:     T("products","id, name, price, category",              [[1,"Pen",10,"stationery"],[2,"Mug",90,"kitchen"],[3,"Book",250,"books"],[4,"Lamp",450,"home"]]),
  clients:      T("clients","id, name, tier",                          [[1,"Acme","gold"],[2,"Globex","silver"],[3,"Initech","gold"]]),
  orders:       T("orders","id, client_id, amount, created_at",        [[101,1,500,"2025-05-01"],[102,1,300,"2025-05-03"],[103,2,150,"2025-05-10"]]),
  order_items:  T("order_items","id, order_id, product_id, qty, price",[[1,101,1,5,10],[2,101,3,1,250],[3,102,2,2,90],[4,103,4,1,150]]),
  payments:     T("payments","id, order_id, amount, status, paid_at",  [[1,101,500,"paid","2025-05-02"],[2,102,300,"paid","2025-05-04"],[3,103,150,"pending",null]]),
  tickets:      T("tickets","id, client_id, status",                   [[1,1,"open"],[2,1,"closed"],[3,2,"closed"],[4,2,"closed"]]),
  sales_daily:  T("sales_daily","day, total",                          [["2025-05-01",1500],["2025-05-02",2100],["2025-05-03",1800],["2025-05-04",2400]]),
  category_tree:T("category_tree","id, name, parent_id",               [[1,"Home",null],[2,"Kitchen",1],[3,"Mugs",2],[4,"Garden",1]]),
  blocklist:    T("blocklist","client_id, reason",                     [[3,"spam"]]),
  posts:        T("posts","id, user_id, title",                        [[1,1,"Hello"],[2,1,"MySQL tips"],[3,2,"About me"]]),
  comments:     T("comments","id, post_id, user_id, body",             [[1,1,2,"Welcome"],[2,1,3,"Nice"],[3,2,3,"Helpful"]]),
  audit_log:    T("audit_log","id, table_name, row_id, action, when",  [[1,"orders",101,"INSERT","2025-05-01 10:30"],[2,"orders",101,"UPDATE","2025-05-02 09:15"]]),
  event_log:    T("event_log","id, user_id, event, occurred_at",       [[1,1,"login","2025-05-20 08:00"],[2,1,"view","2025-05-20 08:15"],[3,2,"login","2025-05-20 09:00"]]),
  accounts:     T("accounts","id, owner, balance",                     [[1,"A",1000],[2,"B",500]]),
  listings:     T("listings","id, brand_name",                         [[1,"adidas"],[2,"ad1das"],[3,"nike"],[4,"n1ke"]]),
  backlinks:    T("backlinks","id, target_url, source_domain, quality",[[1,"/blog","x.com",8],[2,"/blog","y.com",6],[3,"/home","x.com",9]])
};

/* ============ Glossary ============ */
const GLOSSARY = [
  ["Table","A collection of rows sharing the same columns."],
  ["Row","One record in a table."],
  ["Column","A named field with a fixed data type."],
  ["Primary Key (PK)","Column(s) that uniquely identify each row."],
  ["Foreign Key (FK)","A column referencing another table's PK."],
  ["NULL","Absence of a value — unknown. Not zero, not empty string."],
  ["DISTINCT","Removes duplicate rows from a SELECT."],
  ["GROUP BY","Buckets rows so aggregates compute per bucket."],
  ["HAVING","Filters AFTER aggregation. Can reference aggregates."],
  ["JOIN","Combines rows from two tables based on a relationship."],
  ["Anti-join","Returns rows with NO match in another table. <code>LEFT JOIN … IS NULL</code> or <code>NOT EXISTS</code>."],
  ["UNION / UNION ALL","Stack results vertically. UNION dedupes; UNION ALL keeps everything (faster)."],
  ["CTE","Common Table Expression: a named subquery with <code>WITH</code>."],
  ["Subquery","A SELECT inside another SQL statement."],
  ["Window function","Returns a per-row value computed across a window. Doesn't collapse rows."],
  ["Index","Sorted structure that speeds up lookups."],
  ["Covering Index","Index containing every column the query needs; MySQL never reads the table itself."],
  ["VIEW","Saved SELECT that behaves like a table."],
  ["Stored Procedure","Reusable named code on the server. Called with <code>CALL</code>."],
  ["Stored Function","Like a procedure but returns a value; usable in expressions."],
  ["Trigger","Code that runs automatically on INSERT / UPDATE / DELETE."],
  ["Transaction","Group of statements committed (or rolled back) together."],
  ["ACID","Atomicity, Consistency, Isolation, Durability."],
  ["Normalization","Designing tables so data isn't duplicated. 1NF → 2NF → 3NF."],
  ["M:N relationship","Implemented with a junction table holding two foreign keys."],
  ["UPSERT","Insert or update on conflict. MySQL: <code>INSERT … ON DUPLICATE KEY UPDATE</code>."],
  ["Prepared Statement","Parameterized SQL — values bound separately. Prevents SQL injection."],
  ["SQL Injection","Attack where user input is interpreted as SQL."],
  ["GRANT / REVOKE","Give or remove privileges."],
  ["JSON column","Native MySQL type for semi-structured data; path access with <code>-&gt;&gt;</code>."],
  ["FULLTEXT index","Index for <code>MATCH() AGAINST()</code> search."],
  ["EXPLAIN","Shows MySQL's query plan."],
  ["INTERVAL","Date math syntax: <code>NOW() - INTERVAL 7 DAY</code>."],
  ["CHECK constraint","Row-level rule that rejects invalid data."]
];

/* ============ Module data ============ */
const M = [
{id:1, title:"Database Fundamentals", icon:"🌱", color:"#58cc02", difficulty:"beginner",
 description:"Tables, rows, columns, keys — the building blocks.",
 cards:[
  {type:'concept', title:"What's a relational database?",
   body:`<p>A database holds <b>tables</b>. A table is a grid: each <b>column</b> is a named field with a fixed data type, each <b>row</b> is one record.</p><p>Tables connect through keys. Together they form a <b>schema</b>.</p>`},
  {type:'example', title:"A simple table", input:[TBL.products],
   walkthrough:"<p>4 rows, 4 columns. Every value in <code>price</code> is a number; every value in <code>name</code> is text.</p>"},
  {type:'concept', title:"Primary Key",
   body:`<p>The PK uniquely identifies each row. In <code>products</code>, <code>id</code> is the PK — no two rows can share an id.</p><p>Usually <code>INT AUTO_INCREMENT</code> — MySQL fills it in for you.</p>`},
  {type:'concept', title:"Foreign Key",
   body:`<p>A foreign key is a column pointing to another table's PK — how rows link across tables.</p>`,
   input:[TBL.clients, TBL.orders],
   walkthrough:"<p>In <code>orders</code>, <code>client_id</code> references <code>clients.id</code>. Order 101 belongs to Acme.</p>"},
  {type:'question', kind:'mcq', question:"How many rows are in the products table?", tables:[TBL.products],
   options:["3","4","5","16"], correct:1, explanation:"Count data rows only: Pen, Mug, Book, Lamp = 4."},
  {type:'question', kind:'mcq', question:"Which column is the primary key?", tables:[TBL.products],
   options:["name","id","price","category"], correct:1, explanation:"id has a unique value per row; the others can repeat."},
  {type:'pitfall', title:"Unique ≠ sequential",
   body:`<p>A PK only needs to be <b>unique</b>. After deletes, ids 1, 2, 5, 8 are perfectly valid.</p>`},
  {type:'summary', title:"Recap", bullets:[
    "Databases are made of tables with columns (fields) and rows (records).",
    "Every column has a fixed data type.",
    "A primary key uniquely identifies each row.",
    "A foreign key references another table's PK, creating relationships."
  ]}
 ]},

{id:2, title:"SELECT & DISTINCT", icon:"🎯", color:"#1cb0f6", difficulty:"beginner",
 description:"Read data, pick columns, alias with AS, deduplicate.",
 cards:[
  {type:'concept', title:"SELECT reads rows",
   body:`<p>The most common SQL statement. Pick the columns you want — or use <code>*</code> for every column.</p>`},
  {type:'syntax', title:"Basic SELECT",
   code:`SELECT column_a, column_b
FROM table_name;

-- or every column:
SELECT * FROM table_name;`,
   note:"Columns are comma-separated. The semicolon ends the statement."},
  {type:'example', title:"Pick columns",
   input:[TBL.products],
   code:`SELECT name, price FROM products;`,
   result:T("result","name, price",[["Pen",10],["Mug",90],["Book",250],["Lamp",450]]),
   walkthrough:"<p>Four rows in, four rows out — only the two columns you asked for.</p>"},
  {type:'concept', title:"AS — rename columns",
   body:`<p>Use <code>AS</code> to alias a column in the output. Helpful for reports.</p>`,
   code:`SELECT name AS product, price AS cost FROM products;`},
  {type:'concept', title:"DISTINCT removes duplicates",
   body:`<p>To get unique values, add <code>DISTINCT</code>. It applies to the WHOLE column list — unique <i>combinations</i>.</p>`},
  {type:'example', title:"DISTINCT in action",
   input:[TBL.products],
   code:`SELECT DISTINCT category FROM products;`,
   result:T("result","category",[["stationery"],["kitchen"],["books"],["home"]]),
   walkthrough:"<p>Four unique categories. If two products shared a category, only one row would show.</p>"},
  {type:'question', kind:'mcq', question:"Which query returns unique categories?", tables:[TBL.products],
   options:["SELECT category FROM products","SELECT DISTINCT category FROM products","SELECT UNIQUE category FROM products","SELECT DEDUPE(category) FROM products"],
   correct:1, explanation:"DISTINCT is the standard keyword for unique rows."},
  {type:'question', kind:'fill', question:"Rename price to 'cost' in the result.", tables:[TBL.products],
   template:"SELECT name, price ___ cost FROM products;", answer:"AS",
   explanation:"AS gives a column an output alias."},
  {type:'pitfall', title:"DISTINCT is on the row, not one column",
   body:`<p>A common mistake: <code>SELECT DISTINCT a, b</code> hoping for unique values of <code>a</code>. You get unique <i>pairs</i> instead.</p>`,
   bad:`SELECT DISTINCT category, price FROM products;  -- unique pairs`,
   good:`SELECT DISTINCT category FROM products;        -- unique categories`},
  {type:'summary', title:"Recap", bullets:[
    "SELECT picks columns; * picks all.",
    "DISTINCT removes duplicate rows.",
    "DISTINCT applies to ALL listed columns together.",
    "<code>AS</code> renames a column in the output."
  ]}
 ]},

{id:3, title:"Filtering with WHERE", icon:"🔎", color:"#ff9600", difficulty:"beginner",
 description:"Conditions, comparison operators, AND/OR/NOT, parentheses.",
 cards:[
  {type:'concept', title:"WHERE filters rows",
   body:`<p>WHERE keeps only rows where the condition is TRUE. Runs <b>per row</b>, before grouping or sorting.</p>`},
  {type:'syntax', title:"Comparison operators",
   code:`SELECT * FROM products
WHERE price > 100;

-- operators: =, !=, <>, <, >, <=, >=`,
   note:"Most queries you write will start with a WHERE."},
  {type:'example', title:"Filtering by price",
   input:[TBL.products],
   code:`SELECT * FROM products WHERE price > 100;`,
   result:T("result","id, name, price, category",[[3,"Book",250,"books"],[4,"Lamp",450,"home"]]),
   walkthrough:"<p>Pen (10) and Mug (90) drop out; Book (250) and Lamp (450) stay.</p>"},
  {type:'concept', title:"AND, OR, NOT",
   body:`<p><code>AND</code> needs both; <code>OR</code> needs either; <code>NOT</code> flips a condition.</p>`},
  {type:'example', title:"AND vs OR",
   input:[TBL.products],
   code:`-- both must be true:
WHERE price > 50 AND category = 'home'

-- either is true:
WHERE category = 'books' OR price < 20`,
   result:T("AND result","id, name, price, category",[[4,"Lamp",450,"home"]]),
   result2:T("OR result","id, name, price, category",[[1,"Pen",10,"stationery"],[3,"Book",250,"books"]])},
  {type:'question', kind:'mcq', question:"How many rows match: <code>WHERE category = 'home' AND price > 100</code>?", tables:[TBL.products],
   options:["0","1","2","4"], correct:1, explanation:"Only Lamp satisfies both."},
  {type:'question', kind:'fill', question:"Products NOT in stationery category.", tables:[TBL.products],
   template:"SELECT * FROM products WHERE category ___ 'stationery';", answer:"!=|<>|not =",
   explanation:"<code>!=</code> or <code>&lt;&gt;</code> = 'not equal'."},
  {type:'pitfall', title:"AND binds tighter than OR",
   body:`<p>Without parens, <code>A OR B AND C</code> means <code>A OR (B AND C)</code> — usually not what you wanted.</p>`,
   bad:`WHERE category = 'home' OR category = 'books' AND price > 200;`,
   good:`WHERE (category = 'home' OR category = 'books') AND price > 200;`},
  {type:'summary', title:"Recap", bullets:[
    "WHERE filters rows.",
    "Comparison: =, !=, <, >, <=, >=.",
    "Combine with AND, OR; negate with NOT.",
    "AND binds tighter than OR — always parenthesize when mixing."
  ]}
 ]},

{id:4, title:"Sorting & LIMIT", icon:"📐", color:"#ce82ff", difficulty:"beginner",
 description:"ORDER BY, ASC/DESC, LIMIT, OFFSET for pagination.",
 cards:[
  {type:'concept', title:"ORDER BY sorts the result",
   body:`<p>Sort by one or more columns. Default ascending; add <code>DESC</code> for descending.</p>`},
  {type:'example', title:"Sort by price",
   input:[TBL.products],
   code:`SELECT name, price FROM products ORDER BY price DESC;`,
   result:T("result","name, price",[["Lamp",450],["Book",250],["Mug",90],["Pen",10]])},
  {type:'example', title:"Sort by two columns",
   input:[TBL.employees],
   code:`SELECT name, dept_id, salary
FROM employees
ORDER BY dept_id ASC, salary DESC;`,
   result:T("result","name, dept_id, salary",[["Ben",1,95000],["Asha",1,70000],["Cara",2,60000],["Dev",3,95000]]),
   walkthrough:"<p>Primary sort dept_id ASC. Within each dept, salary DESC.</p>"},
  {type:'concept', title:"LIMIT and OFFSET",
   body:`<p><code>LIMIT N</code> caps the rows. <code>OFFSET K</code> skips the first K. Always pair with ORDER BY — otherwise the 'top' isn't stable.</p>`},
  {type:'example', title:"Pagination",
   input:[TBL.products],
   code:`-- top 2 most expensive:
SELECT * FROM products ORDER BY price DESC LIMIT 2;

-- page 2 with 2 per page (skip first 2):
SELECT * FROM products ORDER BY id LIMIT 2 OFFSET 2;`,
   result:T("top 2","id, name, price, category",[[4,"Lamp",450,"home"],[3,"Book",250,"books"]]),
   result2:T("page 2","id, name, price, category",[[3,"Book",250,"books"],[4,"Lamp",450,"home"]]),
   walkthrough:"<p>OFFSET = (page - 1) × per_page.</p>"},
  {type:'question', kind:'mcq', question:"For page 4 with 10 per page:", options:["LIMIT 4","LIMIT 10 OFFSET 30","LIMIT 30 OFFSET 10","LIMIT 40"], correct:1,
   explanation:"Page 4 = rows 31–40. Skip 30, take 10."},
  {type:'question', kind:'fill', question:"Return only the 3 most expensive products.", tables:[TBL.products],
   template:"SELECT * FROM products ORDER BY price DESC ___ 3;", answer:"LIMIT",
   explanation:"LIMIT N caps the result."},
  {type:'pitfall', title:"LIMIT without ORDER BY",
   body:`<p>Without ORDER BY, MySQL can return rows in any order. Pagination becomes unstable.</p>`,
   bad:`SELECT * FROM products LIMIT 3;        -- which 3? unpredictable`,
   good:`SELECT * FROM products ORDER BY id LIMIT 3;`},
  {type:'summary', title:"Recap", bullets:[
    "ORDER BY sorts; ASC default, DESC for descending.",
    "Multi-column sort breaks ties left to right.",
    "LIMIT N caps the row count.",
    "OFFSET K skips rows — for pagination.",
    "Always combine LIMIT with ORDER BY."
  ]}
 ]},

{id:5, title:"NULL & Operators", icon:"🧰", color:"#ff6b9d", difficulty:"beginner",
 description:"IN, BETWEEN, LIKE wildcards, IS NULL handling.",
 cards:[
  {type:'concept', title:"NULL means 'unknown'",
   body:`<p>Not zero. Not empty string. Any comparison with NULL returns UNKNOWN — so <code>col = NULL</code> never matches.</p>`},
  {type:'example', title:"Finding NULL values",
   input:[TBL.payments],
   code:`SELECT * FROM payments WHERE paid_at IS NULL;`,
   result:T("result","id, order_id, amount, status, paid_at",[[3,103,150,"pending",null]]),
   walkthrough:"<p>Only payment #3 has NULL paid_at.</p>"},
  {type:'concept', title:"IN and BETWEEN",
   body:`<p><code>IN (a, b, c)</code> matches any from a list. <code>BETWEEN x AND y</code> matches a range (inclusive on both ends).</p>`},
  {type:'example', title:"IN and BETWEEN",
   input:[TBL.products],
   code:`WHERE category IN ('books', 'home')
WHERE price BETWEEN 50 AND 300`,
   result:T("IN result","id, name, price, category",[[3,"Book",250,"books"],[4,"Lamp",450,"home"]]),
   result2:T("BETWEEN result","id, name, price, category",[[2,"Mug",90,"kitchen"],[3,"Book",250,"books"]])},
  {type:'concept', title:"LIKE wildcards",
   body:`<p><code>%</code> matches any number of characters. <code>_</code> matches exactly one. Case-insensitive by default.</p>`},
  {type:'example', title:"LIKE patterns",
   input:[TBL.products],
   code:`WHERE name LIKE 'B%'    -- starts with B  → Book
WHERE name LIKE '%g'    -- ends with g    → Mug
WHERE name LIKE '_en'   -- one char + en  → Pen`,
   result:T("'B%'","name",[["Book"]]),
   result2:T("'%g'","name",[["Mug"]]),
   result3:T("'_en'","name",[["Pen"]])},
  {type:'question', kind:'mcq', question:"Equivalent to <code>category='books' OR category='home'</code>:",
   options:["category = ('books','home')","category IN ('books','home')","category LIKE ('books','home')","category BETWEEN 'books' AND 'home'"],
   correct:1, explanation:"IN is the 'match any from a list' operator."},
  {type:'question', kind:'fill', question:"Find rows where email is missing.", tables:[TBL.users],
   template:"SELECT * FROM users WHERE email ___;", answer:"IS NULL",
   explanation:"<code>IS NULL</code> tests for absence — never <code>= NULL</code>."},
  {type:'pitfall', title:"= NULL never works",
   body:`<p><code>WHERE col = NULL</code> always returns nothing. Use <code>IS NULL</code> or <code>IS NOT NULL</code>.</p><p>To fall back to a default when reading: <code>COALESCE(col, 'fallback')</code>.</p>`,
   bad:`WHERE paid_at = NULL;       -- never matches`,
   good:`WHERE paid_at IS NULL;     -- correct`},
  {type:'summary', title:"Recap", bullets:[
    "NULL = unknown. Use IS NULL / IS NOT NULL.",
    "IN matches any value in a list.",
    "BETWEEN matches a range (inclusive both ends).",
    "LIKE uses % (any chars) and _ (one char)."
  ]}
 ]},

{id:6, title:"GROUP BY & HAVING", icon:"➕", color:"#00d9c5", difficulty:"beginner",
 description:"Aggregates, buckets, filtering on aggregates.",
 cards:[
  {type:'concept', title:"Aggregate functions",
   body:`<p>Aggregates collapse rows into one number: <code>COUNT(*)</code>, <code>SUM</code>, <code>AVG</code>, <code>MIN</code>, <code>MAX</code>. They ignore NULL — except <code>COUNT(*)</code>.</p>`},
  {type:'example', title:"Whole-table aggregates",
   input:[TBL.products],
   code:`SELECT COUNT(*) AS n, SUM(price) AS total,
       AVG(price) AS avg_p, MIN(price) AS lo, MAX(price) AS hi
FROM products;`,
   result:T("result","n, total, avg_p, lo, hi",[[4,800,200,10,450]])},
  {type:'concept', title:"GROUP BY",
   body:`<p>Splits rows by a column's value. Aggregates compute one value <i>per bucket</i>. Every non-aggregated column in SELECT must be in GROUP BY.</p>`},
  {type:'example', title:"Per-category aggregates",
   input:[TBL.products],
   code:`SELECT category, COUNT(*) AS n, AVG(price) AS avg_p
FROM products GROUP BY category;`,
   result:T("result","category, n, avg_p",[["stationery",1,10],["kitchen",1,90],["books",1,250],["home",1,450]])},
  {type:'concept', title:"WHERE vs HAVING",
   body:`<p><code>WHERE</code> filters rows BEFORE grouping. <code>HAVING</code> filters groups AFTER grouping — it can use aggregates.</p>`},
  {type:'example', title:"HAVING in action",
   input:[TBL.tickets],
   code:`SELECT client_id, COUNT(*) AS n
FROM tickets
WHERE status = 'closed'
GROUP BY client_id
HAVING n >= 2;`,
   result:T("result","client_id, n",[[2,2]]),
   walkthrough:"<p>WHERE keeps closed tickets. GROUP BY buckets by client. HAVING keeps buckets with 2+ rows.</p>"},
  {type:'question', kind:'mcq', question:"Where does a filter on COUNT(*) belong?",
   options:["WHERE","HAVING","ORDER BY","LIMIT"], correct:1,
   explanation:"Aggregates only exist after grouping. WHERE runs before."},
  {type:'question', kind:'fill', question:"Clients with more than 1 ticket.", tables:[TBL.tickets],
   template:`SELECT client_id, COUNT(*) AS n
FROM tickets GROUP BY client_id
___ COUNT(*) > 1;`, answer:"HAVING", explanation:"HAVING filters on aggregates."},
  {type:'pitfall', title:"ONLY_FULL_GROUP_BY",
   body:`<p>Strict mode rejects queries where SELECT has a column that's neither aggregated nor in GROUP BY.</p>`,
   bad:`SELECT dept_id, name, COUNT(*) FROM employees GROUP BY dept_id;`,
   good:`SELECT dept_id, ANY_VALUE(name), COUNT(*) FROM employees GROUP BY dept_id;`},
  {type:'summary', title:"Recap", bullets:[
    "Aggregates: COUNT, SUM, AVG, MIN, MAX.",
    "GROUP BY makes one output row per bucket.",
    "Non-aggregates in SELECT must be in GROUP BY.",
    "WHERE filters rows (before); HAVING filters groups (after)."
  ]}
 ]},

{id:7, title:"CASE expressions", icon:"🔀", color:"#8b5cf6", difficulty:"beginner",
 description:"If/else for SQL — bucket rows, conditional columns, pivot tables.",
 cards:[
  {type:'concept', title:"CASE = if/else for SQL",
   body:`<p>CASE returns a value based on conditions. Use anywhere a value goes: SELECT, WHERE, ORDER BY.</p>`},
  {type:'syntax', title:"Two forms",
   code:`-- searched (most flexible):
CASE
  WHEN price < 50  THEN 'cheap'
  WHEN price < 200 THEN 'medium'
  ELSE                  'expensive'
END

-- simple (compare one expression):
CASE category
  WHEN 'books' THEN '📚'
  ELSE              '❓'
END`,
   note:"Always include ELSE — unmatched rows return NULL."},
  {type:'example', title:"Bucket products by price",
   input:[TBL.products],
   code:`SELECT name, price,
  CASE
    WHEN price < 50  THEN 'cheap'
    WHEN price < 200 THEN 'medium'
    ELSE                  'expensive'
  END AS tier
FROM products;`,
   result:T("result","name, price, tier",[["Pen",10,"cheap"],["Mug",90,"medium"],["Book",250,"expensive"],["Lamp",450,"expensive"]])},
  {type:'example', title:"Pivot with conditional SUM",
   input:[TBL.tickets],
   code:`SELECT client_id,
  SUM(CASE WHEN status='open'   THEN 1 ELSE 0 END) AS open_n,
  SUM(CASE WHEN status='closed' THEN 1 ELSE 0 END) AS closed_n
FROM tickets GROUP BY client_id;`,
   result:T("result","client_id, open_n, closed_n",[[1,1,1],[2,0,2]]),
   walkthrough:"<p>MySQL has no PIVOT — this is how you do it.</p>",
   real:"BI dashboards live on this pattern — one row per entity, separate columns per status."},
  {type:'question', kind:'mcq', question:"With no ELSE and no WHEN matches, CASE returns…",
   options:["0","Empty string","NULL","Error"], correct:2,
   explanation:"Missing ELSE = NULL. Always include ELSE."},
  {type:'question', kind:'fill', question:"Count open tickets for Acme.", tables:[TBL.tickets],
   template:"SELECT SUM(___ WHEN status='open' THEN 1 ELSE 0 END) FROM tickets WHERE client_id=1;",
   answer:"CASE", explanation:"CASE WHEN inside SUM = conditional count."},
  {type:'pitfall', title:"Order matters — most specific first",
   body:`<p>WHEN clauses are tried top-down; first match wins. A broad condition first will eat narrower ones below it.</p>`,
   bad:`CASE WHEN price < 1000 THEN 'expensive'
     WHEN price < 50   THEN 'cheap' END   -- 'cheap' never matches`,
   good:`CASE WHEN price < 50   THEN 'cheap'
     WHEN price < 1000 THEN 'expensive' END`},
  {type:'summary', title:"Recap", bullets:[
    "CASE returns a value based on conditions.",
    "Always add ELSE — unmatched returns NULL.",
    "Order conditions most-specific to least.",
    "<code>SUM(CASE WHEN…)</code> is MySQL's pivot pattern."
  ]}
 ]},

{id:8, title:"INNER & LEFT JOIN", icon:"🔗", color:"#ffc800", difficulty:"beginner",
 description:"Why joins exist, ON clause, INNER vs LEFT, aliases.",
 cards:[
  {type:'concept', title:"Joins reunite related tables",
   body:`<p>Real data lives across multiple tables. A JOIN combines rows from two tables using a relationship column.</p>`},
  {type:'syntax', title:"JOIN syntax",
   code:`SELECT c.name, o.amount
FROM clients c
JOIN orders o ON o.client_id = c.id;`,
   note:"Aliases (c, o) keep queries readable. ON specifies the matching condition."},
  {type:'example', title:"INNER JOIN — only matches",
   input:[TBL.clients, TBL.orders],
   code:`SELECT c.name, o.amount
FROM clients c
JOIN orders o ON o.client_id = c.id;`,
   result:T("result","name, amount",[["Acme",500],["Acme",300],["Globex",150]]),
   walkthrough:"<p>Acme has 2 orders → 2 rows. Globex has 1. Initech has 0 — excluded by INNER.</p>"},
  {type:'concept', title:"LEFT JOIN keeps unmatched left rows",
   body:`<p>LEFT JOIN preserves every row from the left table. Unmatched right-side columns become NULL.</p>`},
  {type:'example', title:"LEFT JOIN — Initech appears with NULL",
   input:[TBL.clients, TBL.orders],
   code:`SELECT c.name, o.amount
FROM clients c
LEFT JOIN orders o ON o.client_id = c.id;`,
   result:T("result","name, amount",[["Acme",500],["Acme",300],["Globex",150],["Initech",null]])},
  {type:'question', kind:'mcq', question:"You want every client AND any orders they have. Which join?",
   options:["INNER","LEFT (clients on left)","RIGHT (clients on left)","CROSS"], correct:1,
   explanation:"LEFT JOIN with clients on the left preserves every client."},
  {type:'question', kind:'fill', question:"Complete the join condition.", tables:[TBL.clients, TBL.orders],
   template:`SELECT c.name, o.amount
FROM clients c
JOIN orders o ___ o.client_id = c.id;`, answer:"ON",
   explanation:"ON specifies the matching condition."},
  {type:'pitfall', title:"Don't forget ON",
   body:`<p>Writing <code>FROM a JOIN b</code> without ON makes a CROSS JOIN — every row paired with every row. Disaster on big tables.</p>`,
   bad:`SELECT * FROM clients JOIN orders;`,
   good:`SELECT * FROM clients c JOIN orders o ON o.client_id = c.id;`},
  {type:'summary', title:"Recap", bullets:[
    "JOIN combines rows from two tables.",
    "INNER JOIN keeps only matching rows.",
    "LEFT JOIN keeps every left row; unmatched right = NULL.",
    "ON specifies the match condition.",
    "Aliases keep queries readable."
  ]}
 ]},

{id:9, title:"Anti-joins & advanced JOIN", icon:"🧭", color:"#0ea5e9", difficulty:"intermediate",
 description:"Anti-joins (LEFT JOIN…IS NULL, NOT EXISTS), self-joins, the ON vs WHERE trap.",
 cards:[
  {type:'concept', title:"Anti-join: 'rows that have no match'",
   body:`<p>A common pattern: LEFT JOIN then filter where the right side is NULL — that gives you only the unmatched rows.</p>`},
  {type:'example', title:"Clients with no orders",
   input:[TBL.clients, TBL.orders],
   code:`SELECT c.*
FROM clients c
LEFT JOIN orders o ON o.client_id = c.id
WHERE o.id IS NULL;`,
   result:T("result","id, name, tier",[[3,"Initech","gold"]]),
   real:"Use case: clients who haven't ordered in 90 days, products never reviewed, users without 2FA."},
  {type:'concept', title:"NOT EXISTS — cleaner alternative",
   body:`<p>Same result, often clearer intent — and safer than NOT IN with NULLs.</p>`,
   code:`SELECT c.* FROM clients c
WHERE NOT EXISTS (
  SELECT 1 FROM orders o WHERE o.client_id = c.id
);`},
  {type:'concept', title:"ON vs WHERE — the LEFT JOIN trap",
   body:`<p>Putting a right-table filter in WHERE silently turns a LEFT JOIN into an INNER JOIN. Put right-table filters in ON to preserve outer-join semantics.</p>`},
  {type:'example', title:"The trap, visualized",
   input:[TBL.clients, TBL.orders],
   code:`-- WRONG: NULL > 100 = UNKNOWN, so Initech dropped
LEFT JOIN orders o ON o.client_id = c.id
WHERE o.amount > 100

-- RIGHT: filter is part of join
LEFT JOIN orders o
  ON o.client_id = c.id AND o.amount > 100`,
   result:T("WRONG","name, amount",[["Acme",500],["Acme",300],["Globex",150]]),
   result2:T("RIGHT","name, amount",[["Acme",500],["Acme",300],["Globex",150],["Initech",null]])},
  {type:'concept', title:"Self join",
   body:`<p>Join a table to itself using two aliases. Used for hierarchies, pair comparisons, version diffs.</p>`,
   code:`-- pairs of backlinks pointing to the same target:
SELECT a.id, b.id, a.target_url
FROM backlinks a JOIN backlinks b
  ON a.target_url = b.target_url AND a.id < b.id;`},
  {type:'question', kind:'mcq', question:"Best pattern for 'clients with NO orders'?",
   options:["INNER JOIN with IS NULL","LEFT JOIN with IS NULL","RIGHT JOIN orders","CROSS JOIN"], correct:1,
   explanation:"LEFT JOIN preserves all left rows; IS NULL keeps unmatched ones."},
  {type:'question', kind:'mcq', question:"Filter on a LEFT JOIN's right table — where does it go?",
   options:["WHERE","ON","HAVING","GROUP BY"], correct:1,
   explanation:"In ON, to preserve LEFT JOIN. In WHERE, you accidentally turn it into INNER."},
  {type:'pitfall', title:"NOT IN with NULL = nothing",
   body:`<p>If the subquery returns any NULL, <code>NOT IN</code> returns zero rows. Use NOT EXISTS.</p>`,
   bad:`WHERE c.id NOT IN (SELECT blocked_id FROM blocklist);`,
   good:`WHERE NOT EXISTS (SELECT 1 FROM blocklist b WHERE b.client_id = c.id);`},
  {type:'summary', title:"Recap", bullets:[
    "Anti-join = LEFT JOIN + IS NULL.",
    "NOT EXISTS is the modern equivalent.",
    "Right-table filters belong in ON, not WHERE.",
    "Self joins compare rows within one table.",
    "NOT IN breaks with NULL — prefer NOT EXISTS."
  ]}
 ]},

{id:10, title:"UNION & UNION ALL", icon:"➕", color:"#0d9488", difficulty:"intermediate",
 description:"Stack results vertically; UNION dedupes, UNION ALL keeps everything.",
 cards:[
  {type:'concept', title:"UNION stacks results",
   body:`<p>Combine rows from two SELECTs vertically. Both must have the same number of columns with compatible types. Column names come from the first SELECT.</p>`},
  {type:'syntax', title:"UNION vs UNION ALL",
   code:`-- removes duplicates (slower):
SELECT name FROM employees
UNION
SELECT name FROM clients;

-- keeps everything (faster):
SELECT name FROM employees
UNION ALL
SELECT name FROM clients;`,
   note:"If you know there are no duplicates, prefer UNION ALL."},
  {type:'example', title:"Combining event streams",
   input:[
     T("logins","user_id, ts",[[1,"08:00"],[2,"09:00"]]),
     T("logouts","user_id, ts",[[1,"08:30"],[2,"09:30"]])
   ],
   code:`SELECT user_id, ts, 'login'  AS kind FROM logins
UNION ALL
SELECT user_id, ts, 'logout' AS kind FROM logouts
ORDER BY ts;`,
   result:T("result","user_id, ts, kind",[[1,"08:00","login"],[1,"08:30","logout"],[2,"09:00","login"],[2,"09:30","logout"]]),
   walkthrough:"<p>A literal column ('login'/'logout') marks the source. ORDER BY applies to the combined result.</p>"},
  {type:'question', kind:'mcq', question:"Both queries guarantee distinct rows. Which is faster?",
   options:["UNION","UNION ALL","Same","INTERSECT"], correct:1,
   explanation:"UNION runs a dedup step; skip it with UNION ALL."},
  {type:'question', kind:'mcq', question:"Different column counts in the two SELECTs:",
   options:["NULL filled","Shorter wins","Error","Unpredictable"], correct:2,
   explanation:"Column counts must match — otherwise syntax error."},
  {type:'pitfall', title:"ORDER BY applies to the whole stack",
   body:`<p>ORDER BY must come at the very end and applies to the combined result.</p>`,
   bad:`SELECT name FROM a ORDER BY name
UNION SELECT name FROM b;        -- error`,
   good:`(SELECT name FROM a)
UNION (SELECT name FROM b)
ORDER BY name;`},
  {type:'summary', title:"Recap", bullets:[
    "UNION stacks two SELECTs vertically.",
    "Same column count, compatible types.",
    "UNION dedupes (slower); UNION ALL keeps everything (faster).",
    "ORDER BY goes at the very end."
  ]}
 ]},

{id:11, title:"Subqueries & EXISTS", icon:"📦", color:"#ce82ff", difficulty:"intermediate",
 description:"Scalar subqueries, IN/EXISTS, derived tables, the NOT IN NULL trap.",
 cards:[
  {type:'concept', title:"A subquery is SQL inside SQL",
   body:`<p>A SELECT in parentheses used where a value would go: in WHERE, the SELECT list, or FROM.</p>`},
  {type:'example', title:"Scalar subquery — single value",
   input:[TBL.products],
   code:`SELECT name, price FROM products
WHERE price = (SELECT MAX(price) FROM products);`,
   result:T("result","name, price",[["Lamp",450]]),
   walkthrough:"<p>Inner runs first: MAX(price)=450. Outer becomes <code>WHERE price = 450</code>.</p>"},
  {type:'concept', title:"EXISTS vs IN",
   body:`<p><code>IN</code> compares to a list. <code>EXISTS</code> short-circuits at the first match — usually best for correlated subqueries.</p>`},
  {type:'example', title:"Clients with an open ticket",
   input:[TBL.clients, TBL.tickets],
   code:`SELECT * FROM clients c
WHERE EXISTS (
  SELECT 1 FROM tickets t
  WHERE t.client_id = c.id AND t.status='open'
);`,
   result:T("result","id, name, tier",[[1,"Acme","gold"]])},
  {type:'concept', title:"Derived table (subquery in FROM)",
   body:`<p>A subquery in FROM is treated as a temp table. Must be aliased. CTEs (next module) read better.</p>`},
  {type:'question', kind:'mcq', question:"Best pattern for 'clients with at least one open ticket'?",
   options:["IN (subquery)","EXISTS (correlated)","INNER JOIN + DISTINCT","All three; EXISTS often the best plan"], correct:3,
   explanation:"All work. EXISTS stops at first match per outer row."},
  {type:'question', kind:'fill', question:"Count orders per client.", tables:[TBL.clients, TBL.orders],
   template:`SELECT c.name,
  (SELECT ___(*) FROM orders o WHERE o.client_id = c.id) AS n
FROM clients c;`, answer:"COUNT", explanation:"Correlated scalar subquery — one COUNT per client."},
  {type:'pitfall', title:"NOT IN + NULL = empty",
   body:`<p>If the subquery returns even one NULL, <code>NOT IN</code> returns zero rows. Use NOT EXISTS.</p>`,
   bad:`WHERE id NOT IN (SELECT blocked_id FROM blocklist);`,
   good:`WHERE NOT EXISTS (SELECT 1 FROM blocklist b WHERE b.client_id = c.id);`},
  {type:'summary', title:"Recap", bullets:[
    "Subqueries are SELECTs in parentheses.",
    "Scalar subquery → one value.",
    "EXISTS short-circuits — great for correlated cases.",
    "Derived tables (FROM subquery) must be aliased.",
    "NOT EXISTS beats NOT IN with NULLs."
  ]}
 ]},

{id:12, title:"CTEs (WITH clause)", icon:"🌳", color:"#00d9c5", difficulty:"intermediate",
 description:"Named subqueries; recursive CTEs walk trees.",
 cards:[
  {type:'concept', title:"CTE = named subquery",
   body:`<p>A Common Table Expression names a subquery you can reuse in the same statement. Cleaner than nested subqueries.</p>`},
  {type:'syntax', title:"WITH ... AS ...",
   code:`WITH cte_name AS (
  SELECT ...
)
SELECT * FROM cte_name;

-- chain with commas:
WITH a AS (...),
     b AS (... uses a ...)
SELECT * FROM b;`,
   note:"The CTE exists only for that one statement."},
  {type:'example', title:"Per-category totals, sorted",
   input:[TBL.products],
   code:`WITH cat_totals AS (
  SELECT category, SUM(price) AS total
  FROM products GROUP BY category
)
SELECT * FROM cat_totals ORDER BY total DESC;`,
   result:T("result","category, total",[["home",450],["books",250],["kitchen",90],["stationery",10]])},
  {type:'concept', title:"Recursive CTE — walk a tree",
   body:`<p><code>WITH RECURSIVE</code> joins a CTE to itself. Anchor row → UNION ALL → recursive step.</p>`},
  {type:'example', title:"Category tree with depth",
   input:[TBL.category_tree],
   code:`WITH RECURSIVE tree AS (
  SELECT id, name, parent_id, 0 AS depth
  FROM category_tree WHERE parent_id IS NULL
  UNION ALL
  SELECT c.id, c.name, c.parent_id, t.depth + 1
  FROM category_tree c JOIN tree t ON c.parent_id = t.id
)
SELECT * FROM tree;`,
   result:T("result","id, name, parent_id, depth",[[1,"Home",null,0],[2,"Kitchen",1,1],[4,"Garden",1,1],[3,"Mugs",2,2]])},
  {type:'question', kind:'mcq', question:"Which keyword makes a CTE recursive?",
   options:["WITH LOOP","WITH RECURSIVE","REPEAT WITH","SELF WITH"], correct:1,
   explanation:"<code>WITH RECURSIVE name AS (anchor UNION ALL recursive_step)</code>."},
  {type:'question', kind:'mcq', question:"A CTE referenced twice in the same query is…",
   options:["Cached and computed once","Re-evaluated each reference","Stored on disk","Forbidden"], correct:1,
   explanation:"MySQL doesn't materialize CTEs. Heavy reuse → create a TEMPORARY TABLE."},
  {type:'pitfall', title:"Forgetting termination",
   body:`<p>If the recursive step never stops, MySQL hits <code>cte_max_recursion_depth</code> (default 1000) and errors out.</p>`},
  {type:'summary', title:"Recap", bullets:[
    "<code>WITH name AS (…)</code> names a subquery.",
    "Chain multiple CTEs with commas.",
    "<code>WITH RECURSIVE</code> walks trees and graphs.",
    "Not materialized — refs are re-run."
  ]}
 ]},

{id:13, title:"DATE/TIME & INTERVAL", icon:"📅", color:"#0891b2", difficulty:"intermediate",
 description:"NOW, CURDATE, INTERVAL math, DATE_FORMAT, common reporting patterns.",
 cards:[
  {type:'concept', title:"MySQL date types",
   body:`<p><code>DATE</code> (YYYY-MM-DD), <code>DATETIME</code> (with time), <code>TIMESTAMP</code> (UTC-stored).</p><p>Now: <code>NOW()</code>, <code>CURDATE()</code>.</p>`},
  {type:'syntax', title:"INTERVAL — natural date math",
   code:`NOW() - INTERVAL 7 DAY
CURDATE() + INTERVAL 1 YEAR
NOW() + INTERVAL 30 MINUTE`,
   note:"Units: SECOND, MINUTE, HOUR, DAY, WEEK, MONTH, YEAR."},
  {type:'example', title:"Last 30 days of orders",
   input:[TBL.orders],
   code:`SELECT * FROM orders
WHERE created_at >= CURDATE() - INTERVAL 30 DAY;`,
   real:"The backbone of every 'last 7 days', 'YTD', 'this month' dashboard query."},
  {type:'concept', title:"Useful functions",
   body:`<p><code>DATE(dt)</code>, <code>YEAR/MONTH/DAY(dt)</code>, <code>DATE_FORMAT(dt, fmt)</code>, <code>DATEDIFF(a, b)</code> (days between).</p>`,
   code:`SELECT DATE_FORMAT(created_at, '%Y-%m') AS month,
       SUM(amount) AS revenue
FROM orders GROUP BY DATE_FORMAT(created_at, '%Y-%m');`},
  {type:'question', kind:'mcq', question:"Write 'last 24 hours' in MySQL:",
   options:["WHERE created_at > NOW() - 24","WHERE created_at > NOW() - INTERVAL 1 DAY","WHERE created_at > NOW() - 1d","WHERE created_at = TODAY() - 24h"],
   correct:1, explanation:"INTERVAL is the right syntax."},
  {type:'question', kind:'fill', question:"Days between two dates.",
   template:"SELECT ___(end_date, start_date) FROM events;", answer:"DATEDIFF",
   explanation:"DATEDIFF(a, b) = days a - b."},
  {type:'pitfall', title:"Functions on indexed columns kill indexes",
   body:`<p>Wrapping the indexed column in a function defeats the index. Use a range instead.</p>`,
   bad:`WHERE DATE(created_at) = '2025-05-21';`,
   good:`WHERE created_at >= '2025-05-21' AND created_at < '2025-05-22';`},
  {type:'summary', title:"Recap", bullets:[
    "Types: DATE, DATETIME, TIMESTAMP.",
    "Use <code>INTERVAL N UNIT</code> for date math.",
    "DATE_FORMAT formats; DATEDIFF computes days.",
    "Avoid functions on indexed date columns — use ranges."
  ]}
 ]},

{id:14, title:"Modifying Data & UPSERT", icon:"✏️", color:"#8e7cc3", difficulty:"intermediate",
 description:"INSERT, UPDATE, DELETE, ON DUPLICATE KEY UPDATE.",
 cards:[
  {type:'concept', title:"INSERT — add new rows",
   body:`<p>List columns explicitly. Omit AUTO_INCREMENT columns. Multi-row INSERT is much faster than many singles.</p>`},
  {type:'syntax', title:"INSERT syntax",
   code:`INSERT INTO products (name, price, category)
VALUES ('Notebook', 120, 'stationery');

-- multi-row:
INSERT INTO products (name, price, category) VALUES
  ('Eraser', 5, 'stationery'),
  ('Bowl',  60, 'kitchen');`,
   note:"Multi-row INSERT batches I/O and is dramatically faster."},
  {type:'concept', title:"UPDATE — always with WHERE",
   body:`<p>Without WHERE, UPDATE changes every row. The most common SQL disaster. Test with SELECT first.</p>`,
   code:`UPDATE products SET price = price * 1.10
WHERE category = 'home';`},
  {type:'concept', title:"DELETE & TRUNCATE",
   body:`<p>DELETE without WHERE removes every row. To wipe a table fast: <code>TRUNCATE TABLE name;</code> (also resets AUTO_INCREMENT).</p>`},
  {type:'concept', title:"UPSERT — insert or update",
   body:`<p>MySQL spells it <code>INSERT … ON DUPLICATE KEY UPDATE</code>. Requires a PRIMARY KEY or UNIQUE constraint for the conflict.</p>`,
   code:`INSERT INTO product_stock (product_id, qty)
VALUES (3, 10)
ON DUPLICATE KEY UPDATE qty = qty + VALUES(qty);`,
   real:"Counter tables, dedup pipelines, idempotent imports."},
  {type:'question', kind:'mcq', question:"You run <code>UPDATE products SET price = 0;</code>",
   options:["First row only","MySQL refuses","Every row's price = 0","Syntax error"], correct:2,
   explanation:"Without WHERE = updates every row."},
  {type:'question', kind:'fill', question:"Delete only product 3.",
   template:"DELETE FROM products ___ id = 3;", answer:"WHERE",
   explanation:"WHERE restricts the delete."},
  {type:'pitfall', title:"Consider soft-delete",
   body:`<p>For real apps, often a <code>deleted_at</code> column beats hard-delete — undo, audit, avoid broken FKs.</p>`,
   good:`UPDATE products SET deleted_at = NOW() WHERE id = 3;
-- queries filter: WHERE deleted_at IS NULL`},
  {type:'summary', title:"Recap", bullets:[
    "INSERT — multi-row is much faster.",
    "Always include WHERE in UPDATE/DELETE.",
    "TRUNCATE wipes fast + resets AUTO_INCREMENT.",
    "UPSERT: <code>INSERT … ON DUPLICATE KEY UPDATE</code>.",
    "Consider soft-delete for audits."
  ]}
 ]},

{id:15, title:"Tables, Types & Constraints", icon:"🏗️", color:"#ff6b35", difficulty:"intermediate",
 description:"CREATE TABLE, data types, NOT NULL, UNIQUE, CHECK, FK.",
 cards:[
  {type:'concept', title:"Design tables intentionally",
   body:`<p>Pick the smallest type that fits. Use constraints to reject bad data at the DB — not just in app code.</p>`},
  {type:'syntax', title:"CREATE TABLE",
   code:`CREATE TABLE products (
  id          INT AUTO_INCREMENT PRIMARY KEY,
  name        VARCHAR(100) NOT NULL,
  price       DECIMAL(10,2) NOT NULL DEFAULT 0,
  category    VARCHAR(50),
  created_at  DATETIME DEFAULT CURRENT_TIMESTAMP,
  CHECK (price >= 0)
);`},
  {type:'concept', title:"Common types",
   body:`<p><code>INT</code>, <code>BIGINT</code> for integers. <code>DECIMAL(p,s)</code> for money (never FLOAT). <code>VARCHAR(N)</code> for short text. <code>TEXT</code> for long. <code>DATE/DATETIME/TIMESTAMP</code>. <code>JSON</code> for semi-structured.</p>`},
  {type:'concept', title:"Constraints",
   body:`<ul>
   <li><code>PRIMARY KEY</code> — uniquely identifies rows.</li>
   <li><code>NOT NULL</code> — value required.</li>
   <li><code>UNIQUE</code> — no duplicates.</li>
   <li><code>DEFAULT v</code> — fallback when omitted.</li>
   <li><code>CHECK (expr)</code> — row-level validation.</li>
   <li><code>FOREIGN KEY (col) REFERENCES t(pk)</code> — referential integrity.</li>
   </ul>`},
  {type:'example', title:"FK + CHECK in action",
   code:`CREATE TABLE orders (
  id        INT AUTO_INCREMENT PRIMARY KEY,
  client_id INT NOT NULL,
  amount    DECIMAL(10,2) NOT NULL,
  status    VARCHAR(20) DEFAULT 'pending',
  FOREIGN KEY (client_id) REFERENCES clients(id),
  CHECK (amount > 0),
  CHECK (status IN ('pending','paid','refunded'))
);`,
   walkthrough:"<p>FK prevents orphan orders; CHECK rejects $0 or junk statuses; DEFAULT reduces app-side guesswork.</p>"},
  {type:'concept', title:"ALTER TABLE",
   body:`<p>Add/drop columns, modify types, add constraints — all with <code>ALTER TABLE</code>.</p>`,
   code:`ALTER TABLE products
  ADD COLUMN sku VARCHAR(20) UNIQUE,
  MODIFY COLUMN name VARCHAR(200) NOT NULL;`},
  {type:'question', kind:'mcq', question:"For money values, use…",
   options:["FLOAT","DOUBLE","DECIMAL(p,s)","INT"], correct:2,
   explanation:"DECIMAL is exact. FLOAT/DOUBLE have rounding bugs."},
  {type:'question', kind:'mcq', question:"Which prevents pointing to a non-existent parent row?",
   options:["PRIMARY KEY","UNIQUE","FOREIGN KEY","CHECK"], correct:2,
   explanation:"FK enforces referential integrity."},
  {type:'pitfall', title:"Don't default to VARCHAR(255)",
   body:`<p>Pick N based on the actual max length. <code>VARCHAR(N)</code> stores up to N <i>characters</i>, not bytes.</p>`},
  {type:'summary', title:"Recap", bullets:[
    "Pick the smallest type that fits.",
    "DECIMAL for money — never FLOAT.",
    "Constraints catch bad data: NOT NULL, UNIQUE, CHECK, FK.",
    "DEFAULT for sensible fallbacks.",
    "ALTER TABLE evolves schemas — test in dev first."
  ]}
 ]},

{id:16, title:"M:N relationships & normalization", icon:"🧩", color:"#10b981", difficulty:"intermediate",
 description:"Junction tables, 1NF→3NF, when to denormalize.",
 cards:[
  {type:'concept', title:"Many-to-many needs a junction table",
   body:`<p>A user can have many roles; a role can belong to many users. A single FK can't model that — you need a third table holding <i>pairs</i>.</p>`},
  {type:'example', title:"users × roles via user_roles",
   input:[TBL.users, TBL.roles, TBL.user_roles],
   code:`SELECT u.name, r.name AS role
FROM users u
JOIN user_roles ur ON ur.user_id = u.id
JOIN roles      r  ON r.id      = ur.role_id;`,
   result:T("result","name, role",[["Asha","admin"],["Asha","editor"],["Ben","editor"],["Cara","viewer"]]),
   walkthrough:"<p>The junction table holds (user_id, role_id) pairs.</p>"},
  {type:'concept', title:"Normalization in plain English",
   body:`<p><b>1NF</b> — one value per cell (no comma-lists).<br>
              <b>2NF</b> — no column depends on just part of a composite key.<br>
              <b>3NF</b> — non-key columns depend only on the key.</p><p>Split repeated data into its own table linked by FKs.</p>`},
  {type:'example', title:"Before vs after",
   code:`-- NOT normalized: roles in a CSV column
users(id, name, roles_csv)
1, Asha, "admin,editor"

-- Normalized:
users(id, name)
roles(id, name)
user_roles(user_id, role_id)`,
   walkthrough:"<p>Normalized is harder to read in one table but much easier to query and validate.</p>"},
  {type:'concept', title:"When to denormalize",
   body:`<p>Sometimes you intentionally duplicate data for performance (e.g. <code>last_login_at</code> on user).</p><p>Rule of thumb: normalize first; denormalize only with measurable evidence.</p>`,
   real:"Reporting tables / data warehouses are often denormalized on purpose."},
  {type:'question', kind:'mcq', question:"'A post can have many tags, a tag many posts'. You need…",
   options:["A tags column on posts","A posts column on tags","A post_tags junction table","Two FKs on posts"], correct:2,
   explanation:"M:N always needs a separate table for the pairs."},
  {type:'question', kind:'mcq', question:"'admin,editor,viewer' as CSV in one column breaks…",
   options:["1NF","2NF","3NF","BCNF"], correct:0,
   explanation:"1NF: one value per cell."},
  {type:'pitfall', title:"Composite PK on the junction",
   body:`<p>Make the pair itself the PK — prevents duplicates.</p>`,
   good:`CREATE TABLE user_roles (
  user_id INT NOT NULL,
  role_id INT NOT NULL,
  PRIMARY KEY (user_id, role_id),
  FOREIGN KEY (user_id) REFERENCES users(id),
  FOREIGN KEY (role_id) REFERENCES roles(id)
);`},
  {type:'summary', title:"Recap", bullets:[
    "M:N relationships need a junction table.",
    "1NF: one value per cell.",
    "Normalize first; denormalize deliberately.",
    "Junction PK is usually the pair itself."
  ]}
 ]},

{id:17, title:"Window functions", icon:"🪟", color:"#ef4444", difficulty:"advanced",
 description:"ROW_NUMBER, RANK, LAG, LEAD, running totals — row-level aggregates.",
 cards:[
  {type:'concept', title:"What's a window function?",
   body:`<p>A function that returns a value <b>per row</b>, computed across a 'window' of other rows. Like aggregating — but every row is kept.</p>`},
  {type:'example', title:"Simplest possible",
   input:[TBL.employees],
   code:`SELECT name, salary,
  AVG(salary) OVER () AS company_avg
FROM employees;`,
   result:T("result","name, salary, company_avg",[["Asha",70000,80000],["Ben",95000,80000],["Cara",60000,80000],["Dev",95000,80000]]),
   walkthrough:"<p>Empty <code>OVER ()</code> = window is every row. Each row gets the same average attached.</p>"},
  {type:'concept', title:"PARTITION BY",
   body:`<p>Splits the window into chunks. The aggregate is computed inside each chunk — like GROUP BY for the window, but rows aren't collapsed.</p>`},
  {type:'example', title:"Per-department averages",
   input:[TBL.employees],
   code:`SELECT name, dept_id, salary,
  AVG(salary) OVER (PARTITION BY dept_id) AS dept_avg
FROM employees;`,
   result:T("result","name, dept_id, salary, dept_avg",[["Asha",1,70000,82500],["Ben",1,95000,82500],["Cara",2,60000,60000],["Dev",3,95000,95000]])},
  {type:'concept', title:"ROW_NUMBER, RANK, DENSE_RANK",
   body:`<p>Given scores 90, 90, 85:</p>
   <ul>
   <li><code>ROW_NUMBER</code>: 1, 2, 3 (arbitrary on ties)</li>
   <li><code>RANK</code>: 1, 1, 3 (gap after ties)</li>
   <li><code>DENSE_RANK</code>: 1, 1, 2 (no gap)</li>
   </ul>`},
  {type:'example', title:"Most recent order per client",
   input:[TBL.orders],
   code:`SELECT * FROM (
  SELECT o.*, ROW_NUMBER() OVER (
    PARTITION BY client_id ORDER BY created_at DESC
  ) AS rn
  FROM orders o
) t WHERE rn = 1;`,
   result:T("result","id, client_id, amount, created_at, rn",[[102,1,300,"2025-05-03",1],[103,2,150,"2025-05-10",1]]),
   real:"Latest event per user, top-paid per dept — same pattern."},
  {type:'concept', title:"LAG, LEAD, running totals",
   body:`<p><code>LAG(col)</code> = previous row. <code>LEAD(col)</code> = next row. <code>SUM(col) OVER (ORDER BY …)</code> = running total.</p>`,
   code:`SELECT day, total,
  total - LAG(total) OVER (ORDER BY day) AS delta,
  SUM(total)         OVER (ORDER BY day) AS running
FROM sales_daily;`},
  {type:'example', title:"LAG / running total in action",
   input:[TBL.sales_daily],
   result:T("result","day, total, delta, running",[["2025-05-01",1500,null,1500],["2025-05-02",2100,600,3600],["2025-05-03",1800,-300,5400],["2025-05-04",2400,600,7800]])},
  {type:'question', kind:'mcq', question:"Scores [95, 95, 90, 85] — you want 90 ranked 2 (no gap). Which function?",
   options:["ROW_NUMBER","RANK","DENSE_RANK","NTILE"], correct:2,
   explanation:"DENSE_RANK closes gaps after ties → 1, 1, 2, 3."},
  {type:'question', kind:'fill', question:"Each row minus the previous.",
   template:"SELECT day, t - ___(t) OVER (ORDER BY day) AS delta FROM s;", answer:"LAG",
   explanation:"LAG(col) = previous row in the ordered window."},
  {type:'pitfall', title:"Can't filter a window in same SELECT",
   body:`<p>Windows run AFTER WHERE — can't write <code>WHERE rn = 1</code> at the same level. Wrap in a CTE/subquery.</p>`,
   bad:`SELECT *, ROW_NUMBER() OVER (PARTITION BY c) AS rn
FROM t WHERE rn = 1;        -- error`,
   good:`SELECT * FROM (
  SELECT *, ROW_NUMBER() OVER (PARTITION BY c) AS rn FROM t
) x WHERE rn = 1;`},
  {type:'summary', title:"Recap", bullets:[
    "Windows keep every row + attach a per-window value.",
    "OVER () = whole table; OVER (PARTITION BY x) = per-x.",
    "ROW_NUMBER / RANK / DENSE_RANK handle ties differently.",
    "LAG / LEAD look across rows; SUM OVER (ORDER BY) = running total.",
    "Wrap in CTE/subquery to filter on window results."
  ]}
 ]},

{id:18, title:"Indexes & EXPLAIN", icon:"⚡", color:"#f59e0b", difficulty:"advanced",
 description:"B-tree internals, composite order, covering indexes, reading EXPLAIN.",
 cards:[
  {type:'concept', title:"What an index is",
   body:`<p>A sorted structure that lets MySQL jump to matching rows instead of scanning. InnoDB default = B-tree, O(log N) lookups.</p>`},
  {type:'concept', title:"Indexes love & hate",
   body:`<p><b>Love:</b> equality (=), range (&lt;, &gt;), prefix LIKE (<code>'abc%'</code>), ORDER BY on indexed col.</p><p><b>Hate:</b> leading-wildcard LIKE (<code>'%abc'</code>), functions on the column, very low cardinality alone.</p>`},
  {type:'concept', title:"Composite index — order matters",
   body:`<p>INDEX(a, b, c) is sorted by a first, then b, then c. It serves queries that filter from the LEFT (leftmost-prefix rule).</p>`,
   code:`-- ✓ uses INDEX(a, b, c) well:
WHERE a = 1
WHERE a = 1 AND b = 2
WHERE a = 1 AND b = 2 AND c > 5

-- ✗ can't seek with it:
WHERE b = 2             -- no a
WHERE c > 5             -- no a, no b`,
   note:"Canonical order: equality → range → sort."},
  {type:'concept', title:"Covering index",
   body:`<p>If every column the query needs is in the index, MySQL serves the query without reading the table. EXPLAIN shows <code>Using index</code>.</p>`,
   real:"Hot list-page queries (ORDER BY + LIMIT) become near-instant with the right covering index."},
  {type:'concept', title:"Reading EXPLAIN",
   body:`<p>Key columns: <code>type</code>, <code>key</code>, <code>rows</code>, <code>Extra</code>.</p><ul>
   <li><code>type = ALL</code> → full scan (bad on large tables)</li>
   <li><code>type = ref / range / eq_ref</code> → index used</li>
   <li><code>rows</code> → estimated rows examined</li>
   <li><code>Extra: Using index</code> = covering (great); <code>Using filesort</code>, <code>Using temporary</code> often signal trouble</li>
   </ul>`},
  {type:'question', kind:'mcq', question:"INDEX(client_id, status, created_at). Which query CAN'T use it well?",
   options:["WHERE client_id=5","WHERE client_id=5 AND status='open'","WHERE status='open'","WHERE client_id=5 AND created_at>'2025-01-01'"],
   correct:2, explanation:"Leftmost-prefix: without client_id in the predicate, MySQL can't seek."},
  {type:'question', kind:'mcq', question:"This is slow: <code>WHERE DATE(created_at)='2025-05-21'</code>. Why?",
   options:["DATE() defeats the index","DATETIME isn't indexable","SELECT * disables indexes","Only ints index"], correct:0,
   explanation:"Functions on indexed columns kill the index. Use a range."},
  {type:'pitfall', title:"Too many indexes hurt writes",
   body:`<p>Every index has to be updated on INSERT/UPDATE. Add only what you need; audit existing ones in <code>information_schema</code>.</p>`},
  {type:'summary', title:"Recap", bullets:[
    "Indexes let MySQL jump to matching rows.",
    "Composite order = equality → range → sort.",
    "Covering index serves the query from the index alone.",
    "EXPLAIN: watch type, rows, Extra.",
    "Too many indexes slow writes."
  ]}
 ]},

{id:19, title:"VIEWs, Procedures & Functions", icon:"🧱", color:"#6366f1", difficulty:"advanced",
 description:"Save queries as views; encapsulate logic in procedures and functions.",
 cards:[
  {type:'concept', title:"VIEW = saved SELECT",
   body:`<p>A view behaves like a table when you query it — but it's a stored SELECT, re-evaluated each time. Used to hide complexity and enforce access patterns.</p>`},
  {type:'syntax', title:"CREATE VIEW",
   code:`CREATE VIEW active_clients AS
SELECT id, name, tier
FROM clients
WHERE deleted_at IS NULL;

SELECT * FROM active_clients WHERE tier = 'gold';`,
   note:"Updates to underlying tables show up immediately."},
  {type:'concept', title:"Stored Procedure",
   body:`<p>Reusable named code on the server. Called with <code>CALL name(args)</code>. Has IN/OUT/INOUT params.</p>`,
   code:`DELIMITER //
CREATE PROCEDURE create_invoice(IN p_order_id INT)
BEGIN
  DECLARE v DECIMAL(10,2);
  SELECT SUM(qty*price) INTO v
    FROM order_items WHERE order_id = p_order_id;
  INSERT INTO invoices(order_id, amount)
    VALUES (p_order_id, v);
END //
DELIMITER ;

CALL create_invoice(101);`},
  {type:'concept', title:"Stored Function",
   body:`<p>Like a procedure but returns a value — usable inside expressions: <code>SELECT my_fn(x) FROM t;</code></p>`,
   code:`CREATE FUNCTION order_total(p_id INT)
RETURNS DECIMAL(10,2) DETERMINISTIC
BEGIN
  DECLARE v DECIMAL(10,2);
  SELECT SUM(qty*price) INTO v FROM order_items WHERE order_id=p_id;
  RETURN v;
END`},
  {type:'question', kind:'mcq', question:"Need a query you can re-run that always reflects current data. Use…",
   options:["A view","A copied table","A stored procedure","A CTE"], correct:0,
   explanation:"Views re-evaluate each time. A copy is a snapshot."},
  {type:'question', kind:'mcq', question:"Which can be used inside a SELECT expression?",
   options:["Procedure","Function","Both","Neither"], correct:1,
   explanation:"Functions return a value; procedures are called with CALL."},
  {type:'pitfall', title:"Don't bury business logic in stored code",
   body:`<p>Stored procedures couple business logic to the DB — harder to test, version, migrate. Use views for query convenience, procedures for performance-critical batch ops, app code for business logic.</p>`},
  {type:'summary', title:"Recap", bullets:[
    "VIEW = saved SELECT, queried like a table.",
    "Procedure = block of code called with CALL.",
    "Function = procedure that returns a value; usable in expressions.",
    "DELIMITER lets bodies contain semicolons.",
    "Most business logic belongs in app code."
  ]}
 ]},

{id:20, title:"Transactions & Triggers", icon:"⚙️", color:"#8e7cc3", difficulty:"advanced",
 description:"ACID, isolation levels, audit triggers, COMMIT/ROLLBACK.",
 cards:[
  {type:'concept', title:"What's a transaction?",
   body:`<p>A group of statements that succeed or fail together. Either every change persists, or none do.</p>`},
  {type:'syntax', title:"START TRANSACTION … COMMIT/ROLLBACK",
   code:`START TRANSACTION;
  UPDATE accounts SET balance = balance - 100 WHERE id = 1;
  UPDATE accounts SET balance = balance + 100 WHERE id = 2;
COMMIT;        -- or ROLLBACK to undo both`,
   note:"BEGIN is an alias for START TRANSACTION."},
  {type:'concept', title:"ACID",
   body:`<p><b>Atomicity</b> all-or-nothing. <b>Consistency</b> valid → valid. <b>Isolation</b> concurrent txns don't corrupt each other. <b>Durability</b> committed data survives crashes.</p>`},
  {type:'concept', title:"Isolation levels",
   body:`<ul>
   <li>READ UNCOMMITTED — dirty reads possible</li>
   <li>READ COMMITTED — non-repeatable reads possible</li>
   <li>REPEATABLE READ <b>(InnoDB default)</b></li>
   <li>SERIALIZABLE — strongest</li>
   </ul>`},
  {type:'concept', title:"Triggers",
   body:`<p>Code that fires automatically on INSERT/UPDATE/DELETE — BEFORE or AFTER the row change. Great for audit logs.</p>`,
   code:`CREATE TRIGGER trg_order_audit
AFTER UPDATE ON orders
FOR EACH ROW
INSERT INTO audit_log(table_name, row_id, action, changed_at)
VALUES ('orders', OLD.id, 'UPDATE', NOW());`},
  {type:'question', kind:'mcq', question:"InnoDB's default isolation level is…",
   options:["READ UNCOMMITTED","READ COMMITTED","REPEATABLE READ","SERIALIZABLE"], correct:2,
   explanation:"REPEATABLE READ — also prevents many phantom reads via gap locks."},
  {type:'question', kind:'mcq', question:"In a transaction, the second UPDATE errors. You call ROLLBACK. What about the first?",
   options:["Stays committed","Both undone","Only failed one","Warning issued"], correct:1,
   explanation:"Atomicity — both UPDATEs persist on COMMIT, or both undone on ROLLBACK."},
  {type:'pitfall', title:"Keep triggers small",
   body:`<p>Triggers fire on every affected row. Heavy logic = slow writes. Use them for audits and simple invariants, not workflows.</p>`},
  {type:'summary', title:"Recap", bullets:[
    "Transactions group statements — COMMIT or ROLLBACK.",
    "ACID: atomicity, consistency, isolation, durability.",
    "InnoDB default = REPEATABLE READ.",
    "Triggers fire on row changes — great for audits.",
    "Keep triggers light."
  ]}
 ]},

{id:21, title:"Strings, JSON & Full-text", icon:"🔍", color:"#ff6b9d", difficulty:"advanced",
 description:"REGEXP, fuzzy matching, JSON paths, FULLTEXT search.",
 cards:[
  {type:'concept', title:"Basic string toolkit",
   body:`<p>Daily-driver: <code>LOWER</code>, <code>UPPER</code>, <code>TRIM</code>, <code>CONCAT</code>, <code>CHAR_LENGTH</code>, <code>SUBSTRING</code>, <code>REPLACE</code>. Normalize first (lower + trim) before matching.</p>`},
  {type:'concept', title:"LIKE vs REGEXP",
   body:`<p>LIKE: simple % and _. REGEXP: full regex (character classes, anchors, alternation). MySQL 8 uses Unicode-aware ICU regex.</p>`},
  {type:'example', title:"Brand imitation detection",
   input:[TBL.listings],
   code:`-- catch 'nike', n1ke, n!ke, etc.
SELECT brand_name FROM listings
WHERE brand_name REGEXP '[nN][i1l!|][kK][eE3]';`,
   result:T("result","brand_name",[["nike"],["n1ke"]]),
   real:"Brand-imitation detection on marketplaces."},
  {type:'concept', title:"JSON columns",
   body:`<p>Native type for semi-structured data. Path access: <code>-&gt;</code> returns JSON, <code>-&gt;&gt;</code> returns unquoted scalar.</p>`,
   code:`SELECT id, attributes->>'$.sentiment' AS sentiment
FROM enrichments
WHERE attributes->>'$.sentiment' = 'neg';`},
  {type:'concept', title:"Index JSON via generated columns",
   body:`<p>JSON paths aren't directly indexable. Expose the path as a STORED generated column, then index that.</p>`,
   code:`ALTER TABLE enrichments
  ADD COLUMN sentiment VARCHAR(20)
    AS (attributes->>'$.sentiment') STORED,
  ADD INDEX (sentiment);`},
  {type:'concept', title:"Full-text search",
   body:`<p>FULLTEXT indexes power natural-language search. Query with <code>MATCH(cols) AGAINST(query)</code>, ordered by relevance.</p>`,
   code:`ALTER TABLE articles ADD FULLTEXT(title, body);

SELECT id, title,
  MATCH(title, body) AGAINST('mysql performance') AS rel
FROM articles
WHERE MATCH(title, body) AGAINST('mysql performance')
ORDER BY rel DESC;`},
  {type:'question', kind:'mcq', question:"<code>-&gt;</code> vs <code>-&gt;&gt;</code> in MySQL JSON?",
   options:["Both JSON","-> JSON, ->> unquoted scalar","Both text","-> arrays only"], correct:1,
   explanation:"->> gives the raw value — what you usually want for WHERE."},
  {type:'question', kind:'mcq', question:"What's needed for <code>MATCH() AGAINST()</code>?",
   options:["Any TEXT col","A FULLTEXT index","JSON col","Strict mode"], correct:1,
   explanation:"MATCH only works against a FULLTEXT index whose columns match MATCH's columns."},
  {type:'pitfall', title:"REGEXP is powerful but slow",
   body:`<p>Regex predicates can't use B-tree indexes. For big tables, pre-filter on a sargable condition first, then regex the candidates.</p>`},
  {type:'summary', title:"Recap", bullets:[
    "Normalize strings (lower + trim) before matching.",
    "LIKE for simple patterns, REGEXP for real regex.",
    "JSON: <code>-&gt;</code> JSON, <code>-&gt;&gt;</code> scalar.",
    "Index JSON paths via STORED generated columns.",
    "FULLTEXT + MATCH AGAINST = relevance search."
  ]}
 ]},

{id:22, title:"Security & SQL Injection", icon:"🔐", color:"#0f766e", difficulty:"expert",
 description:"Users, GRANT/REVOKE, roles, prepared statements, SQL injection.",
 cards:[
  {type:'concept', title:"Users and privileges",
   body:`<p>MySQL has users (e.g. <code>'reporter'@'%'</code>) with passwords. Privileges control what they can do — at global, database, table or column level. Least-privilege is the rule.</p>`},
  {type:'syntax', title:"CREATE USER, GRANT, REVOKE",
   code:`CREATE USER 'reporter'@'%' IDENTIFIED BY 'strong-pw';

-- read-only on one database:
GRANT SELECT ON shop.* TO 'reporter'@'%';

-- specific write privilege:
GRANT INSERT, UPDATE ON shop.orders TO 'app'@'%';

-- take it back:
REVOKE INSERT ON shop.orders FROM 'app'@'%';

FLUSH PRIVILEGES;`,
   note:"One user for reads, one for writes; tools get SELECT-only."},
  {type:'concept', title:"Roles (MySQL 8+)",
   body:`<p>Group privileges into roles, then grant the role to users. Cleaner management.</p>`,
   code:`CREATE ROLE 'reporter_role';
GRANT SELECT ON shop.* TO 'reporter_role';
GRANT 'reporter_role' TO 'alice'@'%';
SET DEFAULT ROLE 'reporter_role' TO 'alice'@'%';`},
  {type:'concept', title:"SQL injection — the problem",
   body:`<p>If you build SQL by concatenating user input, an attacker can change the query's meaning.</p>`,
   code:`# DANGEROUS:
sql = f"SELECT * FROM users WHERE name = '{user_input}'"

# if user_input is:  ' OR '1'='1
# query becomes:
SELECT * FROM users WHERE name = '' OR '1'='1';
# returns every user.`},
  {type:'concept', title:"Prepared statements — the fix",
   body:`<p>Send the SQL <i>template</i> and the values <i>separately</i>. The DB knows the values are values, never code.</p>`,
   code:`# Python with mysql-connector / asyncmy:
cur.execute(
  "SELECT * FROM users WHERE name = %s",
  (user_input,)
)`,
   real:"FastAPI / SQLAlchemy / Django ORMs use prepared statements under the hood — as long as you use parameterized queries, you're safe."},
  {type:'question', kind:'mcq', question:"BEST defense against SQL injection?",
   options:["Escape quotes","Validate length","Prepared statements (parameterized)","Block 'OR' in input"],
   correct:2, explanation:"Escaping/validation are defense-in-depth. Parameterized queries are the fundamental fix."},
  {type:'question', kind:'mcq', question:"User that can read but not modify any data:",
   options:["GRANT ALL","GRANT SELECT ON db.*","GRANT READ","GRANT INSERT, SELECT"], correct:1,
   explanation:"SELECT = read-only. <code>db.*</code> covers every table in that database."},
  {type:'pitfall', title:"Never run your app as root",
   body:`<p>Apps should connect as a least-privilege user. If compromised, the blast radius is limited. Keep credentials in env vars or secret managers — never in source code.</p>`},
  {type:'summary', title:"Recap", bullets:[
    "Users have privileges scoped by GRANT — least-privilege.",
    "Roles (MySQL 8+) group privileges cleanly.",
    "SQL injection = user input interpreted as SQL.",
    "Prepared statements / parameterized queries are the fix.",
    "Never use root for app connections."
  ]}
 ]},

/* 23 */ {
  id:23, title:"Ecommerce Analytics", icon:"🛒", color:"#ec4899", difficulty:"analytics",
  description:"AOV, conversion, repeat purchase, RFM — the numbers that run an online store.",
  cards:[
    {type:'concept', title:"The metrics that run ecommerce",
     body:`<p>A small set of numbers drives every ecommerce dashboard:</p>
           <ul>
             <li><b>AOV</b> — average order value. Bigger baskets per order.</li>
             <li><b>Conversion rate</b> — sessions that resulted in a purchase.</li>
             <li><b>Repeat purchase rate</b> — % of customers who bought twice or more.</li>
             <li><b>RFM</b> — recency, frequency, monetary scoring per customer.</li>
           </ul>
           <p>Each one is a single aggregate query.</p>`},
    {type:'example', title:"AOV by month",
     input:[T("orders","id, customer_id, total, created_at",[[1,1,50,"2025-01-15"],[2,2,120,"2025-01-20"],[3,1,75,"2025-02-10"],[4,3,200,"2025-02-15"],[5,2,80,"2025-02-28"]])],
     code:`SELECT substr(created_at, 1, 7) AS month,
       ROUND(AVG(total), 2) AS aov
FROM orders
GROUP BY substr(created_at, 1, 7);`,
     result:T("result","month, aov",[["2025-01",85.00],["2025-02",118.33]]),
     walkthrough:"<p>Group by year-month, compute mean order total. AOV trending up usually means bigger baskets per visit — upsells, bundles, or free-shipping thresholds working.</p>",

           <p>Both exclude one-time fees, usage overages, and refunds.</p>`},

     code:`SELECT SUM(mrr) AS active_mrr

WHERE ended IS NULL OR ended > date('now');`,

     walkthrough:"<p>Sub #3 churned in Jan 2025, so it's excluded. Active MRR = 99 + 49 + 199 = 347.</p>",

           <p><b>Revenue churn</b> = % of MRR lost from cancellations this month.</p>
           <p>If one big customer cancels, logo churn stays small but revenue churn explodes. Always report both.</p>`},
    {type:'example', title:"Net Revenue Retention (NRR)",
     body:`<p>NRR = (Starting MRR + Expansion − Contraction − Churn) ÷ Starting MRR.</p>

SELECT
  (start_mrr + expansion - contraction - churn) * 1.0 / start_mrr AS nrr
FROM mrr_movements WHERE month = '2025-03';`},
