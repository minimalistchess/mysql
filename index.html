   body:`<p>A group of statements that succeed or fail together. Either every change persists, or none do.</p>`},
  {type:'syntax', title:"START TRANSACTION … COMMIT/ROLLBACK",
   code:`START TRANSACTION;
  UPDATE accounts SET balance = balance - 100 WHERE id = 1;
  UPDATE accounts SET balance = balance + 100 WHERE id = 2;
COMMIT;        -- or ROLLBACK to undo both`,
   note:"BEGIN is an alias for START TRANSACTION."},
  {type:'concept', title:"ACID",
   body:`<p><b>Atomicity</b> all-or-nothing. <b>Consistency</b> valid → valid. <b>Isolation</b> concurrent txns don't corrupt each other. <b>Durability</b> committed data survives crashes.</p>`},
  {type:'concept', title:"Isolation levels",
   body:`<ul>
   <li>READ UNCOMMITTED — dirty reads possible</li>
   <li>READ COMMITTED — non-repeatable reads possible</li>
   <li>REPEATABLE READ <b>(InnoDB default)</b></li>
   <li>SERIALIZABLE — strongest</li>
   </ul>`},
  {type:'concept', title:"Triggers",
   body:`<p>Code that fires automatically on INSERT/UPDATE/DELETE — BEFORE or AFTER the row change. Great for audit logs.</p>`,
   code:`CREATE TRIGGER trg_order_audit
AFTER UPDATE ON orders
FOR EACH ROW
INSERT INTO audit_log(table_name, row_id, action, changed_at)
VALUES ('orders', OLD.id, 'UPDATE', NOW());`},
  {type:'question', kind:'mcq', question:"InnoDB's default isolation level is…",
   options:["READ UNCOMMITTED","READ COMMITTED","REPEATABLE READ","SERIALIZABLE"], correct:2,
   explanation:"REPEATABLE READ — also prevents many phantom reads via gap locks."},
  {type:'question', kind:'mcq', question:"In a transaction, the second UPDATE errors. You call ROLLBACK. What about the first?",
   options:["Stays committed","Both undone","Only failed one","Warning issued"], correct:1,
   explanation:"Atomicity — both UPDATEs persist on COMMIT, or both undone on ROLLBACK."},
  {type:'pitfall', title:"Keep triggers small",
   body:`<p>Triggers fire on every affected row. Heavy logic = slow writes. Use them for audits and simple invariants, not workflows.</p>`},
  {type:'summary', title:"Recap", bullets:[
    "Transactions group statements — COMMIT or ROLLBACK.",
    "ACID: atomicity, consistency, isolation, durability.",
    "InnoDB default = REPEATABLE READ.",
    "Triggers fire on row changes — great for audits.",
    "Keep triggers light."
  ]}
 ]},

{id:21, title:"Strings, JSON & Full-text", icon:"🔍", color:"#ff6b9d", difficulty:"advanced",
 description:"REGEXP, fuzzy matching, JSON paths, FULLTEXT search.",
 cards:[
  {type:'concept', title:"Basic string toolkit",
   body:`<p>Daily-driver: <code>LOWER</code>, <code>UPPER</code>, <code>TRIM</code>, <code>CONCAT</code>, <code>CHAR_LENGTH</code>, <code>SUBSTRING</code>, <code>REPLACE</code>. Normalize first (lower + trim) before matching.</p>`},
  {type:'concept', title:"LIKE vs REGEXP",
   body:`<p>LIKE: simple % and _. REGEXP: full regex (character classes, anchors, alternation). MySQL 8 uses Unicode-aware ICU regex.</p>`},
  {type:'example', title:"Brand imitation detection",
   input:[TBL.listings],
   code:`-- catch 'nike', n1ke, n!ke, etc.
SELECT brand_name FROM listings
WHERE brand_name REGEXP '[nN][i1l!|][kK][eE3]';`,
   result:T("result","brand_name",[["nike"],["n1ke"]]),
   real:"Brand-imitation detection on marketplaces."},
  {type:'concept', title:"JSON columns",
   body:`<p>Native type for semi-structured data. Path access: <code>-&gt;</code> returns JSON, <code>-&gt;&gt;</code> returns unquoted scalar.</p>`,
   code:`SELECT id, attributes->>'$.sentiment' AS sentiment
FROM enrichments
WHERE attributes->>'$.sentiment' = 'neg';`},
  {type:'concept', title:"Index JSON via generated columns",
   body:`<p>JSON paths aren't directly indexable. Expose the path as a STORED generated column, then index that.</p>`,
   code:`ALTER TABLE enrichments
  ADD COLUMN sentiment VARCHAR(20)
    AS (attributes->>'$.sentiment') STORED,
  ADD INDEX (sentiment);`},
  {type:'concept', title:"Full-text search",
   body:`<p>FULLTEXT indexes power natural-language search. Query with <code>MATCH(cols) AGAINST(query)</code>, ordered by relevance.</p>`,
   code:`ALTER TABLE articles ADD FULLTEXT(title, body);

SELECT id, title,
  MATCH(title, body) AGAINST('mysql performance') AS rel
FROM articles
WHERE MATCH(title, body) AGAINST('mysql performance')
ORDER BY rel DESC;`},
  {type:'question', kind:'mcq', question:"<code>-&gt;</code> vs <code>-&gt;&gt;</code> in MySQL JSON?",
   options:["Both JSON","-> JSON, ->> unquoted scalar","Both text","-> arrays only"], correct:1,
   explanation:"->> gives the raw value — what you usually want for WHERE."},
  {type:'question', kind:'mcq', question:"What's needed for <code>MATCH() AGAINST()</code>?",
   options:["Any TEXT col","A FULLTEXT index","JSON col","Strict mode"], correct:1,
   explanation:"MATCH only works against a FULLTEXT index whose columns match MATCH's columns."},
  {type:'pitfall', title:"REGEXP is powerful but slow",
   body:`<p>Regex predicates can't use B-tree indexes. For big tables, pre-filter on a sargable condition first, then regex the candidates.</p>`},
  {type:'summary', title:"Recap", bullets:[
    "Normalize strings (lower + trim) before matching.",
    "LIKE for simple patterns, REGEXP for real regex.",
    "JSON: <code>-&gt;</code> JSON, <code>-&gt;&gt;</code> scalar.",
    "Index JSON paths via STORED generated columns.",
    "FULLTEXT + MATCH AGAINST = relevance search."
  ]}
 ]},

{id:22, title:"Security & SQL Injection", icon:"🔐", color:"#0f766e", difficulty:"expert",
 description:"Users, GRANT/REVOKE, roles, prepared statements, SQL injection.",
 cards:[
  {type:'concept', title:"Users and privileges",
   body:`<p>MySQL has users (e.g. <code>'reporter'@'%'</code>) with passwords. Privileges control what they can do — at global, database, table or column level. Least-privilege is the rule.</p>`},
  {type:'syntax', title:"CREATE USER, GRANT, REVOKE",
   code:`CREATE USER 'reporter'@'%' IDENTIFIED BY 'strong-pw';

-- read-only on one database:
GRANT SELECT ON shop.* TO 'reporter'@'%';

-- specific write privilege:
GRANT INSERT, UPDATE ON shop.orders TO 'app'@'%';

-- take it back:
REVOKE INSERT ON shop.orders FROM 'app'@'%';

FLUSH PRIVILEGES;`,
   note:"One user for reads, one for writes; tools get SELECT-only."},
  {type:'concept', title:"Roles (MySQL 8+)",
   body:`<p>Group privileges into roles, then grant the role to users. Cleaner management.</p>`,
   code:`CREATE ROLE 'reporter_role';
GRANT SELECT ON shop.* TO 'reporter_role';
GRANT 'reporter_role' TO 'alice'@'%';
SET DEFAULT ROLE 'reporter_role' TO 'alice'@'%';`},
  {type:'concept', title:"SQL injection — the problem",
   body:`<p>If you build SQL by concatenating user input, an attacker can change the query's meaning.</p>`,
   code:`# DANGEROUS:
sql = f"SELECT * FROM users WHERE name = '{user_input}'"

# if user_input is:  ' OR '1'='1
# query becomes:
SELECT * FROM users WHERE name = '' OR '1'='1';
# returns every user.`},
  {type:'concept', title:"Prepared statements — the fix",
   body:`<p>Send the SQL <i>template</i> and the values <i>separately</i>. The DB knows the values are values, never code.</p>`,
   code:`# Python with mysql-connector / asyncmy:
cur.execute(
  "SELECT * FROM users WHERE name = %s",
  (user_input,)
)`,
   real:"FastAPI / SQLAlchemy / Django ORMs use prepared statements under the hood — as long as you use parameterized queries, you're safe."},
  {type:'question', kind:'mcq', question:"BEST defense against SQL injection?",
   options:["Escape quotes","Validate length","Prepared statements (parameterized)","Block 'OR' in input"],
   correct:2, explanation:"Escaping/validation are defense-in-depth. Parameterized queries are the fundamental fix."},
  {type:'question', kind:'mcq', question:"User that can read but not modify any data:",
   options:["GRANT ALL","GRANT SELECT ON db.*","GRANT READ","GRANT INSERT, SELECT"], correct:1,
   explanation:"SELECT = read-only. <code>db.*</code> covers every table in that database."},
  {type:'pitfall', title:"Never run your app as root",
   body:`<p>Apps should connect as a least-privilege user. If compromised, the blast radius is limited. Keep credentials in env vars or secret managers — never in source code.</p>`},
  {type:'summary', title:"Recap", bullets:[
    "Users have privileges scoped by GRANT — least-privilege.",
    "Roles (MySQL 8+) group privileges cleanly.",
    "SQL injection = user input interpreted as SQL.",
    "Prepared statements / parameterized queries are the fix.",
    "Never use root for app connections."
  ]}
 ]}
];

/* ============ State ============ */
const DEFAULT_STATE = {xp:0, streak:0, lastPlayed:null, moduleProgress:{}};
function loadState(){
  try{
    const raw = localStorage.getItem('sqlingo.v3');
    if(!raw) return {...DEFAULT_STATE};
    return {...DEFAULT_STATE, ...JSON.parse(raw)};
  }catch(e){return {...DEFAULT_STATE}}
}
function saveState(){try{localStorage.setItem('sqlingo.v3', JSON.stringify(state))}catch(e){}}
let state = loadState();
(function streakCheck(){
  const today = new Date().toDateString();
  if(state.lastPlayed && state.lastPlayed !== today){
    const diff = (new Date(today) - new Date(state.lastPlayed))/86400000;
    if(diff > 1) state.streak = 0;
  }
})();

/* ============ DOM ============ */
const $ = sel => document.querySelector(sel);
const main = $('#mainContent');
const feedback = $('#feedback');
const fbTitle = $('#fbTitle');
const fbExplain = $('#fbExplain');
const continueBtn = $('#continueBtn');

function updateStatsUI(){
  $('#xpCount').textContent = state.xp;
  $('#streakCount').textContent = state.streak;
}
function hideFeedback(){feedback.classList.remove('show','correct','wrong')}
function showFeedback(correct, explain){
  feedback.classList.remove('correct','wrong');
  feedback.classList.add('show', correct?'correct':'wrong');
  fbTitle.textContent = correct ? randomCorrect() : 'Not quite';
  fbExplain.innerHTML = explain || '';
}
function randomCorrect(){
  const o = ['Nice!','Excellent!','You got it!','Crushed it!','Perfect.','Sharp!'];
  return o[Math.floor(Math.random()*o.length)];
}

/* ============ Table render (real null) ============ */
function renderTable(t){
  if(!t) return '';
  const head = t.cols.map(c => `<th>${esc(c)}</th>`).join('');
  const body = t.rows.length === 0 ? '' :
    `<tbody>${t.rows.map(r => `<tr>${r.map(v => v===null||v===undefined ? '<td class="null">NULL</td>' : `<td>${esc(String(v))}</td>`).join('')}</tr>`).join('')}</tbody>`;
  return `<div class="mini-table" role="table" aria-label="Table ${esc(t.name)}">
    <div class="mt-caption">${esc(t.name)}</div>
    <table><thead><tr>${head}</tr></thead>${body}</table>
    ${t.rows.length===0 ? '<div class="empty-rows">∅ 0 rows returned</div>' : ''}
  </div>`;
}
function renderTables(arr){
  if(!arr || !arr.length) return '';
  return `<div class="tables-wrap">${arr.map(renderTable).join('')}</div>`;
}

/* ============ Code highlighter (lightweight) ============ */
function hl(code){
  if(!code) return '';
  let s = esc(code);
  s = s.replace(/(--[^\n]*)/g, '<span class="c">$1</span>');
  s = s.replace(/(#[^\n]*)/g, '<span class="c">$1</span>');
  s = s.replace(/'((?:[^'\\\n]|\\.)*)'/g, "<span class=\"s\">'$1'</span>");
  s = s.replace(/(?<![\w])(\d+\.?\d*)\b/g, '<span class="n">$1</span>');
  const kw = ['SELECT','DISTINCT','FROM','WHERE','GROUP BY','HAVING','ORDER BY','LIMIT','OFFSET','JOIN','INNER JOIN','LEFT JOIN','RIGHT JOIN','CROSS JOIN','ON','AS','AND','OR','NOT','IN','BETWEEN','LIKE','IS NULL','IS NOT NULL','NULL','CASE','WHEN','THEN','ELSE','END','UNION ALL','UNION','WITH','RECURSIVE','EXISTS','INSERT INTO','VALUES','UPDATE','SET','DELETE','TRUNCATE','TABLE','CREATE','ALTER','DROP','ADD','MODIFY','COLUMN','INDEX','UNIQUE','PRIMARY KEY','FOREIGN KEY','REFERENCES','CHECK','DEFAULT','NOT','AUTO_INCREMENT','INT','BIGINT','VARCHAR','TEXT','DECIMAL','DATE','DATETIME','TIMESTAMP','JSON','BOOLEAN','BEGIN','COMMIT','ROLLBACK','START TRANSACTION','CALL','RETURN','RETURNS','DECLARE','IF','LOOP','PROCEDURE','FUNCTION','TRIGGER','BEFORE','AFTER','FOR EACH ROW','VIEW','OR REPLACE','GRANT','REVOKE','FLUSH PRIVILEGES','USER','ROLE','TO','OVER','PARTITION BY','MATCH','AGAINST','FULLTEXT','INTERVAL','NOW','CURDATE','CURRENT_TIMESTAMP','ON DUPLICATE KEY UPDATE','ANY_VALUE','COALESCE','IFNULL','COUNT','SUM','AVG','MIN','MAX','DATEDIFF','DATE_FORMAT','YEAR','MONTH','DAY','SUBSTRING','REPLACE','LOWER','UPPER','TRIM','CHAR_LENGTH','CONCAT','REGEXP','SOUNDEX','ROW_NUMBER','RANK','DENSE_RANK','LAG','LEAD','NTILE','PREPARE','EXECUTE','USING','DEALLOCATE','OLD','NEW','VALUES','PRIMARY','SET DEFAULT ROLE','IDENTIFIED BY','DELIMITER','IN','OUT','INOUT'];
  kw.sort((a,b)=>b.length-a.length);
  for(const k of kw){
    const re = new RegExp(`(?<![\\w])(${k.replace(/[-/\\^$*+?.()|[\\]{}]/g,'\\$&')})(?![\\w])`,'gi');
    s = s.replace(re, m => `<span class="k">${m}</span>`);
  }
  return s;
}

let curModule = null;
let curIdx = 0;
let sessionCorrect = 0;
let sessionTotal = 0;
let sessionStart = 0;
let curSelected = null;
let curAnswered = false;

function startModule(id){
  curModule = M.find(m => m.id === id);
  curIdx = 0;
  sessionCorrect = 0;
  sessionTotal = curModule.cards.filter(c => c.type === 'question').length;
  sessionStart = Date.now();
  if(!state.moduleProgress[id]) state.moduleProgress[id] = {cardsDone:0, completed:false};
  state.moduleProgress[id].cardsDone = 0;
  renderCard();
}

function startMixed(count){
  const all = [];
  M.forEach(m => m.cards.forEach(c => {
    if(c.type === 'question') all.push({...c, _from: m.title});
  }));
  for(let i = all.length-1; i>0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [all[i], all[j]] = [all[j], all[i]];
  }
  const picked = all.slice(0, Math.min(count, all.length));
  curModule = {id:'mixed', title:`Mixed Practice (${picked.length})`, icon:'🎲', color:'#ef4444', cards: picked};
  curIdx = 0;
  sessionCorrect = 0;
  sessionTotal = picked.length;
  sessionStart = Date.now();
  renderCard();
}

/* ============ Render card by type ============ */
function renderCard(){
  hideFeedback();
  curSelected = null;
  curAnswered = false;
  const total = curModule.cards.length;
  const stepNum = curIdx + 1;
  const progress = Math.round(100 * curIdx / total);
  const card = curModule.cards[curIdx];

  let body = '';
  if(card.type === 'concept')  body = renderConcept(card);
  else if(card.type === 'syntax')  body = renderSyntax(card);
  else if(card.type === 'example') body = renderExample(card);
  else if(card.type === 'question')body = renderQuestion(card);
  else if(card.type === 'pitfall') body = renderPitfall(card);
  else if(card.type === 'summary') body = renderSummary(card);

  const isQuestion = card.type === 'question';
  const continueText = curIdx === total - 1 ? 'Finish' : 'Continue';

  main.innerHTML = `
    <div class="lesson-header">
      <button class="close-btn" onclick="renderHome()" aria-label="Exit lesson">×</button>
      <div class="progress-bar" role="progressbar" aria-valuenow="${progress}" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-fill" style="width:${progress}%"></div>
      </div>
      <div class="step-label">${stepNum}/${total}</div>
    </div>
    ${body}
    <div class="footer-actions">
      <button class="btn btn-secondary" onclick="prevCard()" ${curIdx===0?'disabled':''} aria-label="Previous card">Back</button>
      <div class="right">
        ${isQuestion
          ? `<button class="btn btn-primary" id="checkBtn" onclick="checkAnswer()" disabled>Check</button>`
          : `<button class="btn btn-primary" onclick="nextCard()">${continueText}</button>`}
      </div>
    </div>`;

  if(card.type === 'question' && card.kind === 'fill'){
    const input = $('#blankInput');
    if(input){
      input.addEventListener('input', () => $('#checkBtn').disabled = input.value.trim().length === 0);
      input.focus();
      input.addEventListener('keydown', e => { if(e.key === 'Enter' && !$('#checkBtn').disabled) checkAnswer(); });
    }
  }
}

/* ============ Navigation ============ */
function nextCard(){
  const c = curModule.cards[curIdx];
  if(c.type !== 'question') {
    state.moduleProgress[curModule.id] && (state.moduleProgress[curModule.id].cardsDone = Math.max(state.moduleProgress[curModule.id].cardsDone || 0, curIdx + 1));
    saveState();
  }
  if(curIdx < curModule.cards.length - 1){
    curIdx++; renderCard();
  } else finishModule();
}
function prevCard(){
  if(curIdx > 0){curIdx--; renderCard();}
}

/* ============ Questions ============ */
function selectOption(i){
  if(curAnswered) return;
  curSelected = i;
  document.querySelectorAll('.option').forEach((el, idx) => {
    el.classList.toggle('selected', idx === i);
    el.setAttribute('aria-checked', idx === i ? 'true' : 'false');
  });
  $('#checkBtn').disabled = false;
}
function checkAnswer(){
  const c = curModule.cards[curIdx];
  let correct = false;
  if(c.kind === 'mcq'){
    if(curSelected === null) return;
    correct = curSelected === c.correct;
    document.querySelectorAll('.option').forEach((el, idx) => {
      el.disabled = true;
      el.classList.remove('selected');
      if(idx === c.correct) el.classList.add('correct');
      else if(idx === curSelected && !correct) el.classList.add('wrong');
    });
  } else if(c.kind === 'fill'){
    const input = $('#blankInput');
    const userAns = input.value.trim();
    const answers = c.answer.split('|').map(a => a.trim().toLowerCase());
    correct = answers.includes(userAns.toLowerCase());
    input.disabled = true;
    input.classList.add(correct ? 'correct' : 'wrong');
  }
  curAnswered = true;
  if(correct){
    sessionCorrect++;
    state.xp += 10;
  }
  saveState();
  updateStatsUI();
  showFeedback(correct, c.explanation);
  const btn = $('#checkBtn'); if(btn) btn.remove();
}

continueBtn.onclick = () => {
  hideFeedback();
  nextCard();
};

function finishModule(){
  const today = new Date().toDateString();
  if(state.lastPlayed !== today){state.streak += 1; state.lastPlayed = today;}
  if(curModule.id !== 'mixed' && state.moduleProgress[curModule.id]){
    state.moduleProgress[curModule.id].completed = true;
    state.moduleProgress[curModule.id].cardsDone = curModule.cards.length;

  saveState();
  const acc = sessionTotal > 0 ? Math.round(100 * sessionCorrect / sessionTotal) : 100;
  const elapsed = Math.round((Date.now() - sessionStart) / 1000);
  const mins = Math.floor(elapsed/60), secs = elapsed%60;
  const timeStr = mins > 0 ? `${mins}m ${secs}s` : `${secs}s`;
  const xpGained = sessionCorrect * 10;
  const isMixed = curModule.id === 'mixed';
  main.innerHTML = `

/* ============ SQL Playground ============ */
let _SQL = null;
let _sqlLoading = null;
const SQLJS_CDN = 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/';

function ensureSql(){
  if(_SQL) return Promise.resolve(_SQL);
  if(_sqlLoading) return _sqlLoading;
  _sqlLoading = new Promise((resolve, reject) => {
    const start = () => {
      window.initSqlJs({locateFile: f => SQLJS_CDN + f})
        .then(SQL => { _SQL = SQL; resolve(SQL); })
        .catch(reject);
    };
    if(window.initSqlJs) start();
    else {
      const s = document.createElement('script');
      s.src = SQLJS_CDN + 'sql-wasm.js';
      s.async = true;
      s.onload = start;
      s.onerror = () => reject(new Error('Could not load sql.js from CDN. Check your network.'));
      document.head.appendChild(s);
    }
  });
  return _sqlLoading;
}

function buildDb(setup){
  const db = new _SQL.Database();
  setup.forEach(stmt => db.run(stmt));
  return db;
}

function execSelect(db, sql){
  const trimmed = sql.trim().replace(/;+\s*$/, '');
  if(!trimmed) throw new Error('Empty query — type something first.');
  if(!/^(select|with)\b/i.test(trimmed)){
    throw new Error('The playground only runs SELECT queries (or WITH … SELECT). No INSERT / UPDATE / DELETE here.');
  }
  const out = db.exec(trimmed);
  if(out.length === 0) return {cols:[], rows:[]};
  return {cols: out[0].columns, rows: out[0].values};
}

function compareResults(a, b, ordered){
  if(a.rows.length !== b.rows.length) return false;
  if(a.cols.length !== b.cols.length) return false;
  const norm = rows => rows.map(r => r.map(v => v===null||v===undefined ? '\u0000NULL' : String(v).trim()));
  let ar = norm(a.rows), br = norm(b.rows);
  if(!ordered){
    const f = (x, y) => JSON.stringify(x).localeCompare(JSON.stringify(y));
    ar = [...ar].sort(f);
    br = [...br].sort(f);
  }
  return JSON.stringify(ar) === JSON.stringify(br);
}

function previewTable(db, name){
  try{
    const r = db.exec(`SELECT * FROM ${name} LIMIT 50`);
    if(r.length === 0) return {name, cols:[], rows:[]};
    return {name, cols: r[0].columns, rows: r[0].values};
  }catch(e){return null}
}

      `INSERT INTO users VALUES (1,'Asha','asha@x.com'),(2,'Ben',NULL),(3,'Cara','cara@x.com'),(4,'Dev',NULL);`
    ],
    visible:['users'],
    starter:`SELECT *\nFROM users\nWHERE email ;`,
    expected:`SELECT * FROM users WHERE email IS NULL;`,
    ordered:false,
    hint:'<code>= NULL</code> never works — use <code>IS NULL</code>.'
  },
  /* ----- Intermediate ----- */
  {
    id:'pg-6', title:'Revenue per client', difficulty:'intermediate',
    prompt:'Return each client\'s <code>name</code> and their total <code>amount</code> as <code>total</code>. Clients with no orders should NOT appear.',
    setup:[
      `CREATE TABLE clients (id INT, name TEXT);`,
      `CREATE TABLE orders (id INT, client_id INT, amount INT);`,
      `INSERT INTO clients VALUES (1,'Acme'),(2,'Globex'),(3,'Initech');`,
      `INSERT INTO orders VALUES (101,1,500),(102,1,300),(103,2,150);`
    ],
    visible:['clients','orders'],
    starter:`SELECT c.name, SUM(o.amount) AS total\nFROM clients c\nJOIN orders o ON \nGROUP BY ;`,
    expected:`SELECT c.name, SUM(o.amount) AS total FROM clients c JOIN orders o ON o.client_id = c.id GROUP BY c.id, c.name;`,
    ordered:false,
    hint:'Inner-join on <code>o.client_id = c.id</code>, then GROUP BY the client.'
  },
  {
    id:'pg-7', title:'Clients with no orders', difficulty:'intermediate',
    prompt:'Return clients (<code>id</code>, <code>name</code>) who have <b>never</b> placed an order.',
    setup:[
      `CREATE TABLE clients (id INT, name TEXT);`,
      `CREATE TABLE orders (id INT, client_id INT, amount INT);`,
      `INSERT INTO clients VALUES (1,'Acme'),(2,'Globex'),(3,'Initech'),(4,'Soylent');`,
      `INSERT INTO orders VALUES (101,1,500),(102,2,300);`
    ],
    visible:['clients','orders'],
    starter:`SELECT c.id, c.name\nFROM clients c\nLEFT JOIN orders o ON \nWHERE  IS NULL;`,
    expected:`SELECT c.id, c.name FROM clients c LEFT JOIN orders o ON o.client_id = c.id WHERE o.id IS NULL;`,
    ordered:false,
    hint:'Anti-join: LEFT JOIN then filter where the right-side id IS NULL.'
  },
  {
    id:'pg-8', title:'Open vs closed tickets', difficulty:'intermediate',
    prompt:'For each <code>client_id</code>, return <code>open_n</code> and <code>closed_n</code> using conditional sums.',
    setup:[
      `CREATE TABLE tickets (id INT, client_id INT, status TEXT);`,
      `INSERT INTO tickets VALUES (1,1,'open'),(2,1,'closed'),(3,2,'closed'),(4,2,'closed'),(5,3,'open'),(6,3,'open');`
    ],
    visible:['tickets'],
    starter:`SELECT client_id,\n  SUM(CASE WHEN status='open'   THEN 1 ELSE 0 END) AS open_n,\n  SUM(CASE WHEN status= THEN 1 ELSE 0 END) AS closed_n\nFROM tickets\nGROUP BY client_id;`,
    expected:`SELECT client_id, SUM(CASE WHEN status='open' THEN 1 ELSE 0 END) AS open_n, SUM(CASE WHEN status='closed' THEN 1 ELSE 0 END) AS closed_n FROM tickets GROUP BY client_id;`,
    ordered:false,
    hint:'Repeat the SUM(CASE WHEN…) pattern for the closed status.'
  },
  {
    id:'pg-9', title:'Average price per category, > 100', difficulty:'intermediate',
    prompt:'Return <code>category</code> and <code>avg_price</code> for categories whose average price is more than 100.',
    setup:[
      `CREATE TABLE products (id INT, name TEXT, price INT, category TEXT);`,
      `INSERT INTO products VALUES (1,'Pen',10,'stationery'),(2,'Pencil',5,'stationery'),(3,'Mug',90,'kitchen'),(4,'Bowl',60,'kitchen'),(5,'Book',250,'books'),(6,'Lamp',450,'home'),(7,'Vase',120,'home');`
    ],
    visible:['products'],
    starter:`SELECT category, AVG(price) AS avg_price\nFROM products\nGROUP BY category\n ;`,
    expected:`SELECT category, AVG(price) AS avg_price FROM products GROUP BY category HAVING AVG(price) > 100;`,
    ordered:false,
    hint:'Filtering on an aggregate → <code>HAVING</code>, not WHERE.'
  },
  {
    id:'pg-10', title:'Order items joined to products', difficulty:'intermediate',
    prompt:'List every order item as <code>product_name</code>, <code>qty</code>, <code>line_total</code> (qty × unit_price).',
    setup:[
      `CREATE TABLE products (id INT, name TEXT);`,
      `CREATE TABLE order_items (id INT, order_id INT, product_id INT, qty INT, unit_price INT);`,
      `INSERT INTO products VALUES (1,'Pen'),(2,'Mug'),(3,'Book');`,
      `INSERT INTO order_items VALUES (10,101,1,5,10),(11,101,3,1,250),(12,102,2,2,90);`
    ],
    visible:['products','order_items'],
    starter:`SELECT p.name AS product_name,\n       oi.qty,\n       oi.qty * oi.unit_price AS line_total\nFROM order_items oi\nJOIN products p ON ;`,
    expected:`SELECT p.name AS product_name, oi.qty, oi.qty * oi.unit_price AS line_total FROM order_items oi JOIN products p ON p.id = oi.product_id;`,
    ordered:false,
    hint:'Join on <code>p.id = oi.product_id</code>.'
  },
  /* ----- Advanced ----- */
  {
    id:'pg-11', title:'Running total of sales', difficulty:'advanced',
    prompt:'For each day, return <code>day</code>, <code>total</code>, and a cumulative <code>running</code> total ordered by day.',
    setup:[
      `CREATE TABLE sales_daily (day TEXT, total INT);`,
      `INSERT INTO sales_daily VALUES ('2025-05-01',1500),('2025-05-02',2100),('2025-05-03',1800),('2025-05-04',2400);`
    ],
    visible:['sales_daily'],
    starter:`SELECT day, total,\n  SUM(total) OVER ( ) AS running\nFROM sales_daily;`,
    expected:`SELECT day, total, SUM(total) OVER (ORDER BY day) AS running FROM sales_daily;`,
    ordered:true,
    hint:'<code>SUM(col) OVER (ORDER BY day)</code> = cumulative total.'
  },
  {
    id:'pg-12', title:'Most recent order per client', difficulty:'advanced',
    prompt:'Return the single most recent order per client: <code>id, client_id, amount, created_at</code>.',
    setup:[
      `CREATE TABLE orders (id INT, client_id INT, amount INT, created_at TEXT);`,
      `INSERT INTO orders VALUES (101,1,500,'2025-05-01'),(102,1,300,'2025-05-03'),(103,2,150,'2025-05-10'),(104,2,200,'2025-04-22'),(105,3,90,'2025-05-08');`
    ],
    visible:['orders'],
    starter:`SELECT id, client_id, amount, created_at\nFROM (\n  SELECT *, ROW_NUMBER() OVER (\n    PARTITION BY  ORDER BY created_at DESC\n  ) AS rn\n  FROM orders\n) t\nWHERE rn = ;`,
    expected:`SELECT id, client_id, amount, created_at FROM (SELECT *, ROW_NUMBER() OVER (PARTITION BY client_id ORDER BY created_at DESC) AS rn FROM orders) t WHERE rn = 1;`,
    ordered:false,
    hint:'Partition by client_id, order by created_at DESC, keep rn = 1.'
  },
  {
    id:'pg-13', title:'Dense rank within department', difficulty:'advanced',
    prompt:'Return <code>name, dept_id, salary, rk</code> where <code>rk</code> is the dense rank within the department (highest salary = 1, ties share rank with no gaps).',
    setup:[
      `CREATE TABLE employees (id INT, name TEXT, salary INT, dept_id INT);`,
      `INSERT INTO employees VALUES (1,'Asha',70000,1),(2,'Ben',95000,1),(3,'Cara',60000,2),(4,'Dev',95000,3),(5,'Eli',85000,1),(6,'Fae',75000,3);`
    ],
    visible:['employees'],
    starter:`SELECT name, dept_id, salary,\n  (salary) OVER (\n    PARTITION BY dept_id \n  ) AS rk\nFROM employees;`,
    expected:`SELECT name, dept_id, salary, DENSE_RANK() OVER (PARTITION BY dept_id ORDER BY salary DESC) AS rk FROM employees;`,
    ordered:false,
    hint:'<code>DENSE_RANK()</code> closes gaps on ties. Partition by dept, order by salary DESC.'
  },
  {
    id:'pg-14', title:'Day-over-day delta', difficulty:'advanced',
    prompt:'Return <code>day, total, delta</code> where delta = today\'s total − previous day\'s total. The first row\'s delta should be NULL.',
    setup:[
      `CREATE TABLE sales_daily (day TEXT, total INT);`,
      `INSERT INTO sales_daily VALUES ('2025-05-01',1500),('2025-05-02',2100),('2025-05-03',1800),('2025-05-04',2400);`
    ],
    visible:['sales_daily'],
    starter:`SELECT day, total,\n  total -  (total) OVER (ORDER BY day) AS delta\nFROM sales_daily;`,
    expected:`SELECT day, total, total - LAG(total) OVER (ORDER BY day) AS delta FROM sales_daily;`,
    ordered:true,
    hint:'<code>LAG(col)</code> returns the previous row in the ordered window.'
  }
];

/* ---------- Challenge UI ---------- */
let curChallenge = null;
let curChallengeDb = null;
let curChallengeStarter = '';

async function startChallenge(id){
  curChallenge = CHALLENGES.find(c => c.id === id);
  if(!curChallenge) return renderHome();
  hideFeedback();
  main.innerHTML = `<div class="pg-loading"><span class="spin">⟳</span>Loading SQL engine</div>`;
  try{
    await ensureSql();
    if(curChallengeDb){try{curChallengeDb.close()}catch(e){}}
    curChallengeDb = buildDb(curChallenge.setup);
    curChallengeStarter = curChallenge.starter;
    renderChallenge();
  }catch(e){
    main.innerHTML = `
      <div class="lesson-header">
        <button class="close-btn" onclick="renderHome()" aria-label="Back">×</button>
        <div style="flex:1"></div>
      </div>
      <article class="card card-pitfall">
        <span class="card-badge b-pitfall">⚠ Couldn't load engine</span>
        <h2>Couldn't load the SQL engine</h2>
        <p>The playground fetches <code>sql.js</code> from a CDN. Make sure you're online and reload the page.</p>
        <div class="error-block">${esc(e.message || String(e))}</div>
        <div class="footer-actions"><button class="btn btn-secondary" onclick="renderHome()">Back to map</button></div>
      </article>`;
  }
}

function renderChallenge(){
  hideFeedback();
  const c = curChallenge;
  const tables = (c.visible || []).map(n => previewTable(curChallengeDb, n)).filter(Boolean);
  main.innerHTML = `
    <div class="lesson-header">
      <button class="close-btn" onclick="exitChallenge()" aria-label="Back to map">×</button>
      <div style="flex:1;font-weight:800;font-size:14px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.title)}</div>
      <span class="diff ${c.difficulty}">${c.difficulty}</span>
    </div>
    <article class="card card-syntax">
      <span class="card-badge b-syntax">🛠 Playground</span>
      <h2>${esc(c.title)}</h2>
      <p>${c.prompt}</p>
      ${tables.length ? `<div class="result-label">tables you can query</div>${renderTables(tables)}` : ''}
      <div class="editor-shell">
        <div class="editor-bar">
          <span>SQL Editor</span>
          <span class="hint">Ctrl/Cmd + Enter to run</span>
        </div>
        <textarea class="sql-editor" id="sqlEditor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" aria-label="SQL editor">${esc(c.starter)}</textarea>
      </div>
      <div class="pg-actions">
        <button class="btn btn-blue" onclick="runChallenge()" aria-label="Run query">▶ Run Query</button>
        <button class="btn btn-primary" onclick="checkChallenge()" aria-label="Check answer">✓ Check Answer</button>
        <button class="btn btn-secondary" onclick="resetChallenge()" aria-label="Reset editor">↺ Reset</button>
        ${c.hint ? `<button class="btn btn-ghost" onclick="showHint()" aria-label="Show hint">💡 Hint</button>` : ''}
      </div>
      <div class="run-output" id="runOutput" aria-live="polite"></div>
    </article>
    <div class="footer-actions" style="margin-top:18px">
      <button class="btn btn-secondary" onclick="prevChallenge()" ${!hasPrevChallenge()?'disabled':''} aria-label="Previous challenge">← Previous</button>
      <div class="right">
        <button class="btn btn-primary" onclick="nextChallenge()" ${!hasNextChallenge()?'disabled':''} aria-label="Next challenge">Next →</button>
      </div>
    </div>
  `;
  const editor = $('#sqlEditor');
  editor.addEventListener('keydown', e => {
    if((e.ctrlKey || e.metaKey) && e.key === 'Enter'){
      e.preventDefault();
      runChallenge();
    }
    if(e.key === 'Tab' && !e.shiftKey){
      e.preventDefault();
      const s = editor.selectionStart, ee = editor.selectionEnd;
      editor.value = editor.value.slice(0, s) + '  ' + editor.value.slice(ee);
      editor.selectionStart = editor.selectionEnd = s + 2;
    }
  });
}

function exitChallenge(){
  if(curChallengeDb){try{curChallengeDb.close()}catch(e){}}
  curChallengeDb = null;
  curChallenge = null;
  renderHome();
}

function runChallenge(){
  const sql = $('#sqlEditor').value;
  const out = $('#runOutput');
  try{
    const r = execSelect(curChallengeDb, sql);
    out.innerHTML = `
      <div class="run-status ok">▶ Query ran · ${r.rows.length} row${r.rows.length===1?'':'s'}</div>
      ${renderTables([{name:'your result', cols:r.cols, rows:r.rows}])}
    `;
  }catch(e){
    out.innerHTML = `
      <div class="run-status err">⚠ Query error</div>
      <div class="error-block">${esc(e.message || String(e))}</div>
    `;
  }
}

function checkChallenge(){
  const sql = $('#sqlEditor').value;
  const out = $('#runOutput');
  let userRes;
  try{
    userRes = execSelect(curChallengeDb, sql);
  }catch(e){
    out.innerHTML = `
      <div class="run-status err">⚠ Query error</div>
      <div class="error-block">${esc(e.message || String(e))}</div>
    `;
    return;
  }
  let expectedRes;
  try{
    const fresh = buildDb(curChallenge.setup);
    expectedRes = execSelect(fresh, curChallenge.expected);
    fresh.close();
  }catch(e){
    out.innerHTML = `<div class="error-block">Internal error: ${esc(e.message)}</div>`;
    return;
  }
  const correct = compareResults(userRes, expectedRes, curChallenge.ordered);
  if(correct){
    if(!state.playgroundProgress) state.playgroundProgress = {};
    const already = state.playgroundProgress[curChallenge.id]?.completed;
    state.playgroundProgress[curChallenge.id] = {completed:true};
    if(!already){
      state.xp += 20;
      const today = new Date().toDateString();
      if(state.lastPlayed !== today){state.streak += 1; state.lastPlayed = today;}
    }
    saveState();
    updateStatsUI();
    out.innerHTML = `
      <div class="run-status ok">✓ Correct!</div>
      <div class="success-block">${already ? '🎉 Solved again — XP only awarded once per challenge.' : '🎉 +20 XP earned!'} Your query matches the expected result.</div>
      ${renderTables([{name:'your result', cols:userRes.cols, rows:userRes.rows}])}
    `;
  } else {
    out.innerHTML = `
      <div class="run-status err">✗ Not yet — your output doesn't match the expected result.</div>
      <div class="diff-block">
        <strong>Your result · ${userRes.rows.length} row${userRes.rows.length===1?'':'s'}</strong>
        ${renderTables([{name:'yours', cols:userRes.cols, rows:userRes.rows}])}
        <strong>Expected · ${expectedRes.rows.length} row${expectedRes.rows.length===1?'':'s'}</strong>
        ${renderTables([{name:'expected', cols:expectedRes.cols, rows:expectedRes.rows}])}
      </div>
    `;
  }
}

function resetChallenge(){
  const ed = $('#sqlEditor');
  ed.value = curChallengeStarter;
  $('#runOutput').innerHTML = '';
  ed.focus();
}

function showHint(){
  $('#runOutput').innerHTML = `<div class="hint-block"><b>💡 Hint:</b> ${curChallenge.hint}</div>`;
}

function challengeIdx(){return CHALLENGES.findIndex(c => c.id === curChallenge.id)}
function hasPrevChallenge(){return challengeIdx() > 0}
function hasNextChallenge(){return challengeIdx() < CHALLENGES.length - 1}
function prevChallenge(){if(hasPrevChallenge()) startChallenge(CHALLENGES[challengeIdx()-1].id)}
function nextChallenge(){if(hasNextChallenge()) startChallenge(CHALLENGES[challengeIdx()+1].id)}

/* ============ Boot ============ */
updateStatsUI();
renderHome();
window.addEventListener('keydown', e => {
  if(e.key === 'Escape'){
    if($('#modalContainer').innerHTML) closeGlossary();
  }
});
</script>
