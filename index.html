<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SQLingo — MySQL Mastery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f7f7f2; --card:#ffffff; --ink:#2b2b2b; --muted:#777; --line:#e5e5e5;
    --green:#58cc02; --green-dark:#46a302; --green-shadow:#58a700;
    --orange:#ff9600; --orange-shadow:#c77400;
    --blue:#1cb0f6; --blue-shadow:#0a8ac9;
    --red:#ff4b4b; --red-shadow:#cc3a3a;
    --purple:#ce82ff; --gold:#ffc800;
    --code-bg:#1e1e2e; --code-text:#cdd6f4;
    --code-keyword:#f5c2e7; --code-string:#a6e3a1;
    --code-number:#fab387; --code-comment:#6c7086;
    --tbl-head:#eaeaf5; --tbl-row-alt:#fafafa;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Nunito',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  code,pre{font-family:'JetBrains Mono',ui-monospace,monospace}

  #app{min-height:100vh;display:flex;flex-direction:column}
  .topbar{position:sticky;top:0;z-index:50;background:var(--card);border-bottom:2px solid var(--line);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .logo{font-weight:900;font-size:24px;letter-spacing:-0.5px;display:flex;align-items:center;gap:8px}
  .logo-mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--green),var(--blue));display:flex;align-items:center;justify-content:center;color:white;font-weight:900;font-size:18px;box-shadow:0 3px 0 var(--green-shadow)}
  .stats{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
  .stat{display:flex;align-items:center;gap:6px;font-weight:800;font-size:15px}
  .stat-icon{font-size:20px}
  .streak{color:var(--orange)}
  .xp{color:var(--gold)}
  main{flex:1;padding:24px 16px 60px;max-width:920px;margin:0 auto;width:100%}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 24px;border-radius:14px;font-weight:800;font-size:15px;letter-spacing:0.5px;text-transform:uppercase;transition:transform .08s,box-shadow .08s;user-select:none}
  .btn:active{transform:translateY(2px)}
  .btn-primary{background:var(--green);color:white;box-shadow:0 4px 0 var(--green-shadow)}
  .btn-primary:active{box-shadow:0 2px 0 var(--green-shadow)}
  .btn-primary:disabled{background:#e5e5e5;color:#aaa;box-shadow:0 4px 0 #ccc;cursor:not-allowed}
  .btn-secondary{background:white;color:var(--muted);box-shadow:0 4px 0 var(--line);border:2px solid var(--line)}
  .btn-secondary:active{box-shadow:0 2px 0 var(--line)}
  .btn-blue{background:var(--blue);color:white;box-shadow:0 4px 0 var(--blue-shadow)}

  .hero{text-align:center;padding:24px 0 24px}
  .hero h1{font-size:38px;font-weight:900;letter-spacing:-1px;line-height:1.05}
  .hero p{color:var(--muted);font-size:17px;font-weight:600;margin-top:8px;max-width:560px;margin-left:auto;margin-right:auto}
  .resume-banner{background:linear-gradient(135deg,#fff5e1,#ffe9c4);border:2px solid #ffd17a;border-radius:18px;padding:16px 20px;margin:0 auto 28px;max-width:680px;display:flex;gap:14px;align-items:flex-start}
  .resume-banner-icon{font-size:28px;line-height:1}
  .resume-banner-text{font-size:14px;font-weight:600;color:#7a5a10;line-height:1.45}
  .resume-banner-text strong{font-weight:900;color:#4a3700}

  .section-heading{font-size:22px;font-weight:900;letter-spacing:-0.5px;margin:24px 0 12px}
  .section-sub{color:var(--muted);font-weight:700;font-size:13px;margin-bottom:14px}

  .map{display:flex;flex-direction:column;gap:14px}
  .module-card{background:var(--card);border:2px solid var(--line);border-radius:20px;padding:18px;display:grid;grid-template-columns:60px 1fr auto;gap:16px;align-items:center;cursor:pointer;transition:transform .1s,box-shadow .1s,border-color .1s;box-shadow:0 4px 0 var(--line)}
  .module-card:hover{transform:translateY(-2px);box-shadow:0 6px 0 var(--line);border-color:var(--green)}
  .module-card.completed{border-color:var(--green);background:linear-gradient(135deg,#ffffff,#f0fae6)}
  .module-icon{width:60px;height:60px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;color:white;box-shadow:inset 0 -4px 0 rgba(0,0,0,0.15)}
  .module-meta h3{font-size:18px;font-weight:900;letter-spacing:-0.3px}
  .module-meta .desc{font-size:13px;color:var(--muted);font-weight:600;margin-top:3px;line-height:1.4}
  .module-meta .diff{display:inline-block;margin-top:6px;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;background:#eef;color:#447}
  .diff.beginner{background:#e3f7d2;color:#3d7300}
  .diff.intermediate{background:#fff0d6;color:#9c5d00}
  .diff.advanced{background:#ffe0e0;color:#9c2222}
  .diff.expert{background:#e8defb;color:#5e2c9e}
  .progress-ring{width:50px;height:50px;border-radius:50%;background:conic-gradient(var(--green) calc(var(--p)*1%),#eee 0);display:flex;align-items:center;justify-content:center;margin-left:auto}
  .progress-ring-inner{width:40px;height:40px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900}

  .lesson-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
  .progress-bar{flex:1;height:14px;background:#e5e5e5;border-radius:10px;overflow:hidden}
  .progress-bar-fill{height:100%;background:var(--green);border-radius:10px;transition:width .3s;box-shadow:inset 0 -3px 0 rgba(0,0,0,0.1)}
  .close-btn{width:36px;height:36px;border-radius:50%;background:#eee;color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900}

  .card-stage{perspective:1200px;min-height:440px;display:flex;align-items:center;justify-content:center;margin:24px 0}
  .flashcard{width:100%;max-width:600px;min-height:420px;position:relative;transform-style:preserve-3d;transition:transform .6s cubic-bezier(.65,.05,.36,1);cursor:pointer}
  .flashcard.flipped{transform:rotateY(180deg)}
  .flashcard-face{position:absolute;inset:0;background:var(--card);border:2px solid var(--line);border-radius:22px;padding:26px;display:flex;flex-direction:column;backface-visibility:hidden;box-shadow:0 6px 0 var(--line);overflow-y:auto}
  .flashcard-face.back{transform:rotateY(180deg)}
  .flashcard-label{font-size:11px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:var(--blue);margin-bottom:10px}
  .flashcard-front .concept{font-size:24px;font-weight:900;letter-spacing:-0.5px;line-height:1.2;margin-bottom:10px}
  .flashcard-front .hint{color:var(--muted);font-size:14.5px;font-weight:600;line-height:1.5;margin-bottom:8px}
  .flashcard-back h4{font-size:15px;font-weight:800;margin-bottom:8px}
  .flashcard-back p{font-size:14.5px;line-height:1.55;color:#444;font-weight:500;margin-bottom:10px}
  .flashcard-back ul{margin-left:20px;font-size:14px;line-height:1.6}
  .tap-hint{position:sticky;bottom:0;text-align:center;font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;padding-top:8px;background:linear-gradient(to bottom,transparent,white 40%)}

  pre.code{background:var(--code-bg);color:var(--code-text);padding:12px 14px;border-radius:10px;font-size:12.5px;line-height:1.55;overflow-x:auto;white-space:pre;margin:8px 0 8px}
  pre.code .k{color:var(--code-keyword);font-weight:600}
  pre.code .s{color:var(--code-string)}
  pre.code .n{color:var(--code-number)}
  pre.code .c{color:var(--code-comment);font-style:italic}
  .scenario-tag{display:inline-block;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;background:#e1f4ff;color:#0a6996;margin-top:4px}

  /* MINI TABLE */
  .tables-wrap{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0 14px}
  .mini-table{background:#fafaf7;border:2px solid var(--line);border-radius:10px;padding:8px;font-family:'JetBrains Mono',monospace;font-size:11.5px;flex:1;min-width:180px;max-width:100%}
  .mini-table-caption{font-size:10.5px;font-weight:800;color:var(--blue-shadow);text-transform:lowercase;letter-spacing:.4px;margin-bottom:4px;font-family:'Nunito',sans-serif}
  .mini-table table{border-collapse:collapse;width:100%}
  .mini-table th,.mini-table td{padding:3px 7px;border:1px solid var(--line);text-align:left;white-space:nowrap;line-height:1.4}
  .mini-table th{background:var(--tbl-head);font-weight:700;color:var(--ink);font-size:11px}
  .mini-table tbody tr:nth-child(even){background:var(--tbl-row-alt)}
  .mini-table td.null{color:#bbb;font-style:italic}
  .mini-table td.pk{color:var(--blue-shadow);font-weight:700}
  .table-note{font-size:11.5px;color:var(--muted);font-weight:700;margin-top:6px;line-height:1.4}

  .question-area{background:var(--card);border:2px solid var(--line);border-radius:22px;padding:24px;box-shadow:0 6px 0 var(--line)}
  .question-prompt{font-size:13px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:var(--orange);margin-bottom:10px}
  .question-text{font-size:19px;font-weight:800;line-height:1.35;margin-bottom:6px;letter-spacing:-.3px}
  .question-scenario{background:#f0f8ff;border-left:4px solid var(--blue);padding:11px 13px;border-radius:10px;font-size:13.5px;font-weight:600;color:#1a4d6e;margin:12px 0;line-height:1.5}
  .options{display:grid;gap:11px;margin-top:14px}
  .option{background:white;border:2px solid var(--line);border-radius:14px;padding:14px 16px;font-size:14.5px;font-weight:700;text-align:left;box-shadow:0 3px 0 var(--line);transition:all .1s;display:flex;align-items:center;gap:12px;line-height:1.4}
  .option:hover:not(:disabled){border-color:var(--blue)}
  .option.selected{border-color:var(--blue);background:#eaf6fe;color:var(--blue-shadow)}
  .option.correct{border-color:var(--green);background:#dffac4;color:var(--green-shadow);box-shadow:0 3px 0 var(--green-shadow)}
  .option.wrong{border-color:var(--red);background:#ffd6d6;color:var(--red-shadow);box-shadow:0 3px 0 var(--red-shadow)}
  .option-letter{width:28px;height:28px;border-radius:8px;background:#eee;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:var(--muted);flex-shrink:0}
  .option.selected .option-letter{background:var(--blue);color:white}
  .option.correct .option-letter{background:var(--green);color:white}
  .option.wrong .option-letter{background:var(--red);color:white}
  .option code{font-size:13px;background:rgba(0,0,0,0.06);padding:2px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace}

  .fill-template{background:var(--code-bg);color:var(--code-text);padding:16px;border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:13.5px;line-height:1.7;margin:12px 0;white-space:pre-wrap}
  .blank-input{display:inline-block;background:white;color:var(--ink);border:2px dashed var(--orange);border-radius:8px;padding:2px 10px;font-family:inherit;font-size:14px;font-weight:700;min-width:90px;outline:none}
  .blank-input:focus{border-style:solid;border-color:var(--blue)}
  .blank-input.correct{border-color:var(--green);background:#dffac4;color:var(--green-shadow)}
  .blank-input.wrong{border-color:var(--red);background:#ffd6d6;color:var(--red-shadow)}

  .order-bank,.order-zone{display:flex;flex-wrap:wrap;gap:8px;padding:14px;border-radius:14px;min-height:64px;margin:10px 0}
  .order-bank{background:#f5f5f0;border:2px dashed #ccc}
  .order-zone{background:white;border:2px solid var(--line);box-shadow:0 3px 0 var(--line)}
  .order-chip{background:white;border:2px solid var(--line);border-radius:10px;padding:8px 12px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;box-shadow:0 3px 0 var(--line);cursor:pointer;transition:transform .1s;user-select:none}
  .order-chip:active{transform:translateY(2px);box-shadow:0 1px 0 var(--line)}
  .order-chip.placed{background:#eaf6fe;border-color:var(--blue)}

  .feedback{position:fixed;bottom:0;left:0;right:0;padding:18px 20px 22px;background:white;border-top:3px solid var(--line);transform:translateY(100%);transition:transform .25s cubic-bezier(.5,0,.5,1.4);z-index:60}
  .feedback.show{transform:translateY(0)}
  .feedback.correct{background:#d7ffb8;border-top-color:var(--green)}
  .feedback.wrong{background:#ffdfdf;border-top-color:var(--red)}
  .feedback-inner{max-width:780px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
  .feedback-title{font-size:22px;font-weight:900;letter-spacing:-.5px}
  .feedback.correct .feedback-title{color:var(--green-shadow)}
  .feedback.wrong .feedback-title{color:var(--red-shadow)}
  .feedback-explain{font-size:13.5px;font-weight:600;line-height:1.45;margin-top:4px;max-width:560px}
  .feedback-explain code{background:rgba(0,0,0,0.08);padding:2px 6px;border-radius:4px;font-size:12.5px;font-family:'JetBrains Mono',monospace}

  .results{text-align:center;padding:40px 20px}
  .results-trophy{font-size:88px;margin-bottom:12px;animation:bounce .8s ease-out}
  @keyframes bounce{0%{transform:scale(0) rotate(-15deg)}60%{transform:scale(1.15) rotate(8deg)}100%{transform:scale(1) rotate(0)}}
  .results h2{font-size:32px;font-weight:900;letter-spacing:-.8px;margin-bottom:8px}
  .results .subtitle{color:var(--muted);font-weight:600;font-size:16px;margin-bottom:32px}
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:540px;margin:0 auto 32px}
  .stat-card{background:var(--card);border:2px solid var(--line);border-radius:16px;padding:20px 12px;box-shadow:0 4px 0 var(--line)}
  .stat-card-label{font-size:11px;font-weight:900;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted)}
  .stat-card-value{font-size:30px;font-weight:900;letter-spacing:-1px;margin-top:6px}
  .stat-card.xp .stat-card-value{color:var(--gold)}
  .stat-card.acc .stat-card-value{color:var(--green)}
  .stat-card.time .stat-card-value{color:var(--blue)}

  .footer-actions{display:flex;gap:12px;justify-content:center;margin-top:18px;flex-wrap:wrap}
  .hidden{display:none!important}
  .row{display:flex;gap:12px;align-items:center}

  @media (max-width:600px){
    .hero h1{font-size:28px}
    .module-card{grid-template-columns:52px 1fr auto;padding:14px;gap:12px}
    .module-icon{width:52px;height:52px;font-size:24px;border-radius:14px}
    .module-meta h3{font-size:16px}
    .module-meta .desc{font-size:12.5px}
    .progress-ring{width:44px;height:44px}
    .progress-ring-inner{width:34px;height:34px;font-size:11px}
    .flashcard-front .concept{font-size:20px}
    .flashcard-face{padding:18px}
    .question-text{font-size:17px}
    .question-area{padding:18px}
    .stats{gap:10px}
    .stat{font-size:13px}
    .topbar{padding:10px 14px}
    .logo{font-size:20px}
    .logo-mark{width:32px;height:32px;font-size:16px}
    .mini-table{font-size:11px;min-width:140px}
    .mini-table th,.mini-table td{padding:2px 5px}
  }
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="logo"><div class="logo-mark">🐬</div><span>SQLingo</span></div>
    <div class="stats">
      <div class="stat streak"><span class="stat-icon">🔥</span><span id="streakCount">0</span></div>
      <div class="stat xp"><span class="stat-icon">⚡</span><span id="xpCount">0</span></div>
    </div>
  </header>
  <main id="mainContent"></main>
</div>

<div class="feedback" id="feedback">
  <div class="feedback-inner">
    <div>
      <div class="feedback-title" id="feedbackTitle"></div>
      <div class="feedback-explain" id="feedbackExplain"></div>
    </div>
    <button class="btn btn-primary" id="continueBtn">Continue</button>
  </div>
</div>

<script>
/* ─────────────────────────────────────────────────────────
   SQLINGO — MySQL Mastery (Beginner → Expert)
   All modules unlocked. No hearts. Every card has a tiny
   sample table for visualization.
   ───────────────────────────────────────────────────────── */

/* Helper to keep table definitions compact:
   T("products", "id,name,price", [[1,"Pen",10],[2,"Mug",90]]) */
const T = (name, colsStr, rows) => ({name, cols:colsStr.split(',').map(c=>c.trim()), rows});

// Reusable tables
const TBL = {
  products: T("products","id,name,price,category", [[1,"Pen",10,"stationery"],[2,"Mug",90,"kitchen"],[3,"Book",250,"books"],[4,"Lamp",450,"home"]]),
  productsLow: T("products","id,name,qty_in_stock", [[1,"Pen",120],[2,"Mug",4],[3,"Book",0],[4,"Lamp",7]]),
  clients: T("clients","id,name,tier", [[1,"Acme","gold"],[2,"Globex","silver"],[3,"Initech","gold"]]),
  orders: T("orders","id,client_id,amount", [[101,1,500],[102,1,300],[103,2,150]]),
  ordersNullable: T("orders","id,client_id,amount,paid_at", [[101,1,500,"2025-05-01"],[102,2,300,"NULL"],[103,1,150,"2025-05-10"]]),
  employees: T("employees","id,name,salary,dept", [[1,"Asha",70000,"Eng"],[2,"Ben",95000,"Eng"],[3,"Cara",60000,"Mkt"],[4,"Dev",95000,"Eng"]]),
  campaigns: T("campaigns","id,client_id,spend,created_at", [[1,1,2000,"2025-04-01"],[2,1,1200,"2025-05-01"],[3,2,800,"2025-05-15"]]),
  backlinks: T("backlinks","id,target_url,source_domain,quality", [[1,"/blog","x.com",8],[2,"/blog","y.com",6],[3,"/home","x.com",9]]),
  listings: T("listings","id,brand_name", [[1,"adidas"],[2,"ad1das"],[3,"nike"],[4,"n1ke"]]),
  leads: T("daily_leads","day,leads", [["2025-05-01",40],["2025-05-02",55],["2025-05-03",48]]),
  tickets: T("tickets","id,client_id,status", [[1,1,"open"],[2,1,"closed"],[3,2,"closed"],[4,2,"closed"]]),
  categories: T("categories","id,name,parent_id", [[1,"Home","NULL"],[2,"Kitchen",1],[3,"Mugs",2],[4,"Garden",1]]),
  invoices: T("invoices","id,order_id,amount", [[501,101,500],[502,102,300]]),
  enrichments: T("enrichments","id,source_text,attributes", [[1,"Great product!",'{"sentiment":"pos"}'],[2,"Bad service",'{"sentiment":"neg"}']]),
  articles: T("articles","id,title,body", [[1,"MySQL tips","Indexes help"],[2,"Performance","tune queries"]]),
  accounts: T("accounts","id,owner,balance", [[1,"A",1000],[2,"B",500]])
};

const MODULES = [
  /* ─── 1 ─── BASICS */
  {
    id:1, title:"Database Fundamentals", icon:"🌱", color:"#58cc02",
    description:"Tables, rows, columns, keys — the building blocks before any SQL.",
    difficulty:"beginner",
    flashcards:[
      {label:"WHAT IS A TABLE",
       concept:"A table is a grid: columns name the fields, rows hold the records.",
       hint:"Like a spreadsheet, but with strict types and rules.",
       tables:[TBL.products],
       back:`<p>Every relational database is made of tables. A table has:</p>
             <ul><li><b>Columns</b> — the fields (id, name, price). Each has a data type.</li>
             <li><b>Rows</b> — individual records (one product per row).</li></ul>
             <p>The example above has 4 columns and 4 rows.</p>`},
      {label:"PRIMARY KEY",
       concept:"Primary Key = the unique ID for each row.",
       hint:"Usually called 'id'. No two rows can share it.",
       tables:[TBL.products],
       back:`<p>The primary key uniquely identifies each row. In <code>products</code>, the <code>id</code> column is the PK — values 1, 2, 3, 4 never repeat.</p>
             <p>PKs are usually <code>AUTO_INCREMENT</code> integers, but can be any unique value.</p>`},
      {label:"FOREIGN KEY",
       concept:"Foreign Key = a column that points to another table's PK.",
       hint:"This is how tables 'link' to each other.",
       tables:[TBL.clients, TBL.orders],
       back:`<p>In <code>orders</code>, the column <code>client_id</code> is a foreign key — it references <code>clients.id</code>.</p>
             <p>Order 101 belongs to client 1 (Acme). Order 103 belongs to client 2 (Globex). This is how you connect tables in a JOIN.</p>`}
    ],
    questions:[
      {type:"mcq",
       tables:[TBL.products],
       question:"How many ROWS does this table have?",
       options:["3","4","5","16"], correct:1,
       explanation:"Count data rows (not the header). Pen, Mug, Book, Lamp = 4 rows."},
      {type:"mcq",
       tables:[TBL.products],
       question:"Which column is most likely the PRIMARY KEY?",
       options:["name — it identifies the product","id — it's unique per row","price — it's a number","category — it groups things"], correct:1,
       explanation:"The PK uniquely identifies a row. 'id' has unique values per row; 'name' could collide; 'price' and 'category' repeat."},
      {type:"mcq",
       tables:[TBL.clients, TBL.orders],
       question:"In the orders table, what is client_id?",
       options:["A primary key","A foreign key to clients.id","A random number","The order amount"], correct:1,
       explanation:"client_id links each order back to a row in clients. That's the definition of a foreign key."},
      {type:"fill",
       tables:[TBL.products],

/* ─────── STATE & PERSISTENCE ─────── */

const DEFAULT_STATE = {xp:0, streak:0, lastPlayed:null, moduleProgress:{}};

function loadState(){
  try{
    const raw = localStorage.getItem('sqlingo.v2');
    if(!raw) return {...DEFAULT_STATE};
    return {...DEFAULT_STATE, ...JSON.parse(raw)};
  }catch(e){return {...DEFAULT_STATE}}
}
function saveState(){try{localStorage.setItem('sqlingo.v2', JSON.stringify(state))}catch(e){}}

let state = loadState();
(function streakCheck(){
  const today = new Date().toDateString();
  if(state.lastPlayed !== today){
    const last = state.lastPlayed ? new Date(state.lastPlayed) : null;
    if(last){
      const diff = (new Date(today) - last)/86400000;
      if(diff > 1) state.streak = 0;
    }
  }
})();

const $ = sel => document.querySelector(sel);
const main = $('#mainContent');
const feedback = $('#feedback');
const feedbackTitle = $('#feedbackTitle');
const feedbackExplain = $('#feedbackExplain');
const continueBtn = $('#continueBtn');

function updateStatsUI(){
  $('#xpCount').textContent = state.xp;
  $('#streakCount').textContent = state.streak;
}
function hideFeedback(){feedback.classList.remove('show','correct','wrong')}
function showFeedback(correct, explain){
  feedback.classList.remove('correct','wrong');
  feedback.classList.add('show', correct?'correct':'wrong');
  feedbackTitle.textContent = correct ? randomCorrect() : 'Not quite';
  feedbackExplain.innerHTML = explain;
}
function randomCorrect(){
  const opts = ['Nice!','Excellent!','You got it!','Crushed it!','That\'s the one.','Perfect.','Sharp!'];
  return opts[Math.floor(Math.random()*opts.length)];
}
function escapeHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function renderTables(tables){
  if(!tables) return '';
  const arr = Array.isArray(tables) ? tables : [tables];
  if(arr.length===0) return '';
  return `<div class="tables-wrap">${arr.map(t => `
    <div class="mini-table">
      <div class="mini-table-caption">${escapeHtml(t.name)}</div>
      <table>
        <thead><tr>${t.cols.map(c=>`<th>${escapeHtml(c)}</th>`).join('')}</tr></thead>
        <tbody>${t.rows.map(r=>`<tr>${r.map(v=>{
          const s = String(v);
          if(s==='NULL') return '<td class="null">NULL</td>';
          return `<td>${escapeHtml(s)}</td>`;
        }).join('')}</tr>`).join('')}</tbody>
      </table>
    </div>`).join('')}</div>`;
}

function formatCode(s){
  if(/SELECT|FROM|WHERE|JOIN|GROUP|HAVING|ORDER|INDEX|EXISTS|NULL|REGEXP|LIKE|CASE|WHEN|SUM|COUNT|MAX|MIN|AVG|MATCH|AGAINST|DISTINCT|TRANSACTION|COMMIT|ROLLBACK|INNER|LEFT|RIGHT|INSERT|UPDATE|DELETE|TABLE|PRIMARY|UNIQUE|FOREIGN|CREATE|ALTER/.test(s)){
    return `<code>${escapeHtml(s)}</code>`;
  }
  return escapeHtml(s);
}

let currentModule = null;
let currentStage = 'flashcards';
let currentIndex = 0;
let sessionCorrect = 0;
let sessionStart = 0;
let currentSelected = null;
let currentAnsweredCorrectly = false;

function startModule(moduleId){
  currentModule = MODULES.find(m=>m.id===moduleId);
  currentStage = 'flashcards';
  currentIndex = 0;
  sessionCorrect = 0;
  sessionStart = Date.now();
  if(!state.moduleProgress[moduleId]){
    state.moduleProgress[moduleId] = {flashcardsDone:false, questionsCorrect:0, total:currentModule.questions.length, completed:false};
  } else {
    state.moduleProgress[moduleId].questionsCorrect = 0; // reset session count for accurate display
  }
  renderFlashcard();
}

      <div style="font-weight:900;font-size:14px;color:var(--muted);min-width:50px;text-align:right">${stepNum}/${totalSteps}</div>
    </div>
    <div style="font-size:13px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:var(--blue);text-align:center;margin-bottom:8px">Flashcard ${currentIndex+1} of ${currentModule.flashcards.length}</div>
    <div class="card-stage">
      <div class="flashcard" id="flashcard" onclick="this.classList.toggle('flipped')">
        <div class="flashcard-face flashcard-front">
          <div class="flashcard-label">${fc.label}</div>
          <div class="concept">${fc.concept}</div>
          <div class="hint">${fc.hint}</div>
          ${renderTables(fc.tables)}
          <div class="tap-hint">Tap card to reveal →</div>
        </div>
        <div class="flashcard-face back">
          <div class="flashcard-label">EXPLANATION</div>
          <div class="flashcard-back">${fc.back}</div>
          <div class="tap-hint">← Tap to flip back</div>
        </div>
      </div>
    </div>
    <div class="footer-actions">
      <button class="btn btn-secondary" onclick="prevStep()" ${currentIndex===0?'disabled':''}>Back</button>
      <button class="btn btn-primary" onclick="nextStep()">${currentIndex===currentModule.flashcards.length-1?'Start quiz →':'Next card'}</button>
    </div>
  `;
}

function prevStep(){
  if(currentStage==='flashcards' && currentIndex>0){currentIndex--; renderFlashcard()}
  else if(currentStage==='questions' && currentIndex>0){currentIndex--; renderQuestion()}
  else if(currentStage==='questions' && currentIndex===0){
    currentStage='flashcards'; currentIndex = currentModule.flashcards.length-1; renderFlashcard();
  }
}
function nextStep(){
  if(currentStage==='flashcards'){
    if(currentIndex < currentModule.flashcards.length-1){currentIndex++; renderFlashcard()}
    else {
      state.moduleProgress[currentModule.id].flashcardsDone = true;
      saveState();
      currentStage='questions'; currentIndex=0; renderQuestion();
    }
  }
}

function renderQuestion(){
  hideFeedback();
  currentSelected = null;
  currentAnsweredCorrectly = false;
  const q = currentModule.questions[currentIndex];
  const totalSteps = currentModule.flashcards.length + currentModule.questions.length;
  const stepNum = currentModule.flashcards.length + currentIndex + 1;
  const progress = Math.round(100*(stepNum-1)/totalSteps);

  let body = '';
  if(q.type==='mcq'){
    body = `
      ${q.scenario?`<div class="question-scenario"><strong>Scenario:</strong> ${escapeHtml(q.scenario)}</div>`:''}
      <div class="question-text">${q.question||'Choose the best answer:'}</div>
      ${renderTables(q.tables)}
      <div class="options" id="options">
        ${q.options.map((opt,i)=>`
          <button class="option" data-i="${i}" onclick="selectOption(${i})">
            <div class="option-letter">${String.fromCharCode(65+i)}</div>
            <div>${formatCode(opt)}</div>
          </button>`).join('')}
      </div>`;
  } else if(q.type==='fill'){
    body = `
      ${q.scenario?`<div class="question-scenario"><strong>Scenario:</strong> ${escapeHtml(q.scenario)}</div>`:''}
      <div class="question-text">${q.question||'Fill in the blank:'}</div>
      ${renderTables(q.tables)}
      <div class="fill-template">${q.template.replace('___','<input class="blank-input" id="blankInput" autocomplete="off" spellcheck="false" />')}</div>`;
  } else if(q.type==='order'){
    body = `
      ${q.scenario?`<div class="question-scenario"><strong>Scenario:</strong> ${escapeHtml(q.scenario)}</div>`:''}
      <div class="question-text">${q.question}</div>
      ${renderTables(q.tables)}
      <div style="font-size:12px;font-weight:800;color:var(--muted);margin-top:14px;letter-spacing:.5px;text-transform:uppercase">Tap chips below in correct order</div>
      <div class="order-zone" id="orderZone"></div>
      <div style="font-size:12px;font-weight:800;color:var(--muted);margin-top:6px;letter-spacing:.5px;text-transform:uppercase">Available</div>
      <div class="order-bank" id="orderBank"></div>`;
  }

  main.innerHTML = `
    <div class="lesson-header">
      <button class="close-btn" onclick="renderHome()">×</button>
      <div class="progress-bar"><div class="progress-bar-fill" style="width:${progress}%"></div></div>
      <div style="font-weight:900;font-size:14px;color:var(--muted);min-width:50px;text-align:right">${stepNum}/${totalSteps}</div>
    </div>
    <div style="font-size:13px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:var(--orange);text-align:center;margin-bottom:8px">Question ${currentIndex+1} of ${currentModule.questions.length}</div>
    <div class="question-area">${body}</div>
    <div class="footer-actions" id="checkActions">
      <button class="btn btn-secondary" onclick="prevStep()">Back</button>
      <button class="btn btn-primary" id="checkBtn" onclick="checkAnswer()" disabled>Check</button>
    </div>`;

  if(q.type==='order'){
    const bank = $('#orderBank');
    const shuffled = [...q.chips.map((c,i)=>({c,i}))].sort(()=>Math.random()-0.5);
    shuffled.forEach(({c,i})=>{
      const chip = document.createElement('button');
      chip.className='order-chip'; chip.dataset.i=i; chip.textContent=c;
      chip.onclick = ()=>moveChip(chip, 'zone');
      bank.appendChild(chip);
    });
  }
  if(q.type==='fill'){
    const input = $('#blankInput');
    input.addEventListener('input', ()=>{$('#checkBtn').disabled = input.value.trim().length===0});
    input.focus();
    input.addEventListener('keydown',(e)=>{if(e.key==='Enter' && !$('#checkBtn').disabled)checkAnswer()});
  }
}

function selectOption(i){
  if(currentAnsweredCorrectly) return;
  currentSelected = i;
  document.querySelectorAll('#options .option').forEach((el,idx)=>{el.classList.toggle('selected', idx===i)});
  $('#checkBtn').disabled = false;
}
function moveChip(chip, target){
  if(currentAnsweredCorrectly) return;
  const dest = target==='zone'?$('#orderZone'):$('#orderBank');
  chip.onclick = ()=>moveChip(chip, target==='zone'?'bank':'zone');
  chip.classList.toggle('placed', target==='zone');
  dest.appendChild(chip);
  $('#checkBtn').disabled = $('#orderZone').children.length===0;
}

function checkAnswer(){
  const q = currentModule.questions[currentIndex];
  let correct = false;

  if(q.type==='mcq'){
    if(currentSelected===null) return;
    correct = currentSelected === q.correct;
    document.querySelectorAll('#options .option').forEach((el,idx)=>{
      el.disabled = true; el.classList.remove('selected');
      if(idx===q.correct) el.classList.add('correct');
      else if(idx===currentSelected && !correct) el.classList.add('wrong');
    });
  } else if(q.type==='fill'){
    const input = $('#blankInput');
    const userAnswer = input.value.trim();
    const answers = q.answer.split('|').map(a=>a.trim().toLowerCase());
    correct = answers.includes(userAnswer.toLowerCase());
    input.disabled = true;
    input.classList.add(correct?'correct':'wrong');
  } else if(q.type==='order'){
    const placed = [...$('#orderZone').children].map(el=>parseInt(el.dataset.i,10));
    correct = JSON.stringify(placed) === JSON.stringify(q.correctOrder);
  }

  if(correct){
    currentAnsweredCorrectly = true;
    sessionCorrect++;
    state.xp += 10;
    state.moduleProgress[currentModule.id].questionsCorrect = (state.moduleProgress[currentModule.id].questionsCorrect||0)+1;
  }
  saveState();
  updateStatsUI();
  showFeedback(correct, q.explanation);
  const btn = $('#checkBtn'); if(btn) btn.remove();
}

continueBtn.onclick = ()=>{
  hideFeedback();
  if(currentStage==='questions'){
    if(currentIndex < currentModule.questions.length-1){currentIndex++; renderQuestion()}
    else finishModule();
  }
};

function finishModule(){
  const today = new Date().toDateString();
  if(state.lastPlayed !== today){state.streak += 1; state.lastPlayed = today}
  state.moduleProgress[currentModule.id].completed = true;
  saveState();
  const totalQs = currentModule.questions.length;
  const acc = Math.round(100 * sessionCorrect / totalQs);
  const elapsed = Math.round((Date.now()-sessionStart)/1000);
  const mins = Math.floor(elapsed/60); const secs = elapsed%60;
  const timeStr = mins>0 ? `${mins}m ${secs}s` : `${secs}s`;
  const xpGained = sessionCorrect * 10;
  main.innerHTML = `
    <div class="results">
      <div class="results-trophy">${acc===100?'🏆':acc>=80?'🌟':acc>=60?'💪':'📖'}</div>
      <h2>Module complete!</h2>
      <p class="subtitle">${currentModule.title}</p>
      <div class="stat-grid">
        <div class="stat-card xp"><div class="stat-card-label">XP Earned</div><div class="stat-card-value">+${xpGained}</div></div>
        <div class="stat-card acc"><div class="stat-card-label">Accuracy</div><div class="stat-card-value">${acc}%</div></div>
        <div class="stat-card time"><div class="stat-card-label">Time</div><div class="stat-card-value">${timeStr}</div></div>
      </div>
      <div class="footer-actions">
        <button class="btn btn-secondary" onclick="startModule(${currentModule.id})">Replay</button>
        <button class="btn btn-primary" onclick="goNextOrHome()">${nextModuleId()?'Next module →':'Back to map'}</button>
      </div>
    </div>`;
}
function nextModuleId(){
  const idx = MODULES.findIndex(m=>m.id===currentModule.id);
  return idx<MODULES.length-1 ? MODULES[idx+1].id : null;
}
function goNextOrHome(){const n = nextModuleId(); if(n) startModule(n); else renderHome()}
function resetProgress(){
  if(confirm('Reset all progress, XP and streak? This cannot be undone.')){
    state = {...DEFAULT_STATE}; saveState(); renderHome();
  }
}

updateStatsUI();
renderHome();
</script>
</body>
</html>
