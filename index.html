    <div id="joinSqlBox" class="join-sql-box" style="display:none"></div>
  `;
  document.getElementById('normPrev').disabled = (i === 0);
  document.getElementById('normNext').disabled = (i === NORM_STAGES.length - 1);
}

/* ============ AI Mentor ============ */
let lastChallengeRun = {user:null, expected:null, error:null};
let mentor = {issues:[], issueIdx:0, hintLevel:0};

const MENTOR_RULES = [
  {id:'no-from', tag:'Syntax', title:'<code>SELECT</code> without <code>FROM</code>',
   test:s=>/\bSELECT\b/i.test(s) && !/\bFROM\b/i.test(s) && !/^\s*SELECT\s+\d+\s*(;|$)/i.test(s),
   hints:[
     'Your query has SELECT but no FROM clause. The database needs to know which table to read from.',
     'Look at the tables listed above the editor — pick the one that holds the data the prompt asks about.',
     'Add <code>FROM &lt;table_name&gt;</code> after your column list. That gives SELECT something to read.'
   ]},
  {id:'unbalanced-paren', tag:'Syntax', title:'Parentheses don\'t balance',
   test:s=>{const o=(s.match(/\(/g)||[]).length, c=(s.match(/\)/g)||[]).length; return o !== c;},
   hints:[
     'Count your parentheses — they don\'t balance.',
     'Each <code>(</code> needs a matching <code>)</code>. The usual suspects: subqueries, function calls, GROUP BY expressions, OVER() clauses.',
     'Read your query left to right. For every <code>(</code>, find its matching <code>)</code>. The unmatched one points to your bug.'
   ]},
  {id:'null-eq', tag:'NULL pitfall', title:'Comparing with NULL using <code>=</code> or <code>!=</code>',
   test:s=>/\b(WHERE|AND|OR)\s+[\w.()]+\s*(=|!=|<>)\s*NULL\b/i.test(s),
   hints:[
     'Look carefully at your WHERE clause. There\'s a comparison that will silently return zero rows.',
     'NULL means "unknown". Comparing anything to "unknown" with <code>=</code> returns "unknown" — which SQL treats as FALSE. So <code>WHERE col = NULL</code> never matches.',
     'Replace <code>= NULL</code> with <code>IS NULL</code>, and <code>!= NULL</code> with <code>IS NOT NULL</code>. These are the only operators that work around NULL.'
   ]},
  {id:'not-in-subq', tag:'NULL pitfall', title:'<code>NOT IN (SELECT …)</code> is dangerous around NULLs',
   test:s=>/\bNOT\s+IN\s*\(\s*SELECT/i.test(s),
   hints:[
     'You\'re using NOT IN with a subquery. There\'s a classic bug lurking here…',
     'If the subquery returns even one NULL, the entire NOT IN evaluates to UNKNOWN — and you get zero rows back. Three-valued logic strikes again.',
     'Switch to <code>NOT EXISTS (SELECT 1 FROM … WHERE …)</code>. Safe around NULLs, often faster, clearer intent.'
   ]},
  {id:'cross-join', tag:'Inefficient join', title:'Accidental cross join via comma',
   test:s=>/\bFROM\s+\w+(?:\s+\w+)?\s*,\s*\w+/i.test(s) && !/\bJOIN\b/i.test(s),
   hints:[
     'Look at your FROM clause. You\'ve listed multiple tables with a comma — but I don\'t see a JOIN.',
     'Comma-separated tables in FROM without a matching condition produce a Cartesian product: every row of A paired with every row of B. Often unintended and very slow.',
     'Use explicit <code>JOIN … ON …</code> syntax. It\'s clearer, and you can\'t forget the ON.'
   ]},
  {id:'limit-no-order', tag:'Anti-pattern', title:'<code>LIMIT</code> without <code>ORDER BY</code>',
   test:s=>/\bLIMIT\s+\d+/i.test(s) && !/\bORDER\s+BY\b/i.test(s),
   hints:[
     'You used LIMIT, but I don\'t see an ORDER BY. Which rows you get back depends on database mood.',
     'Without ORDER BY, "top N" isn\'t stable. Run the same query twice → potentially different rows.',
     'Add an ORDER BY clause that produces a deterministic ordering — usually the column that motivated the LIMIT in the first place.'
   ]},
  {id:'func-on-col', tag:'Optimization', title:'Function on a column in WHERE — kills index',
   test:s=>/\bWHERE\b[\s\S]*?\b(DATE|YEAR|MONTH|UPPER|LOWER|SUBSTR|CAST|TRIM)\s*\(\s*[\w.]+\s*\)\s*(=|<|>|<=|>=|<>|!=)/i.test(s),
   hints:[
     'You\'re wrapping a column in a function inside WHERE. Spot anything suspicious?',
     'When you write <code>WHERE DATE(created_at) = …</code>, the database has to compute DATE() for every row before comparing. The index on created_at can\'t help.',
     'Rewrite as a range. Instead of <code>DATE(created_at) = \'2025-05-21\'</code>, use <code>created_at &gt;= \'2025-05-21\' AND created_at &lt; \'2025-05-22\'</code>. Same result, indexes work.'
   ]},
  {id:'leading-wildcard', tag:'Optimization', title:'<code>LIKE \'%…\'</code> can\'t use indexes',
   test:s=>/\bLIKE\s+['"]%[^'"%]/i.test(s),
   hints:[
     'Your LIKE pattern starts with %. Even if there\'s an index on the column, the database can\'t use it.',
     'B-tree indexes seek by prefix. <code>LIKE \'abc%\'</code> works — the DB knows where "abc" starts. <code>LIKE \'%abc\'</code> doesn\'t — could be anywhere.',
     'If you really need contains-search at scale, look at full-text indexing (e.g. <code>MATCH() AGAINST()</code> in MySQL).'
   ]},
  {id:'select-star-join', tag:'Style', title:'<code>SELECT *</code> with a JOIN',
   test:s=>/\bSELECT\s+\*\s+FROM[\s\S]+?\bJOIN\b/i.test(s),
   hints:[
     'You\'re selecting <code>*</code> in a query with a JOIN. Usually a sign you haven\'t picked which columns you actually need.',
     'SELECT * with JOINs returns the join-key column twice, includes columns you don\'t need, and blocks covering-index optimizations.',
     'List the specific columns you need, qualified by alias (e.g. <code>c.name, o.total</code>). Cleaner SQL, faster, more interview-friendly.'
   ]},
  {id:'having-no-group', tag:'GROUP BY mistake', title:'<code>HAVING</code> without GROUP BY or aggregates',
   test:s=>/\bHAVING\b/i.test(s) && !/\bGROUP\s+BY\b/i.test(s) && !/\b(COUNT|SUM|AVG|MIN|MAX)\s*\(/i.test(s),
   hints:[
     'You have HAVING but no GROUP BY and no aggregate function. That\'s almost always a mistake.',
     'HAVING filters GROUPS after aggregation. If you\'re filtering raw rows, you want WHERE.',
     'Replace <code>HAVING</code> with <code>WHERE</code>. The query should work.'
   ]},
  {id:'agg-no-group', tag:'GROUP BY mistake', title:'Aggregate mixed with raw column, no GROUP BY',
   test:s=>{
     const m = s.match(/\bSELECT\s+([\s\S]+?)\bFROM\b/i);
     if(!m) return false;
     const proj = m[1];
     const hasAgg = /\b(COUNT|SUM|AVG|MIN|MAX)\s*\(/i.test(proj);
     // crude: count comma-separated terms and check at least one isn't fully inside an aggregate
     const terms = proj.split(',');
     const hasRaw = terms.some(t => !/\b(COUNT|SUM|AVG|MIN|MAX)\s*\(/i.test(t) && /[\w.]/.test(t) && !/^\s*\d+\s*$/.test(t));
     return hasAgg && hasRaw && !/\bGROUP\s+BY\b/i.test(s);
   },
   hints:[
     'You have an aggregate (COUNT, SUM, etc.) AND a non-aggregated column in SELECT — but no GROUP BY.',
     'The database doesn\'t know whether you want ONE row (with one aggregate) or one row per category. It needs a GROUP BY.',
     'Every non-aggregate column in SELECT must appear in GROUP BY. Decide what you\'re grouping by, then add it.'
   ]}
];

function analyzeSql(sql){
  if(!sql || !sql.trim()) return [];
  return MENTOR_RULES.filter(r => { try{return r.test(sql);}catch(e){return false;} });
}

function diffAnalysis(user, expected){
  if(!user || !expected) return null;
  if(user.rows.length === 0 && expected.rows.length > 0){
    return {id:'diff-empty', tag:'Wrong result', title:'Your query returned 0 rows — expected has data',
      hints:[
        `Expected ${expected.rows.length} row(s); you got 0. Most common cause: your WHERE clause is too restrictive.`,
        'Common culprits: comparing strings to numbers, using AND where OR was meant, or filtering on a value that doesn\'t exist in the data.',
        'Strip your WHERE clause and rerun. If rows come back, add conditions one at a time to find which one is killing everything.'
      ]};
  }
  if(expected.rows.length > 0 && user.rows.length > expected.rows.length * 1.5){
    return {id:'diff-many', tag:'Too many rows', title:`You returned ${user.rows.length} rows; expected ${expected.rows.length}`,
      hints:[
        'Too many rows usually means a JOIN without a proper ON clause, a missing GROUP BY, or UNION ALL when UNION was meant.',
        'Cartesian joins explode row counts. Check each JOIN — does it have a matching ON condition that uniquely connects rows?',
        'Ask yourself: "What does ONE row in the expected output represent?" Then verify your query produces ONE row per that thing.'
      ]};
  }
  if(user.cols.length !== expected.cols.length){
    return {id:'diff-cols', tag:'Wrong columns', title:`Wrong number of columns (you: ${user.cols.length}, expected: ${expected.cols.length})`,
      hints:[
        'Re-read the prompt. It usually states exactly which columns to return.',
        'If you used <code>SELECT *</code>, you may have too many. If you listed columns by hand, you may be missing some.',
        'List the columns the prompt asks for, in order. Aliases don\'t affect count — but extras or omissions do.'
      ]};
  }
  if(user.rows.length === expected.rows.length){
    return {id:'diff-values', tag:'Wrong values', title:'Right shape, but the values differ',
      hints:[
        'Same row count and column count — but the values aren\'t matching. Likely a JOIN, filter, or computation issue.',
        'Compare your output to expected side by side. Where do they first differ? That\'s where to look.',
        'If aggregates differ, recheck GROUP BY. If specific values look wrong, check your JOIN keys (joining on the wrong column?) or computations.'
      ]};
  }
  return null;
}

function lev(a, b){
  if(a === b) return 0;
  const m = a.length, n = b.length;
  if(m === 0) return n;
  if(n === 0) return m;
  const dp = Array(n+1).fill(0).map((_,i) => i);
  for(let i = 1; i <= m; i++){
    let prev = dp[0]; dp[0] = i;
    for(let j = 1; j <= n; j++){
      const tmp = dp[j];
      dp[j] = a[i-1] === b[j-1] ? prev : 1 + Math.min(prev, dp[j-1], dp[j]);
      prev = tmp;
    }
  }
  return dp[n];
}
function closestKeyword(input, list){
  let best = null;
  for(const word of list){
    const d = lev(input, word);
    const ml = Math.max(input.length, word.length);
    const score = ml === 0 ? 0 : 1 - d/ml;
    if(!best || score > best.score) best = {word, score, d};
  }
  return best;
}

function parseExecError(msg, sql){
  if(!msg) return [];
  // Our own validation
  if(/empty query|type something first/i.test(msg)){
    return [{tag:'Empty query', title:'Your editor is empty',
      hints:[
        'Nothing to analyze yet — the editor is empty.',
        'Click <b>↺ Reset</b> to bring back the starter code, which gives you a skeleton to fill in.',
        'Type at least <code>SELECT … FROM …</code> to get started.'
      ]}];
  }
  if(/only runs SELECT|only allows SELECT/i.test(msg)){
    return [{tag:'Statement type', title:'Playground only runs SELECT statements',
      hints:[
        'This sandbox only allows SELECT (and WITH … SELECT). INSERT / UPDATE / DELETE / DDL are blocked.',
        'If the prompt mentions modifying data, you can usually express it as a SELECT that returns what the modified state would look like.',
        'Start your query with <code>SELECT</code> or <code>WITH … SELECT</code>.'
      ]}];
  }
  // near "X": syntax error
  const near = msg.match(/near\s+"([^"]+)":\s*syntax error/i);
  if(near){
    const token = near[1];
    const KW = ['SELECT','FROM','WHERE','GROUP','HAVING','ORDER','LIMIT','OFFSET','JOIN','INNER','LEFT','RIGHT','OUTER','CROSS','ON','AS','AND','OR','NOT','IN','LIKE','BETWEEN','IS','NULL','DISTINCT','UNION','ALL','EXISTS','CASE','WHEN','THEN','ELSE','END','WITH','OVER','PARTITION','BY','DESC','ASC','VALUES'];
    const upper = token.toUpperCase();
    if(/^[a-zA-Z]+$/.test(token) && !KW.includes(upper)){
      const close = closestKeyword(upper, KW);
      if(close && close.score >= 0.6 && close.d <= 2){
        return [{tag:'Misspelled keyword', title:`<code>${esc(token)}</code> looks like a typo`,
          hints:[
            `The parser stopped at <code>${esc(token)}</code> — that\'s not a SQL keyword or anything recognized there.`,
            `It looks very close to <code>${close.word}</code> — a common typo (letters swapped or one missing).`,
            `Replace <code>${esc(token)}</code> with <code>${close.word}</code> and rerun.`
          ]}];
      }
    }
    if(token === ')' || token === '('){
      return [{tag:'Parentheses issue', title:`Unexpected <code>${esc(token)}</code>`,
        hints:[
          `SQL choked on an unmatched <code>${esc(token)}</code>. Almost certainly a paren imbalance.`,
          `Count your <code>(</code> and <code>)</code> — they must match. Subqueries, function calls, and <code>OVER()</code> each need their own pair.`,
          `Read left to right. Match each opening paren with a closing one. The unpaired one is your bug.`
        ]}];
    }
    if(token === ',' || token === ';'){
      return [{tag:'Unexpected punctuation', title:`Unexpected <code>${esc(token)}</code>`,
        hints:[
          `SQL didn\'t expect a <code>${esc(token)}</code> there.`,
          `Common causes: trailing comma at the end of SELECT, a stray semicolon mid-statement, or a comma where a keyword belongs.`,
          `Remove the extra punctuation, or add what was supposed to come before/after it.`
        ]}];
    }
    if(/^['"]/.test(token)){
      return [{tag:'String/quote issue', title:`Quote problem near <code>${esc(token)}</code>`,
        hints:[
          `SQL hit a quoted value that doesn\'t parse cleanly.`,
          `Common causes: unterminated string (missing closing quote), smart quotes from copy-paste, or mixing <code>"</code> and <code>\'</code>.`,
          `In SQL, string literals use straight single quotes: <code>\'hello\'</code>. Double quotes mean an identifier.`
        ]}];
    }
    return [{tag:'Syntax error', title:`Syntax error near <code>${esc(token)}</code>`,
      hints:[
        `The parser stopped right before <code>${esc(token)}</code>. Whatever it saw just BEFORE this point doesn\'t make sense to SQL.`,
        `Most common causes: missing comma between columns, missing keyword (FROM, AS, ON), a clause out of order, or stray punctuation.`,
        `Focus on the 3–5 words just BEFORE <code>${esc(token)}</code>. That\'s where the bug lives ~90% of the time.`
      ]}];
  }
  // no such table
  const noTable = msg.match(/no such table:?\s*([\w.]+)/i);
  if(noTable){
    return [{tag:'Unknown table', title:`Table <code>${esc(noTable[1])}</code> doesn\'t exist`,
      hints:[
        `SQL can\'t find a table called <code>${esc(noTable[1])}</code>. Either misspelled, or it\'s not part of this challenge.`,
        `Scroll up — the tables you CAN query are listed above the editor. Check spelling, plural vs singular, underscores.`,
        `Pick the right table from the visible list and update your FROM/JOIN to match.`
      ]}];
  }
  // no such column
  const noCol = msg.match(/no such column:?\s*([\w.]+)/i);
  if(noCol){
    const c = noCol[1];
    const qualified = c.includes('.');
    return [{tag:'Unknown column', title:`Column <code>${esc(c)}</code> doesn\'t exist`,
      hints:[
        `SQL can\'t find <code>${esc(c)}</code> in the tables your query reads from.`,
        qualified
          ? `You qualified it with an alias. Either the alias is wrong, or that table doesn\'t have this column. Check the columns above.`
          : `Maybe a typo, OR the column is in a table you haven\'t JOINed yet. SQL only sees columns from tables in FROM/JOIN.`,
        `Fix the spelling, add the missing JOIN, or qualify the column with the right table alias.`
      ]}];
  }
  // ambiguous column
  const ambig = msg.match(/ambiguous column name:?\s*([\w.]+)/i);
  if(ambig){
    return [{tag:'Ambiguous column', title:`<code>${esc(ambig[1])}</code> exists in multiple joined tables`,
      hints:[
        `Two of your joined tables both have a column called <code>${esc(ambig[1])}</code>. SQL doesn\'t know which one you want.`,
        `Alias your tables (e.g. <code>FROM customers c JOIN orders o</code>) and qualify the column: <code>c.${esc(ambig[1])}</code> or <code>o.${esc(ambig[1])}</code>.`,
        `Decide which table\'s <code>${esc(ambig[1])}</code> the query needs. Prefix every reference with that alias.`
      ]}];
  }
  // misuse of aggregate
  if(/misuse of aggregate/i.test(msg)){
    return [{tag:'Aggregate misuse', title:'Aggregate function used in the wrong place',
      hints:[
        'You\'re using COUNT/SUM/AVG/MIN/MAX somewhere it isn\'t allowed — usually inside WHERE.',
        'WHERE runs row-by-row, BEFORE any aggregation. Aggregates only exist AFTER grouping.',
        'Fix: filter aggregates with <code>HAVING</code> after a <code>GROUP BY</code> — or wrap the aggregate in a subquery.'
      ]}];
  }
  // incomplete input
  if(/incomplete input/i.test(msg)){
    return [{tag:'Incomplete query', title:'Your query is incomplete',
      hints:[
        'SQL ran out of input before the query was finished — something is left dangling.',
        'Common culprits: missing closing <code>)</code>, missing <code>END</code> on a CASE, a WHERE/ON clause that just stops mid-air, or no FROM after SELECT.',
        'Read top to bottom. Find the last token — what\'s supposed to come right after it? Add it.'
      ]}];
  }
  // unrecognized token
  const utok = msg.match(/unrecognized token:?\s*"?([^"\n]+?)"?\s*$/i);
  if(utok){
    return [{tag:'Unrecognized token', title:`Unrecognized token: <code>${esc(utok[1])}</code>`,
      hints:[
        `SQL doesn\'t know what to do with <code>${esc(utok[1])}</code>. Usually a stray character or wrong quote style.`,
        'Common causes: smart/curly quotes (&ldquo; &rdquo;) from copy-paste, backticks (`) where SQL wants normal quotes, or an invisible character.',
        'Replace with straight quotes (<code>\'</code> for strings, <code>"</code> for identifiers). Retype the line if you\'re unsure.'
      ]}];
  }
  // wrong number of arguments
  const wargs = msg.match(/wrong number of arguments to function ([\w.]+)/i);
  if(wargs){
    return [{tag:'Function arg count', title:`<code>${esc(wargs[1])}</code> got the wrong number of arguments`,
      hints:[
        `The function <code>${esc(wargs[1])}</code> doesn\'t accept the number of args you passed.`,
        'Common slips: an extra comma inside the parens, or missing arg. <code>DATE_FORMAT(col, fmt)</code> needs 2; <code>COUNT(col)</code> needs 1.',
        'Look up the function\'s signature, and match your call to it exactly.'
      ]}];
  }
  // GROUP BY required pattern
  if(/aggregate.*GROUP BY|GROUP BY.*required/i.test(msg)){
    return [{tag:'GROUP BY mistake', title:'Aggregate without proper GROUP BY',
      hints:[
        'You mixed aggregates with non-aggregated columns. SQL needs to know how to group rows.',
        'Every column in SELECT that isn\'t inside an aggregate must appear in GROUP BY.',
        'Decide what you\'re grouping by, then add <code>GROUP BY column</code>.'
      ]}];
  }
  // Generic fallback — still helpful
  return [{tag:'Query error', title:'SQL engine raised an error',
    hints:[
      `The engine said: <code>${esc(msg)}</code>`,
      'Read the error left to right. Phrases like "near X" or "no such Y" point right at the problem token.',
      'Stuck? Simplify: comment out clauses one by one. When the error vanishes, the clause you just removed had the bug.'
    ]}];
}

function askMentor(src){
  const editor = document.getElementById('sqlEditor');
  const sql = editor ? editor.value : '';
  let lastRun = null;
  if(src === 'playground') lastRun = lastChallengeRun;
  else if(src === 'interview' && iv) lastRun = iv.lastRun;
  let issues = [];
  // 1. Runtime/parser error first (highest priority)
  if(lastRun && lastRun.error){
    issues = issues.concat(parseExecError(lastRun.error, sql));
  }
  // 2. Static anti-pattern analysis
  issues = issues.concat(analyzeSql(sql));
  // 3. Diff analysis (only if there was a successful run with both results)
  if(lastRun && !lastRun.error && lastRun.user && lastRun.expected){
    const d = diffAnalysis(lastRun.user, lastRun.expected);
    if(d) issues.push(d);
  }
  mentor = {issues, issueIdx:0, hintLevel:0};
  renderMentorPanel();
  const panel = document.getElementById('mentorPanel');
  if(panel) panel.scrollIntoView({behavior:'smooth', block:'center'});
}

function renderMentorPanel(){
  const panel = document.getElementById('mentorPanel');
  if(!panel) return;
  if(mentor.issues.length === 0){
    panel.innerHTML = `
      <div class="mentor-card">
        <div class="mentor-header">
          <div class="mentor-avatar" aria-hidden="true">🧠</div>
          <div class="mentor-info">
            <div class="mentor-name">SQL Mentor</div>
            <div class="mentor-tag">Looks clean</div>
          </div>
          <button class="mentor-close" onclick="closeMentor()" aria-label="Close mentor">×</button>
        </div>
        <div class="mentor-encouragement">Your query looks structurally clean — no obvious anti-patterns or NULL traps I can see. Hit <b>Run Query</b> to see what comes back, then come ask me again if the result isn\'t what you expected!</div>
      </div>
    `;
    return;
  }
  const issue = mentor.issues[mentor.issueIdx];
  const total = mentor.issues.length;
  const lastHint = mentor.hintLevel >= issue.hints.length - 1;
  const moreIssues = mentor.issueIdx < total - 1;
  panel.innerHTML = `
    <div class="mentor-card">
      <div class="mentor-header">
        <div class="mentor-avatar" aria-hidden="true">🧠</div>
        <div class="mentor-info">
          <div class="mentor-name">SQL Mentor${total>1?` · Issue ${mentor.issueIdx+1} of ${total}`:''}</div>
          <div class="mentor-tag">${issue.tag}</div>
        </div>
        <button class="mentor-close" onclick="closeMentor()" aria-label="Close mentor">×</button>
      </div>
      <div class="mentor-title">${issue.title}</div>
      <div class="mentor-hint">${issue.hints[mentor.hintLevel]}</div>
      <div class="mentor-progress">Hint ${mentor.hintLevel+1} of ${issue.hints.length}${lastHint ? ' · last one!' : ''}</div>
      <div class="mentor-actions">
        ${!lastHint ? '<button class="btn btn-mentor" onclick="moreMentorHint()">Tell me more →</button>' : ''}
        ${lastHint && moreIssues ? '<button class="btn btn-mentor" onclick="nextMentorIssue()">Next issue →</button>' : ''}
        ${lastHint && !moreIssues ? '<button class="btn btn-primary" onclick="closeMentor()">Got it — let me try</button>' : '<button class="btn btn-ghost" onclick="closeMentor()" style="padding:8px 12px;font-size:12.5px">Close</button>'}
      </div>
    </div>
  `;
}

function moreMentorHint(){
  const issue = mentor.issues[mentor.issueIdx];
  if(!issue) return;
  if(mentor.hintLevel < issue.hints.length - 1){
    mentor.hintLevel++;
    renderMentorPanel();
  }
}
function nextMentorIssue(){
  if(mentor.issueIdx < mentor.issues.length - 1){
    mentor.issueIdx++;
    mentor.hintLevel = 0;
    renderMentorPanel();
  }
}
function closeMentor(){
  const panel = document.getElementById('mentorPanel');
  if(panel) panel.innerHTML = '';
  mentor = {issues:[], issueIdx:0, hintLevel:0};
}

const CONCEPTS = [
  {id:'joins', name:'JOINs', icon:'🔗'},
  {id:'aggregates', name:'Aggregates & GROUP BY', icon:'∑'},
  {id:'subqueries', name:'Subqueries', icon:'🔂'},

  {id:'indexing', name:'Indexing & optimization', icon:'🗃️'},
  {id:'transactions', name:'Transactions & locks', icon:'⚙️'}
];

const CONCEPT_TAG_MAP = {
  'join':'joins','joins':'joins','self-join':'joins','star schema':'joins','multi-join':'joins','anti-join':'joins','left join':'joins','inner join':'joins',
  'aggregation':'aggregates','aggregate':'aggregates','aggregates':'aggregates','group-by':'aggregates','having':'aggregates','group by':'aggregates',
  'subquery':'subqueries','subqueries':'subqueries','correlated':'subqueries','exists':'subqueries','point-in-time':'subqueries','scd':'subqueries','incremental refresh':'subqueries','materialized view':'subqueries',
  'cte':'ctes','ctes':'ctes','with':'ctes','recursive':'ctes',
  'window':'window-functions','window function':'window-functions','window-functions':'window-functions','rank':'window-functions','row_number':'window-functions','top-n-per-group':'window-functions','running total':'window-functions','partition by':'window-functions',
  'index':'indexing','indexing':'indexing','explain':'indexing','composite':'indexing','covering':'indexing','optimization':'indexing','partitioning':'indexing',
  'transaction':'transactions','transactions':'transactions','isolation':'transactions','lock':'transactions','locks':'transactions','deadlock':'transactions','concurrency':'transactions','replication':'transactions'
};

function adTodayKey(){const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

function tagsToConcepts(tags){
  if(!tags || !tags.length) return [];
  const set = new Set();
  for(const t of tags){
    const lt = String(t).toLowerCase();
    if(CONCEPT_TAG_MAP[lt]){ set.add(CONCEPT_TAG_MAP[lt]); continue; }
    for(const [key, cid] of Object.entries(CONCEPT_TAG_MAP)){
      if(lt.includes(key)){ set.add(cid); break; }
    }
  }
  return Array.from(set);
}

function moduleToConcepts(mod){
  if(!mod) return [];
  const text = ((mod.title||'') + ' ' + (mod.description||'')).toLowerCase();
  const out = new Set();
  if(/\bjoin/.test(text)) out.add('joins');
  if(/aggregat|group by|having/.test(text)) out.add('aggregates');
  if(/subquer/.test(text)) out.add('subqueries');
  if(/\bcte|common table|\bwith\b/.test(text)) out.add('ctes');
  if(/window/.test(text)) out.add('window-functions');
  if(/index|explain|optim/.test(text)) out.add('indexing');
  if(/transac|isolation|\block|deadlock|concurren|replication/.test(text)) out.add('transactions');
  return Array.from(out);
}

function recordConcept(concepts, correct){
  if(!concepts || !concepts.length) return;
  if(!state.concepts) state.concepts = {};
  for(const c of concepts){
    if(!state.concepts[c]) state.concepts[c] = {seen:0, correct:0, ease:2.5, dueAt:0, lastSeen:0, interval:1};
    const cs = state.concepts[c];
    cs.seen += 1;
    if(correct) cs.correct += 1;
    cs.lastSeen = Date.now();
    if(correct){
      cs.ease = Math.min(3.0, (cs.ease||2.5) + 0.05);
      cs.interval = Math.max(1, Math.round((cs.interval||1) * cs.ease));
    } else {
      cs.ease = Math.max(1.3, (cs.ease||2.5) - 0.2);
      cs.interval = 1;
    }
    cs.dueAt = Date.now() + cs.interval * 86400000;
  }
}

function recordQuestionSrs(qid, correct){
  if(!qid) return;
  if(!state.questionSrs) state.questionSrs = {};
  let srs = state.questionSrs[qid] || {ease:2.5, interval:1, reps:0, lapses:0, dueAt:0};
  srs.reps += 1;
  if(correct){
    srs.ease = Math.min(3.0, srs.ease + 0.1);
    if(srs.reps === 1) srs.interval = 1;
    else if(srs.reps === 2) srs.interval = 4;
    else srs.interval = Math.max(1, Math.round(srs.interval * srs.ease));
  } else {
    srs.lapses += 1;
    srs.ease = Math.max(1.3, srs.ease - 0.25);
    srs.interval = 1;
    srs.reps = 0;
  }
  srs.dueAt = Date.now() + srs.interval * 86400000;
  state.questionSrs[qid] = srs;
}

function bumpDailyGoal(){
  const today = adTodayKey();
  if(!state.dailyProgress || state.dailyProgress.date !== today){
    state.dailyProgress = {date: today, completed: 0};
  }
  state.dailyProgress.completed += 1;
}

function getDailyProgress(){
  const today = adTodayKey();
  const goal = state.dailyGoal || 10;
  if(!state.dailyProgress || state.dailyProgress.date !== today){
    return {completed: 0, goal};
  }
  return {completed: state.dailyProgress.completed, goal};
}

function tickStreak(){
  const today = new Date().toDateString();
  if(state.lastPlayed === today) return;
  state.streak = (state.streak || 0) + 1;
  state.lastPlayed = today;
  state.streakFrozeRecently = false;
  // Award a freeze at every 7-day milestone (max 3)
  if(state.streak > 0 && state.streak % 7 === 0 && state.streak !== (state.lastFreezeMilestone||0)){
    state.freezesAvailable = Math.min((state.freezesAvailable || 0) + 1, 3);
    state.lastFreezeMilestone = state.streak;
  }
}

function getDueReviewQuestions(){
  const now = Date.now();
  const due = [];
  if(!state.questionSrs) return due;
  for(const q of INTERVIEW_QUESTIONS){
    const srs = state.questionSrs[q.id];
    if(srs && srs.dueAt && srs.dueAt <= now) due.push(q);
  }
  return due;
}

function getWeakConcepts(threshold=0.7, minSeen=3){
  if(!state.concepts) return [];
  const arr = [];
  for(const c of CONCEPTS){
    const cs = state.concepts[c.id];
    if(cs && cs.seen >= minSeen){
      const acc = cs.correct / cs.seen;
      if(acc < threshold) arr.push({...c, accuracy: acc, seen: cs.seen, correct: cs.correct});
    }
  }
  return arr.sort((a,b) => a.accuracy - b.accuracy);
}

function getUntouchedConcepts(){
  return CONCEPTS.filter(c => {
    const cs = state.concepts && state.concepts[c.id];
    return !cs || cs.seen < 2;
  });
}

function getRecommendation(){
  const weak = getWeakConcepts();
  if(weak.length > 0) return {type:'weak', concept: weak[0]};
  const untouched = getUntouchedConcepts();
  if(untouched.length > 0) return {type:'untouched', concept: untouched[0]};
  return null;
}

function findModulesForConcept(conceptId){
  return M.filter(m => moduleToConcepts(m).includes(conceptId));
}

function startConceptPractice(conceptId){
  const mods = findModulesForConcept(conceptId);
  if(mods.length > 0) startModule(mods[0].id);
  else renderConceptStats();
}

function renderAdaptivePanels(){
  const prog = getDailyProgress();
  const pct = Math.min(100, Math.round(prog.completed / Math.max(1, prog.goal) * 100));
  const complete = prog.completed >= prog.goal;

  let statusMsg;

  else if(prog.completed === 0) statusMsg = `${prog.goal} correct answers today and your streak grows. Let's go.`;
  else statusMsg = `${remaining} more correct answer${remaining===1?'':'s'} to hit today's goal.`;
  const freezeLine = state.freezesAvailable > 0 ? ` · ❄️ ${state.freezesAvailable} streak freeze${state.freezesAvailable===1?'':'s'} banked` : '';
  const frozeLine = state.streakFrozeRecently ? '<span class="dg-freeze">❄️ STREAK SAVED</span>' : '';
  const goalHtml = `
    <button class="daily-goal-card" onclick="renderConceptStats()" aria-label="View concept mastery stats">
      <div class="dg-header">
        <div class="dg-title">🎯 Today's goal ${frozeLine}</div>
        <div class="dg-count">${prog.completed} / ${prog.goal}</div>
      </div>
      <div class="dg-bar-bg"><div class="dg-bar-fill ${complete?'complete':''}" style="width:${pct}%"></div></div>
      <div class="dg-status">${statusMsg}${freezeLine}</div>
    </button>
  `;
  const due = getDueReviewQuestions();
  const reviewHtml = due.length > 0 ? `
    <button class="review-card" onclick="launchReview()" aria-label="Start review session">
      <div class="review-icon" aria-hidden="true">🔄</div>
      <div class="review-info">
        <h4>Review session ready</h4>
        <p>Spaced-repetition — lock in what you've practiced.</p>
      </div>
      <div class="review-badge">${due.length} DUE</div>
    </button>
  ` : '';
  const rec = getRecommendation();
  let recHtml = '';
  if(rec && rec.type === 'weak'){
    const acc = Math.round(rec.concept.accuracy * 100);
    recHtml = `
      <button class="rec-card" onclick="startConceptPractice('${rec.concept.id}')" aria-label="Practice ${esc(rec.concept.name)}">
        <div class="rec-icon" aria-hidden="true">${rec.concept.icon}</div>
        <div class="rec-body">
          <h4>Practice ${esc(rec.concept.name)}</h4>
          <p>Your weakest topic — ${acc}% accuracy across ${rec.concept.seen} ${rec.concept.seen===1?'try':'tries'}. Let's drill it.</p>
        </div>
        <div class="rec-arrow" aria-hidden="true">›</div>
      </button>
    `;
  } else if(rec && rec.type === 'untouched' && (state.concepts && Object.keys(state.concepts).length > 0)){
    recHtml = `
      <button class="rec-card" onclick="startConceptPractice('${rec.concept.id}')" aria-label="Try ${esc(rec.concept.name)}">
        <div class="rec-icon" aria-hidden="true">${rec.concept.icon}</div>
        <div class="rec-body">
          <h4>Try ${esc(rec.concept.name)}</h4>
          <p>You haven't practiced this concept yet — new territory to cover.</p>
        </div>
        <div class="rec-arrow" aria-hidden="true">›</div>
      </button>
    `;
  }
  return goalHtml + reviewHtml + recHtml;
}

function renderConceptStats(){
  hideFeedback();
  const concepts = state.concepts || {};
  const items = CONCEPTS.map(c => {
    const cs = concepts[c.id] || {seen:0, correct:0};
    const acc = cs.seen ? Math.round((cs.correct/cs.seen)*100) : null;
    const cls = acc === null ? '' : acc >= 80 ? 'strong' : acc < 60 ? 'weak' : '';
    const mods = findModulesForConcept(c.id);
    const modBtns = mods.slice(0,3).map(m => `<button class="rec-btn" onclick="startModule(${m.id})">${m.icon} ${esc(m.title)}</button>`).join('');
    const srsHint = cs.dueAt && cs.dueAt > Date.now() ? ` · next review in ${Math.ceil((cs.dueAt - Date.now())/86400000)}d` : '';
    return `
      <div class="concept-row ${cls}">
        <div class="cr-icon" aria-hidden="true">${c.icon}</div>
        <div class="cr-info">
          <div class="cr-name">${esc(c.name)}</div>
          <div class="cr-bar-bg"><div class="cr-bar-fill" style="width:${acc||0}%"></div></div>
        </div>
        <div class="cr-stat">
          <div class="cr-acc">${acc !== null ? acc + '%' : '–'}</div>
          <div class="cr-seen">${cs.seen} ${cs.seen===1?'try':'tries'}${srsHint}</div>
        </div>
      </div>
      ${modBtns ? `<div class="rec-buttons" style="margin:-2px 0 6px 48px">${modBtns}</div>` : ''}
    `;
  }).join('');
  const due = getDueReviewQuestions();
  const reviewBlock = due.length > 0 ? `
    <button class="review-card" onclick="launchReview()" style="margin-top:14px">
      <div class="review-icon" aria-hidden="true">🔄</div>
      <div class="review-info">
        <h4>Review session ready</h4>
        <p>${due.length} interview question${due.length===1?'':'s'} due based on spaced repetition.</p>
      </div>
      <div class="review-badge">${due.length} DUE</div>
    </button>
  ` : '';
  const prog = getDailyProgress();
  const totalAttempts = Object.values(concepts).reduce((a,c) => a + (c.seen||0), 0);
  const totalCorrect = Object.values(concepts).reduce((a,c) => a + (c.correct||0), 0);
  const overall = totalAttempts ? Math.round(totalCorrect/totalAttempts*100) : null;
  main.innerHTML = `
    <div class="lesson-header">
      <button class="close-btn" onclick="renderHome()" aria-label="Back">×</button>
      <div style="flex:1;font-weight:800;font-size:14px;color:var(--muted)">Concept mastery</div>
    </div>
    <article class="card card-concept">
      <span class="card-badge b-concept">📊 Adaptive stats</span>
      <h2>Your concept mastery</h2>
      <p>Accuracy per concept across every question you've answered. Concepts below 60% (red) get prioritized in recommendations. Each concept also has a spaced-repetition review schedule.</p>
      <div style="display:flex;gap:14px;margin:14px 0;font-size:13px;font-weight:700;color:var(--muted);flex-wrap:wrap">
        <div>Overall accuracy: <b style="color:var(--ink);font-size:15px">${overall !== null ? overall + '%' : '–'}</b></div>
        <div>Total attempts: <b style="color:var(--ink);font-size:15px">${totalAttempts}</b></div>
        <div>Today: <b style="color:var(--ink);font-size:15px">${prog.completed}/${prog.goal}</b></div>
        <div>Streak: <b style="color:var(--ink);font-size:15px">${state.streak||0}🔥</b></div>
        <div>Freezes: <b style="color:var(--ink);font-size:15px">${state.freezesAvailable||0}❄️</b></div>
      </div>
      <div class="concept-rows">${items}</div>
      ${reviewBlock}
    </article>
    <div class="footer-actions" style="margin-top:18px">
      <button class="btn btn-primary" onclick="renderHome()">Done</button>
    </div>
  `;
}

async function launchReview(){
  let due = getDueReviewQuestions();
  if(due.length === 0){
    // No SRS-due questions: fall back to weakest concept
    const weak = getWeakConcepts();
    if(weak.length > 0){
      const pool = INTERVIEW_QUESTIONS.filter(q => tagsToConcepts(q.tags || []).includes(weak[0].id));
      if(pool.length > 0){
        due = pool.sort(() => Math.random() - 0.5).slice(0, 5);
      }
    }
    if(due.length === 0){
      alert('No reviews due yet! Complete a few interview questions first, then come back here.');
      return;
    }
  }
  hideFeedback();
  main.innerHTML = `<div class="pg-loading"><span class="spin">⟳</span>Loading SQL engine</div>`;
  try{ await ensureSql(); }catch(e){
    main.innerHTML = `<article class="card card-pitfall"><span class="card-badge b-pitfall">⚠ Engine error</span><h2>Couldn't load engine</h2><div class="error-block">${esc(e.message||String(e))}</div><div class="footer-actions"><button class="btn btn-secondary" onclick="renderHome()">Back</button></div></article>`;
    return;
  }
  const questions = due.slice(0, 10);
  const durationMin = Math.max(5, questions.length * 2);
  iv = {
    difficulty: 'medium',
    durationMs: durationMin * 60000,
    startTime: Date.now(),
    endTime: Date.now() + durationMin * 60000,
    questions: questions,
    idx: 0,
    score: 0,
    db: null,
    timerId: null,
    qStart: 0,
    qHints: 0,
    qAttempts: 0,
    qStarter: '',
    results: [],
    reviewMode: true,
    lastRun: {user:null, expected:null, error:null}
  };
  startIvQuestion();
}

/* ============ Boot ============ */
updateStatsUI();
renderHome();
window.addEventListener('keydown', e => {
  if(e.key === 'Escape'){
    if($('#modalContainer').innerHTML) closeGlossary();
  }
});
</script>
</body>
</html>
