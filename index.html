<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SQLingo — Learn MySQL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f7f2; --card:#fff; --ink:#1f1f1f; --ink2:#2b2b2b;
  --muted:#525252; --line:#e0e0d8;
  --green:#58cc02; --green-sh:#46a302;
  --orange:#ff9600; --orange-sh:#c77400;
  --blue:#1cb0f6; --blue-sh:#0a8ac9;
  --red:#ef4444; --red-sh:#b91c1c;
  --purple:#a855f7; --purple-sh:#7e22ce;
  --gold:#f59e0b; --gold-sh:#b45309;
  --teal:#0ea5e9;
  --code-bg:#1e1e2e; --code-tx:#cdd6f4;
  --code-k:#f5c2e7; --code-s:#a6e3a1; --code-n:#fab387; --code-c:#7f849c;
  --tbl-h:#ebebe2; --tbl-alt:#fafaf5;
  --focus:#1cb0f6;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Nunito',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;line-height:inherit}
button:focus-visible,input:focus-visible,[tabindex]:focus-visible{outline:3px solid var(--focus);outline-offset:2px;border-radius:6px}
code,pre{font-family:'JetBrains Mono',ui-monospace,monospace}

#app{min-height:100vh;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:50;background:var(--card);border-bottom:2px solid var(--line);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{font-weight:900;font-size:22px;letter-spacing:-0.5px;display:flex;align-items:center;gap:8px}
.logo-mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--green),var(--blue));display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;box-shadow:0 3px 0 var(--green-sh)}
.stats{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:6px;font-weight:800;font-size:15px}
.stat-icon{font-size:18px;line-height:1}
.streak{color:var(--orange)}.xp{color:var(--gold)}
.icon-btn{padding:6px 10px;border-radius:10px;font-size:18px;background:transparent}
.icon-btn:hover{background:#eee}

main{flex:1;padding:20px 14px 80px;max-width:880px;margin:0 auto;width:100%}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 22px;border-radius:14px;font-weight:800;font-size:15px;transition:transform .08s,box-shadow .08s;min-height:44px;user-select:none}
.btn:active{transform:translateY(2px)}
.btn-primary{background:var(--green);color:#fff;box-shadow:0 4px 0 var(--green-sh)}
.btn-primary:active{box-shadow:0 2px 0 var(--green-sh)}
.btn-primary:disabled{background:#d4d4d4;color:#888;box-shadow:0 4px 0 #b0b0b0;cursor:not-allowed}
.btn-secondary{background:#fff;color:var(--muted);box-shadow:0 4px 0 var(--line);border:2px solid var(--line)}
.btn-secondary:active{box-shadow:0 2px 0 var(--line)}
.btn-ghost{background:transparent;color:var(--muted);font-weight:700;box-shadow:none}
.btn-ghost:hover{background:#eee}

.hero{text-align:center;padding:18px 0 22px}
.hero h1{font-size:32px;font-weight:900;letter-spacing:-0.7px;line-height:1.15}
.hero p{color:var(--muted);font-size:16px;font-weight:600;margin-top:8px;max-width:560px;margin-left:auto;margin-right:auto}

.banner{background:linear-gradient(135deg,#fff5e1,#ffe9c4);border:2px solid #ffd17a;border-radius:18px;padding:14px 18px;margin:0 auto 22px;max-width:680px;display:flex;gap:14px;align-items:flex-start}
.banner-icon{font-size:24px;line-height:1;flex-shrink:0}
.banner-text{font-size:14px;font-weight:600;color:#7a5a10;line-height:1.5}
.banner-text strong{color:#4a3700}

.featured{background:linear-gradient(135deg,#ef4444,#ff9600);color:#fff;border-radius:20px;padding:22px;margin-bottom:24px;display:flex;gap:18px;align-items:center;flex-wrap:wrap;box-shadow:0 6px 0 #b91c1c}
.featured-icon{font-size:38px;flex-shrink:0;filter:drop-shadow(0 2px 0 rgba(0,0,0,.15))}
.featured-content{flex:1;min-width:200px}
.featured h2{font-size:20px;font-weight:900;letter-spacing:-.3px}
.featured p{font-size:13.5px;font-weight:600;opacity:.95;line-height:1.5;margin-top:2px}
.featured-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.featured-btn{background:#fff;color:#b91c1c;padding:9px 16px;border-radius:12px;font-weight:900;font-size:13px;box-shadow:0 3px 0 rgba(0,0,0,.2);min-height:40px}
.featured-btn:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.2)}

.section-heading{font-size:19px;font-weight:900;letter-spacing:-.3px;margin:22px 0 6px;display:flex;gap:8px;align-items:center}
.section-sub{color:var(--muted);font-weight:700;font-size:13px;margin-bottom:12px}

.map{display:flex;flex-direction:column;gap:12px}
.module-card{background:var(--card);border:2px solid var(--line);border-radius:18px;padding:16px;display:grid;grid-template-columns:54px 1fr auto;gap:14px;align-items:center;cursor:pointer;text-align:left;width:100%;transition:transform .1s,box-shadow .1s,border-color .1s;box-shadow:0 4px 0 var(--line)}
.module-card:hover{transform:translateY(-2px);box-shadow:0 6px 0 var(--line);border-color:var(--green)}
.module-card.completed{border-color:var(--green);background:linear-gradient(135deg,#fff,#f3fae6)}
.module-icon{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;box-shadow:inset 0 -4px 0 rgba(0,0,0,.15)}
.module-meta h3{font-size:17px;font-weight:900;letter-spacing:-.2px;line-height:1.25}
.module-meta .desc{font-size:13px;color:var(--muted);font-weight:600;margin-top:3px;line-height:1.45}
.diff{display:inline-block;margin-top:7px;padding:3px 10px;border-radius:10px;font-size:10.5px;font-weight:800;letter-spacing:.6px;text-transform:uppercase}
.diff.beginner{background:#e3f7d2;color:#3d7300}
.diff.intermediate{background:#fff0d6;color:#9c5d00}
.diff.advanced{background:#ffe0e0;color:#9c2222}
.diff.expert{background:#e8defb;color:#5e2c9e}
.diff.analytics{background:#dbeafe;color:#1d4ed8}
.diff.engineering{background:#e2e8f0;color:#0f172a}
.progress-ring{width:46px;height:46px;border-radius:50%;background:conic-gradient(var(--green) calc(var(--p)*1%),#eee 0);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.progress-ring-inner{width:36px;height:36px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:900}

.lesson-header{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.progress-bar{flex:1;height:12px;background:#e5e5e5;border-radius:10px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:10px;transition:width .3s;box-shadow:inset 0 -2px 0 rgba(0,0,0,.1)}
.close-btn{width:38px;height:38px;border-radius:50%;background:#eee;color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;flex-shrink:0}
.step-label{font-size:11.5px;font-weight:900;letter-spacing:1px;text-transform:uppercase;color:var(--muted);min-width:46px;text-align:right}

.card{background:var(--card);border:2px solid var(--line);border-radius:20px;padding:22px;box-shadow:0 6px 0 var(--line);border-left-width:6px;margin:18px 0}
.card-concept{border-left-color:var(--blue)}
.card-syntax{border-left-color:var(--purple)}
.card-example{border-left-color:var(--green)}
.card-question{border-left-color:var(--orange)}
.card-pitfall{border-left-color:var(--red)}
.card-summary{border-left-color:var(--gold)}

.card-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;margin-bottom:10px}
.b-concept{background:#e1f4ff;color:var(--blue-sh)}
.b-syntax{background:#f3e8ff;color:var(--purple-sh)}
.b-example{background:#dffac4;color:var(--green-sh)}
.b-question{background:#fff0d6;color:var(--orange-sh)}
.b-pitfall{background:#fee2e2;color:var(--red-sh)}
.b-summary{background:#fef3c7;color:var(--gold-sh)}

.card h2{font-size:21px;font-weight:900;letter-spacing:-.4px;line-height:1.25;margin-bottom:12px}
.card p{margin-bottom:10px;line-height:1.65;color:var(--ink2)}
.card p:last-child{margin-bottom:0}
.card ul,.card ol{margin:6px 0 12px 22px;line-height:1.65}
.card ul li,.card ol li{margin-bottom:5px}
.card code{background:rgba(0,0,0,.07);padding:2px 6px;border-radius:5px;font-size:.9em}

pre.code{background:var(--code-bg);color:var(--code-tx);padding:14px 16px;border-radius:12px;font-size:13px;line-height:1.65;overflow-x:auto;white-space:pre;margin:10px 0}
pre.code .k{color:var(--code-k);font-weight:600}
pre.code .s{color:var(--code-s)}
pre.code .n{color:var(--code-n)}
pre.code .c{color:var(--code-c);font-style:italic}
.note{background:#fff7ed;border-left:3px solid var(--orange);padding:10px 12px;border-radius:8px;font-size:13.5px;color:#7a4a00;font-weight:600;line-height:1.5;margin-top:10px}
.real{background:#ecfeff;border-left:3px solid var(--teal);padding:10px 12px;border-radius:8px;font-size:13px;color:#0c4a6e;font-weight:600;line-height:1.5;margin-top:12px}
.real b{color:#075985}
details.more{margin-top:12px;border:1px solid var(--line);border-radius:10px;background:#fafaf5}
details.more summary{cursor:pointer;padding:10px 14px;font-weight:800;font-size:13.5px;color:var(--muted);list-style:none;display:flex;justify-content:space-between;align-items:center}
details.more summary::-webkit-details-marker{display:none}
details.more summary::after{content:'▾';font-size:12px}
details[open].more summary::after{content:'▴'}
details.more[open]{background:#fff}
.more-body{padding:6px 14px 14px;font-size:14px;line-height:1.65;color:var(--ink2)}
.more-body ol{margin-left:20px}
.more-body li{margin-bottom:6px}

.tables-wrap{display:flex;gap:12px;flex-wrap:wrap;margin:10px 0 12px}
.mini-table{background:#fafaf7;border:1.5px solid var(--line);border-radius:10px;padding:8px 10px;flex:1;min-width:180px;max-width:100%}
.mt-caption{font-size:11px;font-weight:800;color:var(--blue-sh);letter-spacing:.4px;margin-bottom:6px}
.mini-table table{border-collapse:collapse;width:100%;font-family:'JetBrains Mono',monospace;font-size:11.5px}
.mini-table th,.mini-table td{padding:4px 8px;border:1px solid var(--line);text-align:left;white-space:nowrap;line-height:1.45}
.mini-table th{background:var(--tbl-h);font-weight:700;color:var(--ink);font-size:11px}
.mini-table tbody tr:nth-child(even){background:var(--tbl-alt)}
.mini-table td.null{color:#999;font-style:italic;font-size:10.5px}
.empty-rows{padding:8px 0 2px;text-align:center;font-size:11px;color:#9ca3af;font-style:italic}
.result-label{font-size:11px;font-weight:900;letter-spacing:.5px;color:var(--green-sh);margin:10px 0 2px;display:flex;align-items:center;gap:4px}
.result-label::before{content:'▶';font-size:9px}

.scenario{background:#f0f8ff;border-left:3px solid var(--blue);padding:10px 12px;border-radius:8px;font-size:13.5px;color:#1a4d6e;line-height:1.55;margin:8px 0 12px}
.options{display:grid;gap:10px;margin-top:14px}
.option{background:#fff;border:2px solid var(--line);border-radius:12px;padding:13px 15px;font-size:14.5px;font-weight:600;text-align:left;box-shadow:0 3px 0 var(--line);display:flex;align-items:flex-start;gap:12px;line-height:1.45;width:100%;min-height:44px}
.option:hover:not(:disabled){border-color:var(--blue)}
.option.selected{border-color:var(--blue);background:#eaf6fe;color:var(--blue-sh)}
.option.correct{border-color:var(--green);background:#dffac4;color:var(--green-sh);box-shadow:0 3px 0 var(--green-sh)}
.option.wrong{border-color:var(--red);background:#fee2e2;color:var(--red-sh);box-shadow:0 3px 0 var(--red-sh)}
.opt-letter{width:28px;height:28px;border-radius:8px;background:#eee;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:var(--muted);flex-shrink:0}
.option.selected .opt-letter{background:var(--blue);color:#fff}
.option.correct .opt-letter{background:var(--green);color:#fff}
.option.wrong .opt-letter{background:var(--red);color:#fff}
.option code{font-family:'JetBrains Mono',monospace;font-size:13px}

.fill{background:var(--code-bg);color:var(--code-tx);padding:14px;border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:13.5px;line-height:1.75;margin:12px 0;white-space:pre-wrap}
.blank{background:#fff;color:var(--ink);border:2px dashed var(--orange);border-radius:8px;padding:3px 10px;font-family:'JetBrains Mono',monospace;font-size:13.5px;font-weight:700;min-width:90px;outline:none}
.blank:focus{border-style:solid;border-color:var(--blue)}
.blank.correct{border-color:var(--green);background:#dffac4;color:var(--green-sh)}
.blank.wrong{border-color:var(--red);background:#fee2e2;color:var(--red-sh)}

.pitfall-block{margin-top:10px}
.pitfall-block .lbl{font-size:11px;font-weight:900;letter-spacing:.5px;margin-bottom:4px}
.pitfall-block.bad .lbl{color:var(--red-sh)}
.pitfall-block.good .lbl{color:var(--green-sh)}

.bullets{list-style:none;margin:8px 0 0;padding:0}
.bullets li{padding:8px 0 8px 32px;position:relative;line-height:1.55;font-weight:600;color:var(--ink2);border-bottom:1px dashed var(--line)}
.bullets li:last-child{border-bottom:none}
.bullets li::before{content:'✓';position:absolute;left:0;top:8px;width:22px;height:22px;border-radius:50%;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900}

.feedback{position:fixed;bottom:0;left:0;right:0;padding:16px 18px 20px;background:#fff;border-top:3px solid var(--line);transform:translateY(100%);transition:transform .25s cubic-bezier(.5,0,.5,1.4);z-index:60}
.feedback.show{transform:translateY(0)}
.feedback.correct{background:#d7ffb8;border-top-color:var(--green)}
.feedback.wrong{background:#fee2e2;border-top-color:var(--red)}
.feedback-inner{max-width:780px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
.fb-title{font-size:20px;font-weight:900;letter-spacing:-.3px;line-height:1.2}
.feedback.correct .fb-title{color:var(--green-sh)}
.feedback.wrong .fb-title{color:var(--red-sh)}
.fb-explain{font-size:13.5px;font-weight:600;line-height:1.5;margin-top:3px;max-width:560px;color:var(--ink2)}
.fb-explain code{background:rgba(0,0,0,.08);padding:2px 6px;border-radius:4px;font-size:12.5px}

.footer-actions{display:flex;gap:12px;justify-content:space-between;margin-top:18px;flex-wrap:wrap}
.footer-actions .right{display:flex;gap:10px;margin-left:auto}

.results{text-align:center;padding:30px 16px}
.trophy{font-size:78px;margin-bottom:8px;animation:bounce .8s ease-out}
@keyframes bounce{0%{transform:scale(0) rotate(-15deg)}60%{transform:scale(1.15) rotate(8deg)}100%{transform:scale(1) rotate(0)}}
.results h2{font-size:28px;font-weight:900;letter-spacing:-.7px;margin-bottom:6px}
.results .subtitle{color:var(--muted);font-weight:600;font-size:15px;margin-bottom:26px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:520px;margin:0 auto 26px}
.stat-card{background:var(--card);border:2px solid var(--line);border-radius:14px;padding:18px 10px;box-shadow:0 4px 0 var(--line)}
.sc-label{font-size:11px;font-weight:900;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.sc-value{font-size:26px;font-weight:900;letter-spacing:-.6px;margin-top:4px}
.stat-card.xp .sc-value{color:var(--gold)}
.stat-card.acc .sc-value{color:var(--green)}
.stat-card.time .sc-value{color:var(--blue)}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:18px;max-width:680px;width:100%;max-height:80vh;overflow-y:auto;padding:22px;box-shadow:0 12px 30px rgba(0,0,0,.3)}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-head h2{font-size:22px;font-weight:900;letter-spacing:-.4px}
.gloss-term{padding:10px 0;border-bottom:1px solid var(--line)}
.gloss-term:last-child{border-bottom:none}
.gloss-term dt{font-weight:900;font-size:14.5px;margin-bottom:3px;color:var(--blue-sh)}
.gloss-term dd{font-size:13.5px;color:var(--muted);line-height:1.5}
.gloss-term dd code{background:rgba(0,0,0,.07);padding:2px 5px;border-radius:4px;font-size:12.5px}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

@media (max-width:600px){
  .hero h1{font-size:25px}
  main{padding:16px 12px 80px}
  .module-card{padding:13px;grid-template-columns:48px 1fr auto;gap:10px}
  .module-icon{width:48px;height:48px;font-size:22px;border-radius:12px}
  .module-meta h3{font-size:15.5px}
  .module-meta .desc{font-size:12.5px}
  .progress-ring{width:40px;height:40px}
  .progress-ring-inner{width:30px;height:30px;font-size:10.5px}
  .card{padding:18px 16px}
  .card h2{font-size:18px}
  .featured{padding:18px}
  .featured h2{font-size:18px}
  .topbar{padding:10px 12px}
  .logo{font-size:19px}
  .logo-mark{width:32px;height:32px;font-size:16px}
  pre.code{font-size:12px;padding:11px 12px}
  .option{padding:11px 13px;font-size:13.5px}
  .modal{padding:18px;max-height:85vh}
  .mini-table{font-size:11px;min-width:140px}
  .mini-table th,.mini-table td{padding:3px 6px}
}

/* === Playground === */
.challenge-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.challenge-item{background:var(--card);border:2px solid var(--line);border-radius:14px;padding:14px;display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;cursor:pointer;text-align:left;width:100%;transition:transform .1s,box-shadow .1s,border-color .1s;box-shadow:0 3px 0 var(--line)}
.challenge-item:hover{transform:translateY(-2px);box-shadow:0 5px 0 var(--line);border-color:var(--blue)}
.challenge-item.completed{border-color:var(--green);background:#f3fae6}
.challenge-num{width:32px;height:32px;border-radius:8px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;flex-shrink:0}
.challenge-num.intermediate{background:var(--orange)}
.challenge-num.advanced{background:var(--red)}
.challenge-num.analytics{background:#3b82f6}
.challenge-info h4{font-size:15px;font-weight:800;letter-spacing:-.1px;line-height:1.3}
.challenge-info p{font-size:12.5px;color:var(--muted);margin-top:2px;line-height:1.4;font-weight:600}
.check-badge{font-size:18px;flex-shrink:0;color:var(--green-sh);font-weight:900}

.editor-shell{background:#1e1e2e;border-radius:12px;overflow:hidden;border:2px solid var(--line);margin-top:12px}
.editor-bar{background:#181825;padding:7px 11px;font-size:10.5px;font-weight:800;letter-spacing:.5px;color:#a6adc8;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
.editor-bar .hint{font-size:10px;color:#7f849c;letter-spacing:.2px;text-transform:none;font-weight:600}
.sql-editor{width:100%;border:none;background:transparent;color:#cdd6f4;font-family:'JetBrains Mono',monospace;font-size:13.5px;line-height:1.65;padding:12px 14px;outline:none;resize:vertical;min-height:140px;tab-size:2;display:block}
.sql-editor::placeholder{color:#6c7086}

.pg-actions{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
.pg-actions .btn{padding:10px 16px;font-size:13.5px;min-height:42px}

.run-output{margin-top:14px}
.run-output:empty{display:none}
.run-status{font-size:11px;font-weight:900;letter-spacing:.8px;text-transform:uppercase;margin:0 0 8px;display:flex;align-items:center;gap:6px}
.run-status.ok{color:var(--green-sh)}
.run-status.err{color:var(--red-sh)}
.error-block{background:#fef2f2;border-left:4px solid var(--red);padding:12px 14px;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#7f1d1d;line-height:1.55;white-space:pre-wrap;word-break:break-word}
.success-block{background:#d7ffb8;border-left:4px solid var(--green);padding:12px 14px;border-radius:8px;font-size:14px;color:#3d7300;font-weight:700;line-height:1.5;margin-bottom:8px}
.diff-block{background:#fff7ed;border-left:4px solid var(--orange);padding:12px 14px;border-radius:8px;font-size:13px;color:#7a4a00;line-height:1.5;margin-top:10px;font-weight:600}
.diff-block strong{color:#4a3700;display:block;margin:10px 0 4px;font-size:11.5px;letter-spacing:.4px;text-transform:uppercase}
.diff-block strong:first-child{margin-top:0}
.hint-block{background:#eff6ff;border-left:4px solid var(--blue);padding:11px 13px;border-radius:8px;font-size:13.5px;color:#1e40af;line-height:1.55;font-weight:600}

.pg-loading{text-align:center;padding:50px 20px;color:var(--muted);font-weight:700;font-size:15px}
.pg-loading .spin{display:inline-block;animation:spin 1s linear infinite;margin-right:8px;font-size:18px}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

@media (max-width:600px){
  .sql-editor{font-size:13px;padding:11px 12px;min-height:120px}
  .challenge-item{padding:12px;grid-template-columns:auto 1fr auto;gap:10px}
  .challenge-info h4{font-size:14.5px}
  .challenge-info p{font-size:12px}
}

/* === Interview Mode === */
.interview-card{background:linear-gradient(135deg,#1e1e2e,#6366f1);color:#fff;border-radius:20px;padding:22px;margin-bottom:24px;display:flex;gap:18px;align-items:center;flex-wrap:wrap;box-shadow:0 6px 0 #312e81}
.interview-card .featured-btn{background:#fff;color:#3730a3}

.interview-bar{position:sticky;top:62px;z-index:40;background:linear-gradient(135deg,#1e1e2e,#313244);color:#fff;padding:12px 16px;border-radius:14px;display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:16px;box-shadow:0 4px 0 #181825;flex-wrap:wrap}
.iv-timer{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:900;display:flex;align-items:center;gap:8px;letter-spacing:.5px}
.iv-timer .pulse{display:inline-block;width:10px;height:10px;background:#a6e3a1;border-radius:50%;animation:tick 1s infinite}
.iv-timer.urgent{color:#ff6b6b}
.iv-timer.urgent .pulse{background:#ff6b6b;animation:urgent 0.5s infinite}
@keyframes tick{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes urgent{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(1.4)}}
.iv-meta{display:flex;gap:18px;font-weight:800;font-size:13px;align-items:center}
.iv-meta-item{display:flex;flex-direction:column;align-items:flex-start;gap:1px}
.iv-meta-item .lbl{opacity:.65;font-size:9.5px;text-transform:uppercase;letter-spacing:.6px;font-weight:700}
.iv-meta-item .val{font-size:16px;font-weight:900;font-family:'JetBrains Mono',monospace}
.iv-meta-item .val.score{color:#a6e3a1}

.iv-diff-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:14px 0 18px}
.iv-diff-btn{padding:16px 14px;border-radius:16px;background:#fff;border:2px solid var(--line);box-shadow:0 4px 0 var(--line);text-align:left;cursor:pointer;transition:transform .1s,box-shadow .1s,border-color .1s;display:block;width:100%}
.iv-diff-btn:hover{transform:translateY(-2px);box-shadow:0 6px 0 var(--line);border-color:var(--blue)}
.iv-diff-btn.active{border-color:var(--blue);background:#eaf6fe;box-shadow:0 4px 0 var(--blue-sh)}
.iv-diff-btn h4{font-size:15px;font-weight:900;letter-spacing:-.2px;display:flex;align-items:center;gap:6px}
.iv-diff-btn p{font-size:12px;color:var(--muted);margin-top:3px;font-weight:600;line-height:1.4}
.iv-diff-btn .pill{display:inline-block;padding:1px 7px;border-radius:8px;font-size:10px;font-weight:800;background:var(--line);color:var(--muted);margin-left:6px}
.iv-diff-btn.active .pill{background:var(--blue);color:#fff}
.iv-diff-btn.faang{background:linear-gradient(135deg,#1e1e2e,#312e81);color:#fff;border-color:#312e81;box-shadow:0 4px 0 #1e1b4b}
.iv-diff-btn.faang p{color:#cdd6f4}
.iv-diff-btn.faang .pill{background:rgba(255,255,255,0.2);color:#fff}
.iv-diff-btn.faang.active{border-color:#a6e3a1;box-shadow:0 4px 0 #1e1b4b}

.iv-duration{display:flex;gap:10px;margin:8px 0 22px;flex-wrap:wrap}
.iv-duration .iv-dur-btn{flex:1;min-width:90px;padding:14px;border-radius:14px;background:#fff;border:2px solid var(--line);box-shadow:0 4px 0 var(--line);font-weight:800;font-size:14px;cursor:pointer;text-align:center;transition:transform .08s,box-shadow .08s,border-color .1s}
.iv-duration .iv-dur-btn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--line)}
.iv-duration .iv-dur-btn.active{border-color:var(--blue);background:#eaf6fe;color:var(--blue-sh);box-shadow:0 4px 0 var(--blue-sh)}
.iv-duration .iv-dur-btn .sub{font-size:10.5px;font-weight:700;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.4px}
.iv-duration .iv-dur-btn.active .sub{color:var(--blue-sh)}

.iv-start-btn{width:100%;padding:16px;font-size:16px;margin-top:6px}

.iv-q-result{font-size:11px;font-weight:900;letter-spacing:.5px;text-transform:uppercase;padding:5px 10px;border-radius:8px;display:inline-flex;align-items:center;gap:5px}
.iv-q-result.correct{background:#d7ffb8;color:var(--green-sh)}
.iv-q-result.skipped{background:#fde68a;color:#92400e}
.iv-q-result.timeout{background:#fed7aa;color:#9a3412}
.iv-q-result.failed{background:#fee2e2;color:var(--red-sh)}

.iv-summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:540px;margin:18px auto 24px}
.iv-sum-card{background:var(--card);border:2px solid var(--line);border-radius:12px;padding:14px 6px;box-shadow:0 4px 0 var(--line)}
.iv-sum-card .lbl{font-size:10px;font-weight:900;letter-spacing:.6px;text-transform:uppercase;color:var(--muted)}
.iv-sum-card .val{font-size:22px;font-weight:900;letter-spacing:-.4px;margin-top:3px}
.iv-sum-card.score .val{color:var(--gold)}
.iv-sum-card.solved .val{color:var(--green)}
.iv-sum-card.xp .val{color:var(--blue)}
.iv-sum-card.time .val{color:var(--purple)}

.iv-breakdown{margin:24px 0 0}
.iv-breakdown h3{font-size:15px;font-weight:900;margin-bottom:10px;letter-spacing:-.2px}
.iv-q-row{display:grid;grid-template-columns:auto 1fr auto auto;gap:10px;align-items:center;padding:10px 12px;background:#fff;border:1.5px solid var(--line);border-radius:10px;margin-bottom:8px;text-align:left;font-size:13.5px;font-weight:700}
.iv-q-row.correct{border-left:4px solid var(--green)}
.iv-q-row.failed{border-left:4px solid var(--red)}
.iv-q-row.skipped{border-left:4px solid #f59e0b}
.iv-q-row .qnum{width:26px;height:26px;border-radius:6px;background:var(--line);color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0}
.iv-q-row.correct .qnum{background:var(--green);color:#fff}
.iv-q-row.failed .qnum{background:var(--red);color:#fff}
.iv-q-row.skipped .qnum{background:#f59e0b;color:#fff}
.iv-q-row .qtitle{font-weight:800;font-size:13px;letter-spacing:-.1px}
.iv-q-row .qcat{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
.iv-q-row .qtime{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);font-weight:700}
.iv-q-row .qscore{font-size:14px;font-weight:900;color:var(--gold-sh);font-family:'JetBrains Mono',monospace}

.iv-history{margin-top:18px}
.iv-history h3{font-size:15px;font-weight:900;margin-bottom:10px;letter-spacing:-.2px}
.iv-history-empty{padding:18px;text-align:center;color:var(--muted);font-size:13px;font-style:italic;background:#fafaf5;border-radius:12px;border:1px dashed var(--line)}
.iv-history-list{display:flex;flex-direction:column;gap:8px}
.iv-history-row{background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;font-size:13px}
.iv-history-row .dt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);font-weight:700}
.iv-history-row .desc{font-weight:800;font-size:13px}
.iv-history-row .desc small{display:block;color:var(--muted);font-weight:600;font-size:11.5px;margin-top:1px}
.iv-history-row .pts{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:900;color:var(--gold-sh)}

.iv-end-warning{background:#fef3c7;border-left:4px solid #f59e0b;padding:10px 12px;border-radius:8px;font-size:13px;color:#7a4a00;font-weight:600;line-height:1.5;margin-top:10px}

@media (max-width:600px){
  .iv-diff-grid{grid-template-columns:1fr}
  .iv-summary-grid{grid-template-columns:repeat(2,1fr)}
  .interview-bar{top:54px;padding:10px 12px;gap:8px}
  .iv-timer{font-size:18px}
  .iv-meta{gap:12px}
  .iv-meta-item .val{font-size:14px}
  .iv-q-row{grid-template-columns:auto 1fr auto;font-size:12.5px}
  .iv-q-row .qtime{display:none}
}

/* === Schema viewer & ER diagrams === */
.schema-list{display:flex;flex-direction:column;gap:10px}
.schema-item{background:var(--card);border:2px solid var(--line);border-radius:14px;padding:14px;display:grid;grid-template-columns:50px 1fr auto;gap:12px;align-items:center;cursor:pointer;text-align:left;width:100%;transition:transform .1s,box-shadow .1s,border-color .1s;box-shadow:0 3px 0 var(--line)}
.schema-item:hover{transform:translateY(-2px);box-shadow:0 5px 0 var(--line);border-color:#0ea5e9}
.schema-icon{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;flex-shrink:0;box-shadow:inset 0 -3px 0 rgba(0,0,0,.15)}
.schema-info h4{font-size:15px;font-weight:800;letter-spacing:-.1px;line-height:1.3}
.schema-info p{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:2px;line-height:1.4}
.schema-arrow{font-size:20px;color:var(--muted);font-weight:900}

.schema-canvas{background:#fafaf5;background-image:radial-gradient(circle,#d4d4cc 1px,transparent 1px);background-size:18px 18px;border:2px solid var(--line);border-radius:14px;margin:14px 0;overflow:auto;-webkit-overflow-scrolling:touch}
.schema-canvas-inner{position:relative}
.schema-svg{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
.schema-tables{position:absolute;top:0;left:0;width:100%;height:100%;z-index:2}

.er-table{position:absolute;width:210px;background:#fff;border:2px solid var(--ink2);border-radius:10px;box-shadow:0 4px 0 rgba(0,0,0,.15);font-family:'JetBrains Mono',monospace;font-size:11.5px;overflow:hidden}
.er-table-header{background:linear-gradient(135deg,#1e1e2e,#313244);color:#fff;padding:8px 12px;font-weight:900;font-family:Nunito,sans-serif;font-size:13px;letter-spacing:.3px}
.er-row{height:28px;padding:0 10px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:6px;line-height:28px;transition:background .25s,box-shadow .25s}
.er-row.pk-row{background:#fff7e0}
.er-row.fk-row{background:#eff6ff}
.er-row.pk-row.fk-row{background:linear-gradient(135deg,#fff7e0,#eff6ff)}
.er-row.highlight{background:#dffac4!important;box-shadow:inset 0 0 0 2px var(--green);animation:rowPulse .8s ease-in-out 3}
@keyframes rowPulse{0%,100%{background:#dffac4}50%{background:#a7f3d0}}
.er-row .col-name{font-weight:700;display:flex;align-items:center;gap:6px;color:var(--ink)}
.er-row .col-type{color:var(--muted);font-size:10px;letter-spacing:.2px}
.er-row .kpi{font-family:Nunito,sans-serif;font-size:9px;font-weight:900;padding:2px 5px;border-radius:4px;letter-spacing:.3px;line-height:1}
.er-row .kpi.pk{background:var(--gold);color:#fff}
.er-row .kpi.fk{background:var(--blue);color:#fff}

.rel-line{fill:none;stroke:#94a3b8;stroke-width:2;stroke-dasharray:5 4;cursor:pointer;pointer-events:stroke;transition:stroke .2s,stroke-width .2s,stroke-dasharray .2s}
.rel-line:hover{stroke:#0ea5e9;stroke-width:3}
.rel-line.active{stroke:var(--green-sh);stroke-width:3.5;stroke-dasharray:none}
.rel-line.hit{pointer-events:stroke;stroke:transparent;stroke-width:14}
.rel-label{fill:var(--ink);paint-order:stroke;stroke:#fafaf5;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;font-family:Nunito,sans-serif;font-size:10.5px;font-weight:900;pointer-events:none;text-anchor:middle}
.join-dot{fill:var(--orange);filter:drop-shadow(0 0 6px rgba(255,150,0,.85))}

.rel-list{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.rel-item{background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:center;cursor:pointer;text-align:left;width:100%;transition:border-color .15s,background .15s,box-shadow .15s}
.rel-item:hover{border-color:#0ea5e9}
.rel-item.active{border-color:var(--green-sh);background:#f3fae6;box-shadow:0 2px 0 rgba(70,163,2,.3)}
.rel-type-pill{font-family:Nunito,sans-serif;font-weight:900;font-size:10px;padding:3px 7px;border-radius:6px;letter-spacing:.3px;white-space:nowrap}
.rel-type-pill.one-to-many{background:#dbeafe;color:#1d4ed8}
.rel-type-pill.many-to-many{background:#fef3c7;color:#92400e}
.rel-item .rel-desc{font-size:13px;font-weight:600;color:var(--ink2);line-height:1.4}
.rel-item .rel-desc code{font-family:'JetBrains Mono',monospace;font-size:11.5px;background:rgba(0,0,0,.06);padding:1px 5px;border-radius:4px;color:var(--ink)}
.rel-item .rel-desc small{display:block;color:var(--muted);font-size:11.5px;font-weight:600;margin-top:2px}

.mn-callout{background:linear-gradient(135deg,#fef3c7,#fde68a);border:1.5px solid #f59e0b;border-radius:10px;padding:10px 12px;margin-top:10px;font-size:13px;color:#7a4a00;font-weight:600;line-height:1.5}
.mn-callout b{color:#4a3700}
.mn-callout code{font-family:'JetBrains Mono',monospace;font-size:11.5px;background:rgba(255,255,255,.6);padding:1px 5px;border-radius:4px}

.join-sql-box{margin-top:14px}
.join-sql-box pre.code{margin-top:6px}

.legend{display:flex;gap:14px;flex-wrap:wrap;margin:8px 0 0;font-size:11.5px;color:var(--muted);font-weight:700}
.legend span{display:inline-flex;align-items:center;gap:5px}
.legend .sw{width:14px;height:14px;border-radius:3px;display:inline-block}

/* Normalization */
.norm-stages{display:flex;gap:8px;margin:10px 0 14px;flex-wrap:wrap}
.norm-tab{padding:10px 16px;background:#fff;border:2px solid var(--line);border-radius:12px;font-weight:800;font-size:13px;box-shadow:0 3px 0 var(--line);cursor:pointer;transition:transform .08s;font-family:Nunito,sans-serif}
.norm-tab:active{transform:translateY(2px);box-shadow:0 1px 0 var(--line)}
.norm-tab.active{background:var(--blue);color:#fff;border-color:var(--blue-sh);box-shadow:0 3px 0 var(--blue-sh)}
.norm-stage-header{display:flex;align-items:center;gap:10px;margin:6px 0 10px}
.norm-stage-header h3{font-size:18px;font-weight:900;letter-spacing:-.3px}
.norm-stage-badge{padding:4px 9px;border-radius:8px;font-size:11px;font-weight:900;letter-spacing:.4px;background:var(--line);color:var(--ink2)}
.norm-stage-badge.issue{background:#fee2e2;color:var(--red-sh)}
.norm-stage-badge.partial{background:#fef3c7;color:#92400e}
.norm-stage-badge.fixed{background:#d7ffb8;color:var(--green-sh)}
.norm-issue{padding:11px 13px;border-radius:10px;font-size:13.5px;line-height:1.55;font-weight:600;margin-bottom:10px;border-left:4px solid}
.norm-issue.issue{background:#fef2f2;border-left-color:var(--red);color:#7f1d1d}
.norm-issue.partial{background:#fef3c7;border-left-color:#f59e0b;color:#7a4a00}
.norm-issue.fixed{background:#d7ffb8;border-left-color:var(--green);color:#3d7300}
.norm-issue b{font-weight:900}
.norm-sample-label{font-size:11px;font-weight:900;letter-spacing:.5px;color:var(--muted);margin:14px 0 4px;text-transform:uppercase}

@media (max-width:600px){
  .er-table{width:180px;font-size:11px}
  .er-table-header{font-size:12px;padding:7px 10px}
  .er-row{height:26px;line-height:26px;font-size:10.5px;padding:0 8px}
  .er-row .kpi{font-size:8.5px;padding:2px 4px}
  .er-row .col-type{font-size:9.5px}
  .schema-item{padding:12px;grid-template-columns:42px 1fr auto;gap:10px}
  .schema-icon{width:42px;height:42px;font-size:20px}
  .schema-info h4{font-size:14px}
  .schema-info p{font-size:12px}
  .norm-tab{padding:9px 13px;font-size:12.5px}
}

/* === AI Mentor === */
.mentor-card{background:linear-gradient(135deg,#fefce8,#fef3c7);border:2px solid #f59e0b;border-radius:14px;padding:14px;margin-top:12px;box-shadow:0 4px 0 rgba(245,158,11,.25)}
.mentor-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.mentor-avatar{font-size:22px;width:38px;height:38px;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 0 rgba(0,0,0,.1);flex-shrink:0}
.mentor-info{flex:1;min-width:0}
.mentor-name{font-weight:900;font-size:13.5px;letter-spacing:-.2px;color:#7a4a00;line-height:1.2}
.mentor-tag{font-size:10px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:#a16207;margin-top:2px}
.mentor-close{font-size:18px;color:#a16207;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:900}
.mentor-close:hover{background:rgba(0,0,0,.06)}
.mentor-title{font-size:14.5px;font-weight:900;letter-spacing:-.2px;color:#7a4a00;margin-bottom:8px;line-height:1.35}
.mentor-title code{background:rgba(0,0,0,.07);padding:1px 6px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:12.5px;font-weight:700;color:#5a3a00}
.mentor-hint{background:#fff;border-radius:10px;padding:11px 13px;font-size:13.5px;line-height:1.6;color:#3f2a00;font-weight:600}
.mentor-hint code{background:rgba(0,0,0,.08);padding:2px 6px;border-radius:5px;font-size:12px;font-family:'JetBrains Mono',monospace;color:#1f1f1f}
.mentor-progress{font-size:10.5px;font-weight:900;color:#a16207;margin-top:8px;letter-spacing:.4px;text-transform:uppercase}
.mentor-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.mentor-actions .btn{padding:8px 14px;font-size:12.5px;min-height:36px}
.mentor-encouragement{background:#fff;border-radius:10px;padding:11px 13px;font-size:13.5px;line-height:1.6;color:#3d7300;font-weight:700;border-left:3px solid var(--green)}
.btn-mentor{background:#fef3c7;color:#7a4a00;border:2px solid #f59e0b;box-shadow:0 3px 0 #c77400;font-weight:800}
.btn-mentor:active{box-shadow:0 1px 0 #c77400}
.btn-mentor:hover{background:#fde68a}

/* === Adaptive Learning === */
.daily-goal-card{background:linear-gradient(135deg,#dbeafe,#bfdbfe);border:2px solid #3b82f6;border-radius:16px;padding:14px 16px;margin-bottom:14px;box-shadow:0 4px 0 #1d4ed8;cursor:pointer;width:100%;text-align:left;transition:transform .08s,box-shadow .15s}
.daily-goal-card:hover{transform:translateY(-1px);box-shadow:0 5px 0 #1d4ed8}
.dg-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:10px;flex-wrap:wrap}
.dg-title{font-weight:900;font-size:14.5px;color:#1e3a8a;letter-spacing:-.2px;display:flex;align-items:center;gap:6px}
.dg-count{font-weight:900;font-size:14px;color:#1e3a8a;font-family:'JetBrains Mono',monospace}
.dg-bar-bg{background:#fff;height:10px;border-radius:5px;overflow:hidden;border:1.5px solid #93c5fd}
.dg-bar-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#0ea5e9);border-radius:4px;transition:width .4s}
.dg-bar-fill.complete{background:linear-gradient(90deg,#22c55e,#16a34a)}
.dg-status{font-size:12px;color:#1e40af;font-weight:700;margin-top:7px;line-height:1.4}
.dg-freeze{display:inline-flex;align-items:center;gap:3px;background:#fff;color:#1d4ed8;padding:1px 6px;border-radius:5px;font-size:10.5px;font-weight:900;letter-spacing:.3px}

.rec-card{background:linear-gradient(135deg,#fef3c7,#fde68a);border:2px solid #f59e0b;border-radius:14px;padding:12px 14px;margin-bottom:14px;box-shadow:0 3px 0 #c77400;display:grid;grid-template-columns:42px 1fr auto;gap:12px;align-items:center;cursor:pointer;text-align:left;width:100%;transition:transform .08s,box-shadow .15s}
